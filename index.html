<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Atlas Validator — case_review_atom_mvp</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>

<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-mono/style.css" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  :root {
    --primary:#09090B; --primary-active:#252A33; --primary-disabled:#D1D7DE;
    --hairline:#E8ECF0; --hairline-soft:#F4F6F8;
    --ink:#09090B; --body-strong:#1A1D24; --body:#3A3F4B;
    --muted:#5C6370; --muted-soft:#8B929E;
    --canvas:#FFFFFF; --surface-soft:#F4F6F8; --surface-card:#E8ECF0;
    --surface-cream-strong:#D1D7DE;
    --success:#16A34A; --warning:#D97706; --error:#DC2626;
    --serif:"Geist",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --sans:"Geist",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"Geist Mono",ui-monospace,Menlo,Consolas,monospace;
    --dim-C:#5C6370; --dim-S:#2563EB; --dim-P:#16A34A; --dim-R:#D97706;
    --dim-E:#8B929E; --dim-M:#454B56; --dim-X:#DC2626;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--canvas);color:var(--body);font-family:var(--sans);font-size:13px;line-height:1.4}
  .shell{max-width:880px;margin:0 auto;padding:14px 18px 60px}
  h1{font-family:var(--sans);font-weight:600;font-size:22px;letter-spacing:-0.015em;line-height:1.27;color:var(--ink);margin:0 0 4px}
  .sub{color:var(--muted);font-size:12px;margin-bottom:14px}
  .pill{display:inline-block;padding:1px 6px;border-radius:4px;background:var(--surface-soft);font-size:10px;color:var(--muted);font-family:var(--mono);margin-right:6px}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .stat{background:var(--surface-card);border:1px solid var(--hairline);border-radius:8px;padding:10px}
  .stat .n{font-family:var(--sans);font-size:22px;color:var(--ink);font-weight:600;letter-spacing:-0.02em}
  .stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
  .row{display:flex;gap:8px;align-items:center;margin:10px 0}
  button{font-family:var(--sans);font-size:12px;padding:6px 11px;border-radius:6px;border:1px solid var(--hairline);background:var(--canvas);color:var(--ink);cursor:pointer}
  button:disabled{opacity:.55;cursor:not-allowed}
  button.primary{background:var(--primary);color:#fff;border-color:var(--primary);border-radius:8px}
  button.primary:hover:not(:disabled){background:var(--primary-active);border-color:var(--primary-active)}
  button.primary:disabled{background:var(--primary-disabled);color:var(--muted);border-color:var(--hairline);cursor:not-allowed}
  button.ghost{background:transparent}
  button.tab{background:transparent;border:1px solid var(--hairline);border-radius:6px;padding:6px 14px;color:var(--muted);font-weight:500;transition:all .15s}
  button.tab:hover{background:#f3f4f6;color:var(--ink)}
  button.tab.active{background:#2563EB;color:#fff;border-color:#2563EB;font-weight:600}
  pre{background:#0F1115;color:#EAEDF0;font-family:var(--mono);font-size:11px;padding:10px;border-radius:6px;overflow:auto;max-height:280px}
  .err{background:#FEF2F2;border:1px solid #FECACA;color:var(--error);padding:10px;border-radius:6px;font-size:12px;margin:10px 0}
  .ok{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534;padding:10px;border-radius:6px;font-size:12px;margin:10px 0}
  .muted{color:var(--muted)}

  /* Tagger */
  .tag-card{background:var(--canvas);border:1px solid var(--hairline);border-radius:12px;padding:14px;margin:12px 0}
  .case-meta{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12px}
  .case-meta dt{color:var(--muted);font-weight:500}
  .case-meta dd{margin:0;color:var(--ink);overflow-wrap:anywhere}
  .case-url-link{color:var(--blue,#1677ff);text-decoration:none;font-weight:500;font-size:12px}
  .case-url-link:hover{text-decoration:underline}
  .user-context{display:flex;flex-direction:column;gap:2px}
  .user-nickname{font-weight:600;font-size:12px;line-height:1.4}
  .user-bio{color:var(--muted);font-size:11px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .case-images-section{margin-top:8px;padding-top:8px;border-top:1px solid var(--hairline)}
  .case-images-label{color:var(--muted);font-weight:500;font-size:12px;margin-bottom:6px}
  .text-block{background:var(--surface-soft);border:1px solid var(--hairline);border-radius:6px;padding:8px;margin:4px 0;white-space:pre-wrap;font-size:12px;max-height:120px;overflow:auto}
  .dim-row{display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:start;padding:8px 0;border-top:1px solid var(--hairline)}
  .dim-row:first-child{border-top:none}
  .dim-label{font-family:var(--mono);font-weight:600;font-size:13px;color:#fff;background:var(--muted);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .dim-C .dim-label{background:var(--dim-C)}
  .dim-S .dim-label{background:var(--dim-S)}
  .dim-P .dim-label{background:var(--dim-P)}
  .dim-R .dim-label{background:var(--dim-R)}
  .dim-E .dim-label{background:var(--dim-E)}
  .dim-M .dim-label{background:var(--dim-M)}
  .dim-X .dim-label{background:var(--dim-X)}
  .dim-body{min-width:0}
  .dim-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
  .dim-name{font-weight:500;color:var(--ink);font-size:12px}
  .dim-count{font-size:11px;color:var(--muted);font-family:var(--mono)}
  .filter{width:100%;font-family:var(--sans);font-size:12px;padding:5px 8px;border:1px solid var(--hairline);border-radius:6px;background:var(--canvas);margin-bottom:6px}
  .chips{display:flex;flex-wrap:wrap;gap:4px;max-height:120px;overflow:auto;padding:4px;background:var(--surface-soft);border-radius:5px;border:1px solid var(--hairline)}
  .chip{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:9999px;font-size:11px;border:1px solid var(--hairline);background:var(--canvas);color:var(--ink);cursor:pointer;font-family:var(--mono);white-space:nowrap}
  .chip:hover{background:var(--surface-cream-strong)}
  .chip.selected{background:var(--primary);color:#fff;border-color:var(--primary)}
  .chip.selected:hover{background:var(--primary-active)}
  .chip.suggested{background:#DBEAFE;border-color:#93C5FD}
  .chip.suggested:hover{background:#BFDBFE}
  .chip-name{font-family:var(--sans);font-size:10px;color:inherit;opacity:.85;font-weight:400}
  .selected-strip{padding:6px;background:var(--canvas);border:1px solid var(--hairline);border-radius:6px;min-height:30px;display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
  .selected-strip:empty:before{content:"(none selected)";color:var(--muted);font-size:11px;font-style:italic}
  .case-picker{width:100%;font-family:var(--sans);font-size:13px;padding:7px 10px;border:1px solid var(--hairline);border-radius:8px;background:var(--canvas)}
  .case-picker:focus{outline:2px solid #2563EB;outline-offset:-1px}
  details{margin:8px 0}
  details summary{cursor:pointer;font-weight:500;padding:4px 0;font-size:12px}

  /* Phase 3 — Verdict UI */
  .verdict-card{background:var(--canvas);border:1px solid var(--hairline);border-radius:12px;padding:14px;margin:12px 0;overflow:visible}
  .verdict-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:9999px;font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:.06em;line-height:1.3;border:1px solid transparent;cursor:help}
  [data-tip]{position:relative;cursor:help}
  [data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;font-size:11px;font-weight:400;font-family:var(--sans);line-height:1.4;padding:6px 10px;border-radius:6px;white-space:normal;width:max-content;max-width:280px;z-index:9999;opacity:0;visibility:hidden;transition:opacity .15s,visibility .15s;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.15);text-align:left;letter-spacing:normal}
  [data-tip]:hover::after{opacity:1;visibility:visible}
  [data-tip].tip-down::after{bottom:auto;top:calc(100% + 6px)}
  .verdict-VIOLATION{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
  .verdict-NOT_RECOMMEND{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
  .verdict-NOT_FOR_FEED{background:#FEF9C3;color:#854D0E;border:1px solid #FEF08A}
  .verdict-APPROVE{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}
  .verdict-NO_CLAIM_FIRED{background:#F4F6F8;color:#5C6370;border:1px solid #D1D7DE}
  .verdict-ESCALATE{background:#FDF2F8;color:#9D174D;border:1px solid #FBCFE8}
  /* ---- v0.7.1 phase6a: reasoned-verdict (paste-back) — bytesized brand system ----
     Cool-gray surfaces, hairline border, no colored fill
     except inside the verdict pill (re-uses semantic verdict-* classes).
     Blue accent border reserved for primary-card emphasis when a verdict is rendered. */
  .reasoned-card{background:var(--surface-soft);border:1px solid var(--hairline);border-radius:12px;padding:16px;margin:12px 0}
  .reasoned-card.has-verdict{background:var(--canvas);border-color:var(--hairline)}
  .reasoned-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
  .reasoned-title{font-family:var(--sans);font-weight:600;font-size:18px;color:var(--ink);letter-spacing:-0.01em;line-height:1.33}
  .reasoned-sub{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.45}
  .reasoned-paste{width:100%;font-family:var(--mono);font-size:11px;line-height:1.5;border:1px solid var(--hairline);border-radius:8px;padding:10px 12px;background:var(--canvas);color:var(--ink);resize:vertical;display:block;box-sizing:border-box}
  .reasoned-paste:focus{outline:none;border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,0.12)}
  .reasoned-summary-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--canvas);border:1px solid var(--hairline);border-radius:8px;font-size:12px;color:var(--muted)}
  .reasoned-summary-bar .ok-dot{width:6px;height:6px;border-radius:50%;background:var(--success);display:inline-block;flex:0 0 6px}
  .reasoned-err{background:#FEF2F2;border:1px solid #FECACA;color:var(--error);padding:8px 10px;border-radius:8px;font-size:12px;margin-top:8px;line-height:1.5}
  .reasoned-warn{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;padding:8px 10px;border-radius:8px;font-size:12px;margin-top:8px;line-height:1.5}
  /* Atom chip — pill, caption type, dim-tinted backgrounds (warm-toned) */
  .atom-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:9999px;font-family:var(--sans);font-weight:500;font-size:11px;line-height:1.3;background:var(--surface-card);color:var(--ink);margin:2px;border:1px solid transparent;white-space:nowrap}
  .atom-chip .chip-dim{font-family:var(--mono);font-weight:600;font-size:10px;opacity:0.65;letter-spacing:0.5px}
  .atom-chip .chip-name{font-weight:500}
  .atom-chip.rejected{text-decoration:line-through;color:var(--muted-soft);background:var(--surface-soft);opacity:.85;border-color:var(--hairline-soft)}
  .atom-chip.unknown{background:#fdf0ee;color:var(--error);border-color:#f0c0b8}
  .atom-chip.dim-C{background:#F4F6F8;color:#09090B}
  .atom-chip.dim-S{background:#DBEAFE;color:#09090B}
  .atom-chip.dim-P{background:#DCFCE7;color:#09090B}
  .atom-chip.dim-R{background:#FEF3C7;color:#09090B}
  .atom-chip.dim-E{background:#E8ECF0;color:#09090B}
  .atom-chip.dim-M{background:#F1F5F9;color:#09090B}
  .atom-chip.dim-X{background:#FEF2F2;color:#09090B}
  /* Dim row (scoped to the reasoned-verdict card so it does NOT clash with
     the AtomTagger DimRow grid layout above) */
  .reasoned-card .dim-row{display:flex;align-items:flex-start;gap:10px;padding:6px 0;font-size:12px;border-top:1px dashed var(--hairline-soft);grid-template-columns:none}
  .reasoned-card .dim-row:first-child{border-top:none;padding-top:0}
  .reasoned-card .dim-row .dim-bullet{flex:0 0 22px;width:22px;height:22px;border-radius:50%;background:var(--surface-card);color:var(--ink);display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:0;margin-top:1px}
  .reasoned-card .dim-row .dim-bullet.dim-C{background:#F4F6F8}
  .reasoned-card .dim-row .dim-bullet.dim-S{background:#DBEAFE}
  .reasoned-card .dim-row .dim-bullet.dim-P{background:#DCFCE7}
  .reasoned-card .dim-row .dim-bullet.dim-R{background:#FEF3C7}
  .reasoned-card .dim-row .dim-bullet.dim-E{background:#E8ECF0}
  .reasoned-card .dim-row .dim-bullet.dim-M{background:#F1F5F9}
  .reasoned-card .dim-row .dim-bullet.dim-X{background:#FEF2F2}
  .reasoned-card .dim-row .dim-meta{flex:0 0 auto;display:flex;flex-direction:column;gap:1px;min-width:80px}
  .reasoned-card .dim-row .dim-meta .dim-name{font-family:var(--sans);font-weight:500;font-size:12px;color:var(--ink)}
  .reasoned-card .dim-row .dim-meta .dim-count{font-family:var(--mono);font-size:10px;color:var(--muted)}
  .reasoned-card .dim-row .dim-cells{flex:1;display:flex;flex-wrap:wrap;align-items:center;gap:2px}
  /* Claim chain row — dominant first, highlighted */
  .claim-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;padding:8px 0;border-top:1px solid var(--hairline-soft);font-size:12px;align-items:center}
  .claim-row:first-child{border-top:none}
  .claim-row.dominant{padding:10px 12px;background:var(--surface-card);border-radius:8px;margin-top:2px;border-top:none}
  .claim-id{font-family:var(--mono);font-weight:500;color:var(--ink);font-size:12px}
  /* Precedent applicability cards */
  .precedent-pa{padding:10px 12px;background:var(--canvas);border:1px solid var(--hairline);border-left:3px solid var(--hairline);border-radius:8px;margin:6px 0;font-size:12px;line-height:1.55;overflow:hidden}
  .precedent-pa.applicable{border-left-color:var(--success)}
  .precedent-pa.partial{border-left-color:var(--warning)}
  .precedent-pa.non-applicable{border-left-color:var(--muted-soft,#8B929E);opacity:0.85}
  .precedent-pa .pa-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .precedent-pa .pa-note{margin-top:4px;color:var(--body)}
  .precedent-pa .atom-chip{max-width:100%;overflow:hidden;text-overflow:ellipsis}
  /* Watch-out callouts */
  .watch-out{padding:8px 10px;background:#FFFBEB;border-left:3px solid var(--warning);font-size:12px;margin:4px 0;border-radius:6px;line-height:1.5}
  /* Confidence chip semantics */
  .conf-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:9999px;font-family:var(--mono);font-weight:600;font-size:11px;line-height:1.3;letter-spacing:0.5px;border:1px solid transparent}
  .conf-chip.high{background:#F0FDF4;color:#166534;border-color:#BBF7D0}
  .conf-chip.mid{background:#FEF3C7;color:#92400E;border-color:#FDE68A}
  .conf-chip.low{background:#FEF2F2;color:var(--error);border-color:#FECACA}
  /* Reasoned card sub-section heads (caption-uppercase) */
  .reasoned-section-head{font-family:var(--sans);font-weight:500;font-size:11px;line-height:1.4;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
  .reasoned-section-head:first-child{margin-top:0}
  .reasoned-section-head .count{letter-spacing:0;text-transform:none;font-family:var(--mono);font-size:11px;color:var(--muted-soft);font-weight:400;margin-left:6px}
  /* Generic small button used inside the pane */
  .reasoned-card .btn-ghost{font-family:var(--sans);font-size:12px;font-weight:500;padding:5px 10px;border-radius:6px;border:1px solid var(--hairline);background:transparent;color:var(--ink);cursor:pointer}
  .reasoned-card .btn-ghost:hover{background:var(--surface-card)}
  .reasoned-card details>summary{font-family:var(--sans);font-weight:500;font-size:12px;color:var(--body);cursor:pointer;list-style:none;padding:6px 0}
  .reasoned-card details>summary::-webkit-details-marker{display:none}
  .reasoned-card details>summary::before{content:"▸";display:inline-block;margin-right:6px;color:var(--muted-soft);font-size:10px;transition:transform 0.15s}
  .reasoned-card details[open]>summary::before{transform:rotate(90deg)}
  .verdict-meta{margin-left:10px;font-size:11px;color:var(--muted);font-family:var(--sans)}
  .hit-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:start;padding:7px 0;border-top:1px solid var(--hairline);font-size:12px}
  .hit-row:first-child{border-top:none}
  .hit-id{font-family:var(--mono);font-weight:500;color:var(--ink);padding-top:1px}
  .hit-evidence{display:flex;flex-wrap:wrap;gap:3px}
  .ev-pill{display:inline-block;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:10px;background:var(--surface-soft);color:var(--ink)}
  .prec-card{display:grid;grid-template-columns:200px 1fr;gap:12px;padding:10px 0;border-top:1px solid var(--hairline);font-size:12px}
  .prec-card:first-child{border-top:none}
  .prec-meta{display:flex;flex-direction:column;gap:4px;font-family:var(--mono);font-size:11px}
  .prec-rank{font-weight:700;font-size:13px;color:var(--ink)}
  .prec-id{color:var(--muted);overflow-wrap:anywhere;font-size:10px}
  .prec-pills{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
  .prec-decision{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;color:#fff;background:#666}
  .prec-decision.flag{background:#c00}
  .prec-decision.allow,.prec-decision.approve{background:#1a8a1a}
  .prec-decision.dnr,.prec-decision.not_recommend{background:#d97706}
  .prec-decision.nff,.prec-decision.not_for_feed{background:#a16207}
  .prec-scores{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;font-size:10px}
  .prec-score{padding:1px 6px;border-radius:3px;background:var(--surface-soft);font-family:var(--mono)}
  .prec-score.primary{background:var(--primary);color:#fff}
  .prec-body{display:flex;flex-direction:column;gap:6px;min-width:0}
  .prec-summary{font-size:11px;line-height:1.45;color:var(--ink);max-height:88px;overflow:auto;padding:6px 8px;background:var(--surface-soft);border-radius:4px}
  .prec-rationale{font-size:10px;line-height:1.4;color:var(--muted);font-style:italic}
  .prec-dim-grid{display:flex;gap:3px;flex-wrap:wrap;font-family:var(--mono);font-size:10px}
  .prec-dim-cell{padding:1px 5px;border-radius:4px;background:var(--canvas);border:1px solid var(--hairline);color:var(--muted)}
  .prec-dim-cell.hit{background:#DCFCE7;border-color:#86EFAC;color:#166534}
  .lift-pill{display:inline-block;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:10px;background:var(--success);color:#fff}
  .outcome-tag{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px;background:var(--surface-cream-strong);color:var(--ink)}
  .routing-pill{display:inline-block;padding:2px 8px;border-radius:3px;font-family:var(--mono);font-size:11px;background:var(--surface-soft);color:var(--muted);margin-right:4px}
  .suppressed-row{padding:5px 0;font-size:11px;color:var(--muted);border-top:1px dashed var(--hairline)}
  .suppressed-row:first-child{border-top:none}

  /* Phase 5 — Payload card */
  .payload-card{background:var(--canvas);border:1px solid var(--hairline);border-radius:12px;padding:14px;margin:12px 0}
  .payload-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .payload-title{font-size:13px;font-weight:600;color:var(--ink)}
  .payload-meta{font-size:11px;color:var(--muted);font-family:var(--mono)}
  .payload-actions{display:flex;gap:6px;align-items:center}
  .payload-stat{display:inline-block;padding:2px 7px;border-radius:3px;font-family:var(--mono);font-size:10px;background:var(--surface-soft);color:var(--ink)}
  .payload-stat.routing{background:var(--primary);color:#fff}
  .copy-btn{font-family:var(--sans);font-size:11px;padding:5px 10px;border-radius:5px;border:1px solid var(--primary);background:var(--primary);color:#fff;cursor:pointer}
  .copy-btn:hover{background:var(--primary-active);border-color:var(--primary-active)}

<script>
// =============================================================================
// CONFIG — atom-only.
// =============================================================================
window.ATOM_CONSOLE_CONFIG = {
  atomsTableNames:   ["ATLAS Atoms"],
  claimsTableNames:  ["ATLAS Atom Rules"],
  casesTableNames:   ["Precedents"],
  pendingTableNames: ["Pending Cases"],
};
const PLUGIN_VERSION = "atom-mvp v0.18.21";
const DIMENSIONS = ["C","S","P","R","E","M","X"];
// APV (Atom Pre-Vision) draft parser — reads apv_draft_atoms JSON field
function safeParseAtoms(s) {
  var EMPTY = { C:[], S:[], P:[], R:[], E:[], M:[], X:[] };
  if (!s || typeof s !== "string") return EMPTY;
  try {
    var o = JSON.parse(s);
    if (o && typeof o === "object" && o.draft_atom_tags && typeof o.draft_atom_tags === "object") o = o.draft_atom_tags;
    if (!o || typeof o !== "object") return EMPTY;
    var out = {};
    for (var i = 0; i < DIMENSIONS.length; i++) {
      var d = DIMENSIONS[i];
      out[d] = Array.isArray(o[d]) ? o[d] : [];
    }
    return out;
  } catch (_) { return EMPTY; }
}

const DIM_NAMES = {
  C: "Content",       S: "Subject",     P: "Portrayal",
  R: "Realism",       E: "Explicitness", M: "Modifier",
  X: "Exception",
};
</script>

<script>
// =============================================================================
// engine.js (inlined) — Deterministic atom-rule engine. Phase 3.
// Pure logic. Contract per docs/engine-spec.md
//   AtomEngine.evaluate(caseAtoms, claims, opts?) -> EngineResult
// =============================================================================
(function (root) {
  "use strict";
  var SEVERITY = { VIOLATION: 4, NOT_RECOMMEND: 3, NOT_FOR_FEED: 2, APPROVE: 1 };
  var GATE_DIMS = ["C", "S", "P", "R", "E"];

  function intersects(a, b) {
    if (!a || !b || !a.length || !b.length) return false;
    var s = new Set(a);
    for (var i = 0; i < b.length; i++) if (s.has(b[i])) return true;
    return false;
  }
  function subset(group, set) {
    if (!group || !group.length) return false;
    for (var i = 0; i < group.length; i++) if (set.indexOf(group[i]) < 0) return false;
    return true;
  }
  function dnfMatches(dnf, set) {
    if (!dnf || !dnf.length) return false;
    for (var i = 0; i < dnf.length; i++) if (subset(dnf[i], set)) return true;
    return false;
  }
  function allCaseAtoms(caseAtoms) {
    var out = []; var dims = ["C","S","P","R","E","M","X"];
    for (var i = 0; i < dims.length; i++) {
      var arr = caseAtoms[dims[i]] || [];
      for (var j = 0; j < arr.length; j++) out.push(arr[j]);
    }
    return out;
  }

  function gateHit(claim, caseAtoms) {
    var g = claim.gates || {};
    for (var i = 0; i < GATE_DIMS.length; i++) {
      var d = GATE_DIMS[i];
      var need = g[d] || [];
      if (!need.length) continue;
      if (!intersects(need, caseAtoms[d] || [])) return false;
    }
    if (claim.requires_exception_context) {
      if (!intersects(claim.exceptions_required || [], caseAtoms.X || [])) return false;
    }
    return true;
  }

  function applyLifts(claim, caseAtoms) {
    var M = caseAtoms.M || [];
    var X = caseAtoms.X || [];

    if (intersects(claim.modifiers_excluded || [], M)) {
      return { suppress: true, reason: "modifier_excluded" };
    }
    var req = claim.modifiers_required || [];
    if (req.length && !subset(req, M)) {
      return { suppress: true, reason: "modifier_required_not_met" };
    }
    if (dnfMatches(claim.modifiers_lift_dnf || [], M)) {
      return { suppress: false, outcome: "APPROVE", lift: "modifier" };
    }
    if (claim.exceptions_lift_to_approve && (claim.exceptions_required || []).length) {
      var allCase = allCaseAtoms(caseAtoms);
      var exReq = claim.exceptions_required;
      for (var i = 0; i < exReq.length; i++) {
        var x = exReq[i];
        if (X.indexOf(x) < 0) continue;
        var qGroups  = (claim.exception_qualifiers && claim.exception_qualifiers[x]) || [];
        var qModGrps = (claim.exception_qualifier_modifiers && claim.exception_qualifier_modifiers[x]) || [];
        var qOk  = !qGroups.length  || dnfMatches(qGroups,  allCase);
        var qmOk = !qModGrps.length || dnfMatches(qModGrps, M);
        if (qOk && qmOk) return { suppress: false, outcome: "APPROVE", lift: "exception:" + x };
      }
    }
    return { suppress: false, outcome: claim.outcome, lift: null };
  }

  function specificity(claim) {
    var g = claim.gates || {};
    return ((g.C||[]).length) + ((g.S||[]).length) + ((g.P||[]).length);
  }
  function evidenceFor(claim, caseAtoms) {
    var ev = {};
    for (var i = 0; i < GATE_DIMS.length; i++) {
      var d = GATE_DIMS[i];
      var need = (claim.gates || {})[d] || [];
      var got  = caseAtoms[d] || [];
      var hit  = need.filter(function (a) { return got.indexOf(a) >= 0; });
      if (hit.length) ev[d] = hit;
    }
    return ev;
  }

  function evaluate(caseAtoms, claims, opts) {
    opts = opts || {};
    var hits = []; var suppressed = [];
    for (var i = 0; i < claims.length; i++) {
      var c = claims[i];
      if (opts.policy_title) {
        var pt = c.policy_titles || [];
        if (pt.length) {
          var _optTitles = Array.isArray(opts.policy_title) ? opts.policy_title : [opts.policy_title];
          var _match = false;
          for (var _ti = 0; _ti < _optTitles.length; _ti++) { if (pt.indexOf(_optTitles[_ti]) >= 0) { _match = true; break; } }
          if (!_match) continue;
        }
      }
      if (!gateHit(c, caseAtoms)) continue;
      var lift = applyLifts(c, caseAtoms);
      var entry = {
        claim_id: c.claim_id,
        outcome_base: c.outcome,
        outcome_after_lifts: lift.outcome || c.outcome,
        lift: lift.lift || null,
        specificity: specificity(c),
        evidence: evidenceFor(c, caseAtoms),
        routing: c.routing || { non_realistic_routes_to: null, cross_title_redirect: null },
        policy_titles: c.policy_titles || [],
      };
      if (lift.suppress) {
        suppressed.push(Object.assign({}, entry, { suppress_reason: lift.reason }));
        continue;
      }
      hits.push(entry);
    }
    // Normalize outcome strings to be defensive (uppercase, underscore-form)
    function _normOutcome(o) {
      if (!o) return "";
      return String(o).toUpperCase().replace(/[\s\-]+/g, "_");
    }
    function _sev(o) {
      var n = _normOutcome(o);
      return SEVERITY[n] || 0;
    }
    hits.sort(function (a, b) {
      var sa = _sev(a.outcome_after_lifts);
      var sb = _sev(b.outcome_after_lifts);
      if (sb !== sa) return sb - sa;
      if (b.specificity !== a.specificity) return b.specificity - a.specificity;
      return (a.claim_id || "").localeCompare(b.claim_id || "");
    });
    // Defensive: verdict must come from the highest-severity hit, even if the
    // sort comparator gave a wrong order due to bad input data. Compute the
    // true max-severity hit independently as a sanity check.
    var trueMax = null, trueMaxSev = -1;
    for (var hi = 0; hi < hits.length; hi++) {
      var sv = _sev(hits[hi].outcome_after_lifts);
      if (sv > trueMaxSev) { trueMaxSev = sv; trueMax = hits[hi]; }
    }
    var top = hits[0] || null;
    if (top && trueMax && _sev(top.outcome_after_lifts) < trueMaxSev) {
      console.warn("[AtomEngine] sort/verdict mismatch — promoting trueMax:",
        { topClaim: top.claim_id, topOutcome: top.outcome_after_lifts,
          maxClaim: trueMax.claim_id, maxOutcome: trueMax.outcome_after_lifts,
          allHits: hits.map(function(h){ return h.claim_id + ":" + h.outcome_after_lifts + "(sev=" + _sev(h.outcome_after_lifts) + ")"; }) });
      top = trueMax;
      // Re-sort with trueMax first so the UI shows it as #1 too
      hits = hits.filter(function (h) { return h !== trueMax; });
      hits.unshift(trueMax);
    }
    if (window.__atomEngineVerbose) {
      console.debug("[AtomEngine] verdict=" + (top ? top.outcome_after_lifts : "APPROVE") +
        " top=" + (top ? top.claim_id : "none") +
        " hits=" + hits.map(function(h){ return h.claim_id + ":" + h.outcome_after_lifts; }).join(","));
    }
    return {
      verdict: top ? _normOutcome(top.outcome_after_lifts) || top.outcome_after_lifts : "APPROVE",
      applied_claim_chain: top ? [top.claim_id] : [],
      lifts_applied: top && top.lift ? [{ claim_id: top.claim_id, lift: top.lift }] : [],
      gate_hits: hits,
      suppressed: suppressed,
      routing: top ? top.routing : { non_realistic_routes_to: null, cross_title_redirect: null },
    };
  }

  root.AtomEngine = { evaluate: evaluate, gateHit: gateHit, applyLifts: applyLifts, SEVERITY: SEVERITY };
})(window);
</script>

<script>
// =============================================================================
// stability.js (inlined) — Structural Stability Score v3.1
// Deterministic confidence signal from engine internals. Zero LLM cost.
// Contract per docs/defensibility-framework.md §4.1
//   computeStability(engineResult, caseAtoms, claims) -> StabilityResult
// =============================================================================
(function (root) {
  "use strict";
  var SEVERITY = { VIOLATION: 4, NOT_RECOMMEND: 3, NOT_FOR_FEED: 2, APPROVE: 1 };

  function isEnforcement(outcome) {
    return (SEVERITY[outcome] || 0) >= 2;
  }

  function computeStability(engineResult, caseAtoms, claims) {
    if (!engineResult) return null;

    var fired = engineResult.gate_hits || [];
    var suppressed = engineResult.suppressed || [];
    var verdict = engineResult.verdict || "NO_CLAIM_FIRED";

    // --- NO_CLAIM_FIRED handling ---
    if (verdict === "NO_CLAIM_FIRED" || (verdict === "APPROVE" && fired.length === 0)) {
      if (fired.length === 0 && suppressed.length === 0) {
        return { score: 0.90, band: "L1", reason: "no_claims_in_scope", components: {} };
      }
      if (fired.length === 0 && suppressed.length > 0) {
        var maxSev = 0;
        var hasExcludedMod = false;
        for (var si = 0; si < suppressed.length; si++) {
          var sv = SEVERITY[suppressed[si].outcome_base] || 0;
          if (sv > maxSev) maxSev = sv;
          if (suppressed[si].suppress_reason === "modifier_excluded") hasExcludedMod = true;
        }
        var score;
        if (maxSev >= 4 && hasExcludedMod) {
          score = 0.40;
        } else if (maxSev >= 3) {
          score = 0.48;
        } else {
          score = 0.55;
        }
        var band = score >= 0.70 ? "L1" : (score >= 0.42 ? "L2" : "L3");
        return { score: score, band: band, reason: "all_suppressed",
          components: { max_suppressed_severity: maxSev, n_suppressed: suppressed.length } };
      }
      return { score: 0.55, band: "L2", reason: "no_claims_survived", components: {} };
    }

    if (fired.length === 0) {
      return { score: 0.55, band: "L2", reason: "empty_fired", components: {} };
    }

    // --- ENFORCEMENT CONSENSUS MARGIN ---
    var hasEnforce = false, hasApprove = false;
    for (var i = 0; i < fired.length; i++) {
      var o = fired[i].outcome_after_lifts;
      if (isEnforcement(o)) hasEnforce = true;
      else hasApprove = true;
    }
    var margin;
    if (!hasApprove || !hasEnforce) {
      margin = 1.0;
    } else {
      margin = 0.0;
    }

    // --- CONFLICT PRESSURE ---
    var topOutcome = fired[0].outcome_after_lifts;
    var topIsEnforce = isEnforcement(topOutcome);
    var opposingCount = 0;
    for (var ci = 1; ci < fired.length; ci++) {
      if (isEnforcement(fired[ci].outcome_after_lifts) !== topIsEnforce) {
        opposingCount++;
      }
    }
    var conflict = opposingCount > 0 ? Math.min(1.0, opposingCount / 2.0) : 0.0;

    // --- SPECIFICITY RATIO ---
    var maxSpec = 4;
    var topSpec = fired[0].specificity || 0;
    var spec = Math.min(1.0, topSpec / maxSpec);

    // --- LIFT FRAGILITY (boundary-aware + redundancy + protection) ---
    var topClaim = fired[0];
    var liftFragility = 0.0;

    if (topClaim.lift) {
      var baseOutcome = topClaim.outcome_base;
      var liftedOutcome = topClaim.outcome_after_lifts;
      var crossesBoundary = isEnforcement(baseOutcome) !== isEnforcement(liftedOutcome);

      var baseFragility = crossesBoundary ? 1.0 : 0.4;

      // Redundancy discount: count satisfied lift groups
      var satisfiedGroups = 1;
      if (claims && caseAtoms) {
        var M = caseAtoms.M || [];
        var claimDef = null;
        for (var cd = 0; cd < claims.length; cd++) {
          if (claims[cd].claim_id === topClaim.claim_id) { claimDef = claims[cd]; break; }
        }
        if (claimDef) {
          if (topClaim.lift.indexOf("modifier") === 0) {
            var dnf = claimDef.modifiers_lift_dnf || [];
            satisfiedGroups = 0;
            for (var gi = 0; gi < dnf.length; gi++) {
              var grp = dnf[gi];
              var allIn = true;
              for (var ai = 0; ai < grp.length; ai++) {
                if (M.indexOf(grp[ai]) < 0) { allIn = false; break; }
              }
              if (allIn) satisfiedGroups++;
            }
            if (satisfiedGroups < 1) satisfiedGroups = 1;
          }
          if (topClaim.lift.indexOf("exception:") === 0) {
            var X = caseAtoms.X || [];
            var exReq = claimDef.exceptions_required || [];
            satisfiedGroups = 0;
            for (var xi = 0; xi < exReq.length; xi++) {
              if (X.indexOf(exReq[xi]) >= 0) satisfiedGroups++;
            }
            if (satisfiedGroups < 1) satisfiedGroups = 1;
          }
        }
      }
      var redundancyDiscount = 1.0 / (1.0 + 0.7 * (satisfiedGroups - 1));

      // Protection check: non-lifted claim supporting same verdict (atom-independent)
      var protectionDiscount = 1.0;
      for (var pi = 1; pi < fired.length; pi++) {
        var pc = fired[pi];
        if (!pc.lift && pc.outcome_after_lifts === liftedOutcome) {
          var isIndependent = true;
          if (topClaim.lift.indexOf("exception:") === 0 && claimDef) {
            var protClaimDef = null;
            for (var pcd = 0; pcd < claims.length; pcd++) {
              if (claims[pcd].claim_id === pc.claim_id) { protClaimDef = claims[pcd]; break; }
            }
            if (protClaimDef && protClaimDef.requires_exception_context) {
              isIndependent = false;
            }
          }
          if (isIndependent) {
            protectionDiscount = 0.3;
            break;
          }
        }
      }

      liftFragility = baseFragility * redundancyDiscount * protectionDiscount;
    }

    // --- SUPPRESSION PROXIMITY ---
    var suppProx = 0.0;
    if (suppressed.length > 0) {
      var currentVerdictSev = SEVERITY[verdict] || 0;
      for (var spi = 0; spi < suppressed.length; spi++) {
        var sSev = SEVERITY[suppressed[spi].outcome_base] || 0;
        if (sSev > currentVerdictSev) {
          if (suppressed[spi].suppress_reason === "modifier_excluded") {
            suppProx = Math.max(suppProx, 0.6);
          } else {
            suppProx = Math.max(suppProx, 0.25);
          }
        }
      }
    }

    // --- CLEAN VERDICT BONUS ---
    var isClean = (liftFragility === 0.0 && conflict === 0.0 && suppProx === 0.0);
    var cleanBonus = isClean ? 0.15 : 0.0;

    // --- FINAL SCORE ---
    var finalScore = (0.25 * margin + 0.15 * spec + 0.20 * (1.0 - conflict) + cleanBonus)
                   - (0.20 * liftFragility) - (0.10 * suppProx);
    finalScore = Math.max(0.0, Math.min(1.0, finalScore));

    var finalBand = finalScore >= 0.70 ? "L1" : (finalScore >= 0.42 ? "L2" : "L3");

    return {
      score: Math.round(finalScore * 1000) / 1000,
      band: finalBand,
      reason: isClean ? "clean_verdict" : (topClaim.lift ? "lift_present" : "standard"),
      components: {
        enforcement_consensus_margin: margin,
        specificity_ratio: Math.round(spec * 1000) / 1000,
        conflict_pressure: Math.round(conflict * 1000) / 1000,
        lift_fragility: Math.round(liftFragility * 1000) / 1000,
        suppression_proximity: Math.round(suppProx * 1000) / 1000,
        clean_bonus: cleanBonus
      }
    };
  }

  root.computeStability = computeStability;
})(window);
</script>

<script>
// =============================================================================
// counterfactual.js (inlined) — Phase B: Structural Fragility
// Deterministic counterfactual pass: checks whether removing/adding a single
// gate-level atom (C/S/P/R/E) inverts the engine verdict.
// Only tests evidence-based flips (Strategies 1-2). M/X flips are excluded
// because they test rule-book design, not content ambiguity.
// True ambiguity assessment is done skill-side (content-grounded reasoning).
//   computeCounterfactual(caseAtoms, claims, currentVerdict, opts?) -> FragilityResult
// =============================================================================
(function (root) {
  "use strict";
  var SEVERITY = { VIOLATION: 4, NOT_RECOMMEND: 3, NOT_FOR_FEED: 2, APPROVE: 1 };
  var ALL_DIMS = ["C", "S", "P", "R", "E", "M", "X"];
  var MAX_EVALS = 20;

  function isEnforcement(outcome) {
    return (SEVERITY[outcome] || 0) >= 2;
  }

  function cloneAtoms(atoms) {
    var out = {};
    for (var i = 0; i < ALL_DIMS.length; i++) {
      out[ALL_DIMS[i]] = (atoms[ALL_DIMS[i]] || []).slice();
    }
    return out;
  }

  function verdictFlipped(original, candidate) {
    if (!original || !candidate) return false;
    return isEnforcement(original) !== isEnforcement(candidate);
  }

  /**
   * computeCounterfactual(caseAtoms, claims, currentVerdict, opts?)
   *
   * Returns:
   *   { structurally_fragile: bool,
   *     min_flips_to_inverse: number (1 or Infinity),
   *     nearest_flip_path: [{action, dim, atom_key, resulting_verdict}] | null,
   *     evals_run: number,
   *     fragility_score: number (0.0 = fragile, 1.0 = robust) }
   */
  function computeCounterfactual(caseAtoms, claims, currentVerdict, opts) {
    opts = opts || {};
    var policyTitle = opts.policy_title || undefined;
    var evaluate = root.AtomEngine && root.AtomEngine.evaluate;
    if (!evaluate) return { structurally_fragile: false, min_flips_to_inverse: Infinity, nearest_flip_path: null, evals_run: 0, fragility_score: 1.0 };

    var evalsRun = 0;
    var flips = []; // successful single-atom flips

    // Strategy 1: Remove each currently-tagged atom (most likely to weaken enforcement)
    for (var di = 0; di < ALL_DIMS.length && evalsRun < MAX_EVALS; di++) {
      var dim = ALL_DIMS[di];
      var tagged = caseAtoms[dim] || [];
      for (var ai = 0; ai < tagged.length && evalsRun < MAX_EVALS; ai++) {
        var mutated = cloneAtoms(caseAtoms);
        mutated[dim].splice(ai, 1);
        var result = evaluate(mutated, claims, { policy_title: policyTitle });
        evalsRun++;
        if (verdictFlipped(currentVerdict, result.verdict)) {
          flips.push({ action: "remove", dim: dim, atom_key: tagged[ai], resulting_verdict: result.verdict });
        }
      }
    }

    // Strategy 2: Add relevant atoms from claims that are near-misses
    // Find claims that didn't fire because of exactly 1 missing gate atom
    if (flips.length === 0 && evalsRun < MAX_EVALS) {
      for (var ci = 0; ci < claims.length && evalsRun < MAX_EVALS; ci++) {
        var claim = claims[ci];
        if (policyTitle) {
          var pt = claim.policy_titles || [];
          if (pt.length && pt.indexOf(policyTitle) < 0) continue;
        }
        // Check how many gate dims are unsatisfied
        var gates = claim.gates || {};
        var missingDims = [];
        for (var gdi = 0; gdi < 5; gdi++) { // C,S,P,R,E
          var gDim = ALL_DIMS[gdi];
          var need = gates[gDim] || [];
          if (!need.length) continue;
          var got = caseAtoms[gDim] || [];
          var hasAny = false;
          for (var ni = 0; ni < need.length; ni++) {
            if (got.indexOf(need[ni]) >= 0) { hasAny = true; break; }
          }
          if (!hasAny) missingDims.push({ dim: gDim, candidates: need });
        }
        // Near-miss: exactly 1 dim unsatisfied
        if (missingDims.length === 1) {
          var md = missingDims[0];
          // Try adding the first candidate atom from that dim
          var addAtom = md.candidates[0];
          if (addAtom && evalsRun < MAX_EVALS) {
            var mutated2 = cloneAtoms(caseAtoms);
            if (mutated2[md.dim].indexOf(addAtom) < 0) {
              mutated2[md.dim].push(addAtom);
              var result2 = evaluate(mutated2, claims, { policy_title: policyTitle });
              evalsRun++;
              if (verdictFlipped(currentVerdict, result2.verdict)) {
                flips.push({ action: "add", dim: md.dim, atom_key: addAtom, resulting_verdict: result2.verdict });
              }
            }
          }
        }
      }
    }

    // NOTE: Strategies 3 (modifier_excluded) and 4 (exception removal) removed.
    // Those test rule-book escape paths that exist by design, not genuine content
    // ambiguity. True ambiguity is assessed skill-side (content-grounded reasoning).

    var structurallyFragile = flips.length > 0;
    var minFlips = structurallyFragile ? 1 : Infinity;
    var nearestPath = structurallyFragile ? [flips[0]] : null;

    return {
      structurally_fragile: structurallyFragile,
      min_flips_to_inverse: minFlips,
      nearest_flip_path: nearestPath,
      evals_run: evalsRun,
      // Fragility score: 0.0 = fragile (1 gate-atom flip inverts), 1.0 = robust
      fragility_score: structurallyFragile ? 0.0 : 1.0
    };
  }

  root.computeCounterfactual = computeCounterfactual;
})(window);
</script>

<script>
// === Defensibility merge (v0.18) ===
// Merges Decision Rule Stability (engine-side) + Content Ambiguity (skill-side) into a single tier.
function computeDefensibility(stabilityResult, counterfactualResult, ambiguityAssessment) {
  // Pillar A: Decision Rule Stability
  var ruleStable = stabilityResult && stabilityResult.band === "L1";
  var ruleShaky = stabilityResult && stabilityResult.band === "L2";
  var rawFragile = counterfactualResult && counterfactualResult.structurally_fragile;

  // v0.18.20: Discount fragility when the fragile atom is NOT genuinely contested.
  // The counterfactual pass is mechanical: it removes each atom and re-evaluates.
  // Shared gate atoms (subject.adult, realism.realistic, portrayal.depiction) often
  // appear as the "fragile" atom because they gate ALL claims simultaneously, but
  // they are rarely the genuinely ambiguous dimension. The skill's weakest_atoms
  // identifies which atoms are actually contestable. If the fragile atom is NOT in
  // weakest_atoms, treat fragility as a structural artifact, not genuine risk.
  var fragile = rawFragile;
  if (rawFragile && ruleStable && ambiguityAssessment && ambiguityAssessment.weakest_atoms) {
    var flipAtom = counterfactualResult.nearest_flip_path &&
                   counterfactualResult.nearest_flip_path[0] &&
                   counterfactualResult.nearest_flip_path[0].atom_key;
    if (flipAtom) {
      var contested = ambiguityAssessment.weakest_atoms;
      var flipIsContested = contested.indexOf(flipAtom) >= 0;
      if (!flipIsContested) {
        // Fragile atom is uncontested (e.g., subject.adult in an obvious-adults case).
        // Downgrade: don't let mechanical fragility dominate defensibility.
        fragile = false;
      }
    }
  }
  
  // Pillar B: Content Ambiguity
  var ambigClass = ambiguityAssessment && ambiguityAssessment.classification;
  var precSupport = ambiguityAssessment && ambiguityAssessment.precedent_support;
  
  // Merge logic
  if (ambigClass === "L3") return { tier: "LOW", label: "Low", reason: "Content ambiguity L3 (genuinely contested)" };
  if ((ruleShaky || fragile) && ambigClass === "L2") return { tier: "LOW", label: "Low", reason: "Shaky structure + moderate content ambiguity" };
  if (stabilityResult && stabilityResult.band === "L3") return { tier: "LOW", label: "Low", reason: "Decision rule stability L3 (fragile structure)" };
  if (fragile && !ruleStable && ambigClass !== "L1") return { tier: "LOW", label: "Low", reason: "Structurally fragile + non-trivial ambiguity" };
  if (ambigClass === "L2") return { tier: "MEDIUM", label: "Medium", reason: "Moderate content ambiguity" };
  if (ruleShaky || fragile) return { tier: "MEDIUM", label: "Medium", reason: "Structural concern (shaky or 1-flip fragile)" };
  if (precSupport === "none") return { tier: "MEDIUM", label: "Medium", reason: "No applicable precedent support" };
  if (precSupport === "partial") return { tier: "MEDIUM", label: "Medium", reason: "Partial precedent support" };
  if (ruleStable && ambigClass === "L1") return { tier: "HIGH", label: "High", reason: "Stable rules + clear content" };
  // Fallback: if no ambiguity data yet
  if (!ambiguityAssessment) return null;
  return { tier: "HIGH", label: "High", reason: "All signals favorable" };
}
</script>

<script>
// =============================================================================
// RETRIEVER (Phase 4.5) — Dual-channel hybrid
// Channels:
//   visual = BM25(visual_summary)               + AtomJaccard
//   text   = BM25(asr_text + ocr_text + caption) + AtomJaccard
// Returns top-5 from each channel, deduped by record_id, with channel badges.
// Tokenizer adds bigrams; IDF floor drops corpus-common tokens.
// Atom share scales with how many atoms the candidate has tagged.
// =============================================================================
(function (root) {
  "use strict";

  var STOPWORDS = new Set([
    "a","an","and","are","as","at","be","by","for","from","has","have","he","in",
    "is","it","its","of","on","or","that","the","this","to","was","were","will","with",
    "she","they","them","their","there","these","those","but","not","no","so","if",
    "i","you","we","our","us","me","my","your","do","does","did","just","can","could",
    "would","should","also","into","over","under","up","down","out","then","than",
    // Domain-common boilerplate that BM25 should still tolerate, but no value as queries:
    "video","scene","shows","show","appears","appearing","visible","setting","background"
  ]);
  function uniTokens(text) {
    if (!text) return [];
    return String(text).toLowerCase()
      .replace(/[^\p{L}\p{N}\s]/gu, " ")
      .split(/\s+/)
      .filter(function (t) { return t && t.length > 1 && !STOPWORDS.has(t); });
  }
  // Unigrams + adjacent bigrams (joined with "_") give phrase-level signal
  // ("split_screen", "red_hair", "white_nightstand") on top of bag-of-words.
  function tokenize(text) {
    var uni = uniTokens(text);
    if (uni.length < 2) return uni;
    var out = uni.slice();
    for (var i = 0; i < uni.length - 1; i++) {
      out.push(uni[i] + "_" + uni[i+1]);
    }
    return out;
  }

  // ---- BM25 ----------------------------------------------------------------
  var BM25_K1 = 1.5, BM25_B = 0.75;
  // IDF floor: ignore tokens that appear in > IDF_FLOOR_RATIO of pool docs.
  var IDF_FLOOR_RATIO = 0.5;

  function buildBm25IndexFromTexts(textsArr) {
    // textsArr: array<string>, parallel to pool.
    var docs = [], docLens = [], df = Object.create(null), totalLen = 0;
    for (var i = 0; i < textsArr.length; i++) {
      var toks = tokenize(textsArr[i] || "");
      var tf = Object.create(null);
      for (var j = 0; j < toks.length; j++) tf[toks[j]] = (tf[toks[j]] || 0) + 1;
      var seen = Object.create(null);
      for (var t in tf) if (!seen[t]) { df[t] = (df[t] || 0) + 1; seen[t] = 1; }
      docs.push(tf); docLens.push(toks.length); totalLen += toks.length;
    }
    return {
      docs: docs, docLens: docLens, df: df,
      N: textsArr.length,
      avgdl: textsArr.length ? totalLen / textsArr.length : 0,
      idf_floor: Math.max(1, Math.floor(IDF_FLOOR_RATIO * textsArr.length))
    };
  }
  function bm25Score(idx, qTokens, docIdx) {
    if (!idx.N || !qTokens.length) return 0;
    var tf = idx.docs[docIdx], dl = idx.docLens[docIdx] || 0, avgdl = idx.avgdl || 1, s = 0;
    for (var i = 0; i < qTokens.length; i++) {
      var q = qTokens[i];
      var f = tf[q] || 0; if (!f) continue;
      var n = idx.df[q] || 0;
      if (n >= idx.idf_floor) continue; // skip too-common tokens
      var idf = Math.log(1 + (idx.N - n + 0.5) / (n + 0.5));
      var num = f * (BM25_K1 + 1);
      var den = f + BM25_K1 * (1 - BM25_B + BM25_B * (dl / avgdl));
      s += idf * (num / den);
    }

  }

  // ---- Atoms ---------------------------------------------------------------
  var DIM_WEIGHTS = { C: 1.0, S: 1.0, P: 1.0, R: 0.7, E: 0.7, M: 0.5, X: 0.5 };
  var DIMS = ["C","S","P","R","E","M","X"];

    if ((!a || !a.length) && (!b || !b.length)) return null;
    if (!a || !a.length) return 0;

    var setA = new Set(a), setB = new Set(b), inter = 0;
    setA.forEach(function (k) { if (setB.has(k)) inter++; });
    var union = setA.size + setB.size - inter;

  }
  function atomScore(qAtoms, cAtoms) {
    var sumW = 0, acc = 0, perDim = {};

  // Empty selection mustn't dilute BM25 with a useless 0.
  function atomShare(qAtoms) {

    for (var i = 0; i < DIMS.length; i++) {
      var arr = (qAtoms || {})[DIMS[i]] || [];
      n += arr.length;
    }
    if (n === 0) return 0;
    if (n <= 2) return 0.3;
    return 0.5;
  }

  // ---- Top-level dual-channel retrieve -------------------------------------
  // candidate: { policy_title?, issue?, atoms, visual_summary?, asr_text?, ocr_text?, caption_text? }
  // opts:      { topPerChannel?: 5, totalK?: 10 }
  function retrieve(candidate, cases, opts) {
    opts = opts || {};
    var topPer = opts.topPerChannel || 5;
    var totalK = opts.totalK || (topPer * 2);
    var scopeByTitle = opts.scopeByTitle !== false;
    var scopeByIssue = opts.scopeByIssue !== false;

    // 1. Scope: title → issue → none
    var pool = cases.slice();
    var scope = { kind: "none", value: null };
    if (scopeByTitle && candidate.policy_title && candidate.policy_title.length) {
      var _candTitles = Array.isArray(candidate.policy_title) ? candidate.policy_title : [candidate.policy_title];
      pool = pool.filter(function (c) {
        if (!c.policy_title || !c.policy_title.length) return true;
        var _cTitles = Array.isArray(c.policy_title) ? c.policy_title : [c.policy_title];
        return _cTitles.some(function(t) { return _candTitles.indexOf(t) >= 0; });
      });
      scope = { kind: "policy_title", value: _candTitles.join(", ") };
    } else if (scopeByIssue && candidate.issue) {
      // Match same issue OR sibling sub-verticals (e.g. HSS/BPI both match HHB cases)
      var SIBLING_ISSUES = { HHB:["HHB","HSS","BPI"], HSS:["HHB","HSS","BPI"], BPI:["HHB","HSS","BPI"] };
      var siblings = SIBLING_ISSUES[candidate.issue.toUpperCase()] || [candidate.issue.toUpperCase()];
      pool = pool.filter(function (c) {
        if (!c.issue) return true;
        return siblings.indexOf(c.issue.toUpperCase().trim()) >= 0;
      });
      scope = { kind: "issue", value: candidate.issue };
    }
    if (!pool.length) {
      return { results: [], pool_size: 0, scope: scope, channels: { visual: [], text: [] } };
    }

    // 2. Two indices over the scoped pool.
    var visualTexts = pool.map(function (c) { return c.visual_summary || ""; });
    var textualTexts = pool.map(function (c) {
      return [c.asr_text, c.ocr_text, c.caption_text].filter(Boolean).join(" \n ");
    });
    var visualIdx  = buildBm25IndexFromTexts(visualTexts);
    var textualIdx = buildBm25IndexFromTexts(textualTexts);

    // 3. Queries per channel.
    var qVisual  = tokenize(candidate.visual_summary || "");
    var qTextual = tokenize([candidate.asr_text, candidate.ocr_text, candidate.caption_text]
      .filter(Boolean).join(" \n "));

    // If a channel's query is empty, optionally fall back to the OTHER channel's tokens
    // so we still surface 5 candidates per channel rather than zero.
    if (!qVisual.length && qTextual.length)  qVisual  = qTextual;
    if (!qTextual.length && qVisual.length)  qTextual = qVisual;

    // 4. Score every doc on both channels.
    var aShare = atomShare(candidate.atoms || {});
    var bmShare = 1 - aShare;
    var scored = pool.map(function (c, k) {
      var bmV = bm25Score(visualIdx,  qVisual,  k);
      var bmT = bm25Score(textualIdx, qTextual, k);
      var aj  = atomScore(candidate.atoms || {}, c.atoms || {});
      return {
        case_id: c.case_id, record_id: c.record_id,
        source_video_id: c.source_video_id, policy_title: c.policy_title,
        issue: c.issue, decision: c.decision,
        visual_summary: c.visual_summary, asr_text: c.asr_text,
        ocr_text: c.ocr_text, caption_text: c.caption_text,
        rationale: c.rationale, atoms: c.atoms, images: c.images,
        _bmV: bmV, _bmT: bmT,
        _atom: aj.score, _atom_per_dim: aj.per_dim

    var maxV = 0, maxT = 0;
    for (var i = 0; i < scored.length; i++) {
      if (scored[i]._bmV > maxV) maxV = scored[i]._bmV;
      if (scored[i]._bmT > maxT) maxT = scored[i]._bmT;
    }
    var invV = maxV > 0 ? 1 / maxV : 0;
    var invT = maxT > 0 ? 1 / maxT : 0;
    for (var i = 0; i < scored.length; i++) {
      scored[i].visual_norm = scored[i]._bmV * invV;
      scored[i].text_norm   = scored[i]._bmT * invT;
      scored[i].visual_score = bmShare * scored[i].visual_norm + aShare * scored[i]._atom;
      scored[i].text_score   = bmShare * scored[i].text_norm   + aShare * scored[i]._atom;

    function tieBreak(a, b, primary) {
      if (b[primary] !== a[primary]) return b[primary] - a[primary];
      if (b._atom !== a._atom) return b._atom - a._atom;
      return (a.case_id || "").localeCompare(b.case_id || "");
    }
    var byVisual = scored.slice().sort(function (a, b) { return tieBreak(a, b, "visual_score"); });
    var byText   = scored.slice().sort(function (a, b) { return tieBreak(a, b, "text_score"); });

    var topV = byVisual.slice(0, topPer);
    var topT = byText.slice(0,   topPer);

    // 7. Merge with channel tags + dedupe by record_id.
    var seen = Object.create(null);
    var merged = [];
    function addOne(item, channels) {
      var key = item.record_id || item.case_id || (item.source_video_id + ":" + (Array.isArray(item.policy_title) ? item.policy_title.join(",") : (item.policy_title || "")));
      if (seen[key] != null) {
        // Already added — augment channels.
        var idx = seen[key];
        merged[idx].channels = Array.from(new Set(merged[idx].channels.concat(channels)));
        // Keep the higher of the two channel-rank scores as the displayed primary.
        merged[idx].score = Math.max(merged[idx].score, Math.max(item.visual_score, item.text_score));
        return;
      }
      var primaryScore = channels.indexOf("vis") >= 0 ? item.visual_score : item.text_score;
      var clone = Object.assign({}, item, {
        channels: channels.slice(),
        score: primaryScore
      });
      seen[key] = merged.length;
      merged.push(clone);
    }
    for (var i = 0; i < topV.length; i++) addOne(topV[i], ["vis"]);
    for (var i = 0; i < topT.length; i++) addOne(topT[i], ["txt"]);

    // 8. Backfill if dedupe pulled below totalK: take next-best from union pool.
    if (merged.length < totalK) {
      var combined = byVisual.concat(byText).sort(function (a, b) {
        return Math.max(b.visual_score, b.text_score) - Math.max(a.visual_score, a.text_score);
      });
      for (var i = 0; i < combined.length && merged.length < totalK; i++) {
        var c = combined[i];
        var k = c.record_id || c.case_id || (c.source_video_id + ":" + (Array.isArray(c.policy_title) ? c.policy_title.join(",") : (c.policy_title || "")));
        if (seen[k] != null) continue;
        seen[k] = merged.length;
        merged.push(Object.assign({}, c, {
          channels: ["bf"],
          score: Math.max(c.visual_score, c.text_score)
        }));
      }
    }

    // 9. Final sort by max-channel score desc.
    merged.sort(function (a, b) {
      if (b.score !== a.score) return b.score - a.score;
      if (b._atom !== a._atom) return b._atom - a._atom;
      return (a.case_id || "").localeCompare(b.case_id || "");
    });

    return {
      results: merged.slice(0, totalK),
      pool_size: pool.length,
      total_scored: scored.length,
      scope: scope,
      atom_share: aShare,
      channels: { visual: topV, text: topT },
      mix: { bm: bmShare, atom: aShare }
    };
  }

  root.AtomRetriever = {
    retrieve: retrieve, tokenize: tokenize,
    buildBm25Index: buildBm25IndexFromTexts, bm25Score: bm25Score,
    atomScore: atomScore, DIM_WEIGHTS: DIM_WEIGHTS
  };
})(window);
</script>

<script>
// =============================================================================
// CELL UTILS
// =============================================================================
function cellText(v) {
  if (v == null) return "";
  if (typeof v === "string" || typeof v === "number") return String(v);
  if (Array.isArray(v)) return v.map(cellText).join(" ");
  if (typeof v === "object") {
    if (v.text != null) return String(v.text);
    if (v.name != null) return String(v.name);
    if (v.value != null) return cellText(v.value);
  }
  return "";
}
// cellUrl: extract full URL from a Bitable URL-type field value.
// URL fields return [{type:"url", text:"...", link:"..."}] or a plain string.
// Always prefer .link over .text (SDK may truncate display text).
function cellUrl(v) {
  if (v == null) return "";
  if (typeof v === "string") return v;
  if (Array.isArray(v)) {
    for (var i = 0; i < v.length; i++) {
      var seg = v[i];
      if (seg && typeof seg === "object") {
        if (seg.link) return String(seg.link);
        if (seg.text && /^https?:\/\//i.test(seg.text)) return String(seg.text);
      }
      if (typeof seg === "string" && /^https?:\/\//i.test(seg)) return seg;
    }
    // Fallback: join all text segments (might be a rich-text URL cell)
    return v.map(function(s) { return (s && (s.link || s.text)) || ""; }).join("");
  }
  if (typeof v === "object") {
    if (v.link) return String(v.link);
    if (v.text) return String(v.text);
    if (v.value != null) return cellUrl(v.value);
  }
  return "";
}
function cellArr(v) {
  if (v == null) return [];
  if (Array.isArray(v)) return v.map(x => (typeof x === "string" ? x : (x.text || x.name || ""))).filter(Boolean);
  return [cellText(v)].filter(Boolean);
}
function cellLinkRecordIds(v) {
  if (v == null) return [];
  if (Array.isArray(v)) {
    var out = [];
    for (var i = 0; i < v.length; i++) {
      var x = v[i];
      if (typeof x === "string") { out.push(x); continue; }
      if (typeof x === "object" && x) {
        // DuplexLink element: { recordIds: [...] } or { record_ids: [...] }
        if (Array.isArray(x.recordIds)) { for (var j = 0; j < x.recordIds.length; j++) out.push(x.recordIds[j]); continue; }
        if (Array.isArray(x.record_ids)) { for (var j = 0; j < x.record_ids.length; j++) out.push(x.record_ids[j]); continue; }
        // Single-record link element: { recordId } or { record_id }
        if (x.recordId) { out.push(x.recordId); continue; }
        if (x.record_id) { out.push(x.record_id); continue; }
      }
    }
    return out.filter(Boolean);
  }
  if (typeof v === "object") {
    if (Array.isArray(v.recordIds)) return v.recordIds;
    if (Array.isArray(v.record_ids)) return v.record_ids;
    if (v.recordId) return [v.recordId];
  }
  return [];
}
// Bitable attachment field shape: array of { token, name, type, size, url?, tmp_url? }
// Returns array of { token, name, type, size, url? } for image-typed entries.
function cellAttachments(v) {
  if (!v) return [];
  if (!Array.isArray(v)) v = [v];
  return v.map(function (a) {
    if (!a || typeof a !== "object") return null;
    return {
      token: a.token || a.file_token || a.attachmentToken || "",
      name:  a.name || "",
      type:  a.type || a.mime_type || "",
      size:  a.size || 0,
      url:   a.url || a.tmp_url || ""
    };
  }).filter(function (a) { return a && a.token; });
}

// =============================================================================
// TABLE DISCOVERY (unchanged from Phase 1)
// =============================================================================
const CFG = window.ATOM_CONSOLE_CONFIG;
async function findTableByNames(base, candidates) {
  const list = await base.getTableList();
  const named = await Promise.all(list.map(async t => ({ t, name: await t.getName() })));
  for (const want of candidates) {
    const hit = named.find(x => x.name === want)
             || named.find(x => x.name && x.name.toLowerCase() === want.toLowerCase());
    if (hit) return hit.t;
  }
  const got = named.map(x => x.name).join(", ");
  throw new Error("No table matched any of [" + candidates.join(", ") + "]. Found: [" + got + "]");
}
async function findTableByNamesOptional(base, names) {
  try { return await findTableByNames(base, names); } catch(e) { return null; }
}
async function loadAllRecords(table) {
  const all = []; let pageToken = undefined;
  for (let i = 0; i < 50; i++) {
    const page = await table.getRecords({ pageSize: 5000, pageToken });
    all.push(...(page.records || []));
    if (!page.hasMore) break;
    pageToken = page.pageToken;
  }
  return all;
}
async function buildFieldIndex(table) {
  try {
    const metas = await table.getFieldMetaList();
    const byName = {}, byId = {}, types = {}, linkTableIds = {}, selectOptions = {};
    for (const m of metas) {
      const id = m.id || m.field_id;
      const nm = m.name || m.field_name;
      if (id && nm) {
        byName[nm] = id;
        byId[id] = nm;
        types[id] = m.type;
        // Capture linked table ID for SingleLink (18) and DuplexLink (21).
        if ((m.type === 18 || m.type === 21) && m.property && m.property.tableId) {
          linkTableIds[id] = m.property.tableId;
        }
        // Capture select options for SingleSelect (3) / MultiSelect (4).
        // SDK exposes them on m.property.options as [{id, name, color}].
        if ((m.type === 3 || m.type === 4) && m.property && Array.isArray(m.property.options)) {
          const oByName = {}, oById = {};
          for (const opt of m.property.options) {
            if (opt && opt.id != null && opt.name != null) {
              oByName[String(opt.name)] = String(opt.id);
              // Case-insensitive backup
              oByName[String(opt.name).toLowerCase()] = String(opt.id);
              oById[String(opt.id)] = String(opt.name);
            }
          }
          selectOptions[id] = { byName: oByName, byId: oById };
        }
      }
    }
    return { byName, byId, types, linkTableIds, selectOptions };
  } catch (e) {
    console.warn("[AtomConsole] getFieldMetaList failed:", e);
    return { byName: {}, byId: {}, types: {}, linkTableIds: {}, selectOptions: {} };
  }
}
function readCell(fieldsObj, fieldIndex, name) {
  if (!fieldsObj) return undefined;
  if (fieldsObj[name] !== undefined) return fieldsObj[name];
  const id = fieldIndex && fieldIndex.byName ? fieldIndex.byName[name] : null;
  if (id && fieldsObj[id] !== undefined) return fieldsObj[id];
  return undefined;
}
async function waitForBitableSdk(timeoutMs) {
  timeoutMs = timeoutMs || 5000;
  const start = Date.now();
  while (Date.now() - start < timeoutMs) {
    if (window.bitable && window.bitable.base) return true;
    if (window.__bitableSdkError) throw new Error("Failed to load Bitable SDK from CDN: " + window.__bitableSdkError);
    await new Promise(r => setTimeout(r, 100));
  }
  return false;
}

async function loadAtomCorpus() {
  const ok = await waitForBitableSdk(5000);

  }

  const atomsTbl   = await findTableByNames(base, CFG.atomsTableNames);
  const claimsTbl  = await findTableByNames(base, CFG.claimsTableNames);
  const casesTbl   = await findTableByNamesOptional(base, CFG.casesTableNames);
  const pendingTbl = await findTableByNamesOptional(base, CFG.pendingTableNames);

    buildFieldIndex(atomsTbl),
    buildFieldIndex(claimsTbl),

    pendingTbl ? buildFieldIndex(pendingTbl) : Promise.resolve(null),

    loadAllRecords(claimsTbl),

  const getArr = (f, idx, name) => cellArr (readCell(f, idx, name));

    const f = r.fields || {};

      atom_name: get(f, atomsIdx, "atom_name"),

    const modsLiftJson = safeJson(get(f, claimsIdx, "modifiers_lift_to_json"));
    const exQualJson   = safeJson(get(f, claimsIdx, "exception_qualifiers_json"));
    const exQualModJson= safeJson(get(f, claimsIdx, "exception_qualifier_modifiers_json"));
    return {
      record_id: r.recordId || r.record_id,
      claim_id: get(f, claimsIdx, "claim_id"),
      policy_titles: getArr(f, claimsIdx, "policy_title"),
      issue: get(f, claimsIdx, "issue"),
      outcome: get(f, claimsIdx, "outcome"),
      status: get(f, claimsIdx, "status"),

        const _sR = getLnk(f, claimsIdx, "subject_atoms");
        const _pR = getLnk(f, claimsIdx, "portrayal_atoms");
        const _rR = getLnk(f, claimsIdx, "realism_atoms");
        const _eR = getLnk(f, claimsIdx, "explicitness_atoms");
        return {
          C: ridsToKeys(_cR), S: ridsToKeys(_sR),
          P: ridsToKeys(_pR), R: ridsToKeys(_rR), E: ridsToKeys(_eR),
          _raw: { C: _cR.length, S: _sR.length, P: _pR.length, R: _rR.length, E: _eR.length }
        };
      })(),
      modifiers_required:  ridsToKeys(getLnk(f, claimsIdx, "modifiers_required")),
      modifiers_excluded:  ridsToKeys(getLnk(f, claimsIdx, "modifiers_excluded")),
      modifiers_lift_to_approve: ridsToKeys(getLnk(f, claimsIdx, "modifiers_lift_to_approve")),
      modifiers_lift_dnf:  modsLiftJson || [],
      exceptions_required:        ridsToKeys(getLnk(f, claimsIdx, "exceptions_required")),
      exceptions_lift_to_approve: get(f, claimsIdx, "exceptions_lift_to_approve") === "true"
                                  || readCell(f, claimsIdx, "exceptions_lift_to_approve") === true,
      exception_qualifiers:           exQualJson    || {},
      exception_qualifier_modifiers:  exQualModJson || {},
      requires_exception_context: get(f, claimsIdx, "requires_exception_context") === "true"

      routing: {

  .filter(c => c.claim_id)
  .filter(c => {

    // Treat any of these as active. Reject only explicit inactive states.

    return !inactive.has(s);
  });

  // Gate resolution integrity check: detect claims where raw link had data
  // but ridsToKeys returned [] (atom record_id not in atomByRid).

    const _g = _c.gates;

      if ((_raw[_d] || 0) > 0 && (!_g[_d] || !_g[_d].length)) {

      _gateWarnings.slice(0, 10));

    const _failSet = new Set(_gateWarnings.map(w => w.claim_id + ':' + w.dim));
    for (const _c of claims) {

    const rawSubj = readCell(sampleF, claimsIdx, 'subject_atoms');

  function getImages(f, idx) {

                 : (pendingIdx.byName["object_id"] ? "object_id" : "source_video_id");
  const HAS_USER_NICKNAME = !!(pendingIdx.byName["user_nickname"] || casesIdx.byName["user_nickname"]);
  const HAS_USER_BIO = !!(pendingIdx.byName["user_bio"] || casesIdx.byName["user_bio"]);
  const HAS_CASE_URL = !!(pendingIdx.byName["case_url"] || casesIdx.byName["case_url"]);
  const HAS_COMMENT = !!(pendingIdx.byName["comment"]);

  const cases = caseRecs.map(r => {
    const f = r.fields || {};
    return {
      record_id: r.recordId || r.record_id,
      case_id: get(f, casesIdx, "case_id"),
      source_video_id: get(f, casesIdx, ID_FIELD) || get(f, casesIdx, "source_video_id") || get(f, casesIdx, "object_id"),
      issue: get(f, casesIdx, "issue") || get(f, casesIdx, "policy_area"),
      policy_title: getArr(f, casesIdx, "policy_title"),
      decision: get(f, casesIdx, "decision"),
      visual_summary: get(f, casesIdx, "visual_summary"),
      asr_text: get(f, casesIdx, "asr_text"),
      ocr_text: get(f, casesIdx, "ocr_text"),
      caption_text: get(f, casesIdx, "caption_text"),
      rationale: get(f, casesIdx, "rationale"),
      user_nickname: HAS_USER_NICKNAME ? get(f, casesIdx, "user_nickname") : null,
      user_bio: HAS_USER_BIO ? get(f, casesIdx, "user_bio") : null,
      case_url: HAS_CASE_URL ? cellUrl(readCell(f, casesIdx, "case_url")) : null,
      images: getImages(f, casesIdx),
      atoms: {
        C: ridsToKeys(getLnk(f, casesIdx, "content_atoms")),
        S: ridsToKeys(getLnk(f, casesIdx, "subject_atoms")),
        P: ridsToKeys(getLnk(f, casesIdx, "portrayal_atoms")),
        R: ridsToKeys(getLnk(f, casesIdx, "realism_atoms")),
        E: ridsToKeys(getLnk(f, casesIdx, "explicitness_atoms")),
        M: ridsToKeys(getLnk(f, casesIdx, "modifier_atoms")),
        X: ridsToKeys(getLnk(f, casesIdx, "exception_atoms")),
      },
      reference_weight: get(f, casesIdx, "reference_weight"),
      status: get(f, casesIdx, "status"),
    };
  }).filter(c => {
    const w = (c.reference_weight || "").toLowerCase();
    return w !== "incomplete" && w !== "outdated";
  });

  const pending = pendingRecs.map(r => {
    const f = r.fields || {};
    return {
      record_id: r.recordId || r.record_id,
      source_video_id: get(f, pendingIdx, ID_FIELD) || get(f, pendingIdx, "source_video_id") || get(f, pendingIdx, "object_id"),
      issue: get(f, pendingIdx, "issue"),
      policy_title: getArr(f, pendingIdx, "policy_title"),
      visual_summary: get(f, pendingIdx, "visual_summary"),
      asr_text: get(f, pendingIdx, "asr_text"),
      ocr_text: get(f, pendingIdx, "ocr_text"),
      caption_text: get(f, pendingIdx, "caption_text"),
      user_nickname: HAS_USER_NICKNAME ? get(f, pendingIdx, "user_nickname") : null,
      user_bio: HAS_USER_BIO ? get(f, pendingIdx, "user_bio") : null,
      case_url: HAS_CASE_URL ? cellUrl(readCell(f, pendingIdx, "case_url")) : null,
      comment: HAS_COMMENT ? get(f, pendingIdx, "comment") : null,

      pending_table_id: pendingTbl ? (pendingTbl.id || pendingTbl.tableId || null) : null,

  const atomsByDim = { C:[], S:[], P:[], R:[], E:[], M:[], X:[] };
  for (const a of atoms) {
    const d = (a.dimension || "").charAt(0).toUpperCase();

  for (const d of Object.keys(atomsByDim)) {
    atomsByDim[d].sort((a,b) => (a.atom_key||"").localeCompare(b.atom_key||""));
  }
