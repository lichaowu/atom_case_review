// ---------- Banners / Draft decision (compact) ----------
function ConsistencyBanner({ precedents }) {
  if (!precedents.length) {
    return h("div", { className: "banner no-match" }, "No matching precedent. Treat as candidate grey case.");
  }
  const flags = precedents.filter(p => p.raw.decision === "FLAG").length;
  const passes = precedents.filter(p => p.raw.decision === "PASS").length;
  const total = flags + passes;
  if (total === 0) return h("div", { className: "banner no-match" }, "Precedents found but no decisions recorded.");
  if (flags === 0 || passes === 0) {
    return h("div", { className: "banner aligned" },
      "✓ Aligned — " + total + " precedent" + (total > 1 ? "s" : "") + " all " + (flags > 0 ? "FLAG" : "PASS"));
  }
  return h("div", { className: "banner mixed" },
    "⚠ Mixed — " + flags + " FLAG / " + passes + " PASS in top-" + precedents.length + ". Grey case.");
}

function DecisionBox({ precedents, topRule }) {
  if (!precedents.length) {
    return h("div", { className: "decision-box" },
      h("h4", null, "Draft decision"),
      h("div", { className: "d-row" }, h("b", null, "decision"), h("span", { className: "muted" }, "no precedent — author new rule")),
      h("div", { className: "d-row" }, h("b", null, "case_type"), h(Tag, { kind: "grey" }, "grey (novel)")),
    );
  }
  const flags = precedents.filter(p => p.raw.decision === "FLAG").length;
  const passes = precedents.filter(p => p.raw.decision === "PASS").length;
  const total = flags + passes;
  const mixed = flags > 0 && passes > 0;
  const decision = flags > passes ? "FLAG" : (passes > flags ? "PASS" : "—");
  const caseType = mixed ? "grey" : "routine";
  const topSim = precedents[0].sim;
  const confidence = topSim > 0.7 && !mixed ? "high" : topSim > 0.4 || mixed ? "medium" : "low";
  return h("div", { className: "decision-box" },
    h("h4", null, "Draft decision"),
    h("div", { className: "d-row" }, h("b", null, "decision"),
      h(Tag, { kind: decision === "FLAG" ? "flag" : "pass" }, decision),
      h("span", { className: "muted mono" }, "(" + Math.max(flags, passes) + "/" + total + ")")),
    h("div", { className: "d-row" }, h("b", null, "type"),
      h(Tag, { kind: caseType === "grey" ? "grey" : "routine" }, caseType)),
    h("div", { className: "d-row" }, h("b", null, "rule"),
      topRule ? h("span", { className: "mono" }, topRule.rule_name) : h("span", { className: "muted" }, "no rule")),
    h("div", { className: "d-row" }, h("b", null, "conf."),
      h("span", null, confidence, " ", h("span", { className: "muted mono" }, "(sim " + topSim.toFixed(2) + ")"))),
  );
}

// ---------- Precedent (accordion item) ----------
function PrecedentAccordion({ r, rank, defaultOpen }) {
  const [open, setOpen] = useState(!!defaultOpen);
  const d = r.raw;
  const decKind = d.decision === "FLAG" ? "flag" : d.decision === "PASS" ? "pass" : "sim";
  return h("div", { className: "prec-item " + (open ? "open" : "") },
    h("div", { className: "prec-head", onClick: () => setOpen(o => !o) },
      h("span", { className: "muted mono", style: { width: 18 } }, "#" + rank),
      h(Tag, { kind: decKind }, d.decision || "—"),
      h("span", { className: "prec-id" }, (d.case_id || d.record_id || "").slice(0, 18)),
      h(Tag, { kind: "sim" }, "sim " + r.sim.toFixed(2)),
      h("span", { className: "muted mono" }, open ? "▾" : "▸"),
    ),
    h("div", { className: "prec-body" },
      h("dl", { className: "dl-stack" },
        d.policy_title && h(React.Fragment, null, h("dt", null, "policy"), h("dd", null, d.policy_title)),
        d.rule_applied_name && h(React.Fragment, null, h("dt", null, "rule"), h("dd", null, d.rule_applied_name)),
        d.status && h(React.Fragment, null, h("dt", null, "status"), h("dd", null, d.status)),
        d.reference_weight && h(React.Fragment, null, h("dt", null, "weight"), h("dd", null, String(d.reference_weight))),
        d.key_signals && d.key_signals.length > 0 && h(React.Fragment, null,
          h("dt", null, "signals"),
          h("dd", null, d.key_signals.slice(0, 8).map((s, i) => h(Tag, { key: i, kind: "sim" }, s)).reduce((a, b) => [a, " ", b])),
        ),
      ),
      d.visual_summary && h("details", { open: true }, h("summary", null, "visual_summary"), h("pre", null, d.visual_summary)),
      d.asr_text && h("details", null, h("summary", null, "asr_text"), h("pre", null, d.asr_text)),
      d.ocr_text && h("details", null, h("summary", null, "ocr_text"), h("pre", null, d.ocr_text)),
      d.caption_text && h("details", null, h("summary", null, "caption_text"), h("pre", null, d.caption_text)),
      d.rationale && h("details", { open: true }, h("summary", null, "rationale"), h("pre", null, d.rationale)),
    ),
  );
}

// ---------- Rule card (compact) ----------
function RuleCard({ rule }) {
  if (!rule) return null;
  return h("div", { className: "card" },
    h("h4", null, rule.rule_name || "(no rule_name)"),
    h("div", { className: "kvp" },
      h(Tag, { kind: "linked" }, rule.issue || "—"),
      " · status: ", rule.status || "—"),
    rule.rule_description && h("div", { className: "kvp" }, rule.rule_description),
    rule.rule_text && h("details", null, h("summary", null, "rule_text"), h("pre", null, rule.rule_text)),
    rule.examples && h("details", null, h("summary", null, "examples"), h("pre", null, rule.examples)),
  );
}

// ---------- Reasoned verdict (compact) ----------
function _chainRoleKind(role) {
  const r = (role || "").toLowerCase();
  if (r === "triggering")    return "flag";
  if (r === "exempting")     return "pass";
  if (r === "disambiguating") return "sim";
  return "muted";
}
function _gapDots(gap) {
  if (!gap || typeof gap !== "object") return null;
  const items = [
    ["precedent",      gap.precedent_gap],
    ["disambiguation", gap.disambiguation_gap],
    ["exception",      gap.exception_gap],
  ];
  return h("div", { className: "kvp", style: { display: "flex", gap: 6, alignItems: "center" } },
    h("span", { className: "muted mono" }, "policy gap:"),
    items.map(([label, on], i) => h("span", {
      key: i,
      title: label + (on ? " gap" : " ok"),
      style: {
        display: "inline-flex", alignItems: "center", gap: 4,
        padding: "1px 6px", borderRadius: 10,
        background: on ? "rgba(198,69,69,0.12)" : "rgba(93,184,114,0.12)",
        color: on ? "var(--error)" : "var(--success)",
        fontSize: "var(--fs-mono)", fontFamily: "var(--mono)"
      }
    }, (on ? "● " : "○ ") + label))
  );
}

function ReasonedVerdict({ v }) {
  if (!v) return null;
  const dec = (v.draft_decision || "").toUpperCase();
  const decKind = dec === "FLAG" ? "flag" : dec === "PASS" ? "pass" : "sim";
  const sevKind = (v.severity === "SEVERE") ? "flag" : (v.severity === "LIGHT") ? "sim" : "muted";
  // V3.0: derive legacy boolean if not provided
  const gap = v.policy_gap && typeof v.policy_gap === "object" ? v.policy_gap : null;
  const gapAny = gap ? !!(gap.precedent_gap || gap.disambiguation_gap || gap.exception_gap)
                     : !!v.policy_gap_flag;
  return h("div", { className: "section open", style: { borderColor: "var(--primary)" } },
    h("div", { className: "sec-head", style: { background: "var(--surface-card)" } },
      h("span", null, "🧠 Reasoned verdict"),
      h("span", { className: "chev" }, ""),
    ),
    h("div", { className: "sec-body" },
      h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center", marginBottom: 8 } },
        h(Tag, { kind: decKind }, dec || "?"),
        v.policy_title && h(Tag, { kind: "sim" }, v.policy_title),
        v.severity && h(Tag, { kind: sevKind }, "sev: " + v.severity),
        (typeof v.confidence === "number") && h(Tag, { kind: v.confidence >= 7 ? "pass" : v.confidence <= 4 ? "flag" : "sim" },
          "conf " + v.confidence + "/10"),
        v.grey && h(Tag, { kind: "flag" }, "GREY"),
        gapAny && h(Tag, { kind: "flag" }, "POLICY GAP"),
      ),

      // V3.0: applied_rule_chain — render L1 → L3 → L2 with role badges. Falls back to legacy applied_rule.
      Array.isArray(v.applied_rule_chain) && v.applied_rule_chain.length > 0
        ? h("div", { style: { marginTop: 4, marginBottom: 8 } },
            h("div", { className: "muted mono", style: { marginBottom: 4 } }, "APPLIED RULE CHAIN"),
            h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" } },
              v.applied_rule_chain.map((node, i) => h(React.Fragment, { key: i },
                i > 0 && h("span", { className: "muted mono", style: { fontSize: "var(--fs-mono)" } }, "→"),
                h("span", { style: { display: "inline-flex", flexDirection: "column", gap: 2 } },
                  h(Tag, { kind: _chainRoleKind(node.role) },
                    (node.rule_type || "").replace(" — ", " ") + " · " + (node.role || "")),
                  h("span", { className: "mono", style: { fontSize: "var(--fs-mono)" } },
                    node.rule_name || node.rule_id || "—"),
                  node.note && h("span", { className: "muted", style: { fontSize: "var(--fs-mono)", maxWidth: 280 } },
                    node.note)
                )
              )))
          )
        : (v.applied_rule && (typeof v.applied_rule === "object"
            // V3.2: nsa-precedent-review v3.2+ emits applied_rule as object with trigger_status.
            ? (function() {
                const ar = v.applied_rule;
                const ts = (ar.trigger_status || "").toLowerCase();
                const tsMap = {
                  "met": { kind: "flag", label: "TRIGGERED" },
                  "partially_met": { kind: "sim", label: "PARTIALLY MET" },
                  "not_met": { kind: "pass", label: "NOT TRIGGERED" },
                  "matched_pass_example": { kind: "pass", label: "PASS EXAMPLE MATCHED" },
                  "gated_out": { kind: "pass", label: "GATED OUT" },
                  "not_evaluated": { kind: "sim", label: "NOT EVALUATED" }
                };
                const tsBadge = tsMap[ts];
                return h("div", { style: { marginTop: 4, marginBottom: 8 } },
                  h("div", { className: "muted mono", style: { marginBottom: 4 } }, "APPLIED RULE"),
                  h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" } },
                    ar.rule_type && h(Tag, { kind: "sim" },
                      String(ar.rule_type).replace(" — ", " ")),
                    tsBadge && h(Tag, { kind: tsBadge.kind }, tsBadge.label),
                    ar.tier_version && h("span", { className: "muted mono", style: { fontSize: "var(--fs-mono)" } },
                      ar.tier_version)
                  ),
                  h("div", { className: "mono", style: { marginTop: 4, fontSize: "var(--fs-mono)" } },
                    ar.rule_name || ar.rule_id || "—")
                );
              })()
            : h("dl", { className: "dl-stack" },
                h("dt", null, "applied rule"), h("dd", null, v.applied_rule),
                v.rule_rationale && h("dt", null, "rationale"),
                v.rule_rationale && h("dd", null, v.rule_rationale),
              ))),

      // V3.0: structured policy_gap dots
      gap && _gapDots(gap),

      v.rule_rationale && Array.isArray(v.applied_rule_chain) && v.applied_rule_chain.length > 0 &&
        h("div", { className: "kvp", style: { marginTop: 6 } },
          h("span", { className: "muted mono" }, "rationale: "),
          h("span", null, v.rule_rationale)),

      Array.isArray(v.precedent_analysis) && v.precedent_analysis.length > 0 && h("div", { style: { marginTop: 10 } },
        h("div", { className: "muted mono", style: { marginBottom: 4 } }, "PRECEDENT ANALYSIS"),
        v.precedent_analysis.map((pa, i) => {
          const ap = (pa.applicability || "").toUpperCase();
          const apKind = ap === "APPLICABLE" ? "pass" : ap === "PARTIAL" ? "sim" : "flag";
          return h("div", { key: i, className: "card", style: { padding: 8, marginBottom: 6 } },
            h("div", { className: "kvp" },
              h(Tag, { kind: apKind }, ap || "?"), " ",
              h("span", { className: "mono" }, pa.case_id || "?"), " · ",
              h("span", null, pa.decision_alignment || "—")),
            (Array.isArray(pa.shared_signals) && pa.shared_signals.length > 0) && h("div", { className: "kvp" },
              h("span", { className: "muted" }, "shared: "), pa.shared_signals.join(", ")),
            (Array.isArray(pa.conflicting_signals) && pa.conflicting_signals.length > 0) && h("div", { className: "kvp" },
              h("span", { className: "muted" }, "conflict: "), pa.conflicting_signals.join(", ")),
          );
        }),
      ),

      v.reasoning && h("div", { style: { marginTop: 10 } },
        v.reasoning.visual_analysis && h("details", { open: true },
          h("summary", null, "[VISUAL]"), h("pre", null, v.reasoning.visual_analysis)),
        v.reasoning.text_analysis && h("details", null,
          h("summary", null, "[TEXT]"), h("pre", null, v.reasoning.text_analysis)),
        v.reasoning.disambiguation && h("details", { open: true },
          h("summary", null, "[DISAMBIGUATION]"), h("pre", null, v.reasoning.disambiguation)),
        v.reasoning.first_pass && h("details", { open: true },
          h("summary", null, "[FIRST PASS]"), h("pre", null, v.reasoning.first_pass)),
        (v.reasoning.prosecutor_case && !v.reasoning.first_pass) && h("details", { open: true },
          h("summary", null, "[PROSECUTOR]"), h("pre", null, v.reasoning.prosecutor_case)),
        v.reasoning.second_pass && h("details", { open: true },
          h("summary", null, "[SECOND PASS]"), h("pre", null, v.reasoning.second_pass)),
        (v.reasoning.defense_review && !v.reasoning.second_pass) && h("details", { open: true },
          h("summary", null, "[DEFENSE]"), h("pre", null, v.reasoning.defense_review)),
        v.reasoning.verdict && h("details", { open: true },
          h("summary", null, "[VERDICT]"), h("pre", null, v.reasoning.verdict)),
      ),

      Array.isArray(v.watch_outs) && v.watch_outs.length > 0 && h("div", { style: { marginTop: 8 } },
        h("div", { className: "muted mono" }, "WATCH-OUTS"),
        h("div", { style: { display: "flex", gap: 4, flexWrap: "wrap", marginTop: 4 } },
          v.watch_outs.map((w, i) => h(Tag, { key: i, kind: "sim" }, w)))),

      v.next_step && h("div", { className: "kvp", style: { marginTop: 8 } },
        h("span", { className: "muted" }, "next: "), h("b", null, v.next_step)),
    ),
  );
}

// ---------- App shell ----------
function App() {
  const [corpus, setCorpus] = useState(null);
  const [corpusError, setCorpusError] = useState("");
  const [corpusLoading, setCorpusLoading] = useState(true);
  const [reloadKey, setReloadKey] = useState(0);
  const reload = useCallback(() => { setCorpus(null); setCorpusError(""); setCorpusLoading(true); setReloadKey(k => k + 1); }, []);
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const c = await window.__loadCorpus();
        if (!cancelled) { setCorpus(c); setCorpusLoading(false); }
      } catch (e) {
        if (!cancelled) { setCorpusError(String(e && e.message || e)); setCorpusLoading(false); }
      }
    })();
    return () => { cancelled = true; };
  }, [reloadKey]);
  if (corpusLoading) {
    return h("div", { className: "shell" },
      h("div", { className: "shell-header" }, h("div", { className: "title" }, "Case Review")),
      h("div", { className: "shell-body" }, h("div", { className: "muted", style: { padding: 8 } }, "Loading corpus from Base…")),
      h("div", { className: "shell-footer" }, h("span", null, "loading…"), h("span", { className: "stamp" }, "build V3.3.2")),
    );
  }
  if (corpusError) {
    return h("div", { className: "shell" },
      h("div", { className: "shell-header" }, h("div", { className: "title" }, "Case Review")),
      h("div", { className: "shell-body" },
        h("div", { className: "banner no-match" }, "Failed to load corpus: ", corpusError),
        h("div", { className: "hint" }, "Open this plugin from inside a Base whose tables match the configured names."),
        h("button", { className: "secondary", onClick: reload, style: { marginTop: 12 } }, "Retry"),
      ),
      h("div", { className: "shell-footer" }, h("span", null, "error"), h("span", { className: "stamp" }, "build V3.3.2")),
    );
  }
  if (!corpus) return null;
  return h(MainApp, { corpus, onReloadCorpus: reload });
}

function MainApp({ corpus, onReloadCorpus }) {
  // ---- Navigation state ----
  const [view, setView] = useState("queue"); // 'queue' | 'case' | 'diagnostics'
  const [menuOpen, setMenuOpen] = useState(false);

  // ---- Case form state (inputs) ----
  const [inputs, setInputs] = useState({
    item_id: "",
    visual_summary: "",
    asr_text: "",
    ocr_text: "",
    caption_text: "",
    image_urls: [],
    issue: "",
    title: "",
    k: 5,
  });
  const [pendingHit, setPendingHit] = useState("");

  // ---- Review result + verdict state ----
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [payloadJson, setPayloadJson] = useState("");
  const [reasoningCopied, setReasoningCopied] = useState(false);
  const [keyframesCopied, setKeyframesCopied] = useState(false);
  const [reasonedRaw, setReasonedRaw] = useState("");
  const [reasonedVerdict, setReasonedVerdict] = useState(null);
  const [reasonedError, setReasonedError] = useState("");
  const [showHandoff, setShowHandoff] = useState(false);

  // ---- Verbose logging toggle (session-only) ----
  const [verbose, setVerbose] = useState(false);

  // ---- BM25 index ----
  const index = useMemo(() => buildIndex(corpus.cases), [corpus]);
  const pendingMap = useMemo(() => {
    const m = new Map();
    (corpus.pending || []).forEach(p => { if (p.source_video_id) m.set(p.source_video_id, p); });
    return m;
  }, [corpus]);
  const stats = { cases: corpus.cases.length, rules: corpus.rules.length, pending: pendingMap.size };
  const facets = corpus.facets || { issues: [], titles: [], titlesByIssue: {} };
  const titleOptions = useMemo(() => {
    const all = (facets.titles || []).slice();
    if (inputs.issue && facets.titlesByIssue && Array.isArray(facets.titlesByIssue[inputs.issue])
        && facets.titlesByIssue[inputs.issue].length > 0) {
      return facets.titlesByIssue[inputs.issue];
    }
    return all;
  }, [inputs.issue, facets]);

  // ---- Pre-fill from a Pending Cases row ----
  const applyPending = useCallback((p) => {
    if (!p) return;
    setInputs({
      item_id: p.source_video_id || "",
      visual_summary: p.visual_summary || "",
      asr_text: p.asr_text || "",
      ocr_text: p.ocr_text || "",
      caption_text: p.caption_text || "",
      image_urls: (p.image_urls && p.image_urls.length) ? p.image_urls : [],
      issue: p.issue || "",
      title: p.policy_title || "",
      k: 5,
    });
    setPendingHit(p.source_video_id || "");
    setResult(null);
    setReasonedRaw(""); setReasonedVerdict(null); setReasonedError("");
    setPayloadJson(""); setReasoningCopied(false);
    setShowHandoff(false);
    setView("case");

    // V3.3.2: Lazy keyframes fetch — only when this case is selected, not at corpus load.
    if (p.record_id && (!p.image_urls || !p.image_urls.length) && typeof corpus.resolveKeyframes === "function") {
      const targetRecId = p.record_id;
      const targetSvid = p.source_video_id || "";
      corpus.resolveKeyframes(targetRecId).then((urls) => {
        if (Array.isArray(urls) && urls.length) {
          // Cache on the pending object so re-select is instant.
          p.image_urls = urls;
          // Only update inputs if user is still on this case.
          setInputs(prev => (prev && prev.item_id === targetSvid)
            ? Object.assign({}, prev, { image_urls: urls })
            : prev);
        }
      }).catch(() => {});
    }
  }, [corpus]);

  const onPickQueueItem = useCallback((sourceVideoId) => {
    const p = pendingMap.get(sourceVideoId);
    if (p) applyPending(p);
  }, [pendingMap, applyPending]);

  const onRun = useCallback(() => {
    setLoading(true);
    const queryText = [
      inputs.visual_summary, inputs.asr_text, inputs.ocr_text, inputs.caption_text,
    ].filter(Boolean).join(" ");
    const qtok = tokenize(queryText);
    setTimeout(() => {
      let ranked = score(index, qtok, { issue: inputs.issue || null, title: inputs.title || null });
      if (inputs.item_id) {
        ranked = ranked.filter(r => r.raw.case_id !== inputs.item_id && r.raw.record_id !== inputs.item_id);
      }
      ranked = normScores(ranked.slice(0, inputs.k));

      // V3.0: scope rules to current vertical, then split into L1 candidate / L3 disambiguation / L2 exception.
      const scopedRules = corpus.rules.filter(r =>
        (!inputs.issue || r.issue === inputs.issue) &&
        // policy_title filter only applies when set on input AND the rule carries a matching tag.
        // For L3 rules, the tag is in policy_titles[] (multi); for L1/L2, in policy_title (scalar).
        (!inputs.title || r.policy_title === inputs.title || (Array.isArray(r.policy_titles) && r.policy_titles.indexOf(inputs.title) !== -1))
      );
      const { top: topL1, all: l1Ranking, isLegacyFallback } = rankCandidateL1(scopedRules, qtok, {
        precedentBoostMap: buildPrecedentRuleBoost(ranked, 3),
      });
      const candidatePolicy = topL1 ? topL1.policy_title : null;
      const disambiguation = findDisambiguationCandidates(scopedRules, l1Ranking);
      const exceptionRules = findExceptionCandidates(scopedRules, candidatePolicy, queryText);

      try {
        console.log("[CaseReview] V3.3 retrieval:",
          "L1=" + (topL1 ? (topL1.rule_name + " score=" + topL1.score.toFixed(2) + " bm25=" + (topL1._bm25||0).toFixed(2) + " hits=" + (topL1._trigger_hits||0) + " boost=" + (topL1._precedent_boost||0).toFixed(2)) : "—") + (isLegacyFallback ? " (legacy fallback)" : ""),
          "L3=" + disambiguation.length,
          "L2=" + exceptionRules.length);
      } catch(_) {}

      setResult({
        precedents: ranked,
        topRule: topL1,
        companionRules: { disambiguation, exception: exceptionRules },
        l1Ranking,
        query: queryText
      });
      setLoading(false);
    }, 20);
  }, [inputs, index, corpus]);

  const onBuildPayload = useCallback(() => {
    if (!result) return;
    const payload = buildPayload({
      inputs,
      precedents: result.precedents,
      topRule: result.topRule,
      companionRules: result.companionRules,
      issue: inputs.issue,
    });
    const txt = JSON.stringify(payload, null, 2);
    setPayloadJson(txt);
    setReasoningCopied(false);
    safeCopy(txt).then(ok => setReasoningCopied(!!ok));
  }, [result, inputs]);

  const onCopyKeyframes = useCallback(() => {
    const imgUrls = Array.isArray(inputs.image_urls) ? inputs.image_urls : [];
    if (!imgUrls.length) return;
    setKeyframesCopied(false);
    copyKeyframesToClipboard(imgUrls).then(ok => setKeyframesCopied(!!ok));
  }, [inputs.image_urls]);

  const onParseReply = useCallback(() => {
    setReasonedError("");
    const parsed = tryParseReasonedJson(reasonedRaw);
    if (!parsed) { setReasonedError("Could not parse JSON. Make sure the reply contains a single {…} object."); setReasonedVerdict(null); return; }
    setReasonedVerdict(parsed);
  }, [reasonedRaw]);

  // ---- Header ----
  const headerTitle = view === "queue" ? "Pending queue"
                    : view === "case" ? (inputs.item_id || "New case")
                    : "Diagnostics";
  const showBack = view !== "queue";
  const onBack = () => {
    if (view === "case") setView("queue");
    else if (view === "diagnostics") setView("queue");
  };

  const headerEl = h("div", { className: "shell-header" },
    showBack && h("button", { className: "nav-btn", onClick: onBack, "aria-label": "back", title: "Back" }, "‹"),
    h("div", { className: "title" }, headerTitle),
    h("div", { className: "menu-wrap" },
      h("button", { className: "nav-btn", onClick: () => setMenuOpen(o => !o), "aria-label": "menu" }, "⋯"),
      menuOpen && h("div", { className: "menu-pop", onMouseLeave: () => setMenuOpen(false) },
        h("button", { onClick: () => { setMenuOpen(false); setView("queue"); } }, "Queue"),
        h("button", { onClick: () => { setMenuOpen(false); setView("diagnostics"); } }, "Diagnostics"),
        h("button", { onClick: () => { setMenuOpen(false); onReloadCorpus(); } }, "Refresh corpus"),
      ),
    ),
  );

  const footerEl = h("div", { className: "shell-footer" },
    h("span", null,
      "cases ", stats.cases, " · rules ", stats.rules,
      stats.pending != null ? " · pending " + stats.pending : ""),
    h("span", { className: "stamp", onClick: () => setView("diagnostics"), title: "Open diagnostics" },
      "build V3.3.2"),
  );

  // ---- Views ----
  if (view === "queue") {
    return h("div", { className: "shell" },
      headerEl,
      h("div", { className: "shell-body no-actionbar" },
        h(QueueView, { pending: corpus.pending || [], onPick: onPickQueueItem, onNewCase: () => { applyPending({ source_video_id: "" }); } }),
      ),
      footerEl,
    );
  }
  if (view === "diagnostics") {
    return h("div", { className: "shell" },
      headerEl,
      h("div", { className: "shell-body no-actionbar" },
        h(DiagnosticsView, {
          stats, corpus, verbose, setVerbose,
          onReloadCorpus,
        }),
      ),
      footerEl,
    );
  }
  // Case view
  return h("div", { className: "shell" },
    headerEl,
    h("div", { className: "shell-body" },
      h(CaseView, {
        inputs, setInputs, pendingHit,
        result, loading, onRun,
        facets, titleOptions,
        onBuildPayload, payloadJson, reasoningCopied,
        keyframesCopied, onCopyKeyframes,
        reasonedRaw, setReasonedRaw, reasonedVerdict, reasonedError, onParseReply,
        showHandoff, setShowHandoff,
      }),
    ),
    h(CaseActionBar, { result, loading, onRun, hasInputs: !!(inputs.visual_summary || inputs.asr_text || inputs.ocr_text || inputs.caption_text) }),
    footerEl,
  );
}

// ---------- QueueView ----------
function QueueView({ pending, onPick, onNewCase }) {
  const [q, setQ] = useState("");
  const list = useMemo(() => {
    const s = q.trim().toLowerCase();
    const arr = (pending || []).slice();
    if (!s) return arr;
    return arr.filter(p =>
      (p.source_video_id || "").toLowerCase().includes(s)
      || (p.policy_title || "").toLowerCase().includes(s)
      || (p.issue || "").toLowerCase().includes(s)
    );
  }, [pending, q]);
  return h(React.Fragment, null,
    h("div", { className: "row tight", style: { marginBottom: 10 } },
      h("input", {
        type: "text", value: q,
        placeholder: "Filter by ID, issue, or policy…",
        onChange: e => setQ(e.target.value),
      }),
      h("button", { className: "secondary", style: { flex: "0 0 auto" }, onClick: onNewCase, title: "Start a blank case" }, "+ New"),
    ),
    list.length === 0
      ? h("div", { className: "muted", style: { padding: "24px 8px", textAlign: "center" } },
          (pending && pending.length) ? "No matches." : "No pending cases.")
      : h("div", { className: "queue-list" },
          list.map(p => h(QueueCard, { key: p.record_id || p.source_video_id, p, onPick: () => onPick(p.source_video_id) })),
        ),
  );
}

function QueueCard({ p, onPick }) {
  const thumb = (p.image_urls && p.image_urls[0]) || "";
  const [err, setErr] = useState(false);
  return h("div", { className: "queue-card", onClick: onPick, role: "button", tabIndex: 0,
      onKeyDown: (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onPick(); } } },
    h("div", { className: "qc-thumb" },
      thumb && !err
        ? h("img", { src: thumb, alt: "", referrerPolicy: "no-referrer", loading: "lazy", onError: () => setErr(true) })
        : h("span", null, (p.image_urls && p.image_urls.length) ? "🖼" : "—"),
    ),
    h("div", { className: "qc-meta" },
      h("div", { className: "qc-id" }, p.source_video_id || "(no id)"),
      p.policy_title && h("div", { className: "qc-title" }, p.policy_title),
      h("div", { className: "qc-row" },
        p.issue && h(Tag, { kind: "linked" }, p.issue),
        h(Tag, { kind: "pending" }, "pending"),
        p.image_urls && p.image_urls.length > 0 && h("span", { className: "qc-age" }, p.image_urls.length + " img"),
      ),
    ),
  );
}

// ---------- CaseView ----------
function CaseView({
  inputs, setInputs, pendingHit,
  result, loading, onRun,
  facets, titleOptions,
  onBuildPayload, payloadJson, reasoningCopied,
  keyframesCopied, onCopyKeyframes,
  reasonedRaw, setReasonedRaw, reasonedVerdict, reasonedError, onParseReply,
  showHandoff, setShowHandoff,
}) {
  const setF = (k, v) => setInputs(Object.assign({}, inputs, { [k]: v }));
  const urls = Array.isArray(inputs.image_urls) ? inputs.image_urls : [];

  return h(React.Fragment, null,
    // Candidate inputs section
    h(Section, { title: "Candidate", defaultOpen: true },
      pendingHit && h("div", { className: "hint", style: { color: "var(--primary)", fontWeight: 500, marginBottom: 6 } },
        "↳ Loaded from Pending · " + pendingHit),
      h("label", null, "Source video ID"),
      h("input", { type: "text", value: inputs.item_id, placeholder: "source_video_id…",
        onChange: e => setF("item_id", e.target.value) }),
      h("label", null, "Visual summary"),
      h("textarea", { rows: 4, value: inputs.visual_summary, onChange: e => setF("visual_summary", e.target.value),
        placeholder: "What the frames show" }),
      h("label", null, "ASR (speech)"),
      h("textarea", { rows: 2, value: inputs.asr_text, onChange: e => setF("asr_text", e.target.value) }),
      h("label", null, "OCR (on-screen text)"),
      h("textarea", { rows: 2, value: inputs.ocr_text, onChange: e => setF("ocr_text", e.target.value) }),
      h("label", null, "Caption"),
      h("textarea", { rows: 2, value: inputs.caption_text, onChange: e => setF("caption_text", e.target.value) }),
      h("div", { className: "row tight", style: { marginTop: 8 } },
        h("div", null,
          h("label", null, "Issue"),
          h("select", { value: inputs.issue || "", onChange: e => setF("issue", e.target.value) },
            h("option", { value: "" }, "(any)"),
            (facets.issues || []).map(x => h("option", { key: x, value: x }, x)),
          ),
        ),
        h("div", null,
          h("label", null, "Top-k"),
          h("select", { value: inputs.k, onChange: e => setF("k", parseInt(e.target.value, 10)) },
            [3, 5, 8, 10].map(k => h("option", { key: k, value: k }, k)),
          ),
        ),
      ),
      h("label", null, "Policy title"),
      h("select", { value: inputs.title || "", onChange: e => setF("title", e.target.value) },
        h("option", { value: "" }, "(any)"),
        titleOptions.map(x => h("option", { key: x, value: x }, x)),
      ),
    ),

    // Carousel section
    urls.length > 0 && h(Section, { title: "Keyframes", defaultOpen: true, badge: urls.length },
      h(Carousel, { urls }),
    ),

    // Result sections — only after Run
    result && h(React.Fragment, null,
      h(ConsistencyBanner, { precedents: result.precedents }),

      h(Section, { title: "Top precedents", defaultOpen: false, badge: result.precedents.length },
        result.precedents.length === 0
          ? h("div", { className: "muted" }, "No candidates scored > 0.")
          : h("div", { className: "prec-list" },
              result.precedents.map((r, i) =>
                h(PrecedentAccordion, { key: r.record_id, r, rank: i + 1, defaultOpen: i === 0 })),
            ),
      ),

      h(Section, { title: "Top rule", defaultOpen: false },
        result.topRule
          ? h(React.Fragment, null,
              // V3.3 Patch D — low-confidence banner. The retriever's score is shown
              // alongside a quality verdict so reviewers know when to manually re-pick.
              (function(){
                const tr = result.topRule || {};
                const score = typeof tr.score === "number" ? tr.score : 0;
                const hits = tr._trigger_hits || 0;
                let kind, label, msg;
                if (score >= 8 && hits >= 1) {
                  kind = "pass"; label = "STRONG MATCH"; msg = "Retriever confidence high — proceed.";
                } else if (score >= 4 && hits >= 1) {
                  kind = "sim"; label = "MODERATE MATCH"; msg = "Retriever confidence moderate — verify the rule before sending.";
                } else if (score > 0) {
                  kind = "flag"; label = "WEAK MATCH"; msg = "Retriever score is low (" + score.toFixed(2) + ", " + hits + " trigger hit" + (hits===1?"":"s") + "). Consider manually picking the candidate rule, or expect the reviewer to escalate.";
                } else {
                  kind = "flag"; label = "NO MATCH"; msg = "No L1 rule cleared the trigger gate. The skill will fall back to its embedded rulebook with confidence capped at 6.";
                }
                return h("div", { className: "card", style: { padding: 8, marginBottom: 8, display: "flex", gap: 8, alignItems: "flex-start", flexWrap: "wrap" } },
                  h(Tag, { kind }, label),
                  h("span", { style: { flex: 1, minWidth: 200 } }, msg),
                  h("span", { className: "muted mono", style: { fontSize: "var(--fs-mono)" } },
                    "score " + score.toFixed(2) + " · bm25 " + ((tr._bm25||0).toFixed(2)) + " · trig " + hits + " · prec+" + ((tr._precedent_boost||0).toFixed(2))
                  )
                );
              })(),
              h(RuleCard, { rule: result.topRule })
            )
          : h("div", { className: "muted" }, "No rule matched — possible policy gap."),
      ),

      // Mira hand-off (collapsed by default)
      h(Section, { title: "Send to Mira reviewer", defaultOpen: showHandoff },
        h("div", { className: "hint", style: { marginBottom: 8 } },
          "Copy payload JSON + keyframe images into Mira chat (two pastes), then paste the reply below."),
        h("div", { className: "row tight", style: { marginBottom: 8, flexWrap: "wrap", gap: "6px" } },
          h("button", { className: "secondary", onClick: onBuildPayload },
            reasoningCopied ? "✓ JSON copied" : "1. Copy JSON"),
          h("button", { className: "secondary", onClick: onCopyKeyframes, disabled: !urls.length },
            keyframesCopied ? ("✓ " + urls.length + " frames copied") : ("2. Copy keyframes (" + urls.length + ")")),
          payloadJson && h("button", { className: "secondary tiny", onClick: () => { safeCopy(payloadJson); } }, "Re-copy JSON"),
        ),
        payloadJson && h("div", { className: "muted mono", style: { marginBottom: 8 } },
          payloadJson.length.toLocaleString() + " chars · " + PAYLOAD_VERSION + (urls.length ? " · paste JSON first, then paste keyframes" : "")),
        h("label", null, "Paste Mira's JSON reply"),
        h("textarea", {
          rows: 6, value: reasonedRaw,
          placeholder: '{"draft_decision":"...", "confidence":7, ...}',
          onChange: e => setReasonedRaw(e.target.value),
          style: { fontFamily: "var(--mono)", fontSize: "var(--fs-mono)" },
        }),
        h("div", { className: "row tight", style: { marginTop: 6 } },
          h("button", { onClick: onParseReply, disabled: !reasonedRaw.trim(), className: "secondary" }, "Render verdict"),
          reasonedRaw && h("button", { className: "secondary tiny",
            onClick: () => { setReasonedRaw(""); } }, "Clear"),
        ),
        reasonedError && h("div", { style: { color: "var(--error)", fontSize: "var(--fs-meta)", marginTop: 6 } }, reasonedError),
      ),

      reasonedVerdict && h(ReasonedVerdict, { v: reasonedVerdict }),
    ),

    !result && h("div", { className: "hint", style: { padding: "10px 4px" } },
      "Tap “Run review” below to retrieve precedents and draft a decision."),
  );
}

// ---------- Sticky action bar for Case view ----------
function CaseActionBar({ result, loading, onRun, hasInputs }) {
  return h("div", { className: "actionbar" },
    h("div", { className: "grow" },
      h("div", { className: "summary" },
        result
          ? h(React.Fragment, null,
              h("b", null, result.precedents.length + " precedents"),
              result.topRule ? " · top rule: " + (result.topRule.rule_name || "—") : " · no rule")
          : h("span", null, hasInputs ? "Ready to run" : "Fill candidate inputs to enable")),
    ),
    h("button", { onClick: onRun, disabled: loading || !hasInputs, style: { flex: "0 0 auto" } },
      loading ? "Running…" : (result ? "Re-run" : "Run review")),
  );
}

// ---------- DiagnosticsView ----------
function DiagnosticsView({ stats, corpus, verbose, setVerbose, onReloadCorpus }) {
  const [, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 1500);
    return () => clearInterval(id);
  }, []);
  const logs = (window.__getLogRing ? window.__getLogRing() : []).slice(-80).reverse();
  const fmtTs = (ms) => {
    const d = new Date(ms);
    const pad = (n) => (n < 10 ? "0" : "") + n;
    return pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
  };
  const copyStamp = () => { safeCopy("V3.3.2"); };
  const samplePending = (corpus.pending || []).slice(0, 5).map(p => ({
    source_video_id: p.source_video_id || "",
    issue: p.issue || "",
    image_urls: (p.image_urls || []).length,
  }));
  return h(React.Fragment, null,
    h(Section, { title: "Build", defaultOpen: true },
      h("dl", { className: "dl-stack" },
        h("dt", null, "version"), h("dd", null, h("span", { className: "mono", style: { cursor: "pointer" }, onClick: copyStamp, title: "Copy" }, "V3.3.2")),
        h("dt", null, "host"), h("dd", { className: "mono" }, location.host || "(none)"),
        h("dt", null, "pathname"), h("dd", { className: "mono" }, location.pathname || "/"),
      ),
    ),
    h(Section, { title: "Corpus", defaultOpen: true },
      h("dl", { className: "dl-stack" },
        h("dt", null, "cases"), h("dd", null, String(stats.cases)),
        h("dt", null, "rules"), h("dd", null, String(stats.rules)),
        h("dt", null, "pending"), h("dd", null, String(stats.pending)),
        h("dt", null, "issues"), h("dd", null, (corpus.facets && corpus.facets.issues || []).length + ""),
        h("dt", null, "titles"), h("dd", null, (corpus.facets && corpus.facets.titles || []).length + ""),
      ),
      h("div", { className: "row tight", style: { marginTop: 8 } },
        h("button", { className: "secondary", onClick: onReloadCorpus }, "Refresh corpus"),
      ),
    ),
    h(Section, { title: "Pending sample", defaultOpen: false, badge: samplePending.length },
      samplePending.length === 0
        ? h("div", { className: "muted" }, "No pending rows.")
        : h("table", { className: "diag-table" },
            h("thead", null, h("tr", null, h("th", null, "ID"), h("th", null, "Issue"), h("th", null, "imgs"))),
            h("tbody", null, samplePending.map((s, i) => h("tr", { key: i },
              h("td", { className: "mono" }, s.source_video_id),
              h("td", null, s.issue),
              h("td", null, s.image_urls)))),
          ),
    ),
    h(Section, { title: "Verbose logging", defaultOpen: false },
      h("div", { className: "hint" }, "Session-only toggle (cleared on reload). Currently a placeholder — most modules log unconditionally."),
      h("label", { style: { display: "flex", gap: 6, alignItems: "center", marginTop: 6 } },
        h("input", { type: "checkbox", checked: !!verbose, onChange: e => setVerbose(e.target.checked) }),
        h("span", null, verbose ? "Verbose ON" : "Verbose OFF"),
      ),
    ),
    h(Section, { title: "Recent logs (last " + logs.length + ")", defaultOpen: true },
      logs.length === 0
        ? h("div", { className: "muted" }, "No logs yet.")
        : h("div", { className: "log-list" },
            logs.map((l, i) => h("div", { key: i, className: "log-row " + (l.level === "error" ? "error" : l.level === "warn" ? "warn" : "") },
              h("span", { className: "log-ts" }, fmtTs(l.ts)),
              h("span", null, l.text)))),
    ),
    h(Section, { title: "Design doc", defaultOpen: false },
      h("div", { className: "hint" }, "Open the design doc in a new tab (host filesystem)."),
      h("a", { href: "https://github.com/lichaowu/CaseReview", target: "_blank", rel: "noopener noreferrer", style: { color: "var(--primary)", fontSize: "var(--fs-meta)" } }, "github.com/lichaowu/CaseReview ↗"),
    ),
  );
}

try {
        ReactDOM.createRoot(document.getElementById("root")).render(h(App));
      } catch (e) {
        console.error("[CaseReview] React render failed:", e);
        document.getElementById("root").innerHTML = '<pre style="padding:24px;color:#d1242f;font:12px ui-monospace,monospace;white-space:pre-wrap;">React render error: ' + (e && e.stack || e) + '</pre>';
      }
</script>
</body>
</html>
