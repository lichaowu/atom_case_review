// ---- ImagesPane: display attachments for a case -----------------------------
// Bitable attachment urls embedded in field values are short-lived; for reliable
// display we re-resolve via base.getAttachmentUrl(token, recordId, fieldId, tableId).
// Falls back to the embedded url if available.
function ImagesPane(props) {
  const { images: rawImages, recordId, scope, resolve, label, limit } = props;
  const [expanded, setExpanded] = React.useState(false);
  // limit > 0: only render & resolve the first N images (list-view optimization)
  const effectiveLimit = expanded ? null : limit;
  const images = (effectiveLimit && effectiveLimit > 0 && rawImages && rawImages.length > effectiveLimit)
    ? rawImages.slice(0, effectiveLimit)
    : rawImages;
  const hiddenCount = (effectiveLimit && effectiveLimit > 0 && rawImages && rawImages.length > effectiveLimit)
    ? rawImages.length - effectiveLimit
    : 0;
  // Initialize with embedded urls from the cell value — shows immediately if usable.
  const [zoomSrc, setZoomSrc] = React.useState(null);
  const [resolved, setResolved] = React.useState(function () {
    if (!images || !images.length) return [];
    return images.map(function (im) {
      var u = im && (im.url || im.tmp_url || im.tmpUrl) || "";
      return /^https?:\/\//i.test(u) ? u : "";
    });
  });
  const [done,     setDone]     = React.useState(false);
  const [error,    setError]    = React.useState("");

  React.useEffect(() => {
    let cancelled = false;
    setError("");
    // Re-initialize with embedded urls (don't wipe to []) so images show immediately
    const embeddedInit = images ? images.map(function (im) {
      var u = im && (im.url || im.tmp_url || im.tmpUrl) || "";
      return /^https?:\/\//i.test(u) ? u : "";
    }) : [];
    setResolved(embeddedInit);
    setDone(false);
    if (!images || !images.length) { setDone(true); return; }
    if (typeof resolve !== "function") {
      // No resolver — fall back to embedded urls only.
      const urls = images.map(im => (im && (im.url || im.tmp_url || im.tmpUrl)) || "");
      if (!cancelled) { setResolved(urls); setDone(true); }
      return;
    }
    // Safety timeout: never stay in "loading…" forever — flip done after 18s.
    var safetyTimer = setTimeout(function () {
      if (cancelled) return;
      setError("resolve timeout (18s)");
      setDone(true);
    }, 18000);
    // Cache key for this record (used by retry logic to invalidate on 0-fill)
    var cacheKey = (scope || "case") + ":" + (recordId || "");

    var attemptResolve = function (attempt) {
      resolve(scope || "case", recordId, images, { _totalOnRecord: rawImages ? rawImages.length : (images ? images.length : 0) }).then(function (urls) {
        if (cancelled) return;
        var filledCount = 0;
        if (Array.isArray(urls)) {
          setResolved(function (prev) {
            var merged = prev.slice();
            for (var k = 0; k < urls.length; k++) {
              if (urls[k]) { merged[k] = urls[k]; filledCount++; }
            }
            return merged;
          });
        }
        // If zero SDK urls resolved and this is the first attempt, retry after 3s
        // (SDK might not be ready on initial mount)
        if (filledCount === 0 && attempt === 1 && images.length > 0) {
          console.warn("[AtomConsole] ImagesPane: 0 urls on attempt 1 (scope=" + scope + " rec=" + recordId + "), retrying in 3s…");
          // Invalidate cache so retry goes through SDK again
          if (window._atomResolveCache && window._atomResolveCache.has(cacheKey)) window._atomResolveCache.delete(cacheKey);
          // IMPORTANT: flip done=true immediately so UI doesn't stay "loading..."
          clearTimeout(safetyTimer);
          setDone(true);
          setTimeout(function () {
            if (cancelled) return;
            attemptResolve(2);
          }, 3000);
          return;
        }
        clearTimeout(safetyTimer);
        setDone(true);
      }).catch(function (e) {
        if (cancelled) return;
        if (attempt === 1) {
          // Retry once on error too
          setTimeout(function () {
            if (cancelled) return;
            if (window._atomResolveCache && window._atomResolveCache.has(cacheKey)) window._atomResolveCache.delete(cacheKey);
            attemptResolve(2);
          }, 3000);
          return;
        }
        clearTimeout(safetyTimer);
        setError(String(e && e.message || e));
        setDone(true);
      });
    };
    attemptResolve(1);
    return () => { cancelled = true; clearTimeout(safetyTimer); };
  }, [recordId, scope, expanded]);  // stable deps: recordId+scope identify the record; expanded triggers re-resolve from cache

  if (!images || !images.length) {
    return e("div", { className: "muted", style: { fontSize: 11, padding: "4px 0" }},
      (label || "Images") + ": none attached on this record.");
  }

  return e("div", { style: { display: "flex", flexWrap: "wrap", gap: 6, padding: "4px 0" }},
    ...images.map((img, i) => {
      const url = resolved[i] || "";
      const isImg = !img.type || /^image\//i.test(img.type) || /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(img.name || "");
      let body;
      if (url && isImg) {
        body = e("div", {
            style: { cursor: "zoom-in" },
            onClick: (ev) => { ev.stopPropagation(); setZoomSrc(url); }
          },
          e("img", {
            src: url,
            alt: img.name || ("attachment " + (i+1)),
            style: { width: "100%", height: 100, objectFit: "cover", display: "block" },
            onError: (ev) => {
              if (ev && ev.target) ev.target.style.display = "none";
              if (ev && ev.target && ev.target.parentNode) {
                var ph = document.createElement("div");
                ph.textContent = "\u26a0 expired";
                ph.style.cssText = "font-size:10px;color:#a00;padding:6px;text-align:center;";
                ev.target.parentNode.appendChild(ph);
              }
            }
          }));
      } else if (url) {
        body = e("a", { href: url, target: "_blank", rel: "noreferrer",
          style: { display: "block", padding: 6, fontSize: 10, textDecoration: "none" }},
          "📎 " + (img.name || "attachment"));
      } else if (done) {
        body = e("div", {
          style: { padding: 6, fontSize: 10, color: "#a00", lineHeight: 1.3 },
          title: "no signed url returned · token=" + (img.token || "?")
        }, "image unavailable");
      } else {
        body = e("div", { style: { padding: 6, fontSize: 10 }, className: "muted" }, "loading…");
      }
      return e("div", {
        key: (img.token || "noTok") + "_" + i,
        style: { width: 140, border: "1px solid var(--hairline)", borderRadius: 4, overflow: "hidden", background: "#0001" }
      },
        body,
        e("div", { style: { padding: "2px 4px", fontSize: 9, color: "var(--muted)",
          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }},
          img.name || ("attachment " + (i+1)))
      );
    }),
    hiddenCount > 0 && e("div", {
      style: { width: 140, height: 100, border: "1px dashed var(--hairline)",
               borderRadius: 4, display: "flex", alignItems: "center",
               justifyContent: "center", flexDirection: "column",
               background: "var(--surface-soft)", color: "var(--muted)",
               fontSize: 11, lineHeight: 1.3, padding: 4, textAlign: "center",
               cursor: "pointer" },
      onClick: function() { setExpanded(true); }
    }, e("div", { style: { fontSize: 18, fontWeight: 500, color: "var(--body-strong)" }},
        "+" + hiddenCount),
       e("div", null, "more"),
       e("div", { style: { fontSize: 9, marginTop: 2 }}, "click card →")),
    error && e("div", { className: "muted", style: { fontSize: 10, color: "#c00" }}, "image error: " + error),
    zoomSrc && e(ImageZoomOverlay, { src: zoomSrc, alt: "zoom", onClose: () => setZoomSrc(null) })
  );
}


// ---- DimRow: chip multi-select for one dimension ---------------------------
// Suggestion-first UX:
//   - Default view shows ALL atoms; suggested ones (from top-5 precedents)
//     get a yellow-tint highlight. User can toggle "suggestions only" to
//     narrow down, or start typing to search across all atoms.
//   - Chip label = atom_name (atom_key + serial_code in tooltip).
function DimRow(props) {
  const { dim, atoms, selected, onChange, suggested, skillProposed, skillRejected, relevantKeys } = props;
  const [filter, setFilter] = React.useState("");
  // Default to "show all" so the reviewer always sees the full atom set with
  // suggestions visually highlighted, instead of having to click through to
  // discover non-suggested atoms.
  const [suggestedOnly, setSuggestedOnly] = React.useState(false);
  const f = filter.trim().toLowerCase();
  const sel = new Set(selected || []);
  const sugSet = new Set(suggested || []);
  const hasSuggestions = sugSet.size > 0;
  const skillSet = new Set(skillProposed || []);
  const [dismissedRej, setDismissedRej] = React.useState(new Set());
  const rejKeys = new Set((skillRejected || []).map(r => r.atom_key));

  // Issue/policy-scoped atom base: when relevantKeys is provided (non-null array),
  // restrict the atom universe to only those referenced by claims for this issue.
  const relSet = relevantKeys ? new Set(relevantKeys) : null;
  const scopedAtoms = relSet ? atoms.filter(a => relSet.has(a.atom_key)) : atoms;

  // Decide candidate pool:
  // 1. If filter text typed -> search ALL scoped atoms
  // 2. Else if "suggestions only" toggled (and we have suggestions) -> filter
  // 3. Else (default) -> show all scoped atoms (suggestions highlighted)
  let pool;
  if (f) {
    pool = scopedAtoms.filter(a =>
      (a.atom_key||"").toLowerCase().includes(f) ||
      (a.serial_code||"").toLowerCase().includes(f) ||
      (a.atom_name||"").toLowerCase().includes(f) ||
      (a.description||"").toLowerCase().includes(f)
    );
  } else if (suggestedOnly && hasSuggestions) {
    pool = scopedAtoms.filter(a => sugSet.has(a.atom_key));
  } else {
    pool = scopedAtoms;
  }

  // Sort pool: suggested atoms first (preserving alpha within each group)
  pool = pool.slice().sort(function(a, b) {
    var aS = sugSet.has(a.atom_key) ? 0 : 1;
    var bS = sugSet.has(b.atom_key) ? 0 : 1;
    if (aS !== bS) return aS - bS;
    return (a.atom_name || a.atom_key).localeCompare(b.atom_name || b.atom_key);
  });

  const toggle = (k) => {
    const next = new Set(sel);
    if (next.has(k)) next.delete(k); else next.add(k);
    onChange(Array.from(next));
  };
  const clear = () => onChange([]);

  const modeLabel = f
    ? "filter: " + pool.length + " match"
    : (suggestedOnly && hasSuggestions)
      ? "suggested " + pool.length + "/" + scopedAtoms.length
      : (hasSuggestions
          ? "all " + scopedAtoms.length + " atoms · " + sugSet.size + " suggested"
          : "all " + scopedAtoms.length + " atoms");

  return e("div", { className: "dim-row dim-" + dim },
    e("div", { className: "dim-label" }, dim),
    e("div", { className: "dim-body" },
      e("div", { className: "dim-head" },
        e("span", { className: "dim-name" },
          DIM_NAMES[dim], e("span", { className: "muted" }, " · " + modeLabel)),
        e("span", { className: "dim-count" },
          (sel.size ? sel.size : "0") + " selected ",
          sel.size > 0 && e("button", { className: "ghost", onClick: clear,
            style: { padding: "2px 6px", fontSize: 10, marginLeft: 4 }}, "clear"),
          hasSuggestions && !f && e("button", {
            className: "ghost",
            onClick: () => setSuggestedOnly(!suggestedOnly),
            style: { padding: "2px 6px", fontSize: 10, marginLeft: 4 }
          }, suggestedOnly ? "show all" : "suggested only"))
      ),
      // Selected chips first (always visible regardless of suggestion filter)
      e("div", { className: "selected-strip" },
        ...Array.from(sel).map(k => {
          const a = atoms.find(x => x.atom_key === k);
          const label = (a && a.atom_name) ? a.atom_name : k;
          const isSkill = skillSet.has(k);
          return e("span", {
            key: k, className: "chip selected" + (isSkill ? " skill-src" : " reviewer-src"),
            title: (isSkill ? "[skill-proposed] " : "[reviewer-added] ") +
              (a ? (a.atom_key + (a.serial_code ? " · " + a.serial_code : "") + " — " + (a.description||"").slice(0,200)) : k),
            onClick: () => toggle(k)
          }, label, " ✕");
        }),
        // Skill-rejected atoms (struck-through; click ✗ to dismiss, double-click to override and add)
        ...(skillRejected || []).filter(r => !sel.has(r.atom_key) && !dismissedRej.has(r.atom_key)).map(r => {
          const a = atoms.find(x => x.atom_key === r.atom_key);
          const label = (a && a.atom_name) ? a.atom_name : r.atom_key;
          return e("span", {
            key: "rej-" + r.atom_key,
            className: "chip rejected-by-skill",
            title: "[skill-rejected] " + r.atom_key +
              (a && a.serial_code ? " · " + a.serial_code : "") +
              " — " + (r.reason || "no reason") + " — click to re-select"
          },
            e("span", { onClick: (ev) => { ev.stopPropagation(); toggle(r.atom_key); } }, label),
            e("span", {
              onClick: (ev) => { ev.stopPropagation(); setDismissedRej(prev => { const n = new Set(prev); n.add(r.atom_key); return n; }); },
              style: { marginLeft: 3, cursor: "pointer" }
            }, " \u2715"));
        })
      ),
      // Search input (typing here always searches the full set)
      e("input", {
        className: "filter",
        value: filter,
        placeholder: "search all " + DIM_NAMES[dim].toLowerCase() + " atoms…",
        onChange: ev => setFilter(ev.target.value)
      }),
      // Available chips (excludes selected). Suggested atoms get a subtle highlight.
      e("div", { className: "chips" },
        ...pool.filter(a => !sel.has(a.atom_key) && !(rejKeys.has(a.atom_key) && !dismissedRej.has(a.atom_key))).map(a => {
          const isSug = sugSet.has(a.atom_key);
          const isSkillProp = skillSet.has(a.atom_key);
          return e("span", {
            key: a.atom_key,
            className: "chip" + (isSkillProp ? " skill-proposed" : (isSug ? " suggested" : "")),
            title: (isSkillProp ? "[skill-proposed — click to accept] " : "") +
              a.atom_key + (a.serial_code ? " · " + a.serial_code : "") + (a.description ? " — " + a.description.slice(0,200) : ""),
            onClick: () => toggle(a.atom_key)
          }, (a.atom_name || a.atom_key));
        }),
        pool.length === 0 && e("span", { className: "muted", style: { padding: 4, fontSize: 11 }},
          f ? "no atoms match search"
            : (hasSuggestions ? "no suggestions for this dim — type to search or click 'show all'"
                              : "no atoms in this dim"))
      )
    )
  );
}

// ---- Phase 5b: Payload v0.5 emit ------------------------------------------
// Atom-rule-grounded payload for the per-policy precedent-review specialist.
// The specialist needs to: (1) know the NSA atom rule book, (2) read precedents
// (text+images+atoms+decision+rationale), (3) tag the candidate's atoms by
// analogy, (4) run the deterministic claim chain, (5) return verdict.
//
// Schema v0.5 differences from v0.4:
//   - DROP retrieval scores (BM25/atom-jaccard) — they're retrieval-internal
//     noise. The specialist reasons over content + atom analogy, not ranks.
//   - DROP candidate_rule / companion_rules (V0.3 Rule Book artifacts).
//   - ADD atom_rules block: NSA-scoped atoms_catalog + all NSA claims +
//     dimension definitions + scoring semantics.
//   - Each precedent retains: text fields, images, full atom tags by dim,
//     decision, rationale.
//
// `atoms_catalog` is filtered to atom_keys actually referenced by any claim
// for the candidate's issue (NSA-relevant atoms). `claims` is all claims for
// candidate.issue (preserves cross-title routing).
const POLICY_AREA_MAP = {
  HSS:  "HHB",
  BPI:  "HHB",
  NSA:  "NSA",
  HHB:  "HHB",
  HRA:  "HRA",
  SGC:  "SGC",
  VBDA: "VBDA"
};
function resolvePolicyArea(issue) {
  if (!issue) return null;
  const k = String(issue).toUpperCase().trim();
  if (POLICY_AREA_MAP[k]) return POLICY_AREA_MAP[k];
  for (const key in POLICY_AREA_MAP) {
    if (k.indexOf(key) >= 0) return key;
  }
  return null;
}
// Sub-vertical inclusion: HHB claims live as issue=HSS or issue=BPI in the table.
const POLICY_AREA_INCLUDES = { HHB: ["HHB","HSS","BPI"] };
function matchesPolicyArea(claimIssue, policyArea) {
  const ci = String(claimIssue || "").toUpperCase().trim();
  const includes = POLICY_AREA_INCLUDES[policyArea];
  if (includes) return includes.indexOf(ci) >= 0;
  return ci === policyArea;
}

// ---- copyKeyframesComposite: load N images, draw 2-col grid onto a canvas,
// copy the resulting PNG to clipboard via ClipboardItem. Ported from the
// legacy case_review_mvp plugin (V3.1.0) — proven pattern for shipping
// keyframes into a Mira chat as a multimodal attachment.
//
//   • Slices to first 12 keyframes (matches model attention budget).
//   • Loads with crossOrigin=anonymous + referrerPolicy=no-referrer so the
//     Bitable signed urls render to canvas without taint errors.
//   • 2-col grid, 400×300 cells, 4px gap, dark bg, "#N" frame badge top-left.
//   • Returns { ok, mode, count, dataUrl? }
//        mode = "clipboard"  → PNG written via ClipboardItem.
//        mode = "newtab"     → ClipboardItem blocked; opened a tab with the
//                              dataURL so the reviewer can right-click → Copy.
//        mode = "fail"       → no images loaded.
async function copyKeyframesComposite(urls) {
  const out = { ok: false, mode: "fail", count: 0 };
  if (!urls || !urls.length) return out;
  try {
    // Load up to 12, cross-origin so canvas isn't tainted
    const imgs = await Promise.all(urls.slice(0, 12).map(url => new Promise(resolve => {
      const img = new Image();
      img.crossOrigin   = "anonymous";
      img.referrerPolicy = "no-referrer";
      img.onload  = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = url;
    })));
    const loaded = imgs.filter(Boolean);
    if (!loaded.length) {
      console.warn("[AtomConsole] copyKeyframesComposite: no images loaded");
      return out;
    }
    out.count = loaded.length;

    // 2-col grid, fixed cell, dark bg, frame number badge
    const cols = Math.min(2, loaded.length);
    const rows = Math.ceil(loaded.length / cols);
    const cellW = 400, cellH = 300, gap = 4;
    const W = cols * cellW + (cols - 1) * gap;
    const H = rows * cellH + (rows - 1) * gap;

    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#181715";
    ctx.fillRect(0, 0, W, H);

    loaded.forEach((img, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = col * (cellW + gap);
      const y = row * (cellH + gap);
      const scale = Math.min(cellW / img.naturalWidth, cellH / img.naturalHeight);
      const dw = img.naturalWidth * scale;
      const dh = img.naturalHeight * scale;
      ctx.drawImage(img, x + (cellW - dw) / 2, y + (cellH - dh) / 2, dw, dh);
      // Frame number badge
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(x, y, 28, 20);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 11px Inter, sans-serif";
      ctx.fillText("#" + (i + 1), x + 4, y + 14);
    });

    // Try modern clipboard API first
    const blob = await new Promise(r => canvas.toBlob(r, "image/png"));
    if (!blob) return out;
    try {
      if (typeof ClipboardItem === "function" &&
          navigator.clipboard && navigator.clipboard.write) {
        await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
        out.ok = true; out.mode = "clipboard";
        return out;
      }
      throw new Error("ClipboardItem unavailable");
    } catch (clipErr) {
      // Fallback: open in a new tab so the reviewer can right-click → Copy.
      // Bitable iframe usually blocks ClipboardItem; this fallback lets the
      // reviewer ship the PNG anyway without leaving the table.
      console.warn("[AtomConsole] ClipboardItem blocked → opening composite in tab:",
        clipErr && clipErr.message);
      const dataUrl = canvas.toDataURL("image/png");
      try {
        const w = window.open("");
        if (w) {
          w.document.write(
            "<title>Keyframes composite — copy this image</title>" +
            "<body style=\"margin:0;background:#181715;color:#fff;font:13px sans-serif\">" +
              "<p style=\"padding:8px 12px;margin:0\">Right-click the image → <b>Copy image</b>, then paste into the specialist chat.</p>" +
              "<img src=\"" + dataUrl + "\" style=\"max-width:100%;display:block\">" +
            "</body>");
        }
        out.mode = "newtab";
        // We didn't write to clipboard, but we did surface the image — call it ok.
        out.ok = true;
        out.dataUrl = dataUrl;
        return out;
      } catch (e2) {
        console.error("[AtomConsole] keyframe newtab fallback failed:", e2);
        return out;
      }
    }
  } catch (e) {
    console.error("[AtomConsole] copyKeyframesComposite error:", e);
    return out;
  }
}

function imagesAttachedSummary(images) {
  if (!images || !images.length) return { count: 0, note: "no images attached" };
  const types = {};
  for (const im of images) {
    const t = (im && (im.type || im.ext || "")) || "image";
    types[t] = (types[t] || 0) + 1;
  }
  const parts = Object.keys(types).map(k => k + "×" + types[k]).join(", ");
  // Following the legacy plugin's V3.1.0 pattern: this note tells the specialist
  // skill that the reviewer is expected to paste a composite keyframes image
  // alongside the JSON payload. The skill reads images_note as a hint to look
  // for the multimodal attachment in the same chat turn.
  const cap = Math.min(images.length, 12);
  const note =
      images.length + " keyframe(s) (" + parts + "). " +
      "If the reviewer pasted a composite keyframes image in this chat turn " +
      "(top " + cap + " frames in a 2-col grid, frame numbers labeled top-left), " +
      "analyze it visually as primary evidence for atom tagging. " +
      "Trust pixels over visual_summary on conflict.";
  return { count: images.length, note: note };
}

// Collect every atom_key referenced by a claim's gates/modifiers/exceptions.
function atomKeysReferencedByClaim(c) {
  const acc = new Set();
  const dims = ["C","S","P","R","E"];
  for (const d of dims) {
    const arr = (c.gates && c.gates[d]) || [];
    for (const k of arr) acc.add(k);
  }
  ["modifiers_required","modifiers_excluded","modifiers_lift_to_approve",
   "exceptions_required"].forEach(prop => {
    const arr = c[prop] || [];
    for (const k of arr) acc.add(k);
  });
  // modifiers_lift_dnf is array of { atom_key, lift }
  const dnf = c.modifiers_lift_dnf || [];
  for (const item of dnf) {
    if (item && item.atom_key) acc.add(item.atom_key);
  }
  // exception_qualifiers: { atom_key: [...] } — keys are atom_keys
  const eq = c.exception_qualifiers || {};
  for (const k in eq) acc.add(k);
  const eqm = c.exception_qualifier_modifiers || {};
  for (const k in eqm) acc.add(k);
  return acc;
}

// Pick atoms_catalog entries restricted to dims the candidate touched +
// atoms referenced by the relevant claim slice. Drastically reduces
// per-payload size while preserving every audit_rule the specialist needs.
function sliceAtomsCatalog(corpus, fullCatalog, relevantClaims, tags) {
  const keepKeys = new Set();

  // (a) Every atom_key referenced by the relevant claims (gates + modifiers + exceptions).
  for (const c of relevantClaims) {
    atomKeysReferencedByClaim(c).forEach(k => { if (k) keepKeys.add(String(k).trim()); });
  }
  // (b) Every atom the reviewer drafted on the candidate.
  if (tags) {
    for (const d of ["C","S","P","R","E","M","X"]) {
      const arr = tags[d] || [];
      arr.forEach(k => { if (k) keepKeys.add(String(k).trim()); });
    }
  }

  const out = { C:[], S:[], P:[], R:[], E:[], M:[], X:[] };
  for (const d of Object.keys(fullCatalog)) {
    for (const a of fullCatalog[d]) {
      if (keepKeys.has(String(a.atom_key).trim())) out[d].push(a);
    }
  }
  return out;
}

// Pick a relevant slice of NSA claims for the candidate.
//   - Always include claims that the engine flagged as gate_hit OR suppressed
//     (these are the engine's universe of "fired or nearly fired").
//   - Always include claims for the candidate's policy_title.
//   - Include any claim whose gate intersects with the candidate's tagged atoms.
//   - Include any claim referenced by precedent decisions (rationale anchors).
//   - Cap with a hard limit; if everything is in scope, fall back to all NSA
//     claims (with an explicit `claim_slice_mode = "full"` flag so the
//     specialist knows the slice was not narrowed).
function sliceRelevantClaims(allIssueClaims, opts) {
  const { engineResult, candidatePolicyTitle, tags, precedents, hardCap, policyArea } = opts;
  const cap = hardCap || 60;

  // (0) Umbrella policy areas (HHB = HSS+BPI+HHB) or absent draft tags:
  //     Send ALL issueClaims unsliced. The skill needs the full claim set
  //     cross-vertically to propose atoms the reviewer hasn't tagged yet.
  //     This matches the LLM-first flow (no draft atoms at send time).
  const tagCount = tags ? ["C","S","P","R","E","M","X"].reduce((s,d) => s + (tags[d] || []).length, 0) : 0;
  const isUmbrella = !!(POLICY_AREA_INCLUDES[policyArea]);
  if ((isUmbrella || tagCount === 0) && allIssueClaims.length <= 300) {
    return { claims: allIssueClaims, mode: "full", kept_ids: allIssueClaims.map(c => c.claim_id), all_count: allIssueClaims.length };
  }

  const keepIds = new Set();
  // (a) Engine-considered claims
  if (engineResult) {
    for (const h of (engineResult.gate_hits || []))   if (h.claim_id) keepIds.add(h.claim_id);
    for (const s of (engineResult.suppressed  || []))  if (s.claim_id) keepIds.add(s.claim_id);
    for (const cl of (engineResult.applied_claim_chain || [])) if (cl) keepIds.add(cl);
  }

  // (b) Candidate policy_title match
  const titleNorm = String(candidatePolicyTitle || "").trim().toLowerCase();
  if (titleNorm) {
    for (const c of allIssueClaims) {
      const titles = (c.policy_titles || []).map(t => String(t).trim().toLowerCase());
      if (titles.includes(titleNorm)) keepIds.add(c.claim_id);
    }
  }

  // (c) Atom intersection (any gate atom in tagged set)
  const tagSet = new Set();
  if (tags) {
    for (const d of ["C","S","P","R","E","M","X"]) {
      (tags[d] || []).forEach(k => k && tagSet.add(String(k).trim()));
    }
  }
  if (tagSet.size) {
    for (const c of allIssueClaims) {
      const g = c.gates || {};
      let hit = false;
      for (const d of ["C","S","P","R","E"]) {
        for (const k of (g[d] || [])) {
          if (tagSet.has(String(k).trim())) { hit = true; break; }
        }
        if (hit) break;
      }
      if (hit) keepIds.add(c.claim_id);
    }
  }

  // (d) Precedent policy_titles → also pull those claims (precedents anchor analogy)
  const precTitles = new Set();
  for (const p of (precedents || [])) {
    if (p && p.policy_title) { var _pts = Array.isArray(p.policy_title) ? p.policy_title : [p.policy_title]; for (var _i = 0; _i < _pts.length; _i++) { if (_pts[_i]) precTitles.add(String(_pts[_i]).trim().toLowerCase()); } }
  }
  if (precTitles.size) {
    for (const c of allIssueClaims) {
      const titles = (c.policy_titles || []).map(t => String(t).trim().toLowerCase());
      for (const t of titles) {
        if (precTitles.has(t)) { keepIds.add(c.claim_id); break; }
      }
    }
  }

  let mode = "slice";
  let kept = allIssueClaims.filter(c => keepIds.has(c.claim_id));

  // If we somehow narrowed below 1 (no signal at all), fall back to first
  // `cap` claims so the specialist still sees the rule book shape.
  if (kept.length === 0) {
    kept = allIssueClaims.slice(0, cap);
    mode = "fallback_top_n";
  }
  // If slice exceeds cap, keep the cap-sized prefix (deterministic order).
  if (kept.length > cap) {
    kept = kept.slice(0, cap);
    mode = "slice_capped";
  }

  return { claims: kept, mode: mode, kept_ids: Array.from(keepIds), all_count: allIssueClaims.length };
}

function buildAtomRulesBlock(corpus, policyArea, opts) {
  if (!policyArea || !corpus || !corpus.claims || !corpus.atoms) return null;
  opts = opts || {};

  // 1. Filter claims to ones whose `issue` matches the policy area.
  const issueClaims = corpus.claims.filter(c => matchesPolicyArea(c.issue, policyArea));

  // 2. Build atoms_catalog for this policy area (used for slicing; not all of it ships).
  const referenced = new Set();
  for (const c of issueClaims) {
    const keys = atomKeysReferencedByClaim(c);
    keys.forEach(k => { if (k) referenced.add(String(k).trim()); });
  }
  const atomByKey = {};
  for (const a of corpus.atoms) {
    const k = String(a.atom_key || "").trim();
    if (k) atomByKey[k] = a;
  }
  const fullCatalog = { C: [], S: [], P: [], R: [], E: [], M: [], X: [] };
  let unresolved = 0;
  for (const k of referenced) {
    const a = atomByKey[k];
    if (!a) { unresolved++; continue; }
    const d = (a.dimension || "X").toString().trim().toUpperCase().charAt(0);
    if (!fullCatalog[d]) fullCatalog[d] = [];
    fullCatalog[d].push({
      atom_key:    a.atom_key,
      atom_name:   a.atom_name,
      dimension:   a.dimension,
      serial_code: a.serial_code,
      description: a.description,
      audit_rule:  a.audit_rule
    });
  }
  for (const d of Object.keys(fullCatalog)) {
    fullCatalog[d].sort((x, y) => String(x.serial_code || "").localeCompare(String(y.serial_code || "")));
  }

  // 3. Slice claims relevant to this candidate
  const sliced = sliceRelevantClaims(issueClaims, {
    engineResult:        opts.engineResult,
    candidatePolicyTitle: opts.candidatePolicyTitle,
    tags:                opts.tags,
    precedents:          opts.precedents,
    hardCap:             opts.hardCap || 60,
    policyArea:          policyArea
  });

  // 4. Slim atoms_catalog to entries the relevant claims actually need.
  const slicedCatalog = sliceAtomsCatalog(corpus, fullCatalog, sliced.claims, opts.tags);

  // 5. Emit slimmed claim list — strip empty arrays / objects to save bytes.
  const claimsOut = sliced.claims.map(c => {
    const out = {
      claim_id: c.claim_id,
      issue:    c.issue,
      outcome:  c.outcome,
      gates:    c.gates || {}
    };
    if (c.policy_titles && c.policy_titles.length) out.policy_titles = c.policy_titles;
    if (c.modifiers_required && c.modifiers_required.length) out.modifiers_required = c.modifiers_required;
    if (c.modifiers_excluded && c.modifiers_excluded.length) out.modifiers_excluded = c.modifiers_excluded;
    if (c.modifiers_lift_to_approve && c.modifiers_lift_to_approve.length) out.modifiers_lift_to_approve = c.modifiers_lift_to_approve;
    if (c.modifiers_lift_dnf && c.modifiers_lift_dnf.length) out.modifiers_lift_dnf = c.modifiers_lift_dnf;
    if (c.exceptions_required && c.exceptions_required.length) out.exceptions_required = c.exceptions_required;
    if (c.exceptions_lift_to_approve) out.exceptions_lift_to_approve = true;
    if (c.exception_qualifiers && Object.keys(c.exception_qualifiers).length) out.exception_qualifiers = c.exception_qualifiers;
    if (c.exception_qualifier_modifiers && Object.keys(c.exception_qualifier_modifiers).length) out.exception_qualifier_modifiers = c.exception_qualifier_modifiers;
    if (c.requires_exception_context) out.requires_exception_context = true;
    if (c.routing && (c.routing.non_realistic_routes_to || c.routing.cross_title_redirect)) out.routing = c.routing;
    if (c.notes) out.notes = c.notes;
    return out;
  });

  // Stats for header
  const catCounts = {};
  let total = 0;
  for (const d of ["C","S","P","R","E","M","X"]) {
    catCounts[d] = (slicedCatalog[d] || []).length;
    total += catCounts[d];
  }

  if (unresolved > 0) {
    try { console.warn("[AtomConsole] buildAtomRulesBlock:",
      unresolved, "/", referenced.size, "referenced atom_keys did not resolve in corpus.atoms"); } catch(_) {}
  }
  try { console.info("[AtomConsole] atom_rules built:",
    "policy=" + policyArea,
    "claims_all=" + issueClaims.length,
    "claims_kept=" + claimsOut.length + " (mode=" + sliced.mode + ")",
    "atoms_in_slice=" + total,
    "corpus.atoms=" + corpus.atoms.length); } catch(_) {}

  return {
    policy_area: policyArea,
    dimensions: {
      C: { name: "Content",       weight: 1.0, role: "primary gate" },
      S: { name: "Subject",       weight: 1.0, role: "primary gate" },
      P: { name: "Portrayal",     weight: 1.0, role: "primary gate" },
      R: { name: "Realism",       weight: 0.7, role: "secondary gate; affects routing" },
      E: { name: "Explicitness",  weight: 0.7, role: "secondary gate" },
      M: { name: "Modifier",      weight: 0.5, role: "lift / suppress claim outcome" },
      X: { name: "Exception",     weight: 0.5, role: "lift / context-required" }
    },
    semantics: {
      gate_logic: "AND across dimensions (C,S,P,R,E); OR within each dimension. " +
                  "Empty dimension = wildcard (no constraint).",
      verdict_priority: ["VIOLATION","NOT_RECOMMEND","NOT_FOR_FEED","APPROVE","NO_CLAIM_FIRED"],
      lift_logic: "modifiers_lift_to_approve atoms tagged → outcome upgraded to APPROVE. " +
                  "modifiers_lift_dnf atoms apply per-claim partial lifts. " +
                  "exceptions_required atoms must all be tagged when requires_exception_context=true.",
      routing_logic: "non_realistic_routes_to: when realism atoms imply non-realistic content, " +
                     "re-route to a different claim chain. cross_title_redirect: rebind verdict to a different policy_title."
    },
    atoms_catalog:    slicedCatalog,    // sliced: only atoms referenced by claims_in_scope or tagged on candidate
    atoms_in_scope:   total,
    atoms_per_dim:    catCounts,
    claims:           claimsOut,
    claims_in_scope:  claimsOut.length,
    claims_total_for_policy_area: issueClaims.length,
    claim_slice_mode: sliced.mode,        // "slice" | "slice_capped" | "fallback_top_n"
    note:             "atom_rules is a CASE-SCOPED SLICE. The full atom rule book lives in the skill body. " +
                      "claims_in_scope = " + claimsOut.length + " of " + issueClaims.length + " total " + policyArea + " claims. " +
                      "atoms_catalog only includes atoms referenced by these claims or tagged on the candidate."
  };
}

function buildPayload(pendingCase, tags, engineResult, precedentsResult, corpus) {
  if (!pendingCase) return null;
  const policy_area = resolvePolicyArea(pendingCase.issue);
  const imgSummary = imagesAttachedSummary(pendingCase.images);

  const candidate = {
    item_id:                pendingCase.source_video_id || pendingCase.record_id || "",
    record_id:              pendingCase.record_id || "",
    policy_title:           Array.isArray(pendingCase.policy_title) ? pendingCase.policy_title.join(", ") : (pendingCase.policy_title || ""),
    issue:                  pendingCase.issue || "",
    visual_summary:         pendingCase.visual_summary || "",
    asr_text:               pendingCase.asr_text || "",
    ocr_text:               pendingCase.ocr_text || "",
    caption_text:           pendingCase.caption_text || "",
    case_url:               pendingCase.case_url || "",
    comment:                pendingCase.comment || undefined,
    images_attached_count:  imgSummary.count,
    images_note:            imgSummary.note,
    // Reviewer's draft tags (may be empty). Specialist may revise.
    draft_atom_tags:        tags || {},
    // Precedent-specific context (only populated in precedent re-check mode)
    prior_decision:         pendingCase.decision || undefined,
    prior_rationale:        pendingCase.rationale || undefined,
    case_id:                pendingCase.case_id || undefined
  };

  // Precedents — content-only, no retrieval scores. Atoms are the analogy
  // anchor. Decision + rationale tell the specialist how the atom set was
  // historically resolved. Long text fields are capped to keep payload size
  // sane (typical case shrinks 122 KB → ~40 KB without losing precedential
  // signal — the specialist also reads the candidate composite image).
  const PREC_VS_CAP   = 1500;   // visual_summary
  const PREC_TEXT_CAP = 800;    // asr_text / ocr_text / caption_text each
  const PREC_RAT_CAP  = 1000;   // rationale
  const _cap = (s, n) => {
    if (!s) return "";
    const t = String(s);
    if (t.length <= n) return t;
    return t.slice(0, n) + " …[truncated +" + (t.length - n) + " chars]";
  };
  const precedents = ((precedentsResult && precedentsResult.results) || []).map((r, i) => ({
    rank:               i + 1,
    case_id:            r.case_id || r.source_video_id || "",
    source_video_id:    r.source_video_id || "",
    policy_title:       Array.isArray(r.policy_title) ? r.policy_title.join(", ") : (r.policy_title || ""),
    issue:              r.issue || "",
    decision:           r.decision || "",
    visual_summary:     _cap(r.visual_summary, PREC_VS_CAP),
    asr_text:           _cap(r.asr_text,       PREC_TEXT_CAP),
    ocr_text:           _cap(r.ocr_text,       PREC_TEXT_CAP),
    caption_text:       _cap(r.caption_text,   PREC_TEXT_CAP),
    rationale:          _cap(r.rationale,      PREC_RAT_CAP),
    atoms:              r.atoms || {},        // full tag set, all 7 dims
    images:             (r.images || []).map(im => ({
      // Strip volatile tokens; keep stable metadata so specialist can reference
      // "image #2 shows X" without leaking signed urls.
      name: im && im.name || "",
      type: im && (im.type || im.ext) || "",
      size: im && im.size || null
    }))
  }));

  // Engine output as a simulation hint (the specialist may agree, override, or
  // re-tag and re-run mentally using the embedded atom_rules.claims).
  const engine_simulation = engineResult ? {
    verdict:              engineResult.verdict,
    applied_claim_chain:  engineResult.applied_claim_chain || [],
    lifts_applied:        engineResult.lifts_applied || [],
    routing:              engineResult.routing || {},
    gate_hits: (engineResult.gate_hits || []).map(h => ({
      claim_id:            h.claim_id,
      outcome_base:        h.outcome_base,
      outcome_after_lifts: h.outcome_after_lifts,
      lift:                h.lift || null,
      evidence:            h.evidence || {},
      policy_titles:       h.policy_titles || []
    })),
    suppressed: (engineResult.suppressed || []).map(s => ({
      claim_id:        s.claim_id,
      outcome_base:    s.outcome_base,
      suppress_reason: s.suppress_reason,
      policy_titles:   s.policy_titles || []
    })),
    structural_stability: (function() {
      var ss = window.computeStability
        ? window.computeStability(engineResult, tags, corpus.claims || [])
        : null;
      var cf = window.computeCounterfactual
        ? (function() {
            var ac = corpus.claims || [];
            var pa = pendingCase && pendingCase.issue ? resolvePolicyArea(pendingCase.issue) : null;
            var sc = pa ? ac.filter(function(c) { return matchesPolicyArea(c.issue, pa); }) : ac;
            return window.computeCounterfactual(tags, sc, engineResult.verdict, { policy_title: pendingCase && pendingCase.policy_title });
          })()
        : null;
      if (ss && cf) {
        ss.counterfactual = { structurally_fragile: cf.structurally_fragile, min_flips_to_inverse: cf.min_flips_to_inverse, nearest_flip_path: cf.nearest_flip_path };
        ss.fragility_score = cf.fragility_score;
      }
      return ss;
    })()
  } : null;

  // v0.9.0: Claims are now baked into the specialist skill (Appendix B).
  // Payload no longer ships claims_slice — the skill has the full non-approve
  // corpus (223 claims) and doesn't need per-case claim data from the plugin.
  // The local engine still uses corpus.claims for in-plugin simulation.

  // Tiny version pointer so the specialist can verify rule book alignment.
  const rule_book_ref = {
    schema: "atom-catalog",
    version: "v1.0",
    policy_area: policy_area
  };

  return {
    schema:           "case-review-payload",
    version:          "v0.7",
    policy_area:      policy_area,
    generated_at:     new Date().toISOString(),
    generator:        PLUGIN_VERSION,
    // Strong, version-locked discriminator so the agent picks the atom skill
    // unambiguously even if the legacy nsa-precedent-review skill description
    // also matches `schema=case-review-payload`. The atom skill description
    // pins on `version=v0.6` AND on `_route_hint`.
    _route_hint:      (policy_area ? policy_area.toLowerCase() : "nsa") + "-atom-precedent-review",
    candidate:        candidate,
    precedents:       precedents,
    rule_book_ref:    rule_book_ref,
    engine_simulation: engine_simulation
  };
}

// ---- PayloadPane: emit + copy + JSON preview -------------------------------
// Two-step UX (v0.6.6, ported from legacy case_review_mvp V3.1.0):
//   1. "Send payload"     — copies payload (with route preamble) to clipboard.
//                           Falls back to .json download if the iframe blocks
//                           Clipboard API.
//   2. "Copy keyframes (N)" — builds a single PNG composite of up to 12 frames
//                           in a 2-col grid and writes it to the clipboard via
//                           ClipboardItem. Pasting that PNG gives the specialist
//                           a real multimodal attachment (pixels), not URLs the
//                           agent can't fetch. Falls back to opening a new tab
//                           where the reviewer can right-click → Copy image.
//   • "↓ .json" remains as a quiet ghost link for offline / drag-into-chat.
function PayloadPane(props) {
  const { payload, pendingCase, imageMeta, reviewMode } = props;
  const [copyState, setCopyState]       = React.useState("idle"); // idle | ok | err
  const [imgState,  setImgState]        = React.useState("idle"); // idle | resolving | ok | newtab | err
  const [resolvedImgUrls, setResolvedImgUrls] = React.useState([]);
  const [open, setOpen] = React.useState(false);

  if (!payload) return null;

  const json = React.useMemo(() => JSON.stringify(payload, null, 2), [payload]);
  const sizeKb = (json.length / 1024).toFixed(1);
  const precCount = (payload.precedents || []).length;
  const policyArea = payload.policy_area || "—";
  const verdict = payload.engine_simulation ? payload.engine_simulation.verdict : "(no atoms tagged)";
  const rbr = payload.rule_book_ref || null;
  const rbVersion = rbr ? rbr.version : null;
  // v0.9: claims baked into skill — no claims_slice in payload
  const routeHint  = payload._route_hint || "nsa-atom-precedent-review";

  // Compose payload-with-preamble: gives the agent an unambiguous routing cue
  // even if the (older) legacy nsa-precedent-review skill description also
  // matches schema=case-review-payload. The preamble is plain text the user
  // would type, so it doesn't break the JSON parser on the receiving side.
  const payloadWithPreamble =
      "Run /" + routeHint + " on this case-review-payload (v0.7, claims baked in skill):\n\n" +
      json;

  const hasImages = !!(pendingCase && pendingCase.images && pendingCase.images.length);
  const imgCount  = hasImages ? pendingCase.images.length : 0;

  // ---- helpers --------------------------------------------------------------

  const copyText = async (text) => {
    let ok = false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText &&
          window.isSecureContext !== false) {
        await navigator.clipboard.writeText(text);
        ok = true;
      }
    } catch (e) { /* fall through */ }
    if (!ok) {
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed"; ta.style.left = "-1000px"; ta.style.top = "0";
        document.body.appendChild(ta);
        ta.select();
        ta.setSelectionRange(0, text.length);
        ok = !!document.execCommand("copy");
        document.body.removeChild(ta);
      } catch (e) { ok = false; }
    }
    return ok;
  };

  const downloadJson = () => {
    try {
      const blob = new Blob([payloadWithPreamble], { type: "application/json" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      const itemId = (payload.candidate && payload.candidate.item_id) || "case";
      a.href = url;
      a.download = "payload-" + (policyArea || "X") + "-" + itemId + ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (e) {
      console.error("[AtomConsole] download failed:", e);
    }
  };

  // ---- single-step "Send to specialist" -------------------------------------
  // Tries clipboard first. On failure, auto-downloads .json so the reviewer is
  // never stuck. Either path leaves the payload routed via the preamble line.
  const onSend = async () => {
    const ok = await copyText(payloadWithPreamble);
    if (ok) {
      setCopyState("ok");
      setTimeout(() => setCopyState("idle"), 1800);
    } else {
      // Clipboard blocked → fall back to download. Keep err state visible for
      // the reviewer so they know the .json was saved instead of copied.
      console.warn("[AtomConsole] clipboard blocked → falling back to download");
      downloadJson();
      setCopyState("err");
      setTimeout(() => setCopyState("idle"), 4000);
    }
  };

  // ---- "Copy keyframes" — resolve attachment urls then build a 2-col PNG
  // composite of up to 12 frames and write it to the clipboard. Pasting that
  // single PNG into Mira chat gives the specialist skill a real multimodal
  // attachment to reason over (vs URL strings the agent can't fetch).
  const onCopyKeyframes = async () => {
    if (!hasImages) return;
    setImgState("resolving");
    let urls = [];
    const KF_LIMIT = 12;
    const kfImages = pendingCase.images.slice(0, KF_LIMIT);
    try {
      if (imageMeta && typeof imageMeta.resolve === "function") {
        // Use cache (no priority) — images are already resolved for display.
        // Only if cache miss, this triggers a fresh SDK call through the queue.
        const resolved = await imageMeta.resolve(reviewMode === "precedent" ? "case" : "pending", pendingCase.record_id, kfImages);
        if (Array.isArray(resolved)) {
          urls = resolved;
        }
      }
      if (!Array.isArray(urls) || urls.filter(Boolean).length === 0) {
        urls = kfImages.map(im => (im && (im.url || im.tmp_url || im.tmpUrl)) || "");
      }
    } catch (e) {
      console.error("[AtomConsole] keyframe resolve failed:", e);
      urls = kfImages.map(im => (im && (im.url || im.tmp_url || im.tmpUrl)) || "");
    }
    urls = urls.filter(u => !!u);
    setResolvedImgUrls(urls);
    if (urls.length === 0) {
      setImgState("err");
      setTimeout(() => setImgState("idle"), 3000);
      return;
    }
    // Build composite + clipboard write (or new-tab fallback).
    const r = await copyKeyframesComposite(urls);
    if (r.ok && r.mode === "clipboard") {
      setImgState("ok");
      setTimeout(() => setImgState("idle"), 1800);
    } else if (r.ok && r.mode === "newtab") {
      setImgState("newtab");
      setTimeout(() => setImgState("idle"), 6000);
    } else {
      setImgState("err");
      setTimeout(() => setImgState("idle"), 4000);
    }
  };

  // ---- UI labels ------------------------------------------------------------
  // Two explicitly numbered steps mirror the legacy plugin's "1. Copy JSON /
  // 2. Copy keyframes" UX so reviewers know to paste both into the chat.
  const sendLabel = copyState === "ok"  ? "✓ Copied"
                  : copyState === "err" ? "⤓ saved as .json (clipboard blocked)"
                  : "Send payload";
  const sendClass = "copy-btn" + (copyState === "ok" ? " ok"
                                : copyState === "err" ? " err" : "");
  const kfLabel   = imgState === "resolving" ? "resolving urls…"
                  : imgState === "ok"     ? "✓ Copied"
                  : imgState === "newtab" ? "↗ opened in tab — right-click → Copy image"
                  : imgState === "err"    ? "✗ failed"
                  : "Copy keyframes (" + Math.min(12, imgCount) + ")";

  return e("div", { className: "payload-card" },
    e("div", { className: "payload-head" },
      e("div", null,
        e("div", { className: "payload-title" }, "Payload"),
        e("div", { className: "payload-meta" },
          precCount, " precedent", precCount===1?"":"s",
          hasImages ? " · " + Math.min(12, imgCount) + " keyframe" + (Math.min(12, imgCount)===1?"":"s") : "",
          " · ", sizeKb, " KB"
        )
      ),
      e("div", { className: "payload-actions" },
        e("button", { className: sendClass, onClick: onSend,
          title: "Step 1 — copy payload + route preamble to clipboard. Falls back to .json download if the iframe blocks clipboard." },
          sendLabel),
        hasImages && e("button", {
          className: "copy-btn secondary",
          onClick: onCopyKeyframes,
          disabled: imgState === "resolving",
          title: "Step 2 — build a 2-col PNG composite of up to 12 keyframes and copy it to the clipboard. Paste into the same chat AFTER the payload so the specialist can analyze the pixels."
        }, kfLabel),
        e("button", {
          className: "copy-btn ghost",
          onClick: downloadJson,
          title: "Save the payload as a .json file (offline / drag-into-chat workflow)."
        }, "↓ .json")
      )
    ),
    copyState === "err" && e("div", {
      style: { fontSize: 11, color: "var(--muted)", marginBottom: 6 }
    }, "Clipboard blocked by Bitable — payload was downloaded as .json instead. Drag the file into the specialist chat."),
    imgState === "newtab" && e("div", {
      style: { fontSize: 11, color: "var(--muted)", marginBottom: 6 }
    }, "Composite opened in a new tab (clipboard image write blocked). Right-click the image → Copy image, then paste into the chat after the payload."),
    imgState === "err" && e("div", {
      style: { fontSize: 11, color: "var(--error, #c00)", marginBottom: 6 }
    }, "Could not build keyframe composite. Re-pick the case or refresh the table to refresh signed urls."),

    e("div", { style: { display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 4 }},
      e("span", { className: "payload-stat routing",
        title: "Routes to which specialist skill" },
        "→ /" + routeHint),
      e("span", { className: "payload-stat",
        title: "Atom-engine suggested verdict (specialist may revise tags and override)" },
        "engine: " + verdict)
    ),
    !policyArea && e("div", { className: "muted",
      style: { fontSize: 11, padding: "4px 0", color: "var(--error)" }},
      "⚠ No policy_area resolved from issue \"",
      payload.candidate && payload.candidate.issue,
      "\". Set the case's `issue` to one of: NSA / HHB / HRA / SGC / VBDA."),
    e("details", { open: open, onToggle: ev => setOpen(ev.target.open) },
      e("summary", null, open ? "Hide JSON preview" : "Show JSON preview"),
      e("pre", null, json)
    )
  );
}

// ---- v0.7.0 phase6a: paste-back loop ---------------------------------------
// Mira does not expose a public skill-invocation API to third-party iframes
// (verified May 2026 — only inbound MCP/Skill flows are documented). The
// established workflow is therefore manual:
//   1. Plugin emits payload + composite keyframes (handled by PayloadPane).
//   2. Reviewer pastes both into a Mira chat with the atom skill.
//   3. Skill replies with a single fenced ```json block (Atom Verdict Schema).
//   4. Reviewer copies that reply and pastes it into ReasonedVerdictPane,
//      which parses, schema-checks, and renders a structured view here.
//
// tryParseVerdictJson — port of legacy tryParseReasonedJson (case_review_mvp
// V3.x). Strips ```json fences if present, then locates the outermost {…}
// object and JSON.parses it. Returns null on any failure (no exceptions).
function tryParseVerdictJson(raw) {
  if (!raw) return null;
  let txt = String(raw).trim();
  // Strip markdown fences (```json …``` or ``` …```) if the model wrapped them.
  txt = txt.replace(/^```(?:json)?\s*/i, "").replace(/```\s*$/i, "").trim();
  // Tolerate any prose before/after the object — grab the outermost braces.
  const start = txt.indexOf("{");
  const end   = txt.lastIndexOf("}");
  if (start === -1 || end === -1 || end < start) return null;
  try {
    return JSON.parse(txt.slice(start, end + 1));
  } catch (e) {
    return null;
  }
}

// validateAtomVerdict — soft schema check for atom-verdict v1.0. Returns
// { ok, errors[], warnings[] }. Errors block the render; warnings annotate
// the verdict view (e.g. unknown verdict literal, missing dim, rejected
// shape mismatch). Permissive on extra fields so downstream skill rev-bumps
// don't break the plugin.
const VERDICT_ENUM = ["VIOLATION","NOT_RECOMMEND","NOT_FOR_FEED","APPROVE","ESCALATE"];
const ATOM_DIMS_BY_VERTICAL = {NSA:["C","S","P","R","E","M","X"],HHB:["S","C","P","R","M","X"],HSS:["S","C","P","R","M","X"],BPI:["S","C","P","R","M","X"],HRA:["C","S","P","R","E","M","X"],VBDA:["C","S","P","R","E","M","X"],SGC:["C","S","P","R","E","M","X"]};
const KNOWN_VERTICALS = Object.keys(ATOM_DIMS_BY_VERTICAL);
const ATOM_DIMS = ["C","S","P","R","E","M","X"];
function validateAtomVerdict(v) {
  const errors = [], warnings = [];
  if (!v || typeof v !== "object") {
    return { ok: false, errors: ["payload is not a JSON object"], warnings };
  }
  if (v.schema && v.schema !== "atom-verdict") {
    warnings.push("schema is \"" + v.schema + "\", expected \"atom-verdict\"");
  }
  if (v.vertical && KNOWN_VERTICALS.indexOf(v.vertical) === -1) {
    warnings.push("vertical is \"" + v.vertical + "\", not a known vertical (" + KNOWN_VERTICALS.join(", ") + ")");
  }
  if (!v.verdict || VERDICT_ENUM.indexOf(v.verdict) === -1) {
    errors.push("verdict must be one of " + VERDICT_ENUM.join(" / "));
  }
  // confidence: legacy integer 1-10 or current float 0-1 (deprecated, superseded by ambiguity_assessment)
  // No warning emitted — field is deprecated and both formats are accepted.
  if (!v.proposed_atom_tags || typeof v.proposed_atom_tags !== "object") {
    errors.push("proposed_atom_tags missing or not an object");
  } else {
    const expectedDims = (v.vertical && ATOM_DIMS_BY_VERTICAL[v.vertical]) || ATOM_DIMS;
    const missing = expectedDims.filter(d => !Array.isArray(v.proposed_atom_tags[d]));
    if (missing.length) warnings.push("proposed_atom_tags missing dim(s): " + missing.join(","));
  }
  if (v.simulated_claim_chain && !Array.isArray(v.simulated_claim_chain)) {
    errors.push("simulated_claim_chain must be an array");
  }
  if (v.precedent_analysis && !Array.isArray(v.precedent_analysis)) {
    errors.push("precedent_analysis must be an array");
  }
  if (v.rejected_draft_atoms && !Array.isArray(v.rejected_draft_atoms)) {
    warnings.push("rejected_draft_atoms is not an array — ignoring");
  }
  if (v.watch_outs && !Array.isArray(v.watch_outs)) {
    warnings.push("watch_outs is not an array — ignoring");
  }
  return { ok: errors.length === 0, errors, warnings };
}

// _splitReason — split the v0.6 skill's `reason` string into tagged sections
// keyed by [VISUAL ANALYSIS] / [TEXT ANALYSIS] / [PRECEDENT TRIAGE] /
// [ATOM TAGGING] / [CLAIM SIMULATION] / [VERDICT]. Returns { sectionKey:text }.
// Falls back to { _full: raw } if no tags are detected.
function _splitReason(raw) {
  if (!raw || typeof raw !== "string") return null;
  const re = /\[(VISUAL ANALYSIS|TEXT ANALYSIS|PRECEDENT TRIAGE|ATOM TAGGING|CLAIM SIMULATION|VERDICT)\]/g;
  const matches = [];
  let m;
  while ((m = re.exec(raw)) !== null) matches.push({ tag: m[1], idx: m.index });
  if (!matches.length) return { _full: raw };
  const out = {};
  for (let i = 0; i < matches.length; i++) {
    const start = matches[i].idx + matches[i].tag.length + 2; // +2 for [ ]
    const end = (i + 1 < matches.length) ? matches[i+1].idx : raw.length;
    out[matches[i].tag] = raw.slice(start, end).trim();
  }
  return out;
}

// ReasonedVerdictPane — render an atom-verdict v1.0 object pasted back from
// Mira chat. Mirrors the legacy ReasonedVerdict component's layout:
//   • Header pill (verdict + confidence + grey + policy_title + pattern)
//   • Proposed atoms by dimension (with rejected drafts struck through)
//   • Simulated claim chain (dominant first)
//   • Precedent analysis cards
//   • Watch-outs / next_step / suppressed claims (collapsible)
//   • Engine alignment delta + tagged reasoning sections (collapsible)
function ReasonedVerdictPane(props) {
  const { engineSimulation, atomsByDim, onVerdictParsed, onVerdictCleared, precedentsResult, imageMeta } = props || {};

  const [parsed, setParsed]   = React.useState(null);
  const [check, setCheck]     = React.useState({ ok: true, errors: [], warnings: [] });
  const [editing, setEditing] = React.useState(true); // textarea expanded by default until first parse
  const [openPrec, setOpenPrec] = React.useState(null); // detail modal from analysis cards

  // ---- Build a flat lookup index from corpus.atomsByDim ----
  // Map atom_key → { atom_key, atom_name, serial_code, dim }. Used to resolve
  // any key the skill emits (catalog uses dotted-namespace `atom_key`s; we also
  // accept serial_code as a fallback in case a skill rev returns "C37"). Tries
  // case-insensitive matching as a final resort. Returns null when no match.
  const atomIndex = React.useMemo(() => {
    const byKey = new Map(), bySerial = new Map(), byKeyLC = new Map();
    if (atomsByDim) {
      for (const d of Object.keys(atomsByDim)) {
        const dim = d; // C / S / P / R / E / M / X
        for (const a of (atomsByDim[d] || [])) {
          const rec = {
            atom_key: a.atom_key,
            atom_name: a.atom_name || "",
            serial_code: a.serial_code || "",
            dim: dim,
            description: a.description || ""
          };
          if (a.atom_key) {
            byKey.set(a.atom_key, rec);
            byKeyLC.set(String(a.atom_key).toLowerCase(), rec);
          }
          if (a.serial_code) {
            // serial_code looks like "C37 — Not applicable"; index by leading token too
            bySerial.set(a.serial_code, rec);
            const m = String(a.serial_code).match(/^([A-Z]\d+)/);
            if (m) bySerial.set(m[1], rec);
          }
        }
      }
    }
    return { byKey, bySerial, byKeyLC };
  }, [atomsByDim]);

  // resolveAtom — accepts a raw key + optional dim hint. Returns
  // { key, dim, serial, name, resolved } where resolved=false means "unknown".
  const resolveAtom = React.useCallback((rawKey, dimHint) => {
    if (!rawKey) return { key: rawKey, dim: dimHint || "?", serial: "", name: "", resolved: false };
    const k = String(rawKey);
    let r = atomIndex.byKey.get(k) || atomIndex.bySerial.get(k) || atomIndex.byKeyLC.get(k.toLowerCase());
    if (!r) {
      // Last resort: if the key starts with a known dim prefix (e.g. "C37" or
      // "atom.exposure...."), infer the dim. Catalog uses prefixes:
      //  C → "atom." | S → "subject." | P → "portrayal." | R → "realism."
      //  E → "explicitness." | M → "modifier." | X → "exception."
      const prefixDim = { atom: "C", subject: "S", portrayal: "P", realism: "R",
                          explicitness: "E", modifier: "M", exception: "X" };
      const head = k.split(".")[0];
      const m = k.match(/^([A-Z])\d+/);
      const dim = dimHint || prefixDim[head] || (m ? m[1] : "?");
      // Build a friendly fallback name from the tail of the key.
      const tail = k.includes(".") ? k.split(".").slice(1).join(".") : k;
      return { key: k, dim: dim, serial: "", name: tail || k, resolved: false };
    }
    return { key: r.atom_key, dim: r.dim, serial: r.serial_code, name: r.atom_name, resolved: true };

  // ---- Parse-on-input ----

        warnings: [] });

function ConfirmSaveSection({ corpus, pendingCase, tags, verdictData, engineResult, stabilityResult, counterfactualResult, reviewMode, precedentRid, onCorpusPatch }) {
  const e = React.createElement;
  const [decision, setDecision] = React.useState("flag");
  const [policyTitle, setPolicyTitle] = React.useState([]);
  const [rationale, setRationale] = React.useState("");
  const [saving, setSaving] = React.useState(false);
  const [saved, setSaved] = React.useState(null); // { ok, msg }

  // Sync defaults from verdict when it changes
  React.useEffect(() => {
    if (verdictData) {
      const v = verdictData.verdict || "";
      if (v === "APPROVE") setDecision("pass");
      else setDecision("flag");
      setPolicyTitle(
        verdictData.final_policy_title
          ? (Array.isArray(verdictData.final_policy_title) ? verdictData.final_policy_title : [verdictData.final_policy_title])
          : (Array.isArray(pendingCase.policy_title) ? pendingCase.policy_title : pendingCase.policy_title ? [pendingCase.policy_title] : [])
      );
      // Preload rationale: prefer skill-generated `rationale_for_precedent`
      // (concise, human-readable, max ~1200 chars, focused on decisive signals).
      // Fall back to [VERDICT] section of `reason` for older skill versions.
      let _preloadRationale = "";
      if (verdictData.rationale_for_precedent) {
        _preloadRationale = verdictData.rationale_for_precedent;
      } else if (verdictData.reason) {
        const _secs = _splitReason(verdictData.reason);
        if (_secs && _secs.VERDICT) {
          _preloadRationale = _secs.VERDICT;
        } else if (_secs && _secs._full) {
          _preloadRationale = _secs._full.slice(0, 500);
        } else {
          _preloadRationale = verdictData.reason.slice(0, 500);
        }
      }
      setRationale(_preloadRationale);
    } else {
      setDecision("flag");
      setPolicyTitle(Array.isArray(pendingCase.policy_title) ? pendingCase.policy_title : pendingCase.policy_title ? [pendingCase.policy_title] : []);
      setRationale("");
    }
    setSaved(null);
  }, [verdictData, pendingCase]);

  // Re-sync decision from live engine when atoms change AFTER initial load.
  // This gives the user feedback that their atom edits changed the engine outcome.
  const _prevEngineRef = React.useRef(undefined);
  React.useEffect(() => {
    // Skip the very first render (let verdictData effect win on initial paste)
    if (_prevEngineRef.current === undefined) {
      _prevEngineRef.current = engineResult;
      return;
    }
    _prevEngineRef.current = engineResult;
    // null engineResult = no atoms tagged = no claims can fire = pass
    var liveDecision;
    if (!engineResult || !engineResult.verdict || engineResult.verdict === "APPROVE" || engineResult.verdict === "NO_CLAIM_FIRED") {
      liveDecision = "pass";
    } else {
      liveDecision = "flag";
    }
    setDecision(liveDecision);
    // If switching to pass, clear policy_title
    if (liveDecision === "pass") setPolicyTitle([]);
  }, [engineResult]);

  // Get current user as analyst
  const [analyst, setAnalyst] = React.useState("");
  React.useEffect(() => {
    (async () => {
      try {
        if (window.bitable && window.bitable.bridge && window.bitable.bridge.getUserId) {
          const uid = await window.bitable.bridge.getUserId();
          setAnalyst(uid || "unknown");
        } else {
          setAnalyst("plugin-user");
        }
      } catch(e) { setAnalyst("plugin-user"); }
    })();
  }, []);

  const isPrecedentReview = reviewMode === "precedent" && !!precedentRid;

  const handleSave = async () => {
    setSaving(true);
    setSaved(null);
    try {
      if (isPrecedentReview) {
        await window.__updateExistingRecord(corpus, pendingCase, tags, {
          decision: decision,
          policyTitle: policyTitle,
          rationale: rationale,
          reviewedBy: analyst,
          overrideTag: discrepancy.tag || (escalate ? "[escalate] User escalated for alignment discussion" : ""),
          stabilityScore: stabilityResult && stabilityResult.score,
          stabilityBand: stabilityResult && stabilityResult.band,
          structurallyFragile: counterfactualResult && counterfactualResult.structurally_fragile
        });
        setSaved({ ok: true, msg: "Updated precedent (reviewed_by saved)" });

            record_id: precedentRid,
            decision: decision,
            status: "Reviewed",
            reviewed_by: analyst

        }
      } else {
        const _res = await window.__saveConfirmedRecord(corpus, pendingCase, tags, {
          decision: decision,
          policyTitle: policyTitle,
          rationale: rationale,
          analyst: analyst,
          overrideTag: discrepancy.tag || (escalate ? "[escalate] User escalated for alignment discussion" : ""),
          stabilityScore: stabilityResult && stabilityResult.score,
          stabilityBand: stabilityResult && stabilityResult.band,
          structurallyFragile: counterfactualResult && counterfactualResult.structurally_fragile,
          _pendingRecordId: pendingCase.record_id,

        });
        const _drops = (_res && _res.droppedOptions) || [];
        if (_drops.length) {
          const _msg = "Saved, but these Select options were missing on the column and got dropped: " +
            _drops.map(function(d){ return d.field + "=\'" + d.value + "\'"; }).join(", ") +
            ". Add the option to the column in the Bitable, then re-save.";
          setSaved({ ok: false, msg: _msg });
        } else {
          setSaved({ ok: true, msg: "Saved to Precedents table" });
          // Patch corpus in-memory: mark pending as Reviewed + add new precedent
          if (onCorpusPatch) {
            onCorpusPatch({
              pendingStatusUpdate: { record_id: pendingCase.record_id, status: "Reviewed" },
              newPrecedent: {
                record_id: _res && _res.recordId || null,
                source_video_id: pendingCase.source_video_id || "",
                visual_summary: pendingCase.visual_summary || "",
                caption_text: pendingCase.caption_text || "",
                policy_title: policyTitle ? [policyTitle] : (pendingCase.policy_title || []),
                issue: pendingCase.issue || "",
                decision: decision,
                status: "Reviewed",
                atoms: JSON.parse(JSON.stringify(tags))
              }
            });
          }
        }
      }
    } catch(err) {
      setSaved({ ok: false, msg: String(err.message || err) });
    } finally {
      setSaving(false);
    }
  };

  // Available policy titles — sourced from ATLAS Atom Rules (corpus.claims),
  // scoped to the case's issue when available for relevance.
  const titleOptions = React.useMemo(() => {
    const s = new Set();
    const caseIssue = pendingCase && pendingCase.issue ? pendingCase.issue : null;
    for (const c of (corpus.claims || [])) {
      if (caseIssue && (c.issue || "") !== caseIssue) continue;
      for (const t of (c.policy_titles || [])) { if (t) s.add(t); }
    }
    // If issue-scoped produced nothing (or no issue), fall back to all claim titles
    if (!s.size) {
      for (const c of (corpus.claims || [])) {
        for (const t of (c.policy_titles || [])) { if (t) s.add(t); }
      }
    }
    // Always include current selection so user's choice isn't lost
    for (const _pt of (policyTitle || [])) { if (_pt) s.add(_pt); }
    return Array.from(s).sort();
  }, [corpus.claims, pendingCase, policyTitle]);

  const hasAtoms = Object.values(tags).some(arr => arr && arr.length > 0);

  // Escalation flag — user can manually escalate even when everything agrees
  const [escalate, setEscalate] = React.useState(false);

  // Discrepancy detection — classifies into 3 distinct override types:
  //   model_vs_human: skill verdict != engine verdict (atom edits changed outcome)
  //   rule_gap: engine verdict matches but user manually overrode decision/policy

  const discrepancy = React.useMemo(() => {
    // Live engine evaluation
    var engineDecision = null;
    try {
      if (window.AtomEngine && corpus.claims) {
        const er = window.AtomEngine.evaluate(tags, corpus.claims, {});
        if (er && er.verdict) {
          engineDecision = (er.verdict === "APPROVE" || er.verdict === "NO_CLAIM_FIRED") ? "pass" : "flag";
        }
      }
    } catch(e) { /* engine not available */ }
    // 0 atoms = no claims fire = pass
    if (!engineDecision && !Object.values(tags).some(a => a && a.length)) engineDecision = "pass";

    // Skill verdict (frozen at paste time)
    var skillDecision = null;
    if (verdictData && verdictData.verdict) {
      skillDecision = (verdictData.verdict === "APPROVE") ? "pass" : "flag";
    }

    // Expected policy title from skill
    var expectedTitle = (verdictData && verdictData.final_policy_title) || "";

    // Classification
    var type = null;
    var details = [];

    // Type 1: model_vs_human — skill says X, engine says Y (user changed atoms)
    if (skillDecision && engineDecision && skillDecision !== engineDecision) {
      type = "model_vs_human";
      details.push("Skill:" + skillDecision + " \u2192 Engine:" + engineDecision + " (atom edits changed outcome)");
    }

    // Type 2: rule_gap — engine says X but user manually picked Y in dropdown
    if (engineDecision && decision !== engineDecision) {
      type = "rule_gap";
      details.push("Engine:" + engineDecision + " \u2192 User:" + decision);
    }
    // Also flag policy_title manual override (only for flag decisions)
    // v0.18.20: validate user-selected titles against engine-fired claims' policy titles.
    // Scope evaluation to the case's policy area to prevent cross-vertical claims
    // (e.g., YRGS claims with empty S gates) from producing spurious "missing" alerts.
    if (decision === "flag" && policyTitle.length) {
      // Derive expected titles from engine gate_hits (scoped to policy area)
      var _engineTitles = new Set();
      try {
        if (window.AtomEngine && corpus.claims) {
          // Scope claims to the active case's policy area (same as stability/counterfactual)
          var _pArea = pendingCase && pendingCase.issue ? resolvePolicyArea(pendingCase.issue) : null;
          var _scopedClaims = _pArea
            ? corpus.claims.filter(function(c) { return matchesPolicyArea(c.issue, _pArea); })
            : corpus.claims;
          var _er2 = window.AtomEngine.evaluate(tags, _scopedClaims, {});
          if (_er2 && _er2.gate_hits) {
            // Only collect policy_titles from enforcement-level hits (NFF/VIO/NOT_RECOMMEND).
            // APPROVE-outcome hits (e.g., claims lifted by exceptions) should not contribute
            // to the "expected titles" set — they don't represent active enforcement.
            var _enfSev = { "NOT_FOR_FEED": 1, "NFF": 1, "VIOLATION": 1, "NOT_RECOMMEND": 1 };
            // Build claim_id -> claim lookup for resolution-failure check
            var _claimById = {};
            for (var _ci = 0; _ci < _scopedClaims.length; _ci++) {
              if (_scopedClaims[_ci].claim_id) _claimById[_scopedClaims[_ci].claim_id] = _scopedClaims[_ci];
            }
            for (var _hi = 0; _hi < _er2.gate_hits.length; _hi++) {
              var _hOutcome = String(_er2.gate_hits[_hi].outcome_after_lifts || "").toUpperCase().replace(/[\s\-]+/g, "_");
              if (!_enfSev[_hOutcome]) continue;  // skip APPROVE-outcome hits
              // v0.18.20: skip claims that only fired because a gate resolved empty
              // due to atom-record-ID mismatch (SDK DuplexLink resolution failure).
              var _hClaim = _claimById[_er2.gate_hits[_hi].claim_id];
              if (_hClaim && _hClaim._gateResolutionFailed && _hClaim._gateResolutionFailed.length) continue;
              var _hpt = _er2.gate_hits[_hi].policy_titles || [];
              for (var _pi = 0; _pi < _hpt.length; _pi++) { _engineTitles.add(_hpt[_pi]); }
            }
          }
        }
      } catch(_) {}
      // Fall back to skill expected title if engine produced nothing
      if (!_engineTitles.size && expectedTitle) _engineTitles.add(expectedTitle);

      if (_engineTitles.size) {
        // Check: user selected titles not in engine-fired claims
        var _extra = policyTitle.filter(function(t) { return !_engineTitles.has(t); });
        // Check: engine-fired titles user did NOT select
        var _etArr = []; _engineTitles.forEach(function(t) { _etArr.push(t); });
        var _missing = _etArr.filter(function(t) { return policyTitle.indexOf(t) < 0; });

        if (_extra.length || _missing.length) {
          if (!type) type = "rule_gap";
          var _diffParts = [];
          if (_missing.length) _diffParts.push("missing: " + _missing.join(", "));
          if (_extra.length) _diffParts.push("extra: " + _extra.join(", "));
          details.push("Policy title diff (" + _diffParts.join("; ") + ")");
        }
      }
    }

    // Type 3: escalate — user explicitly flagged
    if (escalate && !type) {
      type = "escalate";
      details.push("User escalated for alignment discussion");
    }

    // Build tag string for persistence
    var tag = null;
    if (type) {
      tag = "[" + type + "] " + details.join("; ");
    } else if (escalate) {
      type = "escalate";
      tag = "[escalate] User escalated for alignment discussion";
    }

    return {
      type: type,
      hasOverride: !!type,
      details: details,
      tag: tag,
      engineDecision: engineDecision,
      skillDecision: skillDecision
    };
  }, [tags, decision, policyTitle, corpus, verdictData, pendingCase, escalate]);

  return e("div", { className: "save-section", style: { marginTop: 16, padding: 12, border: "1px solid var(--hairline)", borderRadius: 8, background: "var(--surface-soft)" } },
    e("div", { style: { fontWeight: 600, fontSize: 13, marginBottom: 8 } },
      isPrecedentReview ? "Update Precedent (re-review)" : "Confirm & Save to Precedents"),

    e("div", { className: "row", style: { gap: 12, alignItems: "center", flexWrap: "wrap", marginBottom: 8 } },
      e("label", { style: { fontSize: 11, color: "var(--muted)" } }, "Decision:"),
      e("select", {
        value: decision,
        onChange: (ev) => setDecision(ev.target.value),

      },
        e("option", { value: "flag" }, "Flag (unapprove)"),
        e("option", { value: "pass" }, "Pass (approve)")
      ),

      decision === "flag" && e("label", { style: { fontSize: 11, color: "var(--muted)", marginLeft: 8 } }, "Policy title(s):")
    ),
    // v0.18.21: Multi-select policy title (chip-based)
    decision === "flag" && e("div", { style: { display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 8, maxHeight: 120, overflowY: "auto" } },
      titleOptions.map(t => {

          key: t,
          onClick: () => setPolicyTitle(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]),
          style: { fontSize: 11, padding: "2px 8px", borderRadius: 10, cursor: "pointer", border: "1px solid " + (sel ? "#4a90d9" : "var(--hairline)"), background: sel ? "#e8f0fa" : "var(--surface-card)", color: sel ? "#2a6cb8" : "var(--body)", whiteSpace: "nowrap" }
        }, sel ? "✓ " + t : t);
      })
    ),
    decision === "flag" && !titleOptions.length && e("span", { style: { fontSize: 10, color: "var(--muted)", marginBottom: 8, display: "block" } }, "No policy titles available for this issue"),

    e("div", { style: { marginBottom: 8 } },
      e("label", { style: { fontSize: 11, color: "var(--muted)", display: "block", marginBottom: 2 } }, "Rationale (optional):"),
      e("textarea", {
        value: rationale,
        onChange: (ev) => setRationale(ev.target.value),
        rows: 8,
        style: { width: "100%", fontSize: 12, lineHeight: 1.45, fontFamily: "var(--mono)", resize: "vertical", padding: "6px 8px", border: "1px solid var(--hairline)", borderRadius: 4, minHeight: 140 }
      })
    ),

    // Escalate checkbox — always visible
    e("div", { style: { marginBottom: 8, display: "flex", alignItems: "center", gap: 6 } },
      e("input", { type: "checkbox", checked: escalate, onChange: function() { setEscalate(!escalate); },
        id: "escalate-cb", style: { margin: 0 } }),
      e("label", { htmlFor: "escalate-cb", style: { fontSize: 11, color: "var(--muted)", cursor: "pointer" } },
        "Escalate for alignment discussion (grey case / new trend)")
    ),

    // Discrepancy banner — color-coded by type
    discrepancy.hasOverride && e("div", { style: {
        marginBottom: 8, padding: "8px 10px", borderRadius: 6, fontSize: 11, lineHeight: 1.5,
        background: discrepancy.type === "model_vs_human" ? "#f0e8fe" :
                    discrepancy.type === "rule_gap" ? "#fef8e8" : "#e8f5f0",
        border: "1px solid " + (discrepancy.type === "model_vs_human" ? "#c4a8f0" :
                                discrepancy.type === "rule_gap" ? "#e8d48b" : "#9dd4be")
      } },
      e("div", { style: { fontWeight: 600, marginBottom: 2, color:
        discrepancy.type === "model_vs_human" ? "#7c5cc4" :
        discrepancy.type === "rule_gap" ? "#b8860b" : "#3d8b6e" } },
        discrepancy.type === "model_vs_human" ? "⚠ Model vs Human (atom selection differs from skill)" :
        discrepancy.type === "rule_gap" ? "⚠ Potential Rule Gap (manual decision override)" :
        "⚑ Escalated for Alignment"),
      e("div", { style: { color: "var(--body)" } },
        discrepancy.details.join(" · ")),
      e("div", { style: { marginTop: 2, color: "var(--muted)" } },

    ),

    e("div", { className: "row", style: { gap: 8, alignItems: "center" } },

      saved && e("span", { style: { fontSize: 11, color: saved.ok ? "var(--success)" : "var(--error)" } }, saved.msg)
    )
