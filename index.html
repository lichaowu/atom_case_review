<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Atom Console — case_review_atom_mvp</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  :root {
    --primary:#cc785c; --primary-active:#a9583e; --hairline:#e6dfd8;
    --ink:#141413; --body:#3d3d3a; --muted:#6c6a64;
    --canvas:#faf9f5; --surface-soft:#f5f0e8; --surface-card:#efe9de;
    --surface-cream-strong:#e8e0d2;
    --success:#5db872; --warning:#d4a017; --error:#c64545;
    --serif:"Cormorant Garamond",Garamond,serif;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
    --mono:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
    --dim-C:#7c5cc4; --dim-S:#5b8def; --dim-P:#5db872; --dim-R:#e8a55a;
    --dim-E:#d4a017; --dim-M:#5db8a6; --dim-X:#c64545;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--canvas);color:var(--body);font-family:var(--sans);font-size:13px;line-height:1.4}
  .shell{max-width:880px;margin:0 auto;padding:14px 18px 60px}
  h1{font-family:var(--serif);font-weight:500;font-size:22px;color:var(--ink);margin:0 0 4px}
  .sub{color:var(--muted);font-size:12px;margin-bottom:14px}
  .pill{display:inline-block;padding:1px 6px;border-radius:3px;background:var(--surface-soft);font-size:10px;color:var(--muted);font-family:var(--mono);margin-right:6px}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .stat{background:var(--surface-card);border:1px solid var(--hairline);border-radius:8px;padding:10px}
  .stat .n{font-family:var(--serif);font-size:22px;color:var(--ink);font-weight:500}
  .stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
  .row{display:flex;gap:8px;align-items:center;margin:10px 0}
  button{font-family:var(--sans);font-size:12px;padding:6px 11px;border-radius:6px;border:1px solid var(--hairline);background:#fff;color:var(--ink);cursor:pointer}
  button:disabled{opacity:.55;cursor:not-allowed}
  button.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  button.primary:hover:not(:disabled){background:var(--primary-active);border-color:var(--primary-active)}
  button.ghost{background:transparent}
  button.tab{background:transparent;border:1px solid transparent;border-bottom:1px solid transparent;border-radius:0;padding:6px 12px;color:var(--muted)}
  button.tab.active{color:var(--ink);border-bottom-color:var(--primary)}
  pre{background:#1f1d1a;color:#e8e0d2;font-family:var(--mono);font-size:11px;padding:10px;border-radius:6px;overflow:auto;max-height:280px}
  .err{background:#fff3f0;border:1px solid #f0c0b8;color:var(--error);padding:10px;border-radius:6px;font-size:12px;margin:10px 0}
  .ok{background:#f0f7ed;border:1px solid #c8e0bd;color:#3d6b2a;padding:10px;border-radius:6px;font-size:12px;margin:10px 0}
  .muted{color:var(--muted)}

  /* Tagger */
  .tag-card{background:#fff;border:1px solid var(--hairline);border-radius:10px;padding:14px;margin:12px 0}
  .case-meta{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12px}
  .case-meta dt{color:var(--muted);font-weight:500}
  .case-meta dd{margin:0;color:var(--ink);overflow-wrap:anywhere}
  .text-block{background:var(--surface-soft);border:1px solid var(--hairline);border-radius:6px;padding:8px;margin:4px 0;white-space:pre-wrap;font-size:12px;max-height:120px;overflow:auto}
  .dim-row{display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:start;padding:8px 0;border-top:1px solid var(--hairline)}
  .dim-row:first-child{border-top:none}
  .dim-label{font-family:var(--mono);font-weight:600;font-size:13px;color:#fff;background:var(--muted);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .dim-C .dim-label{background:var(--dim-C)}
  .dim-S .dim-label{background:var(--dim-S)}
  .dim-P .dim-label{background:var(--dim-P)}
  .dim-R .dim-label{background:var(--dim-R)}
  .dim-E .dim-label{background:var(--dim-E)}
  .dim-M .dim-label{background:var(--dim-M)}
  .dim-X .dim-label{background:var(--dim-X)}
  .dim-body{min-width:0}
  .dim-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
  .dim-name{font-weight:500;color:var(--ink);font-size:12px}
  .dim-count{font-size:11px;color:var(--muted);font-family:var(--mono)}
  .filter{width:100%;font-family:var(--sans);font-size:12px;padding:5px 8px;border:1px solid var(--hairline);border-radius:5px;background:#fff;margin-bottom:6px}
  .chips{display:flex;flex-wrap:wrap;gap:4px;max-height:120px;overflow:auto;padding:4px;background:var(--surface-soft);border-radius:5px;border:1px solid var(--hairline)}
  .chip{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:999px;font-size:11px;border:1px solid var(--hairline);background:#fff;color:var(--ink);cursor:pointer;font-family:var(--mono);white-space:nowrap}
  .chip:hover{background:var(--surface-cream-strong)}
  .chip.selected{background:var(--primary);color:#fff;border-color:var(--primary)}
  .chip.selected:hover{background:var(--primary-active)}
  .chip.suggested{background:#fff7d6;border-color:#e0c97a}
  .chip.suggested:hover{background:#ffeeb3}
  .chip-name{font-family:var(--sans);font-size:10px;color:inherit;opacity:.85;font-weight:400}
  .selected-strip{padding:6px;background:#fff;border:1px solid var(--hairline);border-radius:5px;min-height:30px;display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
  .selected-strip:empty:before{content:"(none selected)";color:var(--muted);font-size:11px;font-style:italic}
  .case-picker{width:100%;font-family:var(--sans);font-size:13px;padding:7px 10px;border:1px solid var(--hairline);border-radius:6px;background:#fff}
  .case-picker:focus{outline:2px solid var(--primary);outline-offset:-1px}
  details{margin:8px 0}
  details summary{cursor:pointer;font-weight:500;padding:4px 0;font-size:12px}

  /* Phase 3 — Verdict UI */
  .verdict-card{background:#fff;border:1px solid var(--hairline);border-radius:10px;padding:14px;margin:12px 0}
  .verdict-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:9999px;font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:.06em;line-height:1.3;border:1px solid transparent}
  .verdict-VIOLATION{background:#fbe4e0;color:#a8332a;border:1px solid #f0c0b8}
  .verdict-NOT_RECOMMEND{background:#fcecd6;color:#8a5a13;border:1px solid #ecd2a3}
  .verdict-NOT_FOR_FEED{background:#fff5d6;color:#7a5b0a;border:1px solid #efddaa}
  .verdict-APPROVE{background:#e6f3df;color:#3d6b2a;border:1px solid #c8e0bd}
  .verdict-NO_CLAIM_FIRED{background:#ece8e1;color:#6c6a64;border:1px solid #d8d2c4}
  .verdict-ESCALATE{background:#ffe4ef;color:#92265a;border:1px solid #eeb6cf}
  /* ---- v0.7.1 phase6a: reasoned-verdict (paste-back) — Anthropic warm-canvas ----
     Anchored on cream surfaces (no white card), hairline border, no coral fill
     except inside the verdict pill (re-uses semantic verdict-* classes).
     Coral border is reserved for primary-card emphasis when a verdict is rendered. */
  .reasoned-card{background:var(--surface-soft);border:1px solid var(--hairline);border-radius:12px;padding:16px;margin:12px 0}
  .reasoned-card.has-verdict{background:var(--canvas);border-color:var(--hairline)}
  .reasoned-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
  .reasoned-title{font-family:var(--serif);font-weight:500;font-size:18px;color:var(--ink);letter-spacing:-0.2px;line-height:1.3}
  .reasoned-sub{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.45}
  .reasoned-paste{width:100%;font-family:var(--mono);font-size:11px;line-height:1.5;border:1px solid var(--hairline);border-radius:8px;padding:10px 12px;background:var(--canvas);color:var(--ink);resize:vertical;display:block;box-sizing:border-box}
  .reasoned-paste:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(204,120,92,0.15)}
  .reasoned-summary-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--canvas);border:1px solid var(--hairline);border-radius:8px;font-size:12px;color:var(--muted)}
  .reasoned-summary-bar .ok-dot{width:6px;height:6px;border-radius:50%;background:var(--success);display:inline-block;flex:0 0 6px}
  .reasoned-err{background:#fdf0ee;border:1px solid #f0c0b8;color:var(--error);padding:8px 10px;border-radius:8px;font-size:12px;margin-top:8px;line-height:1.5}
  .reasoned-warn{background:#fdf3e0;border:1px solid #ecd2a3;color:#8a5a13;padding:8px 10px;border-radius:8px;font-size:12px;margin-top:8px;line-height:1.5}
  /* Atom chip — pill, caption type, dim-tinted backgrounds (warm-toned) */
  .atom-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:9999px;font-family:var(--sans);font-weight:500;font-size:11px;line-height:1.3;background:var(--surface-card);color:var(--ink);margin:2px;border:1px solid transparent;white-space:nowrap}
  .atom-chip .chip-dim{font-family:var(--mono);font-weight:600;font-size:10px;opacity:0.65;letter-spacing:0.5px}
  .atom-chip .chip-name{font-weight:500}
  .atom-chip.rejected{text-decoration:line-through;color:var(--muted-soft);background:var(--surface-soft);opacity:.85;border-color:var(--hairline-soft)}
  .atom-chip.unknown{background:#fdf0ee;color:var(--error);border-color:#f0c0b8}
  .atom-chip.dim-C{background:#ede4d8;color:#3d3d3a}
  .atom-chip.dim-S{background:#f3dcd0;color:#3d3d3a}
  .atom-chip.dim-P{background:#e2e6dc;color:#3d3d3a}
  .atom-chip.dim-R{background:#f1e4cd;color:#3d3d3a}
  .atom-chip.dim-E{background:#e8dee6;color:#3d3d3a}
  .atom-chip.dim-M{background:#dee5dc;color:#3d3d3a}
  .atom-chip.dim-X{background:#f3dcd9;color:#3d3d3a}
  /* Dim row (scoped to the reasoned-verdict card so it does NOT clash with
     the AtomTagger DimRow grid layout above) */
  .reasoned-card .dim-row{display:flex;align-items:flex-start;gap:10px;padding:6px 0;font-size:12px;border-top:1px dashed var(--hairline-soft);grid-template-columns:none}
  .reasoned-card .dim-row:first-child{border-top:none;padding-top:0}
  .reasoned-card .dim-row .dim-bullet{flex:0 0 22px;width:22px;height:22px;border-radius:50%;background:var(--surface-card);color:var(--ink);display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:0;margin-top:1px}
  .reasoned-card .dim-row .dim-bullet.dim-C{background:#ede4d8}
  .reasoned-card .dim-row .dim-bullet.dim-S{background:#f3dcd0}
  .reasoned-card .dim-row .dim-bullet.dim-P{background:#e2e6dc}
  .reasoned-card .dim-row .dim-bullet.dim-R{background:#f1e4cd}
  .reasoned-card .dim-row .dim-bullet.dim-E{background:#e8dee6}
  .reasoned-card .dim-row .dim-bullet.dim-M{background:#dee5dc}
  .reasoned-card .dim-row .dim-bullet.dim-X{background:#f3dcd9}
  .reasoned-card .dim-row .dim-meta{flex:0 0 auto;display:flex;flex-direction:column;gap:1px;min-width:80px}
  .reasoned-card .dim-row .dim-meta .dim-name{font-family:var(--sans);font-weight:500;font-size:12px;color:var(--ink)}
  .reasoned-card .dim-row .dim-meta .dim-count{font-family:var(--mono);font-size:10px;color:var(--muted)}
  .reasoned-card .dim-row .dim-cells{flex:1;display:flex;flex-wrap:wrap;align-items:center;gap:2px}
  /* Claim chain row — dominant first, highlighted */
  .claim-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;padding:8px 0;border-top:1px solid var(--hairline-soft);font-size:12px;align-items:center}
  .claim-row:first-child{border-top:none}
  .claim-row.dominant{padding:10px 12px;background:var(--surface-card);border-radius:8px;margin-top:2px;border-top:none}
  .claim-id{font-family:var(--mono);font-weight:500;color:var(--ink);font-size:12px}
  /* Precedent applicability cards */
  .precedent-pa{padding:10px 12px;background:var(--canvas);border:1px solid var(--hairline);border-left:3px solid var(--hairline);border-radius:8px;margin:6px 0;font-size:12px;line-height:1.55}
  .precedent-pa.applicable{border-left-color:var(--success)}
  .precedent-pa.partial{border-left-color:var(--warning)}
  .precedent-pa.non-applicable{border-left-color:var(--muted-soft,#8e8b82);opacity:0.85}
  .precedent-pa .pa-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .precedent-pa .pa-note{margin-top:4px;color:var(--body)}
  /* Watch-out callouts */
  .watch-out{padding:8px 10px;background:#fdf3e0;border-left:3px solid var(--warning);font-size:12px;margin:4px 0;border-radius:6px;line-height:1.5}
  /* Confidence chip semantics */
  .conf-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:9999px;font-family:var(--mono);font-weight:600;font-size:11px;line-height:1.3;letter-spacing:0.5px;border:1px solid transparent}
  .conf-chip.high{background:#e6f3df;color:#3d6b2a;border-color:#c8e0bd}
  .conf-chip.mid{background:#fdf3e0;color:#8a5a13;border-color:#ecd2a3}
  .conf-chip.low{background:#fdf0ee;color:var(--error);border-color:#f0c0b8}
  /* Reasoned card sub-section heads (caption-uppercase) */
  .reasoned-section-head{font-family:var(--sans);font-weight:500;font-size:11px;line-height:1.4;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
  .reasoned-section-head:first-child{margin-top:0}
  .reasoned-section-head .count{letter-spacing:0;text-transform:none;font-family:var(--mono);font-size:11px;color:var(--muted-soft);font-weight:400;margin-left:6px}
  /* Generic small button used inside the pane */
  .reasoned-card .btn-ghost{font-family:var(--sans);font-size:12px;font-weight:500;padding:5px 10px;border-radius:6px;border:1px solid var(--hairline);background:transparent;color:var(--ink);cursor:pointer}
  .reasoned-card .btn-ghost:hover{background:var(--surface-card)}
  .reasoned-card details>summary{font-family:var(--sans);font-weight:500;font-size:12px;color:var(--body);cursor:pointer;list-style:none;padding:6px 0}
  .reasoned-card details>summary::-webkit-details-marker{display:none}
  .reasoned-card details>summary::before{content:"▸";display:inline-block;margin-right:6px;color:var(--muted-soft);font-size:10px;transition:transform 0.15s}
  .reasoned-card details[open]>summary::before{transform:rotate(90deg)}
  .verdict-meta{margin-left:10px;font-size:11px;color:var(--muted);font-family:var(--sans)}
  .hit-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:start;padding:7px 0;border-top:1px solid var(--hairline);font-size:12px}
  .hit-row:first-child{border-top:none}
  .hit-id{font-family:var(--mono);font-weight:500;color:var(--ink);padding-top:1px}
  .hit-evidence{display:flex;flex-wrap:wrap;gap:3px}
  .ev-pill{display:inline-block;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:10px;background:var(--surface-soft);color:var(--ink)}
  .prec-card{display:grid;grid-template-columns:200px 1fr;gap:12px;padding:10px 0;border-top:1px solid var(--hairline);font-size:12px}
  .prec-card:first-child{border-top:none}
  .prec-meta{display:flex;flex-direction:column;gap:4px;font-family:var(--mono);font-size:11px}
  .prec-rank{font-weight:700;font-size:13px;color:var(--ink)}
  .prec-id{color:var(--muted);overflow-wrap:anywhere;font-size:10px}
  .prec-pills{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
  .prec-decision{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;color:#fff;background:#666}
  .prec-decision.flag{background:#c00}
  .prec-decision.allow,.prec-decision.approve{background:#1a8a1a}
  .prec-decision.dnr,.prec-decision.not_recommend{background:#d97706}
  .prec-decision.nff,.prec-decision.not_for_feed{background:#a16207}
  .prec-scores{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;font-size:10px}
  .prec-score{padding:1px 6px;border-radius:3px;background:var(--surface-soft);font-family:var(--mono)}
  .prec-score.primary{background:var(--primary);color:#fff}
  .prec-body{display:flex;flex-direction:column;gap:6px;min-width:0}
  .prec-summary{font-size:11px;line-height:1.45;color:var(--ink);max-height:88px;overflow:auto;padding:6px 8px;background:var(--surface-soft);border-radius:4px}
  .prec-rationale{font-size:10px;line-height:1.4;color:var(--muted);font-style:italic}
  .prec-dim-grid{display:flex;gap:3px;flex-wrap:wrap;font-family:var(--mono);font-size:10px}
  .prec-dim-cell{padding:1px 5px;border-radius:3px;background:#fff;border:1px solid var(--hairline);color:var(--muted)}
  .prec-dim-cell.hit{background:#dcfce7;border-color:#86efac;color:#166534}
  .lift-pill{display:inline-block;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:10px;background:var(--success);color:#fff}
  .outcome-tag{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px;background:var(--surface-cream-strong);color:var(--ink)}
  .routing-pill{display:inline-block;padding:2px 8px;border-radius:3px;font-family:var(--mono);font-size:11px;background:var(--surface-soft);color:var(--muted);margin-right:4px}
  .suppressed-row{padding:5px 0;font-size:11px;color:var(--muted);border-top:1px dashed var(--hairline)}
  .suppressed-row:first-child{border-top:none}

  /* Phase 5 — Payload card */
  .payload-card{background:#fff;border:1px solid var(--hairline);border-radius:10px;padding:14px;margin:12px 0}
  .payload-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .payload-title{font-size:13px;font-weight:600;color:var(--ink)}
  .payload-meta{font-size:11px;color:var(--muted);font-family:var(--mono)}
  .payload-actions{display:flex;gap:6px;align-items:center}
  .payload-stat{display:inline-block;padding:2px 7px;border-radius:3px;font-family:var(--mono);font-size:10px;background:var(--surface-soft);color:var(--ink)}
  .payload-stat.routing{background:var(--primary);color:#fff}
  .copy-btn{font-family:var(--sans);font-size:11px;padding:5px 10px;border-radius:5px;border:1px solid var(--primary);background:var(--primary);color:#fff;cursor:pointer}
  .copy-btn:hover{background:var(--primary-active);border-color:var(--primary-active)}
  .copy-btn.ok{background:var(--success);border-color:var(--success)}
  .copy-btn.err{background:var(--error);border-color:var(--error)}
  .copy-btn.secondary{background:#fff;color:var(--ink)}
  .copy-btn.secondary:hover{background:var(--surface-soft)}
  .copy-btn.ghost{background:transparent;color:var(--muted);border-color:var(--hairline)}
  .copy-btn.ghost:hover{background:var(--surface-soft);color:var(--ink)}
  .copy-btn:disabled{opacity:0.55;cursor:not-allowed}

/* Skill-first chip states */
.chip.skill-src { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 8%, transparent); }
.chip.reviewer-src { border-color: #6b7; background: color-mix(in srgb, #6b7 8%, transparent); }
.chip.skill-proposed { border: 1.5px dashed var(--primary); opacity: 0.85; }
.chip.rejected-by-skill {
  text-decoration: line-through; opacity: 0.5;
  border-color: #c66; background: color-mix(in srgb, #c66 5%, transparent);
  cursor: pointer;
}
.chip.rejected-by-skill:hover { opacity: 0.8; text-decoration: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
  // Bitable SDK boot — jsDelivr → unpkg fallback.
  const URLS = [
    "https://cdn.jsdelivr.net/npm/@lark-base-open/js-sdk@1.0.2/dist/index.min.mjs",
    "https://unpkg.com/@lark-base-open/js-sdk@1.0.2/dist/index.min.mjs",
  ];
  let mod = null, lastErr = null;
  for (const u of URLS) {
    try { mod = await import(u); break; } catch (e) { lastErr = e; }
  }
  if (!mod) {
    window.__bitableSdkError = String(lastErr && lastErr.message || lastErr || "unknown");
    console.error("[AtomConsole] SDK load failed:", lastErr);
  } else {
    window.bitable = mod.bitable || mod.default || mod;

<script>
// =============================================================================
// engine.js (inlined) — Deterministic atom-rule engine. Phase 3.
// Pure logic. Contract per docs/engine-spec.md
//   AtomEngine.evaluate(caseAtoms, claims, opts?) -> EngineResult
// =============================================================================

  "use strict";

    }
    if (claim.requires_exception_context) {

  }

    var M = caseAtoms.M || [];
    var X = caseAtoms.X || [];

    var req = claim.modifiers_required || [];

        var qModGrps = (claim.exception_qualifier_modifiers && claim.exception_qualifier_modifiers[x]) || [];

        outcome_base: c.outcome,
        outcome_after_lifts: lift.outcome || c.outcome,
        lift: lift.lift || null,
        specificity: specificity(c),
        evidence: evidenceFor(c, caseAtoms),
        routing: c.routing || { non_realistic_routes_to: null, cross_title_redirect: null },

      }
      hits.push(entry);
    }
    hits.sort(function (a, b) {
      var sa = SEVERITY[a.outcome_after_lifts] || 0;

    return {
      verdict: top ? top.outcome_after_lifts : "NO_CLAIM_FIRED",
      applied_claim_chain: top ? [top.claim_id] : [],
      lifts_applied: top && top.lift ? [{ claim_id: top.claim_id, lift: top.lift }] : [],
      gate_hits: hits,
      suppressed: suppressed,
      routing: top ? top.routing : { non_realistic_routes_to: null, cross_title_redirect: null },
    };
  }

<script>
// =============================================================================
// RETRIEVER (Phase 4.5) — Dual-channel hybrid
// Channels:
//   visual = BM25(visual_summary)               + AtomJaccard
//   text   = BM25(asr_text + ocr_text + caption) + AtomJaccard
// Returns top-5 from each channel, deduped by record_id, with channel badges.
// Tokenizer adds bigrams; IDF floor drops corpus-common tokens.
// Atom share scales with how many atoms the candidate has tagged.
// =============================================================================
(function (root) {
  "use strict";

  var STOPWORDS = new Set([
    "a","an","and","are","as","at","be","by","for","from","has","have","he","in",
    "is","it","its","of","on","or","that","the","this","to","was","were","will","with",
    "she","they","them","their","there","these","those","but","not","no","so","if",
    "i","you","we","our","us","me","my","your","do","does","did","just","can","could",
    "would","should","also","into","over","under","up","down","out","then","than",
    // Domain-common boilerplate that BM25 should still tolerate, but no value as queries:
    "video","scene","shows","show","appears","appearing","visible","setting","background"
  ]);

      .replace(/[^\p{L}\p{N}\s]/gu, " ")
      .split(/\s+/)
      .filter(function (t) { return t && t.length > 1 && !STOPWORDS.has(t); });
  }

  }

  var IDF_FLOOR_RATIO = 0.5;

    var docs = [], docLens = [], df = Object.create(null), totalLen = 0;
    for (var i = 0; i < textsArr.length; i++) {
      var toks = tokenize(textsArr[i] || "");
      var tf = Object.create(null);
      for (var j = 0; j < toks.length; j++) tf[toks[j]] = (tf[toks[j]] || 0) + 1;
      var seen = Object.create(null);
      for (var t in tf) if (!seen[t]) { df[t] = (df[t] || 0) + 1; seen[t] = 1; }
      docs.push(tf); docLens.push(toks.length); totalLen += toks.length;
    }

      docs: docs, docLens: docLens, df: df,
      N: textsArr.length,

    for (var i = 0; i < qTokens.length; i++) {

  // opts:      { topPerChannel?: 5, totalK?: 10 }

    var scopeByIssue = opts.scopeByIssue !== false;

      });

      pool = pool.filter(function (c) {
        if (!c.issue) return true;
        return siblings.indexOf(c.issue.toUpperCase().trim()) >= 0;
      });
      scope = { kind: "issue", value: candidate.issue };

    }

    var textualTexts = pool.map(function (c) {

    var textualIdx = buildBm25IndexFromTexts(textualTexts);

    // so we still surface 5 candidates per channel rather than zero.
    if (!qVisual.length && qTextual.length)  qVisual  = qTextual;
    if (!qTextual.length && qVisual.length)  qTextual = qVisual;

      var bmV = bm25Score(visualIdx,  qVisual,  k);
      var bmT = bm25Score(textualIdx, qTextual, k);

        case_id: c.case_id, record_id: c.record_id,
        source_video_id: c.source_video_id, policy_title: c.policy_title,
        issue: c.issue, decision: c.decision,
        visual_summary: c.visual_summary, asr_text: c.asr_text,
        ocr_text: c.ocr_text, caption_text: c.caption_text,
        rationale: c.rationale, atoms: c.atoms, images: c.images,

    var invT = maxT > 0 ? 1 / maxT : 0;
    for (var i = 0; i < scored.length; i++) {

      scored[i].text_norm   = scored[i]._bmT * invT;
      scored[i].visual_score = bmShare * scored[i].visual_norm + aShare * scored[i]._atom;
      scored[i].text_score   = bmShare * scored[i].text_norm   + aShare * scored[i]._atom;
    }

    function tieBreak(a, b, primary) {
      if (b[primary] !== a[primary]) return b[primary] - a[primary];

    var byText   = scored.slice().sort(function (a, b) { return tieBreak(a, b, "text_score"); });

    var topV = byVisual.slice(0, topPer);
    var topT = byText.slice(0,   topPer);

      var key = item.record_id || item.case_id || (item.source_video_id + ":" + (item.policy_title || ""));

        merged[idx].channels = Array.from(new Set(merged[idx].channels.concat(channels)));
        // Keep the higher of the two channel-rank scores as the displayed primary.
        merged[idx].score = Math.max(merged[idx].score, Math.max(item.visual_score, item.text_score));

      var primaryScore = channels.indexOf("vis") >= 0 ? item.visual_score : item.text_score;

        score: primaryScore

      merged.push(clone);

    for (var i = 0; i < topT.length; i++) addOne(topT[i], ["txt"]);

      if (b._atom !== a._atom) return b._atom - a._atom;

      pool_size: pool.length,
      total_scored: scored.length,
      scope: scope,
      atom_share: aShare,
      channels: { visual: topV, text: topT },
      mix: { bm: bmShare, atom: aShare }

    retrieve: retrieve, tokenize: tokenize,
    buildBm25Index: buildBm25IndexFromTexts, bm25Score: bm25Score,

<script>
// =============================================================================
// CELL UTILS
// =============================================================================
function cellText(v) {
  if (v == null) return "";
  if (typeof v === "string" || typeof v === "number") return String(v);
  if (Array.isArray(v)) return v.map(cellText).join(" ");
  if (typeof v === "object") {
    if (v.text != null) return String(v.text);
    if (v.name != null) return String(v.name);
    if (v.value != null) return cellText(v.value);
  }
  return "";
}
function cellArr(v) {
  if (v == null) return [];
  if (Array.isArray(v)) return v.map(x => (typeof x === "string" ? x : (x.text || x.name || ""))).filter(Boolean);
  return [cellText(v)].filter(Boolean);
}
function cellLinkRecordIds(v) {
  if (v == null) return [];
  if (Array.isArray(v)) return v.map(x => (typeof x === "string" ? x : (x.recordId || x.record_id || ""))).filter(Boolean);
  if (typeof v === "object") {
    if (Array.isArray(v.recordIds)) return v.recordIds;
    if (Array.isArray(v.record_ids)) return v.record_ids;
    if (v.recordId) return [v.recordId];
  }
  return [];
}
// Bitable attachment field shape: array of { token, name, type, size, url?, tmp_url? }
// Returns array of { token, name, type, size, url? } for image-typed entries.
function cellAttachments(v) {
  if (!v) return [];
  if (!Array.isArray(v)) v = [v];
  return v.map(function (a) {
    if (!a || typeof a !== "object") return null;
    return {
      token: a.token || a.file_token || a.attachmentToken || "",
      name:  a.name || "",
      type:  a.type || a.mime_type || "",
      size:  a.size || 0,
      url:   a.url || a.tmp_url || ""
    };
  }).filter(function (a) { return a && a.token; });
}

// =============================================================================
// TABLE DISCOVERY (unchanged from Phase 1)
// =============================================================================
const CFG = window.ATOM_CONSOLE_CONFIG;
async function findTableByNames(base, candidates) {
  const list = await base.getTableList();
  const named = await Promise.all(list.map(async t => ({ t, name: await t.getName() })));
  for (const want of candidates) {
    const hit = named.find(x => x.name === want)
             || named.find(x => x.name && x.name.toLowerCase() === want.toLowerCase());
    if (hit) return hit.t;
  }
  const got = named.map(x => x.name).join(", ");
  throw new Error("No table matched any of [" + candidates.join(", ") + "]. Found: [" + got + "]");
}

  try { return await findTableByNames(base, names); } catch(e) { return null; }
}

  const all = []; let pageToken = undefined;
  for (let i = 0; i < 50; i++) {
    const page = await table.getRecords({ pageSize: 5000, pageToken });
    all.push(...(page.records || []));
    if (!page.hasMore) break;
    pageToken = page.pageToken;

}

  try {
    const metas = await table.getFieldMetaList();
    const byName = {}, byId = {}, types = {};
    for (const m of metas) {
      const id = m.id || m.field_id;
      const nm = m.name || m.field_name;
      if (id && nm) { byName[nm] = id; byId[id] = nm; types[id] = m.type; }
    }
    return { byName, byId, types };

    console.warn("[AtomConsole] getFieldMetaList failed:", e);
    return { byName: {}, byId: {}, types: {} };
  }
}

  if (!fieldsObj) return undefined;
  if (fieldsObj[name] !== undefined) return fieldsObj[name];
  const id = fieldIndex && fieldIndex.byName ? fieldIndex.byName[name] : null;
  if (id && fieldsObj[id] !== undefined) return fieldsObj[id];

}

  timeoutMs = timeoutMs || 5000;

  while (Date.now() - start < timeoutMs) {
    if (window.bitable && window.bitable.base) return true;
    if (window.__bitableSdkError) throw new Error("Failed to load Bitable SDK from CDN: " + window.__bitableSdkError);

  }

}

// =============================================================================
// LOADER (atoms + claims + cases + pending; Rule Book NOT loaded)
// =============================================================================
async function loadAtomCorpus() {
  const ok = await waitForBitableSdk(5000);
  if (!ok || !window.bitable || !window.bitable.base) {
    throw new Error("Bitable SDK not available. Open this plugin from inside a Base.");
  }
  const base = window.bitable.base;

  const atomsTbl   = await findTableByNames(base, CFG.atomsTableNames);
  const claimsTbl  = await findTableByNames(base, CFG.claimsTableNames);
  const casesTbl   = await findTableByNamesOptional(base, CFG.casesTableNames);
  const pendingTbl = await findTableByNamesOptional(base, CFG.pendingTableNames);

  const [atomsIdx, claimsIdx, casesIdx, pendingIdx] = await Promise.all([
    buildFieldIndex(atomsTbl),
    buildFieldIndex(claimsTbl),
    casesTbl   ? buildFieldIndex(casesTbl)   : Promise.resolve(null),
    pendingTbl ? buildFieldIndex(pendingTbl) : Promise.resolve(null),
  ]);
  const [atomRecs, claimRecs, caseRecs, pendingRecs] = await Promise.all([
    loadAllRecords(atomsTbl),
    loadAllRecords(claimsTbl),
    casesTbl   ? loadAllRecords(casesTbl)   : Promise.resolve([]),
    pendingTbl ? loadAllRecords(pendingTbl) : Promise.resolve([]),
  ]);

  const get    = (f, idx, name) => cellText(readCell(f, idx, name));
  const getArr = (f, idx, name) => cellArr (readCell(f, idx, name));
  const getLnk = (f, idx, name) => cellLinkRecordIds(readCell(f, idx, name));

  const atoms = atomRecs.map(r => {
    const f = r.fields || {};
    return {
      record_id: r.recordId || r.record_id,
      atom_key: get(f, atomsIdx, "atom_key") || get(f, atomsIdx, "atom_code"),
      atom_name: get(f, atomsIdx, "atom_name"),
      dimension: get(f, atomsIdx, "dimension"),
      description: get(f, atomsIdx, "description"),
      audit_rule: get(f, atomsIdx, "audit_rule"),
      serial_code: get(f, atomsIdx, "serial_code"),
      tax_version: get(f, atomsIdx, "tax_version"),
    };
  }).filter(a => a.atom_key);
  const atomByRid = {};
  for (const a of atoms) atomByRid[a.record_id] = a.atom_key;
  const ridsToKeys = (rids) => rids.map(r => atomByRid[r]).filter(Boolean);

  const claims = claimRecs.map(r => {
    const f = r.fields || {};
    function safeJson(s) { try { return s ? JSON.parse(s) : null; } catch(e) { return null; } }
    const modsLiftJson = safeJson(get(f, claimsIdx, "modifiers_lift_to_json"));
    const exQualJson   = safeJson(get(f, claimsIdx, "exception_qualifiers_json"));
    const exQualModJson= safeJson(get(f, claimsIdx, "exception_qualifier_modifiers_json"));
    return {
      record_id: r.recordId || r.record_id,
      claim_id: get(f, claimsIdx, "claim_id"),
      policy_titles: getArr(f, claimsIdx, "policy_title"),
      issue: get(f, claimsIdx, "issue"),
      outcome: get(f, claimsIdx, "outcome"),
      status: get(f, claimsIdx, "status"),
      tax_version: get(f, claimsIdx, "tax_version"),
      gates: {
        C: ridsToKeys(getLnk(f, claimsIdx, "content_atoms")),
        S: ridsToKeys(getLnk(f, claimsIdx, "subject_atoms")),
        P: ridsToKeys(getLnk(f, claimsIdx, "portrayal_atoms")),
        R: ridsToKeys(getLnk(f, claimsIdx, "realism_atoms")),
        E: ridsToKeys(getLnk(f, claimsIdx, "explicitness_atoms")),
      },
      modifiers_required:  ridsToKeys(getLnk(f, claimsIdx, "modifiers_required")),
      modifiers_excluded:  ridsToKeys(getLnk(f, claimsIdx, "modifiers_excluded")),
      modifiers_lift_to_approve: ridsToKeys(getLnk(f, claimsIdx, "modifiers_lift_to_approve")),
      modifiers_lift_dnf:  modsLiftJson || [],
      exceptions_required:        ridsToKeys(getLnk(f, claimsIdx, "exceptions_required")),
      exceptions_lift_to_approve: get(f, claimsIdx, "exceptions_lift_to_approve") === "true"
                                  || readCell(f, claimsIdx, "exceptions_lift_to_approve") === true,
      exception_qualifiers:           exQualJson    || {},
      exception_qualifier_modifiers:  exQualModJson || {},
      requires_exception_context: get(f, claimsIdx, "requires_exception_context") === "true"
                                  || readCell(f, claimsIdx, "requires_exception_context") === true,
      routing: {
        non_realistic_routes_to: get(f, claimsIdx, "non_realistic_routes_to") || null,
        cross_title_redirect:    get(f, claimsIdx, "cross_title_redirect")    || null,
      },
      molecule_ids: getArr(f, claimsIdx, "molecule_ids"),
      sources: get(f, claimsIdx, "sources"),
      notes: get(f, claimsIdx, "notes"),
    };
  })
  .filter(c => c.claim_id)
  .filter(c => {
    if (!c.status) return true;                          // empty status = include
    const s = String(c.status).trim().toLowerCase();
    // Treat any of these as active. Reject only explicit inactive states.
    const inactive = new Set(["inactive","disabled","off","draft","archived","deprecated","retired","false","0","no"]);
    return !inactive.has(s);
  });

  // Helper: read attachments from any of the candidate field names. First non-empty wins.
  const IMAGE_FIELD_CANDIDATES = ["image","images","screenshots","attachments","cover","thumbnail","frames","frame_grid","frame_grids","preview","video_frames","video_thumbnails","keyframes"];
  function getImages(f, idx) {
    for (const nm of IMAGE_FIELD_CANDIDATES) {
      const v = readCell(f, idx, nm);
      if (v == null) continue;
      const arr = cellAttachments(v);
      if (arr.length) return arr;
    }
    return [];
  }

  const cases = caseRecs.map(r => {
    const f = r.fields || {};
    return {
      record_id: r.recordId || r.record_id,
      case_id: get(f, casesIdx, "case_id"),
      source_video_id: get(f, casesIdx, "source_video_id"),
      issue: get(f, casesIdx, "issue") || get(f, casesIdx, "policy_area"),
      policy_title: get(f, casesIdx, "policy_title"),
      decision: get(f, casesIdx, "decision"),
      visual_summary: get(f, casesIdx, "visual_summary"),
      asr_text: get(f, casesIdx, "asr_text"),
      ocr_text: get(f, casesIdx, "ocr_text"),
      caption_text: get(f, casesIdx, "caption_text"),
      rationale: get(f, casesIdx, "rationale"),
      images: getImages(f, casesIdx),
      atoms: {
        C: ridsToKeys(getLnk(f, casesIdx, "content_atoms")),
        S: ridsToKeys(getLnk(f, casesIdx, "subject_atoms")),
        P: ridsToKeys(getLnk(f, casesIdx, "portrayal_atoms")),
        R: ridsToKeys(getLnk(f, casesIdx, "realism_atoms")),
        E: ridsToKeys(getLnk(f, casesIdx, "explicitness_atoms")),
        M: ridsToKeys(getLnk(f, casesIdx, "modifier_atoms")),
        X: ridsToKeys(getLnk(f, casesIdx, "exception_atoms")),
      },
      reference_weight: get(f, casesIdx, "reference_weight"),
    };
  }).filter(c => {
    const w = (c.reference_weight || "").toLowerCase();
    return w !== "incomplete" && w !== "outdated";
  });

  const pending = pendingRecs.map(r => {
    const f = r.fields || {};
    return {
      record_id: r.recordId || r.record_id,
      source_video_id: get(f, pendingIdx, "source_video_id"),
      issue: get(f, pendingIdx, "issue"),
      policy_title: get(f, pendingIdx, "policy_title"),
      visual_summary: get(f, pendingIdx, "visual_summary"),
      asr_text: get(f, pendingIdx, "asr_text"),
      ocr_text: get(f, pendingIdx, "ocr_text"),
      caption_text: get(f, pendingIdx, "caption_text"),
      images: getImages(f, pendingIdx),
      pending_table_id: pendingTbl ? (pendingTbl.id || pendingTbl.tableId || null) : null,
      atoms: { C:[], S:[], P:[], R:[], E:[], M:[], X:[] },
    };
  }).filter(p => p.source_video_id);

  const atomsByDim = { C:[], S:[], P:[], R:[], E:[], M:[], X:[] };
  for (const a of atoms) {
    const d = (a.dimension || "").charAt(0).toUpperCase();
    if (atomsByDim[d]) atomsByDim[d].push(a);
  }
  for (const d of Object.keys(atomsByDim)) {
    atomsByDim[d].sort((a,b) => (a.atom_key||"").localeCompare(b.atom_key||""));
  }

  // Resolve attachment field ids (Bitable getAttachmentUrl needs fieldId+tableId+recordId+token).
  function findFieldIdInIdx(idx, names) {
    if (!idx || !idx.byName) return null;
    for (const nm of names) {
      if (idx.byName[nm]) return idx.byName[nm];
    }
    // Case-insensitive fallback
    const lower = {};
    for (const k of Object.keys(idx.byName)) lower[k.toLowerCase()] = idx.byName[k];
    for (const nm of names) {
      if (lower[nm.toLowerCase()]) return lower[nm.toLowerCase()];
    }
    return null;
  }
  const caseImgFieldId    = findFieldIdInIdx(casesIdx,   IMAGE_FIELD_CANDIDATES);
  const pendingImgFieldId = findFieldIdInIdx(pendingIdx, IMAGE_FIELD_CANDIDATES);
  const caseTableId    = casesTbl   ? (casesTbl.id   || casesTbl.tableId   || null) : null;
  const pendingTableId = pendingTbl ? (pendingTbl.id || pendingTbl.tableId || null) : null;

  // Field-level URL resolver: mirrors the working Case Review Console pattern.
  // The SDK exposes attachment URL resolution as field-level methods (NOT base.getAttachmentUrl).
  // Strategy:
  //   1. table.getFieldById(fieldId) → Field
  //   2. Try field.getAttachmentUrls(recordId)  → fresh signed URLs (preferred)
  //   3. Try field.getTmpUrls([tokens])        → temp URLs, by token
  //   4. Fall back to embedded url/tmp_url/tmpUrl on the cell value (may be expired)
  // Returns array of URL strings aligned to the input `images` array (same length, "" on failure).
  async function resolveAttachmentUrls(scope, recordId, images) {
    if (!images || !images.length) return [];
    const tbl     = scope === "case" ? casesTbl   : pendingTbl;
    const fieldId = scope === "case" ? caseImgFieldId : pendingImgFieldId;
    const tokens  = images.map(img => img && img.token).filter(Boolean);
    const out     = images.map(() => "");
    const fillFromEmbedded = () => {
      for (let i = 0; i < images.length; i++) {
        if (out[i]) continue;
        const im = images[i] || {};
        const u = im.url || im.tmp_url || im.tmpUrl || "";
        if (/^https?:\/\//i.test(u)) out[i] = u;
      }
    };

    if (!tbl || !fieldId || !recordId) {
      fillFromEmbedded();
      return out;
    }

    let field = null;
    try { field = await tbl.getFieldById(fieldId); } catch (e) { field = null; }

    // Path A: getAttachmentUrls(recordId) — returns array aligned to the cell's tokens.
    if (field && typeof field.getAttachmentUrls === "function") {
      try {
        const arr = await Promise.race([
          field.getAttachmentUrls(recordId),
          new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 6000))
        ]);
        if (Array.isArray(arr)) {
          for (let i = 0; i < images.length && i < arr.length; i++) {
            const v = arr[i];
            const u = (typeof v === "string") ? v : (v && (v.url || v.tmpUrl || v.tmp_url) || "");
            if (u) out[i] = u;
          }
        }
      } catch (e) { /* fall through */ }
    }

    // Path B: getTmpUrls([tokens]) — token-keyed.
    if (out.some(u => !u) && field && typeof field.getTmpUrls === "function" && tokens.length) {
      try {
        const arr = await Promise.race([
          field.getTmpUrls(tokens),
          new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 6000))
        ]);
        if (Array.isArray(arr)) {
          let j = 0;
          for (let i = 0; i < images.length; i++) {
            if (out[i]) continue;
            const v = arr[j++];
            const u = (typeof v === "string") ? v : (v && (v.tmpUrl || v.url || v.tmp_url) || "");
            if (u) out[i] = u;
          }
        }
      } catch (e) { /* fall through */ }
    }

    // Path C: embedded url on cell value.
    fillFromEmbedded();
    return out;
  }

  return {
    atoms, atomsByDim, claims, cases, pending,
    image_meta: {
      case_field_id:    caseImgFieldId,
      pending_field_id: pendingImgFieldId,
      case_table_id:    caseTableId,
      pending_table_id: pendingTableId,
      resolve:          resolveAttachmentUrls
    }
  };
}

window.__loadAtomCorpus = loadAtomCorpus;
</script>

<script>
// =============================================================================
// REACT UI — Phase 2: AtomTagger
// =============================================================================
const e = React.createElement;

function StatCard(props) {
  return e("div", { className: "stat" },
    e("div", { className: "n" }, String(props.n)),
    e("div", { className: "l" }, props.label));
}

// ---- VerdictPane: live engine output ---------------------------------------
function evidencePills(ev) {
  var pills = [];
  ["C","S","P","R","E"].forEach(function (d) {
    if (!ev[d] || !ev[d].length) return;
    ev[d].forEach(function (k) {
      pills.push(e("span", { key: d + ":" + k, className: "ev-pill" }, k));
    });
  });
  return pills;
}

function VerdictPane(props) {
  const { result } = props;
  if (!result) return e("div", { className: "verdict-card" },
    e("div", { style: { display: "flex", alignItems: "center", flexWrap: "wrap", gap: 10 }},
      e("span", { className: "verdict-pill verdict-NO_CLAIM_FIRED" }, "AWAITING ATOMS"),
      e("span", { className: "verdict-meta" },
        "Tag at least one atom to evaluate claims.")
    )
  );
  const { verdict, gate_hits, suppressed, routing, applied_claim_chain, lifts_applied } = result;
  const top = gate_hits[0] || null;
  const rest = gate_hits.slice(1, 5);
  const hasRouting = routing && (routing.non_realistic_routes_to || routing.cross_title_redirect);

  return e("div", { className: "verdict-card" },
    e("div", { style: { display: "flex", alignItems: "center", flexWrap: "wrap", gap: 10 }},
      e("span", { className: "verdict-pill verdict-" + verdict }, verdict),
      e("span", { className: "verdict-meta" },
        gate_hits.length, " gate hit", gate_hits.length===1?"":"s",
        " · ", suppressed.length, " suppressed",
        applied_claim_chain.length ? " · top claim: " + applied_claim_chain[0] : ""
      )
    ),
    hasRouting && e("div", { style: { marginTop: 8 }},
      routing.non_realistic_routes_to && e("span", { className: "routing-pill" },
        "→ non-realistic routes to: ", routing.non_realistic_routes_to),
      routing.cross_title_redirect && e("span", { className: "routing-pill" },
        "→ cross-title redirect: ", routing.cross_title_redirect)
    ),
    lifts_applied.length > 0 && e("div", { style: { marginTop: 8, fontSize: 11 }},
      e("span", { className: "muted" }, "Lift applied on top claim: "),
      lifts_applied.map(function (l) {
        return e("span", { key: l.claim_id, className: "lift-pill" }, l.lift);
      })
    ),

    gate_hits.length > 0 && e("details", { open: true, style: { marginTop: 12 }},
      e("summary", null, "Gate hits (top 5 by severity)"),
      e("div", null,
        ...[top].concat(rest).map(function (h) {
          return e("div", { key: h.claim_id, className: "hit-row" },
            e("span", { className: "hit-id" }, h.claim_id),
            e("div", { className: "hit-evidence" },
              ...evidencePills(h.evidence),
              h.lift && e("span", { className: "lift-pill", style: { marginLeft: 4 }}, "lift:" + h.lift)
            ),
            e("span", { className: "outcome-tag" },
              h.outcome_after_lifts !== h.outcome_base
                ? h.outcome_base + " → " + h.outcome_after_lifts
                : h.outcome_after_lifts)
          );
        })
      )
    ),

    suppressed.length > 0 && e("details", null,
      e("summary", null, "Suppressed (" + suppressed.length + ") — gate-hit but blocked by modifier rules"),
      e("div", null,
        ...suppressed.slice(0, 10).map(function (s) {
          return e("div", { key: s.claim_id, className: "suppressed-row" },
            e("span", { className: "hit-id" }, s.claim_id),
            " · would have been ",
            e("span", { className: "outcome-tag" }, s.outcome_base),
            " · suppressed: ", s.suppress_reason
          );
        }),
        suppressed.length > 10 && e("div", { className: "muted", style: { fontSize: 11, marginTop: 4 }},
          "… and ", suppressed.length - 10, " more")
      )
    ),

    gate_hits.length === 0 && verdict === "NO_CLAIM_FIRED" &&
      e("div", { className: "muted", style: { marginTop: 8, fontSize: 12 }},
        "No active claim's gate fires for the current atom set. ",
        "Add atoms across more dimensions to trigger gates.")
  );
}

// ---- PrecedentsPane: dual-channel hybrid retriever output -------------------
// `showDiagnostics` (default false) gates all scoring chips, channel badges,
// per-dim cells, and the noisy meta header line. Diagnostic data stays in the
// retriever output for the JSON debug pane / payload — only the visual surface
// is hidden on the main panel.
function PrecedentsPane(props) {
  const { result, imageMeta } = props;
  const [showDiag, setShowDiag] = React.useState(false);
  if (!result) return null;
  const { results, pool_size, total_scored, mix, scope, atom_share } = result;
  const scopeLabel = scope && scope.kind && scope.kind !== "none"
    ? scope.kind + "=" + scope.value
    : "no scope";
  const mixLabel = mix
    ? "mix bm/atom " + Math.round((mix.bm || 0)*100) + "/" + Math.round((mix.atom || 0)*100)
    : "";

  if (!results || !results.length) {
    return e("div", { className: "tag-card" },
      e("strong", { style: { fontSize: 13 }}, "Top precedents"),
      e("div", { className: "muted", style: { fontSize: 11, padding: "8px 0" }},
        "No precedents in scope (" + scopeLabel + "). Pool size: " + (pool_size || 0) + "."));
  }

  const fmt = (n) => (n == null ? "—" : (Math.round(n * 1000) / 1000).toFixed(2));
  const decisionClass = (d) => {
    const x = String(d || "").toLowerCase();
    if (!x) return "";
    if (x.indexOf("flag") >= 0 || x.indexOf("violat") >= 0) return "flag";
    if (x.indexOf("allow") >= 0 || x.indexOf("approve") >= 0) return "allow";
    if (x.indexOf("not_recommend") >= 0 || x.indexOf("dnr") >= 0) return "dnr";
    if (x.indexOf("not_for_feed") >= 0 || x.indexOf("nff") >= 0) return "nff";
    return "";
  };
  const channelLabel = (chs) => {
    if (!chs || !chs.length) return "";
    if (chs.indexOf("vis") >= 0 && chs.indexOf("txt") >= 0) return "vis+txt";
    if (chs.indexOf("vis") >= 0) return "vis";
    if (chs.indexOf("txt") >= 0) return "txt";
    if (chs.indexOf("bf")  >= 0) return "backfill";
    return chs.join("+");
  };

  return e("div", { className: "tag-card" },
    e("div", { className: "row", style: { justifyContent: "space-between", marginBottom: 4, alignItems: "center" }},
      e("strong", { style: { fontSize: 13 }}, "Top precedents (" + results.length + ")"),
      e("div", { className: "row", style: { gap: 8, alignItems: "center" }},
        showDiag && e("span", { className: "muted", style: { fontSize: 11 }},
          "scope " + scopeLabel +
          " · pool=" + pool_size + " · scored=" + total_scored +
          " · " + mixLabel +
          " · 5 visual + 5 text (deduped)"),
        e("button", {
          className: "btn-ghost",
          style: { fontSize: 10, padding: "2px 8px", border: "1px solid var(--hairline)",
                   borderRadius: 4, background: "transparent", cursor: "pointer",
                   color: "var(--muted)" },
          onClick: () => setShowDiag(v => !v),
          title: "Toggle ranking diagnostics (scores, channel badges, per-dim atom cells)"
        }, showDiag ? "hide diagnostics" : "show diagnostics")
      )
    ),
    e("div", null,
      ...results.map((r, i) => e("div", { key: r.record_id || i, className: "prec-card" },
        // ── Left column: meta (+ optional diagnostics) ─────────────────
        e("div", { className: "prec-meta" },
          e("div", { className: "prec-rank" },
            "#" + (i+1),
            showDiag && r.channels && e("span", {
              className: "ev-pill",
              style: { marginLeft: 6, fontSize: 9, background: "#0001" },
              title: "Channel(s) where this precedent ranked top-5"
            }, channelLabel(r.channels))
          ),
          e("div", { className: "prec-id" },
            r.case_id || r.source_video_id || r.record_id || "—"),
          e("div", { className: "prec-pills" },
            r.decision && e("span", { className: "prec-decision " + decisionClass(r.decision) },
              r.decision),
            r.policy_title && e("span", { className: "ev-pill" }, r.policy_title),
            r.issue && r.issue !== r.policy_title && e("span", { className: "ev-pill" }, r.issue)
          ),
          showDiag && e("div", { className: "prec-scores" },
            e("span", { className: "prec-score primary",
              title: "max(visual_score, text_score)" }, "score " + fmt(r.score)),
            e("span", { className: "prec-score",
              title: "BM25 over visual_summary, normalized 0–1" },
              "vis " + fmt(r.visual_norm)),
            e("span", { className: "prec-score",
              title: "BM25 over asr+ocr+caption, normalized 0–1" },
              "txt " + fmt(r.text_norm)),
            e("span", { className: "prec-score",
              title: "Atom-Jaccard, dim-weighted (C/S/P=1.0, R/E=0.7, M/X=0.5)" },
              "atm " + fmt(r._atom))
          ),
          showDiag && r._atom_per_dim && e("div", { className: "prec-dim-grid", style: { marginTop: 4 }},
            ...["C","S","P","R","E","M","X"].map(d => {
              const v = r._atom_per_dim[d];
              const isHit = v != null && v > 0;
              return e("span", {
                key: d,
                className: "prec-dim-cell" + (isHit ? " hit" : ""),
                title: v == null
                  ? "dim " + d + ": no atoms tagged on either side (excluded from atm)"
                  : "dim " + d + " atom Jaccard: " + v.toFixed(2)
              }, d + ":" + (v == null ? "—" : fmt(v)));
            }))
        ),
        // ── Right column: body (images + summary + rationale) ──────────
        e("div", { className: "prec-body" },
          r.images && r.images.length > 0 && e(ImagesPane, {
            images: r.images,
            recordId: r.record_id,
            scope: "case",
            resolve: imageMeta && imageMeta.resolve,
            label: "precedent images"
          }),
          r.visual_summary && e("div", { className: "prec-summary" },
            r.visual_summary.length > 360
              ? r.visual_summary.slice(0, 360) + "…"
              : r.visual_summary),
          r.rationale && e("div", { className: "prec-rationale" },
            "rationale: " + (r.rationale.length > 240 ? r.rationale.slice(0, 240) + "…" : r.rationale))
        )
      ))
    )
  );
}

// ---- ImagesPane: display attachments for a case -----------------------------
// Bitable attachment urls embedded in field values are short-lived; for reliable
// display we re-resolve via base.getAttachmentUrl(token, recordId, fieldId, tableId).
// Falls back to the embedded url if available.
function ImagesPane(props) {
  const { images, recordId, scope, resolve, label } = props;
  const [resolved, setResolved] = React.useState([]); // index-aligned url[]
  const [done,     setDone]     = React.useState(false);
  const [error,    setError]    = React.useState("");

  React.useEffect(() => {
    let cancelled = false;
    setError("");
    setResolved([]);
    setDone(false);
    if (!images || !images.length) { setDone(true); return; }
    if (typeof resolve !== "function") {
      // No resolver — fall back to embedded urls only.
      const urls = images.map(im => (im && (im.url || im.tmp_url || im.tmpUrl)) || "");
      if (!cancelled) { setResolved(urls); setDone(true); }
      return;
    }
    resolve(scope || "case", recordId, images).then(urls => {
      if (cancelled) return;
      setResolved(Array.isArray(urls) ? urls : []);
      setDone(true);
    }).catch(e => {
      if (cancelled) return;
      setError(String(e && e.message || e));
      setDone(true);
    });
    return () => { cancelled = true; };
  }, [images, recordId, scope, resolve]);

  if (!images || !images.length) {
    return e("div", { className: "muted", style: { fontSize: 11, padding: "4px 0" }},
      (label || "Images") + ": none attached on this record.");
  }

  return e("div", { style: { display: "flex", flexWrap: "wrap", gap: 6, padding: "4px 0" }},
    ...images.map((img, i) => {
      const url = resolved[i] || "";
      const isImg = !img.type || /^image\//i.test(img.type) || /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(img.name || "");
      let body;
      if (url && isImg) {
        body = e("a", { href: url, target: "_blank", rel: "noreferrer" },
          e("img", {
            src: url,
            alt: img.name || ("attachment " + (i+1)),
            style: { width: "100%", height: 100, objectFit: "cover", display: "block" },
            onError: () => {
              setResolved(prev => { const n = prev.slice(); n[i] = ""; return n; });
            }
          }));
      } else if (url) {
        body = e("a", { href: url, target: "_blank", rel: "noreferrer",
          style: { display: "block", padding: 6, fontSize: 10, textDecoration: "none" }},
          "📎 " + (img.name || "attachment"));
      } else if (done) {
        body = e("div", {
          style: { padding: 6, fontSize: 10, color: "#a00", lineHeight: 1.3 },
          title: "no signed url returned · token=" + (img.token || "?")
        }, "image unavailable");
      } else {
        body = e("div", { style: { padding: 6, fontSize: 10 }, className: "muted" }, "loading…");
      }
      return e("div", {
        key: (img.token || "noTok") + "_" + i,
        style: { width: 140, border: "1px solid var(--hairline)", borderRadius: 4, overflow: "hidden", background: "#0001" }
      },
        body,
        e("div", { style: { padding: "2px 4px", fontSize: 9, color: "var(--muted)",
          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }},
          img.name || ("attachment " + (i+1)))
      );
    }),
    error && e("div", { className: "muted", style: { fontSize: 10, color: "#c00" }}, "image error: " + error)
  );
}

// ---- DimRow: chip multi-select for one dimension ---------------------------
// Suggestion-first UX:
//   - Default view shows only `suggested` atoms (from top-5 precedents) + selected.
//   - User can toggle "show all" or start typing to search the full atom set.
//   - Chip label = serial_code only (atom_key + atom_name in tooltip).
function DimRow(props) {
  const { dim, atoms, selected, onChange, suggested, skillProposed, skillRejected } = props;
  const [filter, setFilter] = React.useState("");
  const [showAll, setShowAll] = React.useState(false);
  const f = filter.trim().toLowerCase();
  const sel = new Set(selected || []);
  const sugSet = new Set(suggested || []);
  const hasSuggestions = sugSet.size > 0;
  const skillSet = new Set(skillProposed || []);
  const rejKeys = new Set((skillRejected || []).map(r => r.atom_key));

  // Decide candidate pool:
  // 1. If filter text typed -> search ALL atoms
  // 2. Else if "show all" toggled or no suggestions -> show all
  // 3. Else -> show suggestions only
  let pool;
  if (f) {
    pool = atoms.filter(a =>
      (a.atom_key||"").toLowerCase().includes(f) ||
      (a.serial_code||"").toLowerCase().includes(f) ||
      (a.atom_name||"").toLowerCase().includes(f) ||
      (a.description||"").toLowerCase().includes(f)
    );
  } else if (showAll || !hasSuggestions) {
    pool = atoms;
  } else {
    pool = atoms.filter(a => sugSet.has(a.atom_key));
  }

  const toggle = (k) => {
    const next = new Set(sel);
    if (next.has(k)) next.delete(k); else next.add(k);
    onChange(Array.from(next));
  };
  const clear = () => onChange([]);

  const modeLabel = f
    ? "filter: " + pool.length + " match"
    : (showAll || !hasSuggestions)
      ? "all " + atoms.length + " atoms"
      : "suggested " + pool.length + "/" + atoms.length;

  return e("div", { className: "dim-row dim-" + dim },
    e("div", { className: "dim-label" }, dim),
    e("div", { className: "dim-body" },
      e("div", { className: "dim-head" },
        e("span", { className: "dim-name" },
          DIM_NAMES[dim], e("span", { className: "muted" }, " · " + modeLabel)),
        e("span", { className: "dim-count" },
          (sel.size ? sel.size : "0") + " selected ",
          sel.size > 0 && e("button", { className: "ghost", onClick: clear,
            style: { padding: "2px 6px", fontSize: 10, marginLeft: 4 }}, "clear"),
          hasSuggestions && !f && e("button", {
            className: "ghost",
            onClick: () => setShowAll(!showAll),
            style: { padding: "2px 6px", fontSize: 10, marginLeft: 4 }
          }, showAll ? "show suggestions" : "show all"))
      ),
      // Selected chips first (always visible regardless of suggestion filter)
      e("div", { className: "selected-strip" },
        ...Array.from(sel).map(k => {
          const a = atoms.find(x => x.atom_key === k);
          const label = (a && a.serial_code) ? a.serial_code : k;
          const isSkill = skillSet.has(k);
          return e("span", {
            key: k, className: "chip selected" + (isSkill ? " skill-src" : " reviewer-src"),
            title: (isSkill ? "[skill-proposed] " : "[reviewer-added] ") +
              (a ? (a.atom_key + " · " + a.atom_name + " — " + (a.description||"").slice(0,200)) : k),
            onClick: () => toggle(k)
          }, label, isSkill ? " ·s ✕" : " ✕");
        }),
        // Skill-rejected atoms (struck-through, click to override and add)
        ...(skillRejected || []).filter(r => !sel.has(r.atom_key)).map(r => {
          const a = atoms.find(x => x.atom_key === r.atom_key);
          const label = (a && a.serial_code) ? a.serial_code : r.atom_key;
          return e("span", {
            key: "rej-" + r.atom_key,
            className: "chip rejected-by-skill",
            title: "[skill-rejected] " + (r.reason || "no reason") + " — click to override",
            onClick: () => toggle(r.atom_key)
          }, label, " ✗");
        })
      ),
      // Search input (typing here always searches the full set)
      e("input", {
        className: "filter",
        value: filter,
        placeholder: "search all " + DIM_NAMES[dim].toLowerCase() + " atoms…",
        onChange: ev => setFilter(ev.target.value)
      }),
      // Available chips (excludes selected). Suggested atoms get a subtle highlight.
      e("div", { className: "chips" },
        ...pool.filter(a => !sel.has(a.atom_key) && !rejKeys.has(a.atom_key)).map(a => {
          const isSug = sugSet.has(a.atom_key);
          const isSkillProp = skillSet.has(a.atom_key);
          return e("span", {
            key: a.atom_key,
            className: "chip" + (isSkillProp ? " skill-proposed" : (isSug ? " suggested" : "")),
            title: (isSkillProp ? "[skill-proposed — click to accept] " : "") +
              a.atom_key + (a.atom_name ? " · " + a.atom_name : "") + (a.description ? " — " + a.description.slice(0,200) : ""),
            onClick: () => toggle(a.atom_key)
          }, (a.serial_code || a.atom_key));
        }),
        pool.length === 0 && e("span", { className: "muted", style: { padding: 4, fontSize: 11 }},
          f ? "no atoms match search"
            : (hasSuggestions ? "no suggestions for this dim — type to search or click 'show all'"
                              : "no atoms in this dim"))
      )
    )
  );
}

// ---- Phase 5b: Payload v0.5 emit ------------------------------------------
// Atom-rule-grounded payload for the per-policy precedent-review specialist.
// The specialist needs to: (1) know the NSA atom rule book, (2) read precedents
// (text+images+atoms+decision+rationale), (3) tag the candidate's atoms by
// analogy, (4) run the deterministic claim chain, (5) return verdict.
//
// Schema v0.5 differences from v0.4:
//   - DROP retrieval scores (BM25/atom-jaccard) — they're retrieval-internal
//     noise. The specialist reasons over content + atom analogy, not ranks.
//   - DROP candidate_rule / companion_rules (V0.3 Rule Book artifacts).
//   - ADD atom_rules block: NSA-scoped atoms_catalog + all NSA claims +
//     dimension definitions + scoring semantics.
//   - Each precedent retains: text fields, images, full atom tags by dim,
//     decision, rationale.
//
// `atoms_catalog` is filtered to atom_keys actually referenced by any claim
// for the candidate's issue (NSA-relevant atoms). `claims` is all claims for
// candidate.issue (preserves cross-title routing).
const POLICY_AREA_MAP = {
  HSS:  "HHB",
  BPI:  "HHB",
  NSA:  "NSA",
  HHB:  "HHB",
  HRA:  "HRA",
  SGC:  "SGC",
  VBDA: "VBDA"
};
function resolvePolicyArea(issue) {
  if (!issue) return null;
  const k = String(issue).toUpperCase().trim();
  if (POLICY_AREA_MAP[k]) return POLICY_AREA_MAP[k];
  for (const key in POLICY_AREA_MAP) {
    if (k.indexOf(key) >= 0) return key;
  }
  return null;
}
// Sub-vertical inclusion: HHB claims live as issue=HSS or issue=BPI in the table.
const POLICY_AREA_INCLUDES = { HHB: ["HHB","HSS","BPI"] };
function matchesPolicyArea(claimIssue, policyArea) {
  const ci = String(claimIssue || "").toUpperCase().trim();
  const includes = POLICY_AREA_INCLUDES[policyArea];
  if (includes) return includes.indexOf(ci) >= 0;
  return ci === policyArea;
}

// ---- copyKeyframesComposite: load N images, draw 2-col grid onto a canvas,
// copy the resulting PNG to clipboard via ClipboardItem. Ported from the
// legacy case_review_mvp plugin (V3.1.0) — proven pattern for shipping
// keyframes into a Mira chat as a multimodal attachment.
//
//   • Slices to first 12 keyframes (matches model attention budget).
//   • Loads with crossOrigin=anonymous + referrerPolicy=no-referrer so the
//     Bitable signed urls render to canvas without taint errors.
//   • 2-col grid, 400×300 cells, 4px gap, dark bg, "#N" frame badge top-left.
//   • Returns { ok, mode, count, dataUrl? }
//        mode = "clipboard"  → PNG written via ClipboardItem.
//        mode = "newtab"     → ClipboardItem blocked; opened a tab with the
//                              dataURL so the reviewer can right-click → Copy.
//        mode = "fail"       → no images loaded.
async function copyKeyframesComposite(urls) {
  const out = { ok: false, mode: "fail", count: 0 };
  if (!urls || !urls.length) return out;
  try {
    // Load up to 12, cross-origin so canvas isn't tainted
    const imgs = await Promise.all(urls.slice(0, 12).map(url => new Promise(resolve => {
      const img = new Image();
      img.crossOrigin   = "anonymous";
      img.referrerPolicy = "no-referrer";
      img.onload  = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = url;
    })));
    const loaded = imgs.filter(Boolean);
    if (!loaded.length) {
      console.warn("[AtomConsole] copyKeyframesComposite: no images loaded");
      return out;
    }
    out.count = loaded.length;

    // 2-col grid, fixed cell, dark bg, frame number badge
    const cols = Math.min(2, loaded.length);
    const rows = Math.ceil(loaded.length / cols);
    const cellW = 400, cellH = 300, gap = 4;
    const W = cols * cellW + (cols - 1) * gap;
    const H = rows * cellH + (rows - 1) * gap;

    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#181715";
    ctx.fillRect(0, 0, W, H);

    loaded.forEach((img, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = col * (cellW + gap);
      const y = row * (cellH + gap);
      const scale = Math.min(cellW / img.naturalWidth, cellH / img.naturalHeight);
      const dw = img.naturalWidth * scale;
      const dh = img.naturalHeight * scale;
      ctx.drawImage(img, x + (cellW - dw) / 2, y + (cellH - dh) / 2, dw, dh);
      // Frame number badge
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(x, y, 28, 20);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 11px Inter, sans-serif";
      ctx.fillText("#" + (i + 1), x + 4, y + 14);
    });

    // Try modern clipboard API first
    const blob = await new Promise(r => canvas.toBlob(r, "image/png"));
    if (!blob) return out;
    try {
      if (typeof ClipboardItem === "function" &&
          navigator.clipboard && navigator.clipboard.write) {
        await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
        out.ok = true; out.mode = "clipboard";
        return out;
      }
      throw new Error("ClipboardItem unavailable");
    } catch (clipErr) {
      // Fallback: open in a new tab so the reviewer can right-click → Copy.
      // Bitable iframe usually blocks ClipboardItem; this fallback lets the
      // reviewer ship the PNG anyway without leaving the table.
      console.warn("[AtomConsole] ClipboardItem blocked → opening composite in tab:",
        clipErr && clipErr.message);
      const dataUrl = canvas.toDataURL("image/png");
      try {
        const w = window.open("");
        if (w) {
          w.document.write(
            "<title>Keyframes composite — copy this image</title>" +
            "<body style=\"margin:0;background:#181715;color:#fff;font:13px sans-serif\">" +
              "<p style=\"padding:8px 12px;margin:0\">Right-click the image → <b>Copy image</b>, then paste into the specialist chat.</p>" +
              "<img src=\"" + dataUrl + "\" style=\"max-width:100%;display:block\">" +
            "</body>");
        }
        out.mode = "newtab";
        // We didn't write to clipboard, but we did surface the image — call it ok.
        out.ok = true;
        out.dataUrl = dataUrl;
        return out;
      } catch (e2) {
        console.error("[AtomConsole] keyframe newtab fallback failed:", e2);
        return out;
      }
    }
  } catch (e) {
    console.error("[AtomConsole] copyKeyframesComposite error:", e);
    return out;
  }
}

function imagesAttachedSummary(images) {
  if (!images || !images.length) return { count: 0, note: "no images attached" };
  const types = {};
  for (const im of images) {
    const t = (im && (im.type || im.ext || "")) || "image";
    types[t] = (types[t] || 0) + 1;
  }
  const parts = Object.keys(types).map(k => k + "×" + types[k]).join(", ");
  // Following the legacy plugin's V3.1.0 pattern: this note tells the specialist
  // skill that the reviewer is expected to paste a composite keyframes image
  // alongside the JSON payload. The skill reads images_note as a hint to look
  // for the multimodal attachment in the same chat turn.
  const cap = Math.min(images.length, 12);
  const note =
      images.length + " keyframe(s) (" + parts + "). " +
      "If the reviewer pasted a composite keyframes image in this chat turn " +
      "(top " + cap + " frames in a 2-col grid, frame numbers labeled top-left), " +
      "analyze it visually as primary evidence for atom tagging. " +
      "Trust pixels over visual_summary on conflict.";
  return { count: images.length, note: note };
}

// Collect every atom_key referenced by a claim's gates/modifiers/exceptions.
function atomKeysReferencedByClaim(c) {
  const acc = new Set();
  const dims = ["C","S","P","R","E"];
  for (const d of dims) {
    const arr = (c.gates && c.gates[d]) || [];
    for (const k of arr) acc.add(k);
  }
  ["modifiers_required","modifiers_excluded","modifiers_lift_to_approve",
   "exceptions_required"].forEach(prop => {
    const arr = c[prop] || [];
    for (const k of arr) acc.add(k);
  });
  // modifiers_lift_dnf is array of { atom_key, lift }
  const dnf = c.modifiers_lift_dnf || [];
  for (const item of dnf) {
    if (item && item.atom_key) acc.add(item.atom_key);
  }
  // exception_qualifiers: { atom_key: [...] } — keys are atom_keys
  const eq = c.exception_qualifiers || {};
  for (const k in eq) acc.add(k);
  const eqm = c.exception_qualifier_modifiers || {};
  for (const k in eqm) acc.add(k);
  return acc;
}

// Pick atoms_catalog entries restricted to dims the candidate touched +
// atoms referenced by the relevant claim slice. Drastically reduces
// per-payload size while preserving every audit_rule the specialist needs.
function sliceAtomsCatalog(corpus, fullCatalog, relevantClaims, tags) {
  const keepKeys = new Set();

  // (a) Every atom_key referenced by the relevant claims (gates + modifiers + exceptions).
  for (const c of relevantClaims) {
    atomKeysReferencedByClaim(c).forEach(k => { if (k) keepKeys.add(String(k).trim()); });
  }
  // (b) Every atom the reviewer drafted on the candidate.
  if (tags) {
    for (const d of ["C","S","P","R","E","M","X"]) {
      const arr = tags[d] || [];
      arr.forEach(k => { if (k) keepKeys.add(String(k).trim()); });
    }
  }

  const out = { C:[], S:[], P:[], R:[], E:[], M:[], X:[] };
  for (const d of Object.keys(fullCatalog)) {
    for (const a of fullCatalog[d]) {
      if (keepKeys.has(String(a.atom_key).trim())) out[d].push(a);
    }
  }
  return out;
}

// Pick a relevant slice of NSA claims for the candidate.
//   - Always include claims that the engine flagged as gate_hit OR suppressed
//     (these are the engine's universe of "fired or nearly fired").
//   - Always include claims for the candidate's policy_title.
//   - Include any claim whose gate intersects with the candidate's tagged atoms.
//   - Include any claim referenced by precedent decisions (rationale anchors).
//   - Cap with a hard limit; if everything is in scope, fall back to all NSA
//     claims (with an explicit `claim_slice_mode = "full"` flag so the
//     specialist knows the slice was not narrowed).
function sliceRelevantClaims(allIssueClaims, opts) {
  const { engineResult, candidatePolicyTitle, tags, precedents, hardCap } = opts;
  const cap = hardCap || 60;

  const keepIds = new Set();
  // (a) Engine-considered claims
  if (engineResult) {
    for (const h of (engineResult.gate_hits || []))   if (h.claim_id) keepIds.add(h.claim_id);
    for (const s of (engineResult.suppressed  || []))  if (s.claim_id) keepIds.add(s.claim_id);
    for (const cl of (engineResult.applied_claim_chain || [])) if (cl) keepIds.add(cl);
  }

  // (b) Candidate policy_title match
  const titleNorm = String(candidatePolicyTitle || "").trim().toLowerCase();
  if (titleNorm) {
    for (const c of allIssueClaims) {
      const titles = (c.policy_titles || []).map(t => String(t).trim().toLowerCase());
      if (titles.includes(titleNorm)) keepIds.add(c.claim_id);
    }
  }

  // (c) Atom intersection (any gate atom in tagged set)
  const tagSet = new Set();
  if (tags) {
    for (const d of ["C","S","P","R","E","M","X"]) {
      (tags[d] || []).forEach(k => k && tagSet.add(String(k).trim()));
    }
  }
  if (tagSet.size) {
    for (const c of allIssueClaims) {
      const g = c.gates || {};
      let hit = false;
      for (const d of ["C","S","P","R","E"]) {
        for (const k of (g[d] || [])) {
          if (tagSet.has(String(k).trim())) { hit = true; break; }
        }
        if (hit) break;
      }
      if (hit) keepIds.add(c.claim_id);
    }
  }

  // (d) Precedent policy_titles → also pull those claims (precedents anchor analogy)
  const precTitles = new Set();
  for (const p of (precedents || [])) {
    if (p && p.policy_title) precTitles.add(String(p.policy_title).trim().toLowerCase());
  }
  if (precTitles.size) {
    for (const c of allIssueClaims) {
      const titles = (c.policy_titles || []).map(t => String(t).trim().toLowerCase());
      for (const t of titles) {
        if (precTitles.has(t)) { keepIds.add(c.claim_id); break; }
      }
    }
  }

  let mode = "slice";
  let kept = allIssueClaims.filter(c => keepIds.has(c.claim_id));

  // If we somehow narrowed below 1 (no signal at all), fall back to first
  // `cap` claims so the specialist still sees the rule book shape.
  if (kept.length === 0) {
    kept = allIssueClaims.slice(0, cap);
    mode = "fallback_top_n";
  }
  // If slice exceeds cap, keep the cap-sized prefix (deterministic order).
  if (kept.length > cap) {
    kept = kept.slice(0, cap);
    mode = "slice_capped";
  }

  return { claims: kept, mode: mode, kept_ids: Array.from(keepIds), all_count: allIssueClaims.length };
}

function buildAtomRulesBlock(corpus, policyArea, opts) {
  if (!policyArea || !corpus || !corpus.claims || !corpus.atoms) return null;
  opts = opts || {};

  // 1. Filter claims to ones whose `issue` matches the policy area.
  const issueClaims = corpus.claims.filter(c => matchesPolicyArea(c.issue, policyArea));

  // 2. Build atoms_catalog for this policy area (used for slicing; not all of it ships).
  const referenced = new Set();
  for (const c of issueClaims) {
    const keys = atomKeysReferencedByClaim(c);
    keys.forEach(k => { if (k) referenced.add(String(k).trim()); });
  }
  const atomByKey = {};
  for (const a of corpus.atoms) {
    const k = String(a.atom_key || "").trim();
    if (k) atomByKey[k] = a;
  }
  const fullCatalog = { C: [], S: [], P: [], R: [], E: [], M: [], X: [] };
  let unresolved = 0;
  for (const k of referenced) {
    const a = atomByKey[k];
    if (!a) { unresolved++; continue; }
    const d = (a.dimension || "X").toString().trim().toUpperCase().charAt(0);
    if (!fullCatalog[d]) fullCatalog[d] = [];
    fullCatalog[d].push({
      atom_key:    a.atom_key,
      atom_name:   a.atom_name,
      dimension:   a.dimension,
      serial_code: a.serial_code,
      description: a.description,
      audit_rule:  a.audit_rule
    });
  }
  for (const d of Object.keys(fullCatalog)) {
    fullCatalog[d].sort((x, y) => String(x.serial_code || "").localeCompare(String(y.serial_code || "")));
  }

  // 3. Slice claims relevant to this candidate
  const sliced = sliceRelevantClaims(issueClaims, {
    engineResult:        opts.engineResult,
    candidatePolicyTitle: opts.candidatePolicyTitle,
    tags:                opts.tags,
    precedents:          opts.precedents,
    hardCap:             opts.hardCap || 60
  });

  // 4. Slim atoms_catalog to entries the relevant claims actually need.
  const slicedCatalog = sliceAtomsCatalog(corpus, fullCatalog, sliced.claims, opts.tags);

  // 5. Emit slimmed claim list — strip empty arrays / objects to save bytes.
  const claimsOut = sliced.claims.map(c => {
    const out = {
      claim_id: c.claim_id,
      issue:    c.issue,
      outcome:  c.outcome,
      gates:    c.gates || {}
    };
    if (c.policy_titles && c.policy_titles.length) out.policy_titles = c.policy_titles;
    if (c.modifiers_required && c.modifiers_required.length) out.modifiers_required = c.modifiers_required;
    if (c.modifiers_excluded && c.modifiers_excluded.length) out.modifiers_excluded = c.modifiers_excluded;
    if (c.modifiers_lift_to_approve && c.modifiers_lift_to_approve.length) out.modifiers_lift_to_approve = c.modifiers_lift_to_approve;
    if (c.modifiers_lift_dnf && c.modifiers_lift_dnf.length) out.modifiers_lift_dnf = c.modifiers_lift_dnf;
    if (c.exceptions_required && c.exceptions_required.length) out.exceptions_required = c.exceptions_required;
    if (c.exceptions_lift_to_approve) out.exceptions_lift_to_approve = true;
    if (c.exception_qualifiers && Object.keys(c.exception_qualifiers).length) out.exception_qualifiers = c.exception_qualifiers;
    if (c.exception_qualifier_modifiers && Object.keys(c.exception_qualifier_modifiers).length) out.exception_qualifier_modifiers = c.exception_qualifier_modifiers;
    if (c.requires_exception_context) out.requires_exception_context = true;
    if (c.routing && (c.routing.non_realistic_routes_to || c.routing.cross_title_redirect)) out.routing = c.routing;
    if (c.notes) out.notes = c.notes;
    return out;
  });

  // Stats for header
  const catCounts = {};
  let total = 0;
  for (const d of ["C","S","P","R","E","M","X"]) {
    catCounts[d] = (slicedCatalog[d] || []).length;
    total += catCounts[d];
  }

  if (unresolved > 0) {
    try { console.warn("[AtomConsole] buildAtomRulesBlock:",
      unresolved, "/", referenced.size, "referenced atom_keys did not resolve in corpus.atoms"); } catch(_) {}
  }
  try { console.info("[AtomConsole] atom_rules built:",
    "policy=" + policyArea,
    "claims_all=" + issueClaims.length,
    "claims_kept=" + claimsOut.length + " (mode=" + sliced.mode + ")",
    "atoms_in_slice=" + total,
    "corpus.atoms=" + corpus.atoms.length); } catch(_) {}

  return {
    policy_area: policyArea,
    dimensions: {
      C: { name: "Content",       weight: 1.0, role: "primary gate" },
      S: { name: "Subject",       weight: 1.0, role: "primary gate" },
      P: { name: "Portrayal",     weight: 1.0, role: "primary gate" },
      R: { name: "Realism",       weight: 0.7, role: "secondary gate; affects routing" },
      E: { name: "Explicitness",  weight: 0.7, role: "secondary gate" },
      M: { name: "Modifier",      weight: 0.5, role: "lift / suppress claim outcome" },
      X: { name: "Exception",     weight: 0.5, role: "lift / context-required" }
    },
    semantics: {
      gate_logic: "AND across dimensions (C,S,P,R,E); OR within each dimension. " +
                  "Empty dimension = wildcard (no constraint).",
      verdict_priority: ["VIOLATION","NOT_RECOMMEND","NOT_FOR_FEED","APPROVE","NO_CLAIM_FIRED"],
      lift_logic: "modifiers_lift_to_approve atoms tagged → outcome upgraded to APPROVE. " +
                  "modifiers_lift_dnf atoms apply per-claim partial lifts. " +
                  "exceptions_required atoms must all be tagged when requires_exception_context=true.",
