      routing_logic: "non_realistic_routes_to: when realism atoms imply non-realistic content, " +
                     "re-route to a different claim chain. cross_title_redirect: rebind verdict to a different policy_title."
    },
    atoms_catalog:    slicedCatalog,    // sliced: only atoms referenced by claims_in_scope or tagged on candidate
    atoms_in_scope:   total,
    atoms_per_dim:    catCounts,
    claims:           claimsOut,
    claims_in_scope:  claimsOut.length,
    claims_total_for_policy_area: issueClaims.length,
    claim_slice_mode: sliced.mode,        // "slice" | "slice_capped" | "fallback_top_n"
    note:             "atom_rules is a CASE-SCOPED SLICE. The full atom rule book lives in the skill body. " +
                      "claims_in_scope = " + claimsOut.length + " of " + issueClaims.length + " total " + policyArea + " claims. " +
                      "atoms_catalog only includes atoms referenced by these claims or tagged on the candidate."
  };
}

function buildPayload(pendingCase, tags, engineResult, precedentsResult, corpus) {
  if (!pendingCase) return null;
  const policy_area = resolvePolicyArea(pendingCase.issue);
  const imgSummary = imagesAttachedSummary(pendingCase.images);

  const candidate = {
    item_id:                pendingCase.source_video_id || pendingCase.record_id || "",
    record_id:              pendingCase.record_id || "",
    policy_title:           pendingCase.policy_title || "",
    issue:                  pendingCase.issue || "",
    visual_summary:         pendingCase.visual_summary || "",
    asr_text:               pendingCase.asr_text || "",
    ocr_text:               pendingCase.ocr_text || "",
    caption_text:           pendingCase.caption_text || "",
    images_attached_count:  imgSummary.count,
    images_note:            imgSummary.note,
    // Reviewer's draft tags (may be empty). Specialist may revise.
    draft_atom_tags:        tags || {}
  };

  // Precedents — content-only, no retrieval scores. Atoms are the analogy
  // anchor. Decision + rationale tell the specialist how the atom set was
  // historically resolved. Long text fields are capped to keep payload size
  // sane (typical case shrinks 122 KB → ~40 KB without losing precedential
  // signal — the specialist also reads the candidate composite image).
  const PREC_VS_CAP   = 1500;   // visual_summary
  const PREC_TEXT_CAP = 800;    // asr_text / ocr_text / caption_text each
  const PREC_RAT_CAP  = 1000;   // rationale
  const _cap = (s, n) => {
    if (!s) return "";
    const t = String(s);
    if (t.length <= n) return t;
    return t.slice(0, n) + " …[truncated +" + (t.length - n) + " chars]";
  };
  const precedents = ((precedentsResult && precedentsResult.results) || []).map((r, i) => ({
    rank:               i + 1,
    case_id:            r.case_id || "",
    source_video_id:    r.source_video_id || "",
    policy_title:       r.policy_title || "",
    issue:              r.issue || "",
    decision:           r.decision || "",
    visual_summary:     _cap(r.visual_summary, PREC_VS_CAP),
    asr_text:           _cap(r.asr_text,       PREC_TEXT_CAP),
    ocr_text:           _cap(r.ocr_text,       PREC_TEXT_CAP),
    caption_text:       _cap(r.caption_text,   PREC_TEXT_CAP),
    rationale:          _cap(r.rationale,      PREC_RAT_CAP),
    atoms:              r.atoms || {},        // full tag set, all 7 dims
    images:             (r.images || []).map(im => ({
      // Strip volatile tokens; keep stable metadata so specialist can reference
      // "image #2 shows X" without leaking signed urls.
      name: im && im.name || "",
      type: im && (im.type || im.ext) || "",
      size: im && im.size || null
    }))
  }));

  // Engine output as a simulation hint (the specialist may agree, override, or
  // re-tag and re-run mentally using the embedded atom_rules.claims).
  const engine_simulation = engineResult ? {
    verdict:              engineResult.verdict,
    applied_claim_chain:  engineResult.applied_claim_chain || [],
    lifts_applied:        engineResult.lifts_applied || [],
    routing:              engineResult.routing || {},
    gate_hits: (engineResult.gate_hits || []).map(h => ({
      claim_id:            h.claim_id,
      outcome_base:        h.outcome_base,
      outcome_after_lifts: h.outcome_after_lifts,
      lift:                h.lift || null,
      evidence:            h.evidence || {}
    })),
    suppressed: (engineResult.suppressed || []).map(s => ({
      claim_id:        s.claim_id,
      outcome_base:    s.outcome_base,
      suppress_reason: s.suppress_reason
    }))
  } : null;

  // The atoms_catalog (constant interpretation knowledge — atom audit_rules)
  // is baked into the specialist skill. Payload only ships the claims SLICE
  // relevant to this case (anchored by candidate.policy_title + precedents +
  // tagged atoms + engine-considered claims). Typical slice: 30–150 claims.
  const claimsSlice = (function buildClaimsSlice() {
    if (!corpus || !corpus.claims) return null;
    const issueClaims = corpus.claims.filter(c =>
      matchesPolicyArea(c.issue, policy_area));
    const sliced = sliceRelevantClaims(issueClaims, {
      engineResult:        engineResult,
      candidatePolicyTitle: pendingCase.policy_title,
      tags:                tags,
      precedents:          precedents,
      hardCap:             200            // generous cap; per-title typically <160
    });
    // Compact each claim (drop empty arrays / objects).
    const out = sliced.claims.map(c => {
      const o = { claim_id: c.claim_id, outcome: c.outcome, gates: c.gates || {} };
      if (c.policy_titles && c.policy_titles.length) o.policy_titles = c.policy_titles;
      if (c.modifiers_required && c.modifiers_required.length) o.modifiers_required = c.modifiers_required;
      if (c.modifiers_excluded && c.modifiers_excluded.length) o.modifiers_excluded = c.modifiers_excluded;
      if (c.modifiers_lift_to_approve && c.modifiers_lift_to_approve.length) o.modifiers_lift_to_approve = c.modifiers_lift_to_approve;
      if (c.modifiers_lift_dnf && c.modifiers_lift_dnf.length) o.modifiers_lift_dnf = c.modifiers_lift_dnf;
      if (c.exceptions_required && c.exceptions_required.length) o.exceptions_required = c.exceptions_required;
      if (c.exceptions_lift_to_approve) o.exceptions_lift_to_approve = true;
      if (c.exception_qualifiers && Object.keys(c.exception_qualifiers).length) o.exception_qualifiers = c.exception_qualifiers;
      if (c.exception_qualifier_modifiers && Object.keys(c.exception_qualifier_modifiers).length) o.exception_qualifier_modifiers = c.exception_qualifier_modifiers;
      if (c.requires_exception_context) o.requires_exception_context = true;
      if (c.routing && (c.routing.non_realistic_routes_to || c.routing.cross_title_redirect)) o.routing = c.routing;
      if (c.notes) o.notes = c.notes;
      return o;
    });
    try { console.info("[AtomConsole] claims_slice:",
      "policy=" + policy_area,
      "kept=" + out.length + " of " + issueClaims.length,
      "mode=" + sliced.mode); } catch(_) {}
    return {
      mode:                 sliced.mode,                 // "slice" | "slice_capped" | "fallback_top_n"
      claims:               out,
      claims_in_scope:      out.length,
      claims_total_for_policy_area: issueClaims.length,
      anchored_by: {
        policy_title:       pendingCase.policy_title || null,
        tagged_atom_count:  Object.keys(tags || {}).reduce((s,d)=>s+(tags[d]||[]).length,0),
        precedent_count:    precedents.length
      }
    };
  })();

  // Tiny version pointer so the specialist can verify rule book alignment.
  const rule_book_ref = {
    schema: "atom-catalog",
    version: "v1.0",
    policy_area: policy_area
  };

  return {
    schema:           "case-review-payload",
    version:          "v0.6",
    policy_area:      policy_area,
    generated_at:     new Date().toISOString(),
    generator:        PLUGIN_VERSION,
    // Strong, version-locked discriminator so the agent picks the atom skill
    // unambiguously even if the legacy nsa-precedent-review skill description
    // also matches `schema=case-review-payload`. The atom skill description
    // pins on `version=v0.6` AND on `_route_hint`.
    _route_hint:      (policy_area ? policy_area.toLowerCase() : "nsa") + "-atom-precedent-review",
    candidate:        candidate,
    precedents:       precedents,
    claims_slice:     claimsSlice,
    rule_book_ref:    rule_book_ref,
    engine_simulation: engine_simulation
  };
}

// ---- PayloadPane: emit + copy + JSON preview -------------------------------
// Two-step UX (v0.6.6, ported from legacy case_review_mvp V3.1.0):
//   1. "Send payload"     — copies payload (with route preamble) to clipboard.
//                           Falls back to .json download if the iframe blocks
//                           Clipboard API.
//   2. "Copy keyframes (N)" — builds a single PNG composite of up to 12 frames
//                           in a 2-col grid and writes it to the clipboard via
//                           ClipboardItem. Pasting that PNG gives the specialist
//                           a real multimodal attachment (pixels), not URLs the
//                           agent can't fetch. Falls back to opening a new tab
//                           where the reviewer can right-click → Copy image.
//   • "↓ .json" remains as a quiet ghost link for offline / drag-into-chat.
function PayloadPane(props) {
  const { payload, pendingCase, imageMeta } = props;
  const [copyState, setCopyState]       = React.useState("idle"); // idle | ok | err
  const [imgState,  setImgState]        = React.useState("idle"); // idle | resolving | ok | newtab | err
  const [resolvedImgUrls, setResolvedImgUrls] = React.useState([]);
  const [open, setOpen] = React.useState(false);

  if (!payload) return null;

  const json = React.useMemo(() => JSON.stringify(payload, null, 2), [payload]);
  const sizeKb = (json.length / 1024).toFixed(1);
  const precCount = (payload.precedents || []).length;
  const policyArea = payload.policy_area || "—";
  const verdict = payload.engine_simulation ? payload.engine_simulation.verdict : "(no atoms tagged)";
  const rbr = payload.rule_book_ref || null;
  const rbVersion = rbr ? rbr.version : null;
  const cs = payload.claims_slice || null;
  const claimsKept = cs ? cs.claims_in_scope : 0;
  const claimsAll  = cs ? cs.claims_total_for_policy_area : 0;
  const routeHint  = payload._route_hint || "nsa-atom-precedent-review";

  // Compose payload-with-preamble: gives the agent an unambiguous routing cue
  // even if the (older) legacy nsa-precedent-review skill description also
  // matches schema=case-review-payload. The preamble is plain text the user
  // would type, so it doesn't break the JSON parser on the receiving side.
  const payloadWithPreamble =
      "Run /" + routeHint + " on this case-review-payload (v0.6, NSA atom-rule-grounded):\n\n" +
      json;

  const hasImages = !!(pendingCase && pendingCase.images && pendingCase.images.length);
  const imgCount  = hasImages ? pendingCase.images.length : 0;

  // ---- helpers --------------------------------------------------------------

  const copyText = async (text) => {
    let ok = false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText &&
          window.isSecureContext !== false) {
        await navigator.clipboard.writeText(text);
        ok = true;
      }
    } catch (e) { /* fall through */ }
    if (!ok) {
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed"; ta.style.left = "-1000px"; ta.style.top = "0";
        document.body.appendChild(ta);
        ta.select();
        ta.setSelectionRange(0, text.length);
        ok = !!document.execCommand("copy");
        document.body.removeChild(ta);
      } catch (e) { ok = false; }
    }
    return ok;
  };

  const downloadJson = () => {
    try {
      const blob = new Blob([payloadWithPreamble], { type: "application/json" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      const itemId = (payload.candidate && payload.candidate.item_id) || "case";
      a.href = url;
      a.download = "payload-" + (policyArea || "X") + "-" + itemId + ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (e) {
      console.error("[AtomConsole] download failed:", e);
    }
  };

  // ---- single-step "Send to specialist" -------------------------------------
  // Tries clipboard first. On failure, auto-downloads .json so the reviewer is
  // never stuck. Either path leaves the payload routed via the preamble line.
  const onSend = async () => {
    const ok = await copyText(payloadWithPreamble);
    if (ok) {
      setCopyState("ok");
      setTimeout(() => setCopyState("idle"), 1800);
    } else {
      // Clipboard blocked → fall back to download. Keep err state visible for
      // the reviewer so they know the .json was saved instead of copied.
      console.warn("[AtomConsole] clipboard blocked → falling back to download");
      downloadJson();
      setCopyState("err");
      setTimeout(() => setCopyState("idle"), 4000);
    }
  };

  // ---- "Copy keyframes" — resolve attachment urls then build a 2-col PNG
  // composite of up to 12 frames and write it to the clipboard. Pasting that
  // single PNG into Mira chat gives the specialist skill a real multimodal
  // attachment to reason over (vs URL strings the agent can't fetch).
  const onCopyKeyframes = async () => {
    if (!hasImages) return;
    setImgState("resolving");
    let urls = [];
    try {
      if (imageMeta && typeof imageMeta.resolve === "function") {
        urls = await imageMeta.resolve("pending", pendingCase.record_id, pendingCase.images);
      }
      if (!Array.isArray(urls) || urls.length === 0) {
        urls = pendingCase.images.map(im => (im && (im.url || im.tmp_url || im.tmpUrl)) || "");
      }
    } catch (e) {
      console.error("[AtomConsole] keyframe resolve failed:", e);
      urls = pendingCase.images.map(im => (im && (im.url || im.tmp_url || im.tmpUrl)) || "");
    }
    urls = urls.filter(u => !!u);
    setResolvedImgUrls(urls);
    if (urls.length === 0) {
      setImgState("err");
      setTimeout(() => setImgState("idle"), 3000);
      return;
    }
    // Build composite + clipboard write (or new-tab fallback).
    const r = await copyKeyframesComposite(urls);
    if (r.ok && r.mode === "clipboard") {
      setImgState("ok");
      setTimeout(() => setImgState("idle"), 1800);
    } else if (r.ok && r.mode === "newtab") {
      setImgState("newtab");
      setTimeout(() => setImgState("idle"), 6000);
    } else {
      setImgState("err");
      setTimeout(() => setImgState("idle"), 4000);
    }
  };

  // ---- UI labels ------------------------------------------------------------
  // Two explicitly numbered steps mirror the legacy plugin's "1. Copy JSON /
  // 2. Copy keyframes" UX so reviewers know to paste both into the chat.
  const sendLabel = copyState === "ok"  ? "✓ payload copied — paste into chat"
                  : copyState === "err" ? "⤓ saved as .json (clipboard blocked)"
                  : "1. Send payload";
  const sendClass = "copy-btn" + (copyState === "ok" ? " ok"
                                : copyState === "err" ? " err" : "");
  const kfLabel   = imgState === "resolving" ? "resolving urls…"
                  : imgState === "ok"     ? "✓ composite copied — paste into chat"
                  : imgState === "newtab" ? "↗ opened in tab — right-click → Copy image"
                  : imgState === "err"    ? "✗ failed"
                  : "2. Copy keyframes (" + imgCount + ")";

  return e("div", { className: "payload-card" },
    e("div", { className: "payload-head" },
      e("div", null,
        e("div", { className: "payload-title" }, "Specialist payload"),
        e("div", { className: "payload-meta" },
          payload.schema, " · ", payload.version, " · ", sizeKb, " KB · ",
          precCount, " precedent", precCount===1?"":"s",
          hasImages ? " · " + imgCount + " keyframe" + (imgCount===1?"":"s") : ""
        )
      ),
      e("div", { className: "payload-actions" },
        e("button", { className: sendClass, onClick: onSend,
          title: "Step 1 — copy payload + route preamble to clipboard. Falls back to .json download if the iframe blocks clipboard." },
          sendLabel),
        hasImages && e("button", {
          className: "copy-btn secondary",
          onClick: onCopyKeyframes,
          disabled: imgState === "resolving",
          title: "Step 2 — build a 2-col PNG composite of up to 12 keyframes and copy it to the clipboard. Paste into the same chat AFTER the payload so the specialist can analyze the pixels."
        }, kfLabel),
        e("button", {
          className: "copy-btn ghost",
          onClick: downloadJson,
          title: "Save the payload as a .json file (offline / drag-into-chat workflow)."
        }, "↓ .json")
      )
    ),
    copyState === "err" && e("div", {
      style: { fontSize: 11, color: "var(--muted)", marginBottom: 6 }
    }, "Clipboard blocked by Bitable — payload was downloaded as .json instead. Drag the file into the specialist chat."),
    imgState === "newtab" && e("div", {
      style: { fontSize: 11, color: "var(--muted)", marginBottom: 6 }
    }, "Composite opened in a new tab (clipboard image write blocked). Right-click the image → Copy image, then paste into the chat after the payload."),
    imgState === "err" && e("div", {
      style: { fontSize: 11, color: "var(--error, #c00)", marginBottom: 6 }
    }, "Could not build keyframe composite. Re-pick the case or refresh the table to refresh signed urls."),
    hasImages && (imgState === "idle" || imgState === "resolving" || imgState === "ok") && e("div", {
      style: { fontSize: 11, color: "var(--muted)", marginBottom: 6 }
    }, "Workflow: send payload first, then composite keyframes — both pasted into the same chat turn."),
    e("div", { style: { display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 4 }},
      e("span", { className: "payload-stat routing",
        title: "Routes to which specialist skill" },
        "→ /" + routeHint),
      e("span", { className: "payload-stat",
        title: "Atom-engine suggested verdict (specialist may revise tags and override)" },
        "engine: " + verdict),
      cs && e("span", { className: "payload-stat",
        title: "Claim slice anchored by candidate.policy_title + draft tags + precedents. " +
               "Mode: " + cs.mode + ". Full atoms_catalog (interpretation knowledge) lives in the skill." },
        "claims_slice: " + claimsKept + " / " + claimsAll + " (" + (cs.mode || "?") + ")"),
      rbr && e("span", { className: "payload-stat",
        title: "atoms_catalog (with audit_rule) is BAKED into the specialist skill. " +
               "Payload only ships this version pointer for alignment." },
        "catalog: " + (rbr.policy_area || "—") + " " + rbVersion + " (in skill)")
    ),
    !policyArea && e("div", { className: "muted",
      style: { fontSize: 11, padding: "4px 0", color: "var(--error)" }},
      "⚠ No policy_area resolved from issue \"",
      payload.candidate && payload.candidate.issue,
      "\". Set the case's `issue` to one of: NSA / HHB / HRA / SGC / VBDA."),
    e("details", { open: open, onToggle: ev => setOpen(ev.target.open) },
      e("summary", null, open ? "Hide JSON preview" : "Show JSON preview"),
      e("pre", null, json)
    )
  );
}

// ---- v0.7.0 phase6a: paste-back loop ---------------------------------------
// Mira does not expose a public skill-invocation API to third-party iframes
// (verified May 2026 — only inbound MCP/Skill flows are documented). The
// established workflow is therefore manual:
//   1. Plugin emits payload + composite keyframes (handled by PayloadPane).
//   2. Reviewer pastes both into a Mira chat with the atom skill.
//   3. Skill replies with a single fenced ```json block (Atom Verdict Schema).
//   4. Reviewer copies that reply and pastes it into ReasonedVerdictPane,
//      which parses, schema-checks, and renders a structured view here.
//
// tryParseVerdictJson — port of legacy tryParseReasonedJson (case_review_mvp
// V3.x). Strips ```json fences if present, then locates the outermost {…}
// object and JSON.parses it. Returns null on any failure (no exceptions).
function tryParseVerdictJson(raw) {
  if (!raw) return null;
  let txt = String(raw).trim();
  // Strip markdown fences (```json …``` or ``` …```) if the model wrapped them.
  txt = txt.replace(/^```(?:json)?\s*/i, "").replace(/```\s*$/i, "").trim();
  // Tolerate any prose before/after the object — grab the outermost braces.
  const start = txt.indexOf("{");
  const end   = txt.lastIndexOf("}");
  if (start === -1 || end === -1 || end < start) return null;
  try {
    return JSON.parse(txt.slice(start, end + 1));
  } catch (e) {
    return null;
  }
}

// validateAtomVerdict — soft schema check for atom-verdict v1.0. Returns
// { ok, errors[], warnings[] }. Errors block the render; warnings annotate
// the verdict view (e.g. unknown verdict literal, missing dim, rejected
// shape mismatch). Permissive on extra fields so downstream skill rev-bumps
// don't break the plugin.
const VERDICT_ENUM = ["VIOLATION","NOT_RECOMMEND","NOT_FOR_FEED","APPROVE","ESCALATE"];
const ATOM_DIMS_BY_VERTICAL = {NSA:["C","S","P","R","E","M","X"],HHB:["S","C","P","R","M","X"],HSS:["S","C","P","R","M","X"],BPI:["S","C","P","R","M","X"],HRA:["C","S","P","R","E","M","X"],VBDA:["C","S","P","R","E","M","X"],SGC:["C","S","P","R","E","M","X"]};
const KNOWN_VERTICALS = Object.keys(ATOM_DIMS_BY_VERTICAL);
const ATOM_DIMS = ["C","S","P","R","E","M","X"];
function validateAtomVerdict(v) {
  const errors = [], warnings = [];
  if (!v || typeof v !== "object") {
    return { ok: false, errors: ["payload is not a JSON object"], warnings };
  }
  if (v.schema && v.schema !== "atom-verdict") {
    warnings.push("schema is \"" + v.schema + "\", expected \"atom-verdict\"");
  }
  if (v.vertical && KNOWN_VERTICALS.indexOf(v.vertical) === -1) {
    warnings.push("vertical is \"" + v.vertical + "\", not a known vertical (" + KNOWN_VERTICALS.join(", ") + ")");
  }
  if (!v.verdict || VERDICT_ENUM.indexOf(v.verdict) === -1) {
    errors.push("verdict must be one of " + VERDICT_ENUM.join(" / "));
  }
  if (typeof v.confidence !== "number" || v.confidence < 1 || v.confidence > 10) {
    warnings.push("confidence should be an integer 1–10");
  }
  if (!v.proposed_atom_tags || typeof v.proposed_atom_tags !== "object") {
    errors.push("proposed_atom_tags missing or not an object");
  } else {
    const expectedDims = (v.vertical && ATOM_DIMS_BY_VERTICAL[v.vertical]) || ATOM_DIMS;
    const missing = expectedDims.filter(d => !Array.isArray(v.proposed_atom_tags[d]));
    if (missing.length) warnings.push("proposed_atom_tags missing dim(s): " + missing.join(","));
  }
  if (v.simulated_claim_chain && !Array.isArray(v.simulated_claim_chain)) {
    errors.push("simulated_claim_chain must be an array");
  }
  if (v.precedent_analysis && !Array.isArray(v.precedent_analysis)) {
    errors.push("precedent_analysis must be an array");
  }
  if (v.rejected_draft_atoms && !Array.isArray(v.rejected_draft_atoms)) {
    warnings.push("rejected_draft_atoms is not an array — ignoring");
  }
  if (v.watch_outs && !Array.isArray(v.watch_outs)) {
    warnings.push("watch_outs is not an array — ignoring");
  }
  return { ok: errors.length === 0, errors, warnings };
}

// _splitReason — split the v0.6 skill's `reason` string into tagged sections
// keyed by [VISUAL ANALYSIS] / [TEXT ANALYSIS] / [PRECEDENT TRIAGE] /
// [ATOM TAGGING] / [CLAIM SIMULATION] / [VERDICT]. Returns { sectionKey:text }.
// Falls back to { _full: raw } if no tags are detected.
function _splitReason(raw) {
  if (!raw || typeof raw !== "string") return null;
  const re = /\[(VISUAL ANALYSIS|TEXT ANALYSIS|PRECEDENT TRIAGE|ATOM TAGGING|CLAIM SIMULATION|VERDICT)\]/g;
  const matches = [];
  let m;
  while ((m = re.exec(raw)) !== null) matches.push({ tag: m[1], idx: m.index });
  if (!matches.length) return { _full: raw };
  const out = {};
  for (let i = 0; i < matches.length; i++) {
    const start = matches[i].idx + matches[i].tag.length + 2; // +2 for [ ]
    const end = (i + 1 < matches.length) ? matches[i+1].idx : raw.length;
    out[matches[i].tag] = raw.slice(start, end).trim();
  }
  return out;
}

// ReasonedVerdictPane — render an atom-verdict v1.0 object pasted back from
// Mira chat. Mirrors the legacy ReasonedVerdict component's layout:
//   • Header pill (verdict + confidence + grey + policy_title + pattern)
//   • Proposed atoms by dimension (with rejected drafts struck through)
//   • Simulated claim chain (dominant first)
//   • Precedent analysis cards
//   • Watch-outs / next_step / suppressed claims (collapsible)
//   • Engine alignment delta + tagged reasoning sections (collapsible)
function ReasonedVerdictPane(props) {
  const { engineSimulation, atomsByDim, onVerdictParsed, onVerdictCleared } = props || {};
  const [raw, setRaw]         = React.useState("");
  const [parsed, setParsed]   = React.useState(null);
  const [check, setCheck]     = React.useState({ ok: true, errors: [], warnings: [] });
  const [editing, setEditing] = React.useState(true); // textarea expanded by default until first parse

  // ---- Build a flat lookup index from corpus.atomsByDim ----
  // Map atom_key → { atom_key, atom_name, serial_code, dim }. Used to resolve
  // any key the skill emits (catalog uses dotted-namespace `atom_key`s; we also
  // accept serial_code as a fallback in case a skill rev returns "C37"). Tries
  // case-insensitive matching as a final resort. Returns null when no match.
  const atomIndex = React.useMemo(() => {
    const byKey = new Map(), bySerial = new Map(), byKeyLC = new Map();
    if (atomsByDim) {
      for (const d of Object.keys(atomsByDim)) {
        const dim = d; // C / S / P / R / E / M / X
        for (const a of (atomsByDim[d] || [])) {
          const rec = {
            atom_key: a.atom_key,
            atom_name: a.atom_name || "",
            serial_code: a.serial_code || "",
            dim: dim,
            description: a.description || ""
          };
          if (a.atom_key) {
            byKey.set(a.atom_key, rec);
            byKeyLC.set(String(a.atom_key).toLowerCase(), rec);
          }
          if (a.serial_code) {
            // serial_code looks like "C37 — Not applicable"; index by leading token too
            bySerial.set(a.serial_code, rec);
            const m = String(a.serial_code).match(/^([A-Z]\d+)/);
            if (m) bySerial.set(m[1], rec);
          }
        }
      }
    }
    return { byKey, bySerial, byKeyLC };
  }, [atomsByDim]);

  // resolveAtom — accepts a raw key + optional dim hint. Returns
  // { key, dim, serial, name, resolved } where resolved=false means "unknown".
  const resolveAtom = React.useCallback((rawKey, dimHint) => {
    if (!rawKey) return { key: rawKey, dim: dimHint || "?", serial: "", name: "", resolved: false };
    const k = String(rawKey);
    let r = atomIndex.byKey.get(k) || atomIndex.bySerial.get(k) || atomIndex.byKeyLC.get(k.toLowerCase());
    if (!r) {
      // Last resort: if the key starts with a known dim prefix (e.g. "C37" or
      // "atom.exposure...."), infer the dim. Catalog uses prefixes:
      //  C → "atom." | S → "subject." | P → "portrayal." | R → "realism."
      //  E → "explicitness." | M → "modifier." | X → "exception."
      const prefixDim = { atom: "C", subject: "S", portrayal: "P", realism: "R",
                          explicitness: "E", modifier: "M", exception: "X" };
      const head = k.split(".")[0];
      const m = k.match(/^([A-Z])\d+/);
      const dim = dimHint || prefixDim[head] || (m ? m[1] : "?");
      // Build a friendly fallback name from the tail of the key.
      const tail = k.includes(".") ? k.split(".").slice(1).join(".") : k;
      return { key: k, dim: dim, serial: "", name: tail || k, resolved: false };
    }
    return { key: r.atom_key, dim: r.dim, serial: r.serial_code, name: r.atom_name, resolved: true };
  }, [atomIndex]);

  // ---- Parse-on-input ----
  const onChange = (ev) => {
    const v = ev.target.value;
    setRaw(v);
    if (!v.trim()) { setParsed(null); setCheck({ ok: true, errors: [], warnings: [] }); return; }
    const p = tryParseVerdictJson(v);
    if (!p) {
      setParsed(null);
      setCheck({ ok: false,
        errors: ["Could not locate a single JSON object. Make sure you copied the entire ```json block (or the bare {…}) from Mira's reply."],
        warnings: [] });
      return;
    }
    const c = validateAtomVerdict(p);
    setParsed(p);
    setCheck(c);
    if (c.ok) {
      setEditing(false); // collapse textarea on successful parse
      if (onVerdictParsed) onVerdictParsed(p);
    }
  };

  const onClear = () => {
    setRaw(""); setParsed(null);
    setCheck({ ok: true, errors: [], warnings: [] });
    setEditing(true);
    if (onVerdictCleared) onVerdictCleared();
  };

  // ---- Derived view-model -----
  const verdict    = parsed && parsed.verdict;
  const conf       = parsed && parsed.confidence;
  const grey       = parsed && parsed.grey;
  const pattern    = parsed && parsed.pattern;
  const finalTitle = parsed && parsed.final_policy_title;
  const showFinalTitle = finalTitle && String(finalTitle).toLowerCase() !== "none" && String(finalTitle).trim() !== "";
  const tags       = (parsed && parsed.proposed_atom_tags) || null;
  const rejected   = (parsed && parsed.rejected_draft_atoms) || [];
  const chain      = (parsed && parsed.simulated_claim_chain) || [];
  const suppressed = (parsed && parsed.suppressed_claims) || [];
  const align      = parsed && parsed.engine_alignment;
  const precs      = (parsed && parsed.precedent_analysis) || [];
  const watchOuts  = (parsed && parsed.watch_outs) || [];
  const verdictVertical = parsed && parsed.vertical;
  const activeDims = (verdictVertical && ATOM_DIMS_BY_VERTICAL[verdictVertical]) || ATOM_DIMS;
  const nextStep   = parsed && parsed.next_step;
  const reasonSecs = parsed && parsed.reason ? _splitReason(parsed.reason) : null;

  // Engine verdict fallback: skill may emit engine_alignment.engine_verdict=null
  // when it didn't compare. Fall back to the payload's engine_simulation, which
  // we shipped from the plugin. Only render the chip when the two differ.
  const engineV = (align && align.engine_verdict)
                || (engineSimulation && engineSimulation.verdict)
                || null;
  const showEngineDelta = engineV && verdict && engineV !== verdict;
  // engine_alignment.delta — show only when it's a real revision string.
  const deltaText = align && align.delta && align.delta !== "none" ? align.delta : null;

  // Confidence chip color (legacy plugin's mapping):
  //   ≥ 7 → success / ≤ 4 → error / mid → warning
  const confKind = (typeof conf !== "number") ? "" :
                   conf >= 7 ? "high" : conf <= 4 ? "low" : "mid";

  // Pre-compute one resolved view for proposed atoms, with rejected atoms
  // grouped per-dim so the renderer can interleave struck-through chips inline.
  const DIM_NAMES = { C: "Content", S: "Subject", P: "Portrayal",
                      R: "Realism", E: "Explicitness", M: "Modifier", X: "Exception" };
  const tagsByDim = React.useMemo(() => {
    if (!tags) return null;
    const out = {};
    for (const d of activeDims) {
      const proposed = (tags[d] || []).map(k => resolveAtom(k, d));
      const rej      = rejected.filter(r => (r.dim || "") === d)
                               .map(r => Object.assign({}, resolveAtom(r.atom_key, d), { reasonText: r.reason }));
      out[d] = { proposed, rejected: rej };
    }
    return out;
  }, [tags, rejected, resolveAtom, activeDims]);

  // For shared/conflicting precedent atoms — same lookup, but flat list.
  const resolveList = (arr, hint) => (arr || []).map(k => resolveAtom(k, hint));

  // ---- Chip helper (exposed as inner React component for clarity) ----
  const AtomChip = ({ atom, struck }) => {
    const cls = "atom-chip"
      + (atom.resolved ? " dim-" + atom.dim : " unknown")
      + (struck ? " rejected" : "");
    const label = atom.resolved && atom.serial
      ? (atom.serial.split(" — ")[0] + " · " + atom.name)
      : (atom.resolved ? atom.name : atom.name + " (unknown)");
    return e("span", {
      className: cls,
      title: atom.resolved
        ? (atom.key + (atom.description ? " — " + atom.description : ""))
        : ("Unknown atom_key — not in the v1.0 catalog: " + atom.key)
    },
      e("span", { className: "chip-dim" }, atom.dim || "?"),
      e("span", { className: "chip-name" }, label)
    );
  };

  // ---- Render -----
  const cardCls = "reasoned-card" + (parsed && check.ok ? " has-verdict" : "");

  return e("div", { className: cardCls },
    // ---- Head: title + clear/edit buttons ----
    e("div", { className: "reasoned-head" },
      e("div", null,
        e("div", { className: "reasoned-title" }, "Reasoned verdict"),
        e("div", { className: "reasoned-sub" },
          editing
            ? "Paste Mira's ```json verdict reply below. Parser + schema check run live as you type."
            : "Parsed and rendered. Edit paste to re-evaluate.")
      ),
      e("div", { style: { display: "flex", gap: 6 } },
        !editing && parsed && e("button", { className: "btn-ghost", onClick: () => setEditing(true),
          title: "Re-open the textarea to paste a new reply." }, "edit paste"),
        raw && e("button", { className: "btn-ghost", onClick: onClear,
          title: "Clear textarea + rendered verdict." }, "clear")
      )
    ),

    // ---- Textarea (expanded) OR one-line summary bar (collapsed) ----
    editing && e("textarea", {
      className: "reasoned-paste",
      rows: 14,
      value: raw,
      onChange: onChange,
      placeholder: "Paste the entire ```json …``` block (or the bare {…}) from Mira's reply here.",
      spellCheck: false
    }),
    !editing && parsed && check.ok && e("div", { className: "reasoned-summary-bar" },
      e("span", { className: "ok-dot", "aria-hidden": true }),
      "Parsed ",
      e("span", { className: "mono", style: { fontFamily: "var(--mono)", color: "var(--ink)" } },
        Math.round(raw.length / 1024 * 10) / 10 + " KB"),
      " of verdict JSON · ",
      verdict || "?",
      (typeof conf === "number") ? " · conf " + conf + "/10" : "",
      " · ",
      (tags ? activeDims.reduce((n, d) => n + ((tags[d] || []).length), 0) : 0),
      " atoms across ",
      (tags ? activeDims.filter(d => (tags[d] || []).length).length : 0),
      " dim",
      (tags && activeDims.filter(d => (tags[d] || []).length).length === 1 ? "" : "s")
    ),

    // ---- Errors / warnings ----
    !check.ok && check.errors.length > 0 && e("div", { className: "reasoned-err" },
      check.errors.map((er, i) => e("div", { key: i }, "✗ ", er))
    ),
    check.warnings.length > 0 && e("div", { className: "reasoned-warn" },
      check.warnings.map((w, i) => e("div", { key: i }, "⚠ ", w))
    ),

    // ---- Rendered verdict view ----
    parsed && check.ok && e("div", { style: { marginTop: 14 } },

      // Header strip — verdict pill + confidence + meta chips
      e("div", { style: { display: "flex", flexWrap: "wrap", alignItems: "center", gap: 8, marginBottom: 4 } },
        e("span", { className: "verdict-pill verdict-" + (verdict || "NO_CLAIM_FIRED") },
          verdict || "?"),
        confKind && e("span", { className: "conf-chip " + confKind,
          title: "Specialist confidence (1–10)" },
          "conf " + conf + "/10"),
        grey && e("span", { className: "verdict-pill verdict-VIOLATION",
          style: { fontSize: 11, padding: "4px 10px" } }, "GREY"),
        pattern && e("span", { className: "atom-chip",
          style: { background: "var(--surface-card)", color: "var(--body)" } },
          e("span", { className: "chip-name" }, pattern)),
        showFinalTitle && e("span", { className: "atom-chip",
          style: { background: "var(--primary)", color: "#fff" },
          title: "final_policy_title" },
          e("span", { className: "chip-name" }, finalTitle)),
        showEngineDelta && e("span", { className: "atom-chip",
          style: { background: "#fdf3e0", color: "#8a5a13" },
          title: deltaText || "engine_alignment delta" },
          e("span", { className: "chip-name" }, "engine: " + engineV + " → " + verdict))
      ),

      // engine_alignment.delta as a separate caption row when present (full text in tooltip)
      deltaText && deltaText.length > 0 && e("div", {
        className: "reasoned-sub",
        style: { marginTop: 6, marginBottom: 2 },
        title: deltaText
      }, "Δ ", deltaText.length > 110 ? deltaText.slice(0, 107) + "…" : deltaText),

      // Proposed atom tags — compact summary (full interactive view is in Atom Tags below)
      tagsByDim && e("div", { className: "reasoned-section-head", style: { marginBottom: 8 } },
        "Proposed atoms: ",
        e("span", { className: "count" },
          activeDims.reduce((n, d) => n + tagsByDim[d].proposed.length, 0) + " accepted",
          rejected.length > 0 ? (" · " + rejected.length + " rejected") : "",
          " — pre-filled in Atom Tags below"
        )
      ),

      // Simulated claim chain
      chain.length > 0 && e("div", null,
        e("div", { className: "reasoned-section-head" }, "Simulated claim chain",
          e("span", { className: "count" }, "(" + chain.length + " fired, dominant first)")),
        e("div", null,
          chain.map((c, i) => e("div", { key: i, className: "claim-row" + (i === 0 ? " dominant" : "") },
            e("span", { className: "claim-id" }, c.claim_id || "—"),
            e("div", { style: { display: "flex", flexWrap: "wrap", gap: 4, alignItems: "center" } },
              c.outcome_base && e("span", { className: "ev-pill" }, c.outcome_base),
              c.outcome_after_lifts && c.outcome_after_lifts !== c.outcome_base &&
                e("span", { className: "lift-pill", style: { marginLeft: 4 } },
                  "→ " + c.outcome_after_lifts),
              c.lift_applied && e("span", { className: "lift-pill", style: { marginLeft: 4 } },
                "lift:" + (typeof c.lift_applied === "string" ? c.lift_applied : JSON.stringify(c.lift_applied))),
              c.routing && c.routing.cross_title_redirect && e("span", { className: "routing-pill", style: { marginLeft: 4 } },
                "→ " + c.routing.cross_title_redirect)
            ),
            i === 0 && e("span", { className: "atom-chip",
              style: { background: "var(--primary)", color: "#fff", fontSize: 10 } },
              e("span", { className: "chip-name" }, "dominant"))
          ))
        )
      ),

      // Watch-outs (always visible — these are the reviewer's call-to-action)
      watchOuts.length > 0 && e("div", null,
        e("div", { className: "reasoned-section-head" }, "Watch-outs",
          e("span", { className: "count" }, "(" + watchOuts.length + ")")),
        watchOuts.map((w, i) => e("div", { key: i, className: "watch-out" }, w))
      ),

      // Next step — small callout
      nextStep && e("div", null,
        e("div", { className: "reasoned-section-head" }, "Next step"),
        e("div", { style: { fontSize: 12, padding: "8px 10px",
                            background: "var(--surface-card)", borderRadius: 8,
                            color: "var(--body)", lineHeight: 1.55 } },
          nextStep)
      ),

      // Precedent analysis (collapsed by default — secondary detail)
      precs.length > 0 && e("details", { open: false, style: { marginTop: 14 } },
        e("summary", null, "Precedent analysis (" + precs.length + ")"),
        e("div", { style: { marginTop: 6 } },
          precs.map((pa, i) => {
            const ap = (pa.applicability || "").toUpperCase();
            const cls = "precedent-pa " +
              (ap === "APPLICABLE" ? "applicable" :
               ap === "PARTIAL"    ? "partial" : "non-applicable");
            const apKind = ap === "APPLICABLE" ? "high" : ap === "PARTIAL" ? "mid" : "low";
            return e("div", { key: i, className: cls },
              e("div", { className: "pa-row" },
                e("span", { className: "conf-chip " + apKind,
                  style: { letterSpacing: 1, fontSize: 10 } }, ap || "?"),
                pa.case_id && e("span", { style: { fontFamily: "var(--mono)", fontSize: 11, color: "var(--body-strong)" } }, pa.case_id),
                typeof pa.rank === "number" && e("span", { className: "muted", style: { fontSize: 11, color: "var(--muted)" } },
                  "#" + pa.rank),
                pa.decision && e("span", { className: "atom-chip" },
                  e("span", { className: "chip-name" }, pa.decision)),
                pa.decision_alignment && e("span", { style: { fontSize: 11, color: "var(--muted)" } },
                  "→ " + pa.decision_alignment)
              ),
              Array.isArray(pa.shared_atoms) && pa.shared_atoms.length > 0 && e("div", { style: { marginTop: 6 } },
                e("span", { style: { fontSize: 10, color: "var(--muted)", fontFamily: "var(--mono)", letterSpacing: 0.5, marginRight: 4 } }, "SHARED"),
                resolveList(pa.shared_atoms).map((a, j) => e(AtomChip, { key: "s" + j, atom: a, struck: false }))
              ),
              Array.isArray(pa.conflicting_atoms) && pa.conflicting_atoms.length > 0 && e("div", { style: { marginTop: 4 } },
                e("span", { style: { fontSize: 10, color: "var(--muted)", fontFamily: "var(--mono)", letterSpacing: 0.5, marginRight: 4 } }, "CONFLICT"),
                resolveList(pa.conflicting_atoms).map((a, j) => e(AtomChip, { key: "c" + j, atom: a, struck: true }))
              ),
              pa.note && e("div", { className: "pa-note" }, pa.note)
            );
          })
        )
      ),

      // Suppressed claims (collapsed)
      suppressed.length > 0 && e("details", null,
        e("summary", null, "Suppressed claims (" + suppressed.length + ")"),
        e("div", { style: { marginTop: 4 } },
          suppressed.slice(0, 12).map((s, i) => e("div", { key: i, className: "claim-row" },
            e("span", { className: "claim-id" }, s.claim_id || "—"),
            e("span", { style: { fontSize: 12, color: "var(--muted)" } }, s.suppress_reason || "—")
          )),
          suppressed.length > 12 && e("div", { style: { fontSize: 11, marginTop: 4, color: "var(--muted)" } },
            "… and " + (suppressed.length - 12) + " more")
        )
      ),

      // Reasoning sections (collapsed)
      reasonSecs && e("details", { style: { marginTop: 4 } },
        e("summary", null, "Reasoning sections"),
        e("div", { style: { marginTop: 6 } },
          reasonSecs._full
            ? e("pre", { style: { whiteSpace: "pre-wrap", fontSize: 11, fontFamily: "var(--mono)",
                                  color: "var(--body)", padding: 8, background: "var(--surface-soft)",
                                  borderRadius: 6 } }, reasonSecs._full)
            : ["VISUAL ANALYSIS","TEXT ANALYSIS","PRECEDENT TRIAGE","ATOM TAGGING","CLAIM SIMULATION","VERDICT"]
                .map(k => reasonSecs[k] && e("details", { key: k, open: k === "VERDICT" || k === "ATOM TAGGING" },
                  e("summary", null, "[" + k + "]"),
                  e("pre", { style: { whiteSpace: "pre-wrap", fontSize: 11, marginTop: 4, fontFamily: "var(--mono)",
                                      color: "var(--body)", padding: 8, background: "var(--surface-soft)",
                                      borderRadius: 6 } }, reasonSecs[k])
                ))
        )
      ),

      // Raw JSON (collapsed)
      e("details", { style: { marginTop: 4 } },
        e("summary", null, "Raw verdict JSON"),
        e("pre", { style: { fontSize: 10, fontFamily: "var(--mono)", color: "var(--body)",
                            padding: 8, background: "var(--surface-soft)", borderRadius: 6,
                            whiteSpace: "pre-wrap" } },
          JSON.stringify(parsed, null, 2))
      )
    )
  );
}

// ---- AtomTagger: top-level pane --------------------------------------------
function AtomTagger(props) {
  const { corpus, tags, setTags, verdictData, pendingRid, setPendingRid, onVerdictParsed, onVerdictCleared } = props;
  const [caseFilter, setCaseFilter] = React.useState("");
  const [titleFilter, setTitleFilter] = React.useState("");
  const [issueFilter, setIssueFilter] = React.useState("");

  // Derive which atoms came from the skill verdict vs reviewer manual adds
  const skillProposed = React.useMemo(() => {
    if (!verdictData || !verdictData.proposed_atom_tags) return {};
    return verdictData.proposed_atom_tags;
  }, [verdictData]);
  const skillRejected = React.useMemo(() => {
    if (!verdictData || !verdictData.rejected_draft_atoms) return [];
    return verdictData.rejected_draft_atoms;
  }, [verdictData]);

  // Distinct policy_titles for the filter <select>, sorted
  const titleOptions = React.useMemo(() => {
    const s = new Set();
    for (const p of corpus.pending) {
      if (p.policy_title) s.add(p.policy_title);
    }
    return Array.from(s).sort();
  }, [corpus.pending]);

  // Distinct issues for the filter <select>, sorted
  const issueOptions = React.useMemo(() => {
    const s = new Set();
    for (const p of corpus.pending) {
      if (p.issue) s.add(p.issue);
    }
    return Array.from(s).sort();
  }, [corpus.pending]);

  // Filtered pending list — text search across video_id / visual_summary / policy_title,
  // plus optional policy_title and issue equality narrowing.
  const filteredPending = React.useMemo(() => {
    const q = caseFilter.trim().toLowerCase();
    return corpus.pending.filter(p => {
      if (titleFilter && (p.policy_title || "") !== titleFilter) return false;
      if (issueFilter && (p.issue || "") !== issueFilter) return false;
      if (!q) return true;
      return (
        (p.source_video_id || "").toLowerCase().includes(q) ||
        (p.visual_summary || "").toLowerCase().includes(q) ||
        (p.caption_text   || "").toLowerCase().includes(q) ||
        (p.policy_title   || "").toLowerCase().includes(q) ||
        (p.issue          || "").toLowerCase().includes(q)
      );
    });
  }, [corpus.pending, caseFilter, titleFilter, issueFilter]);

  const pendingCase = corpus.pending.find(p => p.record_id === pendingRid) || null;

  // If the currently selected case is filtered out, clear the selection.
  React.useEffect(() => {
    if (pendingRid && !filteredPending.find(p => p.record_id === pendingRid)) {
      setPendingRid("");
    }
  }, [filteredPending, pendingRid]);

  const setDim = (dim) => (next) => setTags(prev => Object.assign({}, prev, { [dim]: next }));
  const totalSelected = DIMENSIONS.reduce((s,d) => s + (tags[d]||[]).length, 0);

  // Phase 3: live engine evaluation. Memoized on (tags, policy_title, claims).
  const engineResult = React.useMemo(() => {
    if (!pendingCase || totalSelected === 0) return null;
    return window.AtomEngine.evaluate(tags, corpus.claims, {
      policy_title: pendingCase.policy_title || undefined
    });
  }, [tags, pendingCase, corpus.claims, totalSelected]);

  // Phase 4: hybrid retriever. Runs when a case is picked; uses pendingCase text +
  // current atom selection to find similar precedents in corpus.cases.
  const precedentsResult = React.useMemo(() => {
    if (!pendingCase) return null;
    const candidate = {
      policy_title: pendingCase.policy_title,
      issue:        pendingCase.issue,
      atoms: tags,
      visual_summary: pendingCase.visual_summary,
      asr_text:       pendingCase.asr_text,
      ocr_text:       pendingCase.ocr_text,
      caption_text:   pendingCase.caption_text
    };
    return window.AtomRetriever.retrieve(candidate, corpus.cases, { topPerChannel: 4, totalK: 8 });
  }, [tags, pendingCase, corpus.cases]);

  // Suggested atoms per dim = union of atoms from top-5 precedents.
  // Drives DimRow's default candidate pool. Re-computes with the precedent set.
  const suggestedByDim = React.useMemo(() => {
    const out = { C:[], S:[], P:[], R:[], E:[], M:[], X:[] };
    const seen = { C:new Set(), S:new Set(), P:new Set(), R:new Set(), E:new Set(), M:new Set(), X:new Set() };
    if (!precedentsResult || !precedentsResult.results) return out;
    for (const p of precedentsResult.results) {
      const pa = p.atoms || {};
      for (const d of DIMENSIONS) {
        const arr = pa[d] || [];
        for (const k of arr) {
          if (!seen[d].has(k)) { seen[d].add(k); out[d].push(k); }
        }
      }
    }
    return out;
  }, [precedentsResult]);

  // Phase 5: payload v0.5 emit. Memoized on (pendingCase, tags, engineResult,
  // precedentsResult, corpus). Returns null when no case picked.
  const payload = React.useMemo(() => {
    if (!pendingCase) return null;
    return buildPayload(pendingCase, tags, engineResult, precedentsResult, corpus);
  }, [pendingCase, tags, engineResult, precedentsResult, corpus]);

  return e("div", null,
    e("div", { className: "tag-card" },
      // Filter row: text search + policy_title narrowing
      e("div", { className: "row", style: { gap: 8, flexWrap: "wrap" }},
        e("label", { style: { color: "var(--muted)", fontSize: 12, minWidth: 90 }}, "Filter cases"),
        e("input", {
          className: "filter",
          style: { flex: "1 1 220px", minWidth: 180 },
          value: caseFilter,
          placeholder: "search video_id / visual_summary / caption / title…",
          onChange: ev => setCaseFilter(ev.target.value)
        }),
        e("select", {
          className: "case-picker",
          style: { flex: "0 1 180px", minWidth: 140 },
          value: titleFilter,
          onChange: ev => setTitleFilter(ev.target.value)
        },
          e("option", { value: "" }, "all titles (" + titleOptions.length + ")"),
          ...titleOptions.map(t => e("option", { key: t, value: t }, t))
        ),
        e("select", {
          className: "case-picker",
          style: { flex: "0 1 180px", minWidth: 140 },
          value: issueFilter,
          onChange: ev => setIssueFilter(ev.target.value)
        },
          e("option", { value: "" }, "all issues (" + issueOptions.length + ")"),
          ...issueOptions.map(t => e("option", { key: t, value: t }, t))
        ),
        (caseFilter || titleFilter || issueFilter) && e("button", {
          className: "ghost",
          onClick: () => { setCaseFilter(""); setTitleFilter(""); setIssueFilter(""); },
          style: { fontSize: 11 }
        }, "clear")
      ),
      e("div", { className: "row" },
        e("label", { style: { color: "var(--muted)", fontSize: 12, minWidth: 90 }}, "Pending case"),
        e("select", {
          className: "case-picker", value: pendingRid,
          onChange: ev => setPendingRid(ev.target.value)
        },
          e("option", { value: "" },
            "— pick a pending case (" + filteredPending.length +
            " of " + corpus.pending.length + ") —"),
          ...filteredPending.map(p => e("option", { key: p.record_id, value: p.record_id },
            (p.issue || "?") + " · " + (p.policy_title || "(untitled)") + " · " + p.source_video_id +
            (p.visual_summary ? " · " + p.visual_summary.slice(0, 60).replace(/\s+/g," ") : "")
          ))
        )
      ),
      pendingCase && e("dl", { className: "case-meta" },
        e("dt", null, "video_id"),       e("dd", null, pendingCase.source_video_id || "—"),
        e("dt", null, "issue / title"),  e("dd", null, (pendingCase.issue || "—") + " · " + (pendingCase.policy_title || "—")),
        pendingCase.images && pendingCase.images.length > 0 && e("dt", null, "images"),
        pendingCase.images && pendingCase.images.length > 0 && e("dd", null,
          e(ImagesPane, {
            images: pendingCase.images,
            recordId: pendingCase.record_id,
            scope: "pending",
            resolve: corpus.image_meta && corpus.image_meta.resolve,
            label: "Pending images"
          })
        ),
        pendingCase.visual_summary && e("dt", null, "visual_summary"),
        pendingCase.visual_summary && e("dd", null, e("div", { className: "text-block" }, pendingCase.visual_summary)),
        pendingCase.caption_text && e("dt", null, "caption"),
        pendingCase.caption_text && e("dd", null, e("div", { className: "text-block" }, pendingCase.caption_text)),
        pendingCase.asr_text && e("dt", null, "asr"),
        pendingCase.asr_text && e("dd", null, e("div", { className: "text-block" }, pendingCase.asr_text)),
        pendingCase.ocr_text && e("dt", null, "ocr"),
        pendingCase.ocr_text && e("dd", null, e("div", { className: "text-block" }, pendingCase.ocr_text)),
      )
    ),

    pendingCase && payload && e(PayloadPane, {
      payload: payload,
      pendingCase: pendingCase,
      imageMeta: corpus.image_meta
    }),

    pendingCase && payload && e(ReasonedVerdictPane, {
      engineSimulation: payload.engine_simulation,
      atomsByDim: corpus.atomsByDim,
      onVerdictParsed: onVerdictParsed,
      onVerdictCleared: onVerdictCleared
    }),

    pendingCase && e("div", { className: "tag-card" },
      e("div", { className: "row", style: { justifyContent: "space-between" }},
        e("strong", { style: { fontSize: 13 }}, "Atom tags"),
        e("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
          verdictData && verdictData.proposed_atom_tags && e("span", {
            className: "pill", style: { fontSize: 10, background: "var(--primary)", color: "#fff" }
          }, "skill-proposed"),
          !verdictData && e("span", {
            className: "muted", style: { fontSize: 10 }
          }, "manual mode — paste verdict above to pre-fill"),
          e("span", { className: "muted", style: { fontSize: 11 }},
            totalSelected + " atom" + (totalSelected===1?"":"s") + " selected")
        )
      ),
      ...DIMENSIONS.map(d => e(DimRow, {
        key: d,
        dim: d,
        atoms: corpus.atomsByDim[d] || [],
        selected: tags[d] || [],
        suggested: (suggestedByDim && suggestedByDim[d]) || [],
        skillProposed: (skillProposed[d] || []),
        skillRejected: skillRejected.filter(r => (r.dim || "") === d),
        onChange: setDim(d),
      }))
    ),

    pendingCase && e(VerdictPane, { result: engineResult }),

    pendingCase && precedentsResult && e(PrecedentsPane, {
      result: precedentsResult,
      imageMeta: corpus.image_meta
    }),

    pendingCase && e("details", { open: false },
      e("summary", null, "Engine I/O JSON (debug)"),
      e("pre", null, JSON.stringify({
        candidate: {
          id: pendingCase.record_id,
          source_video_id: pendingCase.source_video_id,
          policy_title: pendingCase.policy_title,
          atoms: tags
        },
        engine_result: engineResult,
        precedents: precedentsResult ? {
          pool_size: precedentsResult.pool_size,
          total_scored: precedentsResult.total_scored,
          mix: precedentsResult.mix,
          results: (precedentsResult.results || []).map(r => ({
            case_id: r.case_id, source_video_id: r.source_video_id,
            policy_title: r.policy_title, decision: r.decision,
            score: r.score, bm25_norm: r.bm25_norm, atom: r._atom,
            atom_per_dim: r._atom_per_dim
          }))
        } : null
      }, null, 2))
    ),

    pendingCase && e("details", { open: false },
      e("summary", null, "Claim gate diagnostics (why didn't a claim fire?)"),
      e("div", { className: "muted", style: { fontSize: 11, padding: "4px 0" }},
        "Per-claim per-dim hit/miss against current selection. Useful when verdict is NO_CLAIM_FIRED."),
      e("pre", null, (function(){
        const out = corpus.claims.map(c => {
          const dimReport = {};
          let any = false;
          ["C","S","P","R","E"].forEach(d => {
            const need = (c.gates && c.gates[d]) || [];
            const got  = tags[d] || [];
            if (!need.length) { dimReport[d] = "wildcard"; return; }
            const hit = need.filter(k => got.indexOf(k) >= 0);
            const miss = need.filter(k => got.indexOf(k) < 0);
            dimReport[d] = (hit.length ? "HIT[" + hit.join(",") + "]" : "MISS")
                         + (miss.length ? " need=[" + miss.join(",") + "]" : "");
            if (!hit.length) any = true;
          });
          return {
            claim_id: c.claim_id,
            policy_titles: c.policy_titles,
            outcome: c.outcome,
            gate_status: any ? "BLOCKED" : "WOULD_FIRE",
            dims: dimReport
          };
        });
        // Sort: WOULD_FIRE first, then partial hits, then full miss
        out.sort((a,b) => (a.gate_status === "WOULD_FIRE" ? -1 : 1));
        return JSON.stringify(out.slice(0, 25), null, 2);
      })())
    ),

    pendingCase && e("details", { open: false },
      e("summary", null, "Selected atom_keys (raw, what the engine sees)"),
      e("pre", null, JSON.stringify(tags, null, 2))
    ),

    !pendingCase && e("div", { className: "muted", style: { padding: 20, textAlign: "center" }},
      "Pick a pending case above to begin tagging.")
  );
}

// ---- Loader pane (Phase 1 verification view) -------------------------------
function LoaderPane(props) {
  const { corpus } = props;
  if (!corpus) return null;
  const dimCounts = Object.keys(corpus.atomsByDim).map(d => ({ d, n: corpus.atomsByDim[d].length }));
  const outcomeCounts = {};
  for (const cl of corpus.claims) outcomeCounts[cl.outcome] = (outcomeCounts[cl.outcome]||0) + 1;

  // Export the full per-policy-area atom rule book (catalog + claims) as a
  // single .json file. Used to bake the constant rule book into the skill body
  // so it does not need to be re-shipped on every payload.
  const exportRuleBook = (policyArea) => {
    const issueClaims = corpus.claims.filter(c =>
      matchesPolicyArea(c.issue, policyArea));
    const referenced = new Set();
    for (const c of issueClaims) {
      atomKeysReferencedByClaim(c).forEach(k => k && referenced.add(String(k).trim()));
    }
    const atomByKey = {};
    for (const a of corpus.atoms) {
      const k = String(a.atom_key || "").trim();
      if (k) atomByKey[k] = a;
    }
    const catalog = { C: [], S: [], P: [], R: [], E: [], M: [], X: [] };
    for (const k of referenced) {
      const a = atomByKey[k];
      if (!a) continue;
      const d = (a.dimension || "X").toString().trim().toUpperCase().charAt(0);
      if (!catalog[d]) catalog[d] = [];
      catalog[d].push({
        atom_key: a.atom_key, atom_name: a.atom_name, dimension: a.dimension,
        serial_code: a.serial_code, description: a.description, audit_rule: a.audit_rule
      });
    }
    for (const d of Object.keys(catalog)) {
      catalog[d].sort((x, y) => String(x.serial_code || "").localeCompare(String(y.serial_code || "")));
    }
    const claimsOut = issueClaims.map(c => {
      const o = { claim_id: c.claim_id, outcome: c.outcome, gates: c.gates || {} };
      if (c.policy_titles && c.policy_titles.length) o.policy_titles = c.policy_titles;
      if (c.modifiers_required && c.modifiers_required.length) o.modifiers_required = c.modifiers_required;
      if (c.modifiers_excluded && c.modifiers_excluded.length) o.modifiers_excluded = c.modifiers_excluded;
      if (c.modifiers_lift_to_approve && c.modifiers_lift_to_approve.length) o.modifiers_lift_to_approve = c.modifiers_lift_to_approve;
      if (c.modifiers_lift_dnf && c.modifiers_lift_dnf.length) o.modifiers_lift_dnf = c.modifiers_lift_dnf;
      if (c.exceptions_required && c.exceptions_required.length) o.exceptions_required = c.exceptions_required;
      if (c.exceptions_lift_to_approve) o.exceptions_lift_to_approve = true;
      if (c.exception_qualifiers && Object.keys(c.exception_qualifiers).length) o.exception_qualifiers = c.exception_qualifiers;
      if (c.exception_qualifier_modifiers && Object.keys(c.exception_qualifier_modifiers).length) o.exception_qualifier_modifiers = c.exception_qualifier_modifiers;
      if (c.requires_exception_context) o.requires_exception_context = true;
      if (c.routing && (c.routing.non_realistic_routes_to || c.routing.cross_title_redirect)) o.routing = c.routing;
      if (c.notes) o.notes = c.notes;
      return o;
    });
    const totalAtoms = ["C","S","P","R","E","M","X"].reduce((s,d)=>s+catalog[d].length,0);
    const book = {
      schema: "atom-rule-book",
      version: "v1.0",
      policy_area: policyArea,
      generated_at: new Date().toISOString(),
      generator: PLUGIN_VERSION,
      dimensions: {
        C: { name: "Content",      weight: 1.0, role: "primary gate" },
        S: { name: "Subject",      weight: 1.0, role: "primary gate" },
        P: { name: "Portrayal",    weight: 1.0, role: "primary gate" },
        R: { name: "Realism",      weight: 0.7, role: "secondary gate; affects routing" },
        E: { name: "Explicitness", weight: 0.7, role: "secondary gate" },
        M: { name: "Modifier",     weight: 0.5, role: "lift / suppress claim outcome" },
        X: { name: "Exception",    weight: 0.5, role: "lift / context-required" }
      },
      semantics: {
        gate_logic: "AND across dimensions (C,S,P,R,E); OR within each dimension. Empty dimension = wildcard.",
        verdict_priority: ["VIOLATION","NOT_RECOMMEND","NOT_FOR_FEED","APPROVE","NO_CLAIM_FIRED"],
        lift_logic: "modifiers_lift_to_approve atoms tagged → outcome upgraded to APPROVE. " +
                    "modifiers_lift_dnf atoms apply per-claim partial lifts. " +
                    "exceptions_required atoms must all be tagged when requires_exception_context=true.",
        routing_logic: "non_realistic_routes_to: when realism atoms imply non-realistic content, " +
                       "re-route to a different claim chain. cross_title_redirect: rebind verdict to a different policy_title."
      },
      atoms_catalog: catalog,
      atoms_total: totalAtoms,
      atoms_per_dim: ["C","S","P","R","E","M","X"].reduce((m,d)=>{m[d]=catalog[d].length;return m;}, {}),
      claims: claimsOut,
      claims_total: claimsOut.length
    };
    const json = JSON.stringify(book, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "atom-rule-book-" + policyArea + "-v1.0.json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    try { console.info("[AtomConsole] exported rule book:",
      policyArea, "atoms=" + totalAtoms, "claims=" + claimsOut.length,
      "size=" + (json.length / 1024).toFixed(1) + " KB"); } catch(_) {}
  };

  return e("div", null,
    e("div", { className: "stat-grid" },
      e(StatCard, { n: corpus.atoms.length, label: "ATLAS atoms" }),
      e(StatCard, { n: corpus.claims.length, label: "Active claims" }),
      e(StatCard, { n: corpus.cases.length, label: "Precedents" }),
      e(StatCard, { n: corpus.pending.length, label: "Pending cases" })
    ),
    e("details", null,
      e("summary", null, "Atom counts by dimension"),
      e("div", { className: "stat-grid" },
        ...dimCounts.map(({d, n}) => e(StatCard, { key: d, n: n, label: "dim " + d })))
    ),
    e("details", null,
      e("summary", null, "Claim outcome distribution"),
      e("div", { className: "stat-grid" },
        ...Object.keys(outcomeCounts).map(o =>
          e(StatCard, { key: o, n: outcomeCounts[o], label: o })))
    ),
    e("details", null,
      e("summary", null, "Admin: Export atom rule book (bakes into specialist skill)"),
      e("div", { className: "muted", style: { fontSize: 11, padding: "4px 0" }},
        "Run once after taxonomy/claim changes. Downloads the full per-policy-area atom catalog + claim list as JSON. ",
        "The constant rule book lives inside the specialist skill — payloads only ship the case-specific slice."),
      e("div", { style: { display: "flex", gap: 6, flexWrap: "wrap", padding: "4px 0" }},
        ...["NSA","HHB","HRA","SGC","VBDA"].map(pa =>
          e("button", { key: pa, className: "copy-btn secondary",
            onClick: () => exportRuleBook(pa),
            title: "Download " + pa + " atom rule book as .json" },
            "Export " + pa)))
    )
  );
}

// ---- App shell -------------------------------------------------------------
function App() {
  const [state, setState] = React.useState({ phase: "idle", err: null, corpus: null });
  const [tab, setTab] = React.useState("tagger");

  // Lifted state: tags + case selection + verdict overlay
  const [pendingRid, setPendingRid] = React.useState("");
  const [tags, setTags] = React.useState({ C:[], S:[], P:[], R:[], E:[], M:[], X:[] });
  const [verdictData, setVerdictData] = React.useState(null);

  // Reset tags + verdict when case changes
  React.useEffect(() => {
    setTags({ C:[], S:[], P:[], R:[], E:[], M:[], X:[] });
    setVerdictData(null);
  }, [pendingRid]);

  // Callback: skill verdict parsed → pre-fill tags
  const onVerdictParsed = React.useCallback((v) => {
    setVerdictData(v);
    if (v && v.proposed_atom_tags) {
      const next = { C:[], S:[], P:[], R:[], E:[], M:[], X:[] };
      for (const d of Object.keys(v.proposed_atom_tags)) {
        if (next[d] !== undefined) {
          next[d] = [...(v.proposed_atom_tags[d] || [])];
        }
      }
      setTags(next);
    }
  }, []);

  const onVerdictCleared = React.useCallback(() => {
    setVerdictData(null);
    // Don’t clear tags — reviewer may have further edited them
  }, []);

  const load = React.useCallback(async () => {
    setState({ phase: "loading", err: null, corpus: null });
    try {
      const corpus = await window.__loadAtomCorpus();
      setState({ phase: "loaded", err: null, corpus });
    } catch (err) {
      console.error("[AtomConsole] load failed:", err);
      setState({ phase: "error", err: String(err && err.message || err), corpus: null });
    }
  }, []);

  React.useEffect(() => { load(); }, [load]);
  const c = state.corpus;

  return e("div", { className: "shell" },
    e("h1", null, "Atom Console"),
    e("div", { className: "sub" },
      e("span", { className: "pill" }, PLUGIN_VERSION),
      e("span", null, "skill-first — paste verdict to pre-fill atoms")
    ),
    e("div", { className: "row", style: { gap: 0, borderBottom: "1px solid var(--hairline)" }},
      e("button", { className: "tab " + (tab==="tagger"?"active":""), onClick: () => setTab("tagger") }, "Review"),
      e("button", { className: "tab " + (tab==="loader"?"active":""), onClick: () => setTab("loader") }, "Loader stats"),
      e("div", { style: { flex: 1 }}),
      e("button", { className: "ghost", onClick: load, disabled: state.phase === "loading" },
        state.phase === "loading" ? "Loading…" : "↻ reload")
    ),
    state.phase === "error" && e("div", { className: "err" },
      e("strong", null, "Load error: "), state.err),
    state.phase === "loading" && e("div", { className: "muted", style: { padding: 20 }}, "Loading corpus…"),
    state.phase === "loaded" && tab === "tagger" && c && e(AtomTagger, {
      corpus: c, tags, setTags, verdictData, pendingRid, setPendingRid,
      onVerdictParsed, onVerdictCleared
    }),
    state.phase === "loaded" && tab === "loader" && c && e(LoaderPane, { corpus: c }),

    e("div", { className: "sub", style: { marginTop: 24 }},
      "Phase 7 — skill-first workflow. ",
      "Flow: 1) Pick case · 2) Send payload to Mira · 3) Paste verdict → atoms pre-fill · 4) Confirm/adjust. ",
      "Mira has no public skill-invoke API for plugins, so the human still rides the bus — but atoms pre-fill from the skill's proposal. ",
      "Next: write-back to Bitable · offline QA harness.")
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(e(App));
</script>
