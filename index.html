  if (slrSample.length) {
    console.info('[AtomConsole] DuplexLink verification — SLR claims gates:', slrSample.map(c => ({ id: c.claim_id, gates_C: c.gates.C })));
  }
  // Also log raw cell value of first claim's content_atoms to verify SDK shape
  if (claimRecs.length) {
    const sampleF = claimRecs[0].fields || {};
    const rawCell = readCell(sampleF, claimsIdx, 'content_atoms');
    console.info('[AtomConsole] Raw content_atoms cell value (first claim):', JSON.stringify(rawCell));
  }

  // Helper: read attachments from any of the candidate field names. First non-empty wins.
  const IMAGE_FIELD_CANDIDATES = ["image","images","screenshots","attachments","cover","thumbnail","frames","frame_grid","frame_grids","preview","video_frames","video_thumbnails","keyframes"];
  function getImages(f, idx) {
    for (const nm of IMAGE_FIELD_CANDIDATES) {
      const v = readCell(f, idx, nm);
      if (v == null) continue;
      const arr = cellAttachments(v);
      if (arr.length) return arr;
    }
    return [];
  }

  // Feature-detection: resolve primary ID field (SV="source_video_id", LIVE="object_id")
  const ID_FIELD = pendingIdx.byName["source_video_id"] ? "source_video_id"
                 : (pendingIdx.byName["object_id"] ? "object_id" : "source_video_id");
  const HAS_USER_NICKNAME = !!(pendingIdx.byName["user_nickname"] || casesIdx.byName["user_nickname"]);
  const HAS_USER_BIO = !!(pendingIdx.byName["user_bio"] || casesIdx.byName["user_bio"]);

  const cases = caseRecs.map(r => {
    const f = r.fields || {};
    return {
      record_id: r.recordId || r.record_id,
      case_id: get(f, casesIdx, "case_id"),
      source_video_id: get(f, casesIdx, ID_FIELD) || get(f, casesIdx, "source_video_id") || get(f, casesIdx, "object_id"),
      issue: get(f, casesIdx, "issue") || get(f, casesIdx, "policy_area"),
      policy_title: get(f, casesIdx, "policy_title"),
      decision: get(f, casesIdx, "decision"),
      visual_summary: get(f, casesIdx, "visual_summary"),
      asr_text: get(f, casesIdx, "asr_text"),
      ocr_text: get(f, casesIdx, "ocr_text"),
      caption_text: get(f, casesIdx, "caption_text"),
      rationale: get(f, casesIdx, "rationale"),
      user_nickname: HAS_USER_NICKNAME ? get(f, casesIdx, "user_nickname") : null,
      user_bio: HAS_USER_BIO ? get(f, casesIdx, "user_bio") : null,
      images: getImages(f, casesIdx),
      atoms: {
        C: ridsToKeys(getLnk(f, casesIdx, "content_atoms")),
        S: ridsToKeys(getLnk(f, casesIdx, "subject_atoms")),
        P: ridsToKeys(getLnk(f, casesIdx, "portrayal_atoms")),
        R: ridsToKeys(getLnk(f, casesIdx, "realism_atoms")),
        E: ridsToKeys(getLnk(f, casesIdx, "explicitness_atoms")),
        M: ridsToKeys(getLnk(f, casesIdx, "modifier_atoms")),
        X: ridsToKeys(getLnk(f, casesIdx, "exception_atoms")),
      },
      reference_weight: get(f, casesIdx, "reference_weight"),
    };
  }).filter(c => {
    const w = (c.reference_weight || "").toLowerCase();
    return w !== "incomplete" && w !== "outdated";
  });

  const pending = pendingRecs.map(r => {
    const f = r.fields || {};
    return {
      record_id: r.recordId || r.record_id,
      source_video_id: get(f, pendingIdx, ID_FIELD) || get(f, pendingIdx, "source_video_id") || get(f, pendingIdx, "object_id"),
      issue: get(f, pendingIdx, "issue"),
      policy_title: get(f, pendingIdx, "policy_title"),
      visual_summary: get(f, pendingIdx, "visual_summary"),
      asr_text: get(f, pendingIdx, "asr_text"),
      ocr_text: get(f, pendingIdx, "ocr_text"),
      caption_text: get(f, pendingIdx, "caption_text"),
      user_nickname: HAS_USER_NICKNAME ? get(f, pendingIdx, "user_nickname") : null,
      user_bio: HAS_USER_BIO ? get(f, pendingIdx, "user_bio") : null,
      images: getImages(f, pendingIdx),
      pending_table_id: pendingTbl ? (pendingTbl.id || pendingTbl.tableId || null) : null,
      atoms: { C:[], S:[], P:[], R:[], E:[], M:[], X:[] },
      apv_draft_atoms: safeParseAtoms(get(f, pendingIdx, "apv_draft_atoms")),
    };
  }).filter(p => p.source_video_id);

  const atomsByDim = { C:[], S:[], P:[], R:[], E:[], M:[], X:[] };
  for (const a of atoms) {
    const d = (a.dimension || "").charAt(0).toUpperCase();
    if (atomsByDim[d]) atomsByDim[d].push(a);
  }
  for (const d of Object.keys(atomsByDim)) {
    atomsByDim[d].sort((a,b) => (a.atom_key||"").localeCompare(b.atom_key||""));
  }

  // Resolve attachment field ids (Bitable getAttachmentUrl needs fieldId+tableId+recordId+token).
  function findFieldIdInIdx(idx, names) {
    if (!idx || !idx.byName) return null;
    for (const nm of names) {
      if (idx.byName[nm]) return idx.byName[nm];
    }
    // Case-insensitive fallback
    const lower = {};
    for (const k of Object.keys(idx.byName)) lower[k.toLowerCase()] = idx.byName[k];
    for (const nm of names) {
      if (lower[nm.toLowerCase()]) return lower[nm.toLowerCase()];
    }
    return null;
  }
  const caseImgFieldId    = findFieldIdInIdx(casesIdx,   IMAGE_FIELD_CANDIDATES);
  const pendingImgFieldId = findFieldIdInIdx(pendingIdx, IMAGE_FIELD_CANDIDATES);
  const caseTableId    = casesTbl   ? (casesTbl.id   || casesTbl.tableId   || null) : null;
  const pendingTableId = pendingTbl ? (pendingTbl.id || pendingTbl.tableId || null) : null;

  // Field-level URL resolver: mirrors the working Case Review Console pattern.
  // The SDK exposes attachment URL resolution as field-level methods (NOT base.getAttachmentUrl).
  // Strategy:
  //   1. table.getFieldById(fieldId) → Field
  //   2. Try field.getAttachmentUrls(recordId)  → fresh signed URLs (preferred)
  //   3. Try field.getTmpUrls([tokens])        → temp URLs, by token
  //   4. Fall back to embedded url/tmp_url/tmpUrl on the cell value (may be expired)
  // Returns array of URL strings aligned to the input `images` array (same length, "" on failure).
  // Concurrency limiter for attachment URL resolution — prevents SDK overload
  // when many ImagesPane components mount simultaneously (e.g. 1 pending + 8 precedents).
  // - Background thumbnail loads go through the queue (max 3 in flight).
  // - User-initiated actions (Copy keyframes, etc.) use { priority: true } to bypass
  //   the queue entirely, so the user is never blocked behind background work.
  // - A 20s defensive watchdog releases the slot if fn() never settles.
  var _resolveQueue = [];
  var _resolveActive = 0;
  var _RESOLVE_MAX_CONCURRENT = 8;

  function _resolveNext() {
    while (_resolveActive < _RESOLVE_MAX_CONCURRENT && _resolveQueue.length > 0) {
      const { fn, resolve, reject } = _resolveQueue.shift();
      _resolveActive++;
      var released = false;
      var release = function () {
        if (released) return;
        released = true;
        _resolveActive--;
        _resolveNext();
      };
      // Defensive watchdog — release slot if fn() never settles (e.g. SDK hangs).
      var watchdog = setTimeout(function () {
        try { reject(new Error("queue-watchdog timeout (20s)")); } catch (e) {}
        release();
      }, 20000);
      try {
        var p = fn();
        if (p && typeof p.then === "function") {
          p.then(function (v) { clearTimeout(watchdog); resolve(v); release(); },
                 function (err) { clearTimeout(watchdog); reject(err); release(); });
        } else {
          clearTimeout(watchdog); resolve(p); release();
        }
      } catch (err) {
        clearTimeout(watchdog); reject(err); release();
      }
    }
  }

  function _enqueueResolve(fn, opts) {
    // opts.priority === true → run immediately, bypass queue entirely.
    if (opts && opts.priority) {
      try {
        var p = fn();
        return (p && typeof p.then === "function") ? p : Promise.resolve(p);
      } catch (err) { return Promise.reject(err); }
    }
    return new Promise(function (resolve, reject) {
      _resolveQueue.push({ fn: fn, resolve: resolve, reject: reject });
      _resolveNext();
    });
  }

  async function _doResolveAttachmentUrls(scope, recordId, images) {
    if (!images || !images.length) return [];
    const tbl     = scope === "case" ? casesTbl   : pendingTbl;
    const fieldId = scope === "case" ? caseImgFieldId : pendingImgFieldId;
    const tableId = scope === "case" ? caseTableId    : pendingTableId;
    const tokens  = images.map(img => img && img.token).filter(Boolean);
    const out     = images.map(() => "");
    const diag    = { scope: scope, recordId: recordId, n: images.length, paths: [] };

    const fillFromEmbedded = () => {
      let n = 0;
      for (let i = 0; i < images.length; i++) {
        if (out[i]) continue;
        const im = images[i] || {};
        const u = im.url || im.tmp_url || im.tmpUrl || "";
        if (/^https?:\/\//i.test(u)) { out[i] = u; n++; }
      }
      if (n) diag.paths.push("embedded:" + n);
    };

    if (!tbl || !fieldId || !recordId) {
      diag.paths.push("no-tbl-or-recordId");
      fillFromEmbedded();
      console.warn("[AtomConsole] resolveAttachmentUrls fast-path:", diag, "out=", out.filter(Boolean).length);
      return out;
    }

    let field = null;
    try { field = await tbl.getFieldById(fieldId); } catch (e) { diag.paths.push("getFieldById-err"); field = null; }

    // Path A: field.getAttachmentUrls(recordId) — Block SDK 2024+
    if (field && typeof field.getAttachmentUrls === "function") {
      try {
        const arr = await Promise.race([
          field.getAttachmentUrls(recordId),
          new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 6000))
        ]);
        if (Array.isArray(arr)) {
          let n = 0;
          for (let i = 0; i < images.length && i < arr.length; i++) {
            const v = arr[i];
            const u = (typeof v === "string") ? v : (v && (v.url || v.tmpUrl || v.tmp_url) || "");
            if (u && !out[i]) { out[i] = u; n++; }
          }
          diag.paths.push("A.getAttachmentUrls:" + n + "/" + arr.length);
        } else {
          diag.paths.push("A.getAttachmentUrls:not-array");
        }
      } catch (e) { diag.paths.push("A.err:" + (e && e.message || e)); }
    } else {
      diag.paths.push("A.no-fn");
    }

    // Path B: field.getTmpUrls([tokens]) — older Block SDK
    if (out.some(u => !u) && field && typeof field.getTmpUrls === "function" && tokens.length) {
      try {
        const arr = await Promise.race([
          field.getTmpUrls(tokens),
          new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 6000))
        ]);
        if (Array.isArray(arr)) {
          let j = 0, n = 0;
          for (let i = 0; i < images.length; i++) {
            if (out[i]) continue;
            const v = arr[j++];
            const u = (typeof v === "string") ? v : (v && (v.tmpUrl || v.url || v.tmp_url) || "");
            if (u) { out[i] = u; n++; }
          }
          diag.paths.push("B.getTmpUrls:" + n);
        } else { diag.paths.push("B.getTmpUrls:not-array"); }
      } catch (e) { diag.paths.push("B.err:" + (e && e.message || e)); }
    } else if (out.some(u => !u)) {
      diag.paths.push("B.no-fn");
    }

    // Path C: base.getAttachmentUrl(token, fieldId, recordId, tableId) — token-by-token.
    // Older base-level API; some SDK builds expose only this.
    if (out.some(u => !u) && base && typeof base.getAttachmentUrl === "function" && tokens.length && tableId) {
      try {
        const tasks = [];
        const _MAX_PATH_C = 12; var _pathC_count = 0;
        for (let i = 0; i < images.length; i++) {
          if (out[i]) { tasks.push(null); continue; }
          const tk = images[i] && images[i].token;
          if (!tk) { tasks.push(null); continue; }
          if (_pathC_count >= _MAX_PATH_C) { tasks.push(null); continue; }
          tasks.push(base.getAttachmentUrl(tk, fieldId, recordId, tableId));
        }
          _pathC_count++;
        const results = await Promise.race([
          Promise.all(tasks.map(t => t || Promise.resolve(null))),
          new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 6000))
        ]);
        let n = 0;
        for (let i = 0; i < results.length; i++) {
          if (out[i]) continue;
          const v = results[i];
          const u = (typeof v === "string") ? v : (v && (v.url || v.tmpUrl || v.tmp_url) || "");
          if (u) { out[i] = u; n++; }
        }
        diag.paths.push("C.base.getAttachmentUrl:" + n);
      } catch (e) { diag.paths.push("C.err:" + (e && e.message || e)); }
    } else if (out.some(u => !u) && !(base && typeof base.getAttachmentUrl === "function")) {
      diag.paths.push("C.no-fn");
    }

    // Path D: re-read the cell via SDK to get fresh embedded urls
    if (out.some(u => !u) && tbl && typeof tbl.getCellValue === "function") {
      try {
        const cv = await Promise.race([
          tbl.getCellValue(fieldId, recordId),
          new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 8000))
        ]);
        const arr = Array.isArray(cv) ? cv : (cv ? [cv] : []);
        let n = 0;
        for (let i = 0; i < images.length && i < arr.length; i++) {
          if (out[i]) continue;
          const a = arr[i] || {};
          const u = a.url || a.tmp_url || a.tmpUrl || "";
          if (/^https?:\/\//i.test(u)) { out[i] = u; n++; }
        }
        diag.paths.push("D.getCellValue:" + n);
      } catch (e) { diag.paths.push("D.err:" + (e && e.message || e)); }
    }

    // Path E: embedded url on cell value (in-memory).
    fillFromEmbedded();

    // Path F: base.batchGetTmpUrl — batch token resolver available in some SDK builds
    if (out.some(u => !u) && tokens.length) {
      const missingTokens = [];
      const missingIdx = [];
      for (let i = 0; i < images.length; i++) {
        if (out[i]) continue;
        const tk = images[i] && images[i].token;
        if (tk) { missingTokens.push(tk); missingIdx.push(i); }
      }
      if (missingTokens.length) {
        let resolved_f = false;
        // Try base.batchGetTmpUrl
        if (base && typeof base.batchGetTmpUrl === "function") {
          try {
            const map = await Promise.race([
              base.batchGetTmpUrl(missingTokens),
              new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 10000))
            ]);
            let n = 0;
            if (map && typeof map === "object") {
              for (let j = 0; j < missingTokens.length; j++) {
                const u = map[missingTokens[j]] || (map.urls && map.urls[j]) || "";
                if (u && !out[missingIdx[j]]) { out[missingIdx[j]] = u; n++; }
              }
            }
            if (n) { diag.paths.push("F.batchGetTmpUrl:" + n); resolved_f = true; }
            else diag.paths.push("F.batchGetTmpUrl:0");
          } catch (e) { diag.paths.push("F.batch-err:" + (e && e.message || e)); }
        }
        // Try window.bitable bridge if available
        if (!resolved_f && window.bitable && window.bitable.bridge && typeof window.bitable.bridge.call === "function") {
          try {
            const resp = await Promise.race([
              window.bitable.bridge.call("getTemporaryUrls", { file_tokens: missingTokens }),
              new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 10000))
            ]);
            let n = 0;
            if (resp && resp.data && resp.data.tmp_urls) {
              const tmp = resp.data.tmp_urls;
              for (let j = 0; j < missingTokens.length; j++) {
                const u = tmp[missingTokens[j]] || (Array.isArray(tmp) && tmp[j]) || "";
                if (u && !out[missingIdx[j]]) { out[missingIdx[j]] = u; n++; }
              }
            }
            if (n) diag.paths.push("F.bridge:" + n);
            else diag.paths.push("F.bridge:0");
          } catch (e) { diag.paths.push("F.bridge-err:" + (e && e.message || e)); }
        } else if (!resolved_f) {
          diag.paths.push("F.no-bridge");
        }
      }
    }

    const filled = out.filter(Boolean).length;
    if (filled < images.length) {
      console.warn("[AtomConsole] resolveAttachmentUrls partial: scope=" + scope + " rec=" + recordId + " filled=" + filled + "/" + images.length + " paths=[" + diag.paths.join(" | ") + "]");
    } else if (window.__atomConsoleVerbose) {
      console.debug("[AtomConsole] resolveAttachmentUrls ok:", diag);
    }
    return out;
  }

  // Per-(scope,recordId) cache so React re-mounts don't pile up duplicate calls.
  // Cache holds the Promise itself (in-flight or settled), reused for the lifetime of corpus.
  // Hoisted to window so ImagesPane (module-scope) can invalidate it
  window._atomResolveCache = window._atomResolveCache || new Map();
  var _resolveCache = window._atomResolveCache;
  function _cacheKey(scope, recordId) { return (scope || "case") + ":" + (recordId || ""); }

  function resolveAttachmentUrls(scope, recordId, images, opts) {
    var key = _cacheKey(scope, recordId);
    // Priority (user actions): never use cache — always fresh.
    if (opts && opts.priority) {
      return _enqueueResolve(function () { return _doResolveAttachmentUrls(scope, recordId, images); }, opts);
    }
    if (_resolveCache.has(key)) {
      return _resolveCache.get(key);
    }
    var p = _enqueueResolve(function () { return _doResolveAttachmentUrls(scope, recordId, images); }, opts);
    _resolveCache.set(key, p);
    // On failure, evict so a subsequent retry can re-attempt.
    p.catch(function () { _resolveCache.delete(key); });
    return p;
  }

  return {
    atoms, atomsByDim, claims, cases, pending,
    _tables: { casesTbl, pendingTbl },
    _fieldIdx: { casesIdx, pendingIdx, atomsIdx },
    _featureFlags: { ID_FIELD, HAS_USER_NICKNAME, HAS_USER_BIO },
    _atomLookup: { atomByRid, atoms },
    image_meta: {
      case_field_id:    caseImgFieldId,
      pending_field_id: pendingImgFieldId,
      case_table_id:    caseTableId,
      pending_table_id: pendingTableId,
      resolve:          resolveAttachmentUrls
    }
  };
}

window.__loadAtomCorpus = loadAtomCorpus;

// =============================================================================
// WRITE-BACK: Save confirmed record to Precedents table
// =============================================================================
async function saveConfirmedRecord(corpus, pendingCase, tags, opts) {
  try { window.__lastSaveDropped = []; } catch(_) {}
  // opts: { decision, policyTitle, rationale, analyst }
  const tbl = corpus._tables && corpus._tables.casesTbl;
  if (!tbl) throw new Error("Precedents table not loaded — cannot save.");
  const idx = corpus._fieldIdx && corpus._fieldIdx.casesIdx;
  if (!idx || !idx.byName) throw new Error("Precedents field index not available.");

  // Resolve atom_keys → record_ids for link fields
  const atomsByKey = {};
  for (const a of (corpus._atomLookup && corpus._atomLookup.atoms || [])) {
    atomsByKey[a.atom_key] = a.record_id;
  }
  function keysToRids(keys) {
    return (keys || []).map(k => atomsByKey[k]).filter(Boolean);
  }

  // Build fields object using field IDs from the index
  function fid(name) { return idx.byName[name] || null; }
  function ftype(name) {
    const id = fid(name);
    return (id && idx.types) ? idx.types[id] : null;
  }

  // Bitable field type constants
  //   1=Text, 2=Number, 3=SingleSelect, 4=MultiSelect, 5=DateTime,
  //   11=User/Person, 15=Url, 17=Attachment, 18=SingleLink, 21=DuplexLink
  const FT_TEXT = 1, FT_SELECT = 3, FT_MULTI = 4, FT_USER = 11, FT_URL = 15;

  const fields = {};
  function setField(name, val) {
    const id = fid(name);
    if (id && val !== undefined && val !== null && val !== "") fields[id] = val;
  }
  function setTextField(name, val) {
    const id = fid(name);
    if (id && val) fields[id] = [{ type: "text", text: String(val) }];
  }
  function setLinkField(name, rids) {
    const id = fid(name);
    if (id && rids && rids.length) {
      fields[id] = { recordIds: rids, tableId: corpus.image_meta.case_table_id || "" };
    }
  }
  // Type-aware writer: dispatch on the actual Bitable field type.
  // Falls back to rich-text segments for Text and unknown types (legacy shape).
  function setSmartField(name, val) {
    const id = fid(name);
    if (!id || val === undefined || val === null || val === "") return;
    const t = (idx.types && idx.types[id]) || null;
    if (t === FT_USER) {
      // Person/Member field: expects [{id: open_id, type: "user"}]
      const arr = Array.isArray(val) ? val : [val];
      fields[id] = arr.filter(Boolean).map(function(v) {
        if (typeof v === "object" && v.id) return v;
        return { id: String(v), type: "user" };
      });
    } else if (t === FT_SELECT) {
      // SingleSelect on Block SDK: requires { text: "OptionName" } object.
      // (Bare string and bare option-id both silently drop on this SDK
      // version, confirmed via readback in v0.16.5/v0.16.6.)
      const _opts = (idx.selectOptions && idx.selectOptions[id]) || null;
      const _name = String(val);
      const _optId = _opts && (_opts.byName[_name] || _opts.byName[_name.toLowerCase()]);
      if (_optId) {
        fields[id] = { id: _optId, text: _name };
      } else {
        console.warn("[AtomConsole.setSmartField] SingleSelect option not found:",
          name, "value:", _name,
          "available:", _opts ? Object.keys(_opts.byName).filter(function(k){return k===k.toLowerCase()?false:true;}) : "(no options indexed)");
        try { (window.__lastSaveDropped = window.__lastSaveDropped || []).push({ field: name, value: _name, kind: "SingleSelect" }); } catch(_) {}
        fields[id] = { text: _name };  // fall back; SDK may still drop
      }
    } else if (t === FT_MULTI) {
      // MultiSelect on Block SDK: array of { text: "OptionName" } objects.
      const _opts = (idx.selectOptions && idx.selectOptions[id]) || null;
      const _arr = Array.isArray(val) ? val : [val];
      fields[id] = _arr.filter(Boolean).map(function(v) {
        const _vname = (typeof v === "object" && v !== null) ? String(v.text || v.name || v.id || "") : String(v);
        const _vid = _opts && (_opts.byName[_vname] || _opts.byName[_vname.toLowerCase()]);
        if (_vid) return { id: _vid, text: _vname };
        console.warn("[AtomConsole.setSmartField] MultiSelect option not found:", name, "value:", _vname);
        try { (window.__lastSaveDropped = window.__lastSaveDropped || []).push({ field: name, value: _vname, kind: "MultiSelect" }); } catch(_) {}
        return { text: _vname };
      });
    } else if (t === FT_URL) {
      // Url: {link, text}
      fields[id] = { link: String(val), text: String(val) };
    } else {
      // Text / RichText / unknown — legacy shape
      fields[id] = [{ type: "text", text: String(val) }];
    }
  }

  // Core fields — type-aware where Bitable cares (User/Select/Url),
  // legacy rich-text elsewhere.
  // ID_FIELD: write to whichever field exists (source_video_id or object_id)
  const _idField = idx.byName["source_video_id"] ? "source_video_id"
                 : (idx.byName["object_id"] ? "object_id" : "source_video_id");
  // Normalize decision: incoming state is lowercase ("flag","pass"); Bitable
  // option names are uppercase ("FLAG","PASS"). Map known synonyms -> FLAG/PASS.
  function _normDecision(d) {
    if (!d) return "FLAG";
    var s = String(d).trim().toUpperCase();
    if (s === "NOT_RECOMMEND" || s === "NOT_FOR_FEED" || s === "ESCALATE") return "FLAG";
    return s;
  }
  // issue / policy_title can arrive as a comma- or space-joined string from
  // cellText() on a MultiSelect cell. Split into array of option names.
  function _splitMulti(v) {
    if (v == null || v === "") return [];
    if (Array.isArray(v)) return v.map(String).map(function(s){return s.trim();}).filter(Boolean);
    return String(v).split(/[,;]\s*|\s{2,}/).map(function(s){return s.trim();}).filter(Boolean);
  }

  setTextField("case_id", pendingCase.source_video_id || pendingCase.record_id);
  setTextField(_idField, pendingCase.source_video_id);
  setSmartField("issue", _splitMulti(pendingCase.issue));
  // Only write policy_title for non-pass decisions (pass = approve, no policy needed)
  if (opts.decision && opts.decision.toLowerCase() !== "pass") {
    setSmartField("policy_title", _splitMulti(opts.policyTitle || pendingCase.policy_title || ""));
  }
  setSmartField("decision", _normDecision(opts.decision));
  setSmartField("status", "Reviewed");
  setTextField("visual_summary", pendingCase.visual_summary);
  setTextField("asr_text", pendingCase.asr_text);
  setTextField("ocr_text", pendingCase.ocr_text);
  setTextField("caption_text", pendingCase.caption_text);
  setTextField("rationale", opts.rationale || "");
  setSmartField("analyst", opts.analyst || "");
  // LIVE-specific fields (feature-detected, no-op if field absent)
  if (pendingCase.user_nickname) setTextField("user_nickname", pendingCase.user_nickname);
  if (pendingCase.user_bio) setTextField("user_bio", pendingCase.user_bio);
  if (opts.overrideTag) {
    setTextField("override_tag", opts.overrideTag);
  }

  // Copy keyframe attachments from pending case (same base, tokens reusable)
  // v0.16.10: read attachment cell directly from the source row so we
  // preserve the SDK-native File handles. The normalized pendingCase.images
  // path loses those handles and the SDK silently drops the write.
  if (pendingCase.images && pendingCase.images.length) {
    const imgFieldId = fid("images");
    if (imgFieldId && idx.types[imgFieldId] === 17) {
      let sdkAtt = null;
      try {
        const ptbl = corpus && corpus._tables && corpus._tables.pendingTbl;
        const pidx = corpus && corpus._fieldIdx && corpus._fieldIdx.pendingIdx;
        const srcRecId = opts && opts._pendingRecordId;
        if (ptbl && pidx && srcRecId) {
          // Find the source-side images field id (same candidate list).
          const SRC_CANDS = ["image","images","screenshots","attachments","cover","thumbnail","frames","frame_grid","frame_grids","preview","video_frames","video_thumbnails","keyframes"];
          let srcImgFid = null;
          for (const nm of SRC_CANDS) {
            if (pidx.byName && pidx.byName[nm]) { srcImgFid = pidx.byName[nm]; break; }
          }
          if (srcImgFid && ptbl.getCellValue) {
            const raw = await ptbl.getCellValue(srcImgFid, srcRecId);
            if (Array.isArray(raw) && raw.length) {
              sdkAtt = raw;
              console.log("[AtomConsole.save] source-cell re-read OK: " + raw.length + " items from " + srcImgFid + "@" + srcRecId);
            } else {
              console.warn("[AtomConsole.save] source-cell empty/null:", raw);
            }
          } else {
            console.warn("[AtomConsole.save] no srcImgFid or getCellValue; ptbl methods:",
              ptbl ? Object.keys(ptbl).filter(function(k){return typeof ptbl[k]==="function";}) : "no ptbl");
          }
        } else {
          console.warn("[AtomConsole.save] missing ptbl/pidx/srcRecId for source re-read",
            { hasPtbl: !!ptbl, hasPidx: !!pidx, srcRecId: srcRecId });
        }
      } catch (e) {
        console.warn("[AtomConsole.save] source-cell re-read failed:", e);
      }
      if (sdkAtt) {
        fields[imgFieldId] = sdkAtt;
      } else {
        // Fallback to the normalized shape (will likely drop, but keep behavior).
        fields[imgFieldId] = pendingCase.images.map(function(img) {
          return { token: img.token, name: img.name || "", type: img.type || "image/jpeg", size: img.size || 0 };
        });
        console.warn("[AtomConsole.save] using fallback normalized attachment shape — write will likely drop");
      }
    }
  }

  // Atom link fields
  const dimFieldMap = {
    C: "content_atoms", S: "subject_atoms", P: "portrayal_atoms",
    R: "realism_atoms", E: "explicitness_atoms", M: "modifier_atoms",
    X: "exception_atoms"
  };
  // DuplexLink/SingleLink Block SDK shape:
  //   { recordIds: [...], tableId: "<linked_table_id>" }
  // tableId is captured per-field in buildFieldIndex (idx.linkTableIds).
  for (const [dim, fieldName] of Object.entries(dimFieldMap)) {
    const rids = keysToRids(tags[dim] || []);
    const fId = fid(fieldName);
    if (rids.length && fId) {
      const linkedTableId = (idx.linkTableIds && idx.linkTableIds[fId]) || "";
      fields[fId] = { recordIds: rids, tableId: linkedTableId };
    }
  }

  // Create record via SDK
  console.log("[AtomConsole.save] fields payload BEFORE addRecord:", JSON.parse(JSON.stringify(fields)));
  try { window.__lastSavePayload = { fields: JSON.parse(JSON.stringify(fields)) }; } catch(_) {}

  // Warn if policy_title is about to write empty — usually means APPROVE verdict
  // with no final_policy_title AND pending row had no preset title.
  try {
    const _ptId = fid("policy_title");
    if (_ptId && Array.isArray(fields[_ptId]) && fields[_ptId].length === 0) {
      console.warn("[AtomConsole.save] policy_title is empty []. Source: opts.policyTitle=" +
        JSON.stringify(opts && opts.policyTitle) + " pendingCase.policy_title=" +
        JSON.stringify(pendingCase && pendingCase.policy_title) +
        ". Pick a value in the dropdown before Save to populate this column.");
    }
  } catch(_) {}

  const result = await tbl.addRecord({ fields });
  console.log("[AtomConsole.save] addRecord returned:", result);

  // v0.16.14: collect any silent drops from setSmartField for caller to surface.
  var _dropped = [];
  try { _dropped = (window.__lastSaveDropped || []).slice(); } catch(_) {}

  // Mark pending case as "Reviewed"
  if (opts._pendingRecordId && corpus._tables && corpus._tables.pendingTbl) {
    try {
      const ptbl = corpus._tables.pendingTbl;
      const pidx = corpus._fieldIdx && corpus._fieldIdx.pendingIdx;
      if (pidx && pidx.byName) {
        const statusFieldId = pidx.byName["status"] || pidx.byName["Status"] || null;
        if (statusFieldId) {
          // v0.16.13: Block SDK SingleSelect silently accepts a bare string
          // as "no match → clear cell" — same trap we hit on the precedent
          // side. Resolve the option id from pidx.selectOptions and write
          // the canonical {id, text} shape.
          const _opts = (pidx.selectOptions && pidx.selectOptions[statusFieldId]) || null;
          const _optId = _opts && (_opts.byName["Reviewed"] || _opts.byName["reviewed"]);
          let _payload;
          if (_optId) {
            _payload = { id: _optId, text: "Reviewed" };
          } else {
            console.warn("[AtomConsole.save] pending status: 'Reviewed' option not indexed; falling back to {text}",
              _opts ? Object.keys(_opts.byName) : "(no selectOptions)");
            _payload = { text: "Reviewed" };
          }
          try {
            await ptbl.setRecord(opts._pendingRecordId, {
              fields: { [statusFieldId]: _payload }
            });
          } catch (e1) {
            console.warn("[AtomConsole.save] pending status setRecord failed:", e1);
          }
        } else {
          console.warn("[AtomConsole.save] pending table has no status field — skipped");
        }
      }
    } catch(e) {
      console.warn("[AtomConsole] Failed to update pending status:", e);
      // Non-fatal — the precedent was already saved
    }
  }

  // v0.16.14: return enriched object so caller can surface dropped options.
  return { recordId: result, droppedOptions: _dropped };
}
window.__saveConfirmedRecord = saveConfirmedRecord;
</script>

<script>
// =============================================================================
// REACT UI — Phase 2: AtomTagger
// =============================================================================
const e = React.createElement;

function StatCard(props) {
  return e("div", { className: "stat" },
    e("div", { className: "n" }, String(props.n)),
    e("div", { className: "l" }, props.label));
}

// ---- VerdictPane: live engine output ---------------------------------------
function evidencePills(ev) {
  var pills = [];
  ["C","S","P","R","E"].forEach(function (d) {
    if (!ev[d] || !ev[d].length) return;
    ev[d].forEach(function (k) {
      pills.push(e("span", { key: d + ":" + k, className: "ev-pill" }, k));
    });
  });
  return pills;
}

function VerdictPane(props) {
  const { result } = props;
  if (!result) return e("div", { className: "verdict-card" },
    e("div", { style: { display: "flex", alignItems: "center", flexWrap: "wrap", gap: 10 }},
      e("span", { className: "verdict-pill verdict-NO_CLAIM_FIRED" }, "AWAITING ATOMS"),
      e("span", { className: "verdict-meta" },
        "Tag at least one atom to evaluate claims.")
    )
  );
  const { verdict, gate_hits, suppressed, routing, applied_claim_chain, lifts_applied } = result;
  const top = gate_hits[0] || null;
  const rest = gate_hits.slice(1, 5);
  const hasRouting = routing && (routing.non_realistic_routes_to || routing.cross_title_redirect);

  return e("div", { className: "verdict-card" },
    e("div", { style: { display: "flex", alignItems: "center", flexWrap: "wrap", gap: 10 }},
      e("span", { className: "verdict-pill verdict-" + verdict }, verdict),
      e("span", { className: "verdict-meta" },
        gate_hits.length, " gate hit", gate_hits.length===1?"":"s",
        " · ", suppressed.length, " suppressed",
        applied_claim_chain.length ? " · top claim: " + applied_claim_chain[0] : ""
      )
    ),
    hasRouting && e("div", { style: { marginTop: 8 }},
      routing.non_realistic_routes_to && e("span", { className: "routing-pill" },
        "→ non-realistic routes to: ", routing.non_realistic_routes_to),
      routing.cross_title_redirect && e("span", { className: "routing-pill" },
        "→ cross-title redirect: ", routing.cross_title_redirect)
    ),
    lifts_applied.length > 0 && e("div", { style: { marginTop: 8, fontSize: 11 }},
      e("span", { className: "muted" }, "Lift applied on top claim: "),
      lifts_applied.map(function (l) {
        return e("span", { key: l.claim_id, className: "lift-pill" }, l.lift);
      })
    ),

    gate_hits.length > 0 && e("details", { open: true, style: { marginTop: 12 }},
      e("summary", null, "Gate hits (top 5 by severity)"),
      e("div", null,
        ...[top].concat(rest).map(function (h) {
          var finalOutcome = h.outcome_after_lifts;
          var showPolicy = finalOutcome !== "APPROVE" && h.policy_titles && h.policy_titles.length > 0;
          return e("div", { key: h.claim_id, className: "hit-row" },
            e("span", { className: "hit-id" }, h.claim_id),
            e("div", { className: "hit-evidence" },
              ...evidencePills(h.evidence),
              h.lift && e("span", { className: "lift-pill", style: { marginLeft: 4 }}, "lift:" + h.lift),
              showPolicy && e("span", {
                className: "policy-title-pill",
                title: h.policy_titles.join(" / "),

function PrecedentDetailModal(props) {
  const { precedent: r, imageMeta, onClose } = props;

  const atomsByDim = r.atoms || {};

    if (x.indexOf("not_recommend") >= 0 || x.indexOf("dnr") >= 0) return "dnr";
    if (x.indexOf("not_for_feed") >= 0 || x.indexOf("nff") >= 0) return "nff";

        e("div", { style: { flex: 1, minWidth: 0 }},

          e("div", { style: { fontSize: 15, fontWeight: 600, color: "var(--ink)",
                              whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }},
            r.case_id || r.source_video_id || r.record_id || "—"),
          e("div", { className: "prec-pills", style: { marginTop: 6 }},
            r.decision && e("span", { className: "prec-decision " + decisionClass(r.decision) },
              r.decision),
            r.policy_title && e("span", { className: "ev-pill" }, r.policy_title),
            r.issue && r.issue !== r.policy_title && e("span", { className: "ev-pill" }, r.issue))
        ),
        e("button", {
          className: "prec-modal-close",
          onClick: onClose,
          title: "Close (Esc)"
        }, "×")
      ),

      // Body — scrollable
      e("div", { className: "prec-modal-body" },
        // Images — full set
        r.images && r.images.length > 0 && e("div", { className: "prec-modal-section" },
          e("div", { className: "prec-modal-section-label" },
            "Images (" + r.images.length + ")"),
          e(ImagesPane, {
            images: r.images,
            recordId: r.record_id,
            scope: "case",
            resolve: imageMeta && imageMeta.resolve,
            label: "precedent images"
          })),

        // Atoms — by dimension
        totalAtoms > 0 && e("div", { className: "prec-modal-section" },
          e("div", { className: "prec-modal-section-label" },
            "Atoms tagged (" + totalAtoms + ")"),
          e("div", { className: "prec-modal-atom-grid" },
            ...dims.map(d => {
              const keys = atomsByDim[d] || [];
              if (!keys.length) return null;
              return e("div", { key: d, className: "prec-modal-atom-row" },
                e("span", {
                  className: "prec-modal-dim-badge",
                  style: { background: "var(--dim-" + d + ")" }
                }, d),
                e("div", { className: "prec-modal-atom-chips" },
                  ...keys.map(k => e("span", { key: k, className: "ev-pill" }, k))));
            }))),

        // Text fields
        textBlock("Visual summary", r.visual_summary),
        textBlock("ASR (transcript)", r.asr_text),
        textBlock("OCR (on-screen text)", r.ocr_text),
        textBlock("Caption", r.caption_text),
        textBlock("Rationale", r.rationale)
      )
    )
  );
}

// ---- ImagesPane: display attachments for a case -----------------------------
// Bitable attachment urls embedded in field values are short-lived; for reliable
// display we re-resolve via base.getAttachmentUrl(token, recordId, fieldId, tableId).
// Falls back to the embedded url if available.
function ImagesPane(props) {
  const { images: rawImages, recordId, scope, resolve, label, limit } = props;
  // limit > 0: only render & resolve the first N images (list-view optimization)
  const images = (limit && limit > 0 && rawImages && rawImages.length > limit)
    ? rawImages.slice(0, limit)
    : rawImages;
  const hiddenCount = (limit && limit > 0 && rawImages && rawImages.length > limit)
    ? rawImages.length - limit
    : 0;
  // Initialize with embedded urls from the cell value — shows immediately if usable.
  const [zoomSrc, setZoomSrc] = React.useState(null);
  const [resolved, setResolved] = React.useState(function () {
    if (!images || !images.length) return [];
    return images.map(function (im) {
      var u = im && (im.url || im.tmp_url || im.tmpUrl) || "";
      return /^https?:\/\//i.test(u) ? u : "";
    });
  });
  const [done,     setDone]     = React.useState(false);
  const [error,    setError]    = React.useState("");

  React.useEffect(() => {
    let cancelled = false;
    setError("");
    // Re-initialize with embedded urls (don't wipe to []) so images show immediately
    const embeddedInit = images ? images.map(function (im) {
      var u = im && (im.url || im.tmp_url || im.tmpUrl) || "";
      return /^https?:\/\//i.test(u) ? u : "";
    }) : [];
    setResolved(embeddedInit);
    setDone(false);
    if (!images || !images.length) { setDone(true); return; }
    if (typeof resolve !== "function") {
      // No resolver — fall back to embedded urls only.
      const urls = images.map(im => (im && (im.url || im.tmp_url || im.tmpUrl)) || "");
      if (!cancelled) { setResolved(urls); setDone(true); }
      return;
    }
    // Safety timeout: never stay in "loading…" forever — flip done after 18s.
    var safetyTimer = setTimeout(function () {
      if (cancelled) return;
      setError("resolve timeout (18s)");
      setDone(true);
    }, 18000);
    // Invalidate cache for this record before resolving (ensures fresh SDK calls)
    var cacheKey = (scope || "case") + ":" + (recordId || "");
    if (window._atomResolveCache && window._atomResolveCache.has(cacheKey)) window._atomResolveCache.delete(cacheKey);

    var attemptResolve = function (attempt) {
      resolve(scope || "case", recordId, images).then(function (urls) {
        if (cancelled) return;
        var filledCount = 0;
        if (Array.isArray(urls)) {
          setResolved(function (prev) {
            var merged = prev.slice();
            for (var k = 0; k < urls.length; k++) {
              if (urls[k]) { merged[k] = urls[k]; filledCount++; }
            }
            return merged;
          });
        }
        // If zero SDK urls resolved and this is the first attempt, retry after 3s
        // (SDK might not be ready on initial mount)
        if (filledCount === 0 && attempt === 1 && images.length > 0) {
          console.warn("[AtomConsole] ImagesPane: 0 urls on attempt 1 (scope=" + scope + " rec=" + recordId + "), retrying in 3s…");
          // Clear cache so retry goes through SDK again
          if (window._atomResolveCache && window._atomResolveCache.has(cacheKey)) window._atomResolveCache.delete(cacheKey);
          // IMPORTANT: flip done=true immediately so UI doesn't stay "loading..."
          // The retry will update state later if it succeeds.
          clearTimeout(safetyTimer);
          setDone(true);
          setTimeout(function () {
            if (cancelled) return;
            attemptResolve(2);
          }, 3000);
          return;
        }
        clearTimeout(safetyTimer);
        setDone(true);
      }).catch(function (e) {
        if (cancelled) return;
        if (attempt === 1) {
          // Retry once on error too
          setTimeout(function () {
            if (cancelled) return;
            if (window._atomResolveCache && window._atomResolveCache.has(cacheKey)) window._atomResolveCache.delete(cacheKey);
            attemptResolve(2);
          }, 3000);
          return;
        }
        clearTimeout(safetyTimer);
        setError(String(e && e.message || e));
        setDone(true);
      });
    };
    attemptResolve(1);
    return () => { cancelled = true; clearTimeout(safetyTimer); };
  }, [images, recordId, scope, resolve]);

  if (!images || !images.length) {
    return e("div", { className: "muted", style: { fontSize: 11, padding: "4px 0" }},
      (label || "Images") + ": none attached on this record.");
  }

  return e("div", { style: { display: "flex", flexWrap: "wrap", gap: 6, padding: "4px 0" }},
    ...images.map((img, i) => {
      const url = resolved[i] || "";
      const isImg = !img.type || /^image\//i.test(img.type) || /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(img.name || "");
      let body;
      if (url && isImg) {
        body = e("div", {
            style: { cursor: "zoom-in" },
            onClick: (ev) => { ev.stopPropagation(); setZoomSrc(url); }
          },
          e("img", {
            src: url,
            alt: img.name || ("attachment " + (i+1)),
            style: { width: "100%", height: 100, objectFit: "cover", display: "block" },
            onError: (ev) => {
              if (ev && ev.target) ev.target.style.display = "none";
              if (ev && ev.target && ev.target.parentNode) {
                var ph = document.createElement("div");
                ph.textContent = "\u26a0 expired";
                ph.style.cssText = "font-size:10px;color:#a00;padding:6px;text-align:center;";
                ev.target.parentNode.appendChild(ph);
              }
            }
          }));
      } else if (url) {
        body = e("a", { href: url, target: "_blank", rel: "noreferrer",
          style: { display: "block", padding: 6, fontSize: 10, textDecoration: "none" }},
          "📎 " + (img.name || "attachment"));
      } else if (done) {
        body = e("div", {
          style: { padding: 6, fontSize: 10, color: "#a00", lineHeight: 1.3 },
          title: "no signed url returned · token=" + (img.token || "?")
        }, "image unavailable");
      } else {
        body = e("div", { style: { padding: 6, fontSize: 10 }, className: "muted" }, "loading…");
      }
      return e("div", {
        key: (img.token || "noTok") + "_" + i,
        style: { width: 140, border: "1px solid var(--hairline)", borderRadius: 4, overflow: "hidden", background: "#0001" }
      },
        body,
        e("div", { style: { padding: "2px 4px", fontSize: 9, color: "var(--muted)",
          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }},
          img.name || ("attachment " + (i+1)))
      );
    }),
    hiddenCount > 0 && e("div", {
      style: { width: 140, height: 100, border: "1px dashed var(--hairline)",
               borderRadius: 4, display: "flex", alignItems: "center",
               justifyContent: "center", flexDirection: "column",
               background: "var(--surface-soft)", color: "var(--muted)",
               fontSize: 11, lineHeight: 1.3, padding: 4, textAlign: "center" }
    }, e("div", { style: { fontSize: 18, fontWeight: 500, color: "var(--body-strong)" }},
        "+" + hiddenCount),
       e("div", null, "more"),
       e("div", { style: { fontSize: 9, marginTop: 2 }}, "click card →")),
    error && e("div", { className: "muted", style: { fontSize: 10, color: "#c00" }}, "image error: " + error),
    zoomSrc && e(ImageZoomOverlay, { src: zoomSrc, alt: "zoom", onClose: () => setZoomSrc(null) })
  );
}

// ---- DimRow: chip multi-select for one dimension ---------------------------
// Suggestion-first UX:
//   - Default view shows ALL atoms; suggested ones (from top-5 precedents)
//     get a yellow-tint highlight. User can toggle "suggestions only" to
//     narrow down, or start typing to search across all atoms.
//   - Chip label = atom_name (atom_key + serial_code in tooltip).
function DimRow(props) {
  const { dim, atoms, selected, onChange, suggested, skillProposed, skillRejected, relevantKeys } = props;
  const [filter, setFilter] = React.useState("");
  // Default to "show all" so the reviewer always sees the full atom set with
  // suggestions visually highlighted, instead of having to click through to
  // discover non-suggested atoms.
  const [suggestedOnly, setSuggestedOnly] = React.useState(false);
  const f = filter.trim().toLowerCase();
  const sel = new Set(selected || []);
  const sugSet = new Set(suggested || []);
  const hasSuggestions = sugSet.size > 0;
  const skillSet = new Set(skillProposed || []);
  const rejKeys = new Set((skillRejected || []).map(r => r.atom_key));

  // Issue/policy-scoped atom base: when relevantKeys is provided (non-null array),
  // restrict the atom universe to only those referenced by claims for this issue.
  const relSet = relevantKeys ? new Set(relevantKeys) : null;
  const scopedAtoms = relSet ? atoms.filter(a => relSet.has(a.atom_key)) : atoms;

  // Decide candidate pool:
  // 1. If filter text typed -> search ALL scoped atoms
  // 2. Else if "suggestions only" toggled (and we have suggestions) -> filter
  // 3. Else (default) -> show all scoped atoms (suggestions highlighted)
  let pool;
  if (f) {
    pool = scopedAtoms.filter(a =>
      (a.atom_key||"").toLowerCase().includes(f) ||
      (a.serial_code||"").toLowerCase().includes(f) ||
      (a.atom_name||"").toLowerCase().includes(f) ||
      (a.description||"").toLowerCase().includes(f)
    );
  } else if (suggestedOnly && hasSuggestions) {
    pool = scopedAtoms.filter(a => sugSet.has(a.atom_key));
  } else {
    pool = scopedAtoms;
  }

  // Sort pool: suggested atoms first (preserving alpha within each group)
  pool = pool.slice().sort(function(a, b) {
    var aS = sugSet.has(a.atom_key) ? 0 : 1;
    var bS = sugSet.has(b.atom_key) ? 0 : 1;
    if (aS !== bS) return aS - bS;
    return (a.atom_name || a.atom_key).localeCompare(b.atom_name || b.atom_key);
  });

  const toggle = (k) => {
    const next = new Set(sel);
    if (next.has(k)) next.delete(k); else next.add(k);
    onChange(Array.from(next));
  };
  const clear = () => onChange([]);

  const modeLabel = f
    ? "filter: " + pool.length + " match"
    : (suggestedOnly && hasSuggestions)
      ? "suggested " + pool.length + "/" + scopedAtoms.length
      : (hasSuggestions
          ? "all " + scopedAtoms.length + " atoms · " + sugSet.size + " suggested"
          : "all " + scopedAtoms.length + " atoms");

  return e("div", { className: "dim-row dim-" + dim },
    e("div", { className: "dim-label" }, dim),
    e("div", { className: "dim-body" },
      e("div", { className: "dim-head" },
        e("span", { className: "dim-name" },
          DIM_NAMES[dim], e("span", { className: "muted" }, " · " + modeLabel)),
        e("span", { className: "dim-count" },
          (sel.size ? sel.size : "0") + " selected ",
          sel.size > 0 && e("button", { className: "ghost", onClick: clear,
            style: { padding: "2px 6px", fontSize: 10, marginLeft: 4 }}, "clear"),
          hasSuggestions && !f && e("button", {
            className: "ghost",
            onClick: () => setSuggestedOnly(!suggestedOnly),
            style: { padding: "2px 6px", fontSize: 10, marginLeft: 4 }
          }, suggestedOnly ? "show all" : "suggested only"))
      ),
      // Selected chips first (always visible regardless of suggestion filter)
      e("div", { className: "selected-strip" },
        ...Array.from(sel).map(k => {
          const a = atoms.find(x => x.atom_key === k);
          const label = (a && a.atom_name) ? a.atom_name : k;
          const isSkill = skillSet.has(k);
          return e("span", {
            key: k, className: "chip selected" + (isSkill ? " skill-src" : " reviewer-src"),
            title: (isSkill ? "[skill-proposed] " : "[reviewer-added] ") +
              (a ? (a.atom_key + (a.serial_code ? " · " + a.serial_code : "") + " — " + (a.description||"").slice(0,200)) : k),
            onClick: () => toggle(k)
          }, label, isSkill ? " ·s ✕" : " ✕");
        }),
        // Skill-rejected atoms (struck-through, click to override and add)
        ...(skillRejected || []).filter(r => !sel.has(r.atom_key)).map(r => {
          const a = atoms.find(x => x.atom_key === r.atom_key);
          const label = (a && a.atom_name) ? a.atom_name : r.atom_key;
          return e("span", {
            key: "rej-" + r.atom_key,
            className: "chip rejected-by-skill",
            title: "[skill-rejected] " + r.atom_key +
              (a && a.serial_code ? " · " + a.serial_code : "") +
              " — " + (r.reason || "no reason") + " — click to override",
            onClick: () => toggle(r.atom_key)
          }, label, " ✗");
        })
      ),
      // Search input (typing here always searches the full set)
      e("input", {
        className: "filter",
        value: filter,
        placeholder: "search all " + DIM_NAMES[dim].toLowerCase() + " atoms…",
        onChange: ev => setFilter(ev.target.value)
      }),
      // Available chips (excludes selected). Suggested atoms get a subtle highlight.
      e("div", { className: "chips" },
        ...pool.filter(a => !sel.has(a.atom_key) && !rejKeys.has(a.atom_key)).map(a => {
          const isSug = sugSet.has(a.atom_key);
          const isSkillProp = skillSet.has(a.atom_key);
          return e("span", {
            key: a.atom_key,
            className: "chip" + (isSkillProp ? " skill-proposed" : (isSug ? " suggested" : "")),
            title: (isSkillProp ? "[skill-proposed — click to accept] " : "") +
              a.atom_key + (a.serial_code ? " · " + a.serial_code : "") + (a.description ? " — " + a.description.slice(0,200) : ""),
            onClick: () => toggle(a.atom_key)
          }, (a.atom_name || a.atom_key));
        }),
        pool.length === 0 && e("span", { className: "muted", style: { padding: 4, fontSize: 11 }},
          f ? "no atoms match search"
            : (hasSuggestions ? "no suggestions for this dim — type to search or click 'show all'"
                              : "no atoms in this dim"))
      )
    )
  );
}

// ---- Phase 5b: Payload v0.5 emit ------------------------------------------
// Atom-rule-grounded payload for the per-policy precedent-review specialist.
// The specialist needs to: (1) know the NSA atom rule book, (2) read precedents
// (text+images+atoms+decision+rationale), (3) tag the candidate's atoms by
// analogy, (4) run the deterministic claim chain, (5) return verdict.
//
// Schema v0.5 differences from v0.4:
//   - DROP retrieval scores (BM25/atom-jaccard) — they're retrieval-internal
//     noise. The specialist reasons over content + atom analogy, not ranks.
//   - DROP candidate_rule / companion_rules (V0.3 Rule Book artifacts).
//   - ADD atom_rules block: NSA-scoped atoms_catalog + all NSA claims +
//     dimension definitions + scoring semantics.
//   - Each precedent retains: text fields, images, full atom tags by dim,
//     decision, rationale.
//
// `atoms_catalog` is filtered to atom_keys actually referenced by any claim
// for the candidate's issue (NSA-relevant atoms). `claims` is all claims for
// candidate.issue (preserves cross-title routing).
const POLICY_AREA_MAP = {
  HSS:  "HHB",
  BPI:  "HHB",
  NSA:  "NSA",
  HHB:  "HHB",
  HRA:  "HRA",
  SGC:  "SGC",
  VBDA: "VBDA"
};
function resolvePolicyArea(issue) {
  if (!issue) return null;
  const k = String(issue).toUpperCase().trim();
  if (POLICY_AREA_MAP[k]) return POLICY_AREA_MAP[k];
  for (const key in POLICY_AREA_MAP) {
    if (k.indexOf(key) >= 0) return key;
  }
  return null;
}
// Sub-vertical inclusion: HHB claims live as issue=HSS or issue=BPI in the table.
const POLICY_AREA_INCLUDES = { HHB: ["HHB","HSS","BPI"] };
function matchesPolicyArea(claimIssue, policyArea) {
  const ci = String(claimIssue || "").toUpperCase().trim();
  const includes = POLICY_AREA_INCLUDES[policyArea];
  if (includes) return includes.indexOf(ci) >= 0;
  return ci === policyArea;
}

// ---- copyKeyframesComposite: load N images, draw 2-col grid onto a canvas,
// copy the resulting PNG to clipboard via ClipboardItem. Ported from the
// legacy case_review_mvp plugin (V3.1.0) — proven pattern for shipping
// keyframes into a Mira chat as a multimodal attachment.
//
//   • Slices to first 12 keyframes (matches model attention budget).
//   • Loads with crossOrigin=anonymous + referrerPolicy=no-referrer so the
//     Bitable signed urls render to canvas without taint errors.
//   • 2-col grid, 400×300 cells, 4px gap, dark bg, "#N" frame badge top-left.
//   • Returns { ok, mode, count, dataUrl? }
//        mode = "clipboard"  → PNG written via ClipboardItem.
//        mode = "newtab"     → ClipboardItem blocked; opened a tab with the
//                              dataURL so the reviewer can right-click → Copy.
//        mode = "fail"       → no images loaded.
async function copyKeyframesComposite(urls) {
  const out = { ok: false, mode: "fail", count: 0 };
  if (!urls || !urls.length) return out;
  try {
    // Load up to 12, cross-origin so canvas isn't tainted
    const imgs = await Promise.all(urls.slice(0, 12).map(url => new Promise(resolve => {
      const img = new Image();
      img.crossOrigin   = "anonymous";
      img.referrerPolicy = "no-referrer";
      img.onload  = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = url;
    })));
    const loaded = imgs.filter(Boolean);
    if (!loaded.length) {
      console.warn("[AtomConsole] copyKeyframesComposite: no images loaded");
      return out;
    }
    out.count = loaded.length;

    // 2-col grid, fixed cell, dark bg, frame number badge
    const cols = Math.min(2, loaded.length);
    const rows = Math.ceil(loaded.length / cols);
    const cellW = 400, cellH = 300, gap = 4;
    const W = cols * cellW + (cols - 1) * gap;
    const H = rows * cellH + (rows - 1) * gap;

    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#181715";
    ctx.fillRect(0, 0, W, H);

    loaded.forEach((img, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = col * (cellW + gap);
      const y = row * (cellH + gap);
      const scale = Math.min(cellW / img.naturalWidth, cellH / img.naturalHeight);
      const dw = img.naturalWidth * scale;
      const dh = img.naturalHeight * scale;
      ctx.drawImage(img, x + (cellW - dw) / 2, y + (cellH - dh) / 2, dw, dh);
      // Frame number badge
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(x, y, 28, 20);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 11px Inter, sans-serif";
      ctx.fillText("#" + (i + 1), x + 4, y + 14);
    });

    // Try modern clipboard API first
    const blob = await new Promise(r => canvas.toBlob(r, "image/png"));
    if (!blob) return out;
    try {
      if (typeof ClipboardItem === "function" &&
          navigator.clipboard && navigator.clipboard.write) {
        await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
        out.ok = true; out.mode = "clipboard";
        return out;
      }
      throw new Error("ClipboardItem unavailable");
    } catch (clipErr) {
      // Fallback: open in a new tab so the reviewer can right-click → Copy.
      // Bitable iframe usually blocks ClipboardItem; this fallback lets the
      // reviewer ship the PNG anyway without leaving the table.
      console.warn("[AtomConsole] ClipboardItem blocked → opening composite in tab:",
        clipErr && clipErr.message);
      const dataUrl = canvas.toDataURL("image/png");
      try {
        const w = window.open("");
        if (w) {
          w.document.write(
            "<title>Keyframes composite — copy this image</title>" +
            "<body style=\"margin:0;background:#181715;color:#fff;font:13px sans-serif\">" +
              "<p style=\"padding:8px 12px;margin:0\">Right-click the image → <b>Copy image</b>, then paste into the specialist chat.</p>" +
              "<img src=\"" + dataUrl + "\" style=\"max-width:100%;display:block\">" +
            "</body>");
        }
        out.mode = "newtab";
        // We didn't write to clipboard, but we did surface the image — call it ok.
        out.ok = true;
        out.dataUrl = dataUrl;
        return out;
      } catch (e2) {
        console.error("[AtomConsole] keyframe newtab fallback failed:", e2);
        return out;
      }
    }
  } catch (e) {
    console.error("[AtomConsole] copyKeyframesComposite error:", e);
    return out;
  }
}

function imagesAttachedSummary(images) {
  if (!images || !images.length) return { count: 0, note: "no images attached" };
  const types = {};
  for (const im of images) {
    const t = (im && (im.type || im.ext || "")) || "image";
    types[t] = (types[t] || 0) + 1;
  }
  const parts = Object.keys(types).map(k => k + "×" + types[k]).join(", ");
  // Following the legacy plugin's V3.1.0 pattern: this note tells the specialist
  // skill that the reviewer is expected to paste a composite keyframes image
  // alongside the JSON payload. The skill reads images_note as a hint to look
  // for the multimodal attachment in the same chat turn.
  const cap = Math.min(images.length, 12);
  const note =
      images.length + " keyframe(s) (" + parts + "). " +
      "If the reviewer pasted a composite keyframes image in this chat turn " +
      "(top " + cap + " frames in a 2-col grid, frame numbers labeled top-left), " +
      "analyze it visually as primary evidence for atom tagging. " +
      "Trust pixels over visual_summary on conflict.";
  return { count: images.length, note: note };
}

// Collect every atom_key referenced by a claim's gates/modifiers/exceptions.
function atomKeysReferencedByClaim(c) {
  const acc = new Set();
  const dims = ["C","S","P","R","E"];
  for (const d of dims) {
    const arr = (c.gates && c.gates[d]) || [];
    for (const k of arr) acc.add(k);
  }
  ["modifiers_required","modifiers_excluded","modifiers_lift_to_approve",
   "exceptions_required"].forEach(prop => {
    const arr = c[prop] || [];
    for (const k of arr) acc.add(k);
  });
  // modifiers_lift_dnf is array of { atom_key, lift }
  const dnf = c.modifiers_lift_dnf || [];
  for (const item of dnf) {
    if (item && item.atom_key) acc.add(item.atom_key);
  }
  // exception_qualifiers: { atom_key: [...] } — keys are atom_keys
  const eq = c.exception_qualifiers || {};
  for (const k in eq) acc.add(k);
  const eqm = c.exception_qualifier_modifiers || {};
  for (const k in eqm) acc.add(k);
  return acc;
}

// Pick atoms_catalog entries restricted to dims the candidate touched +
// atoms referenced by the relevant claim slice. Drastically reduces
// per-payload size while preserving every audit_rule the specialist needs.
function sliceAtomsCatalog(corpus, fullCatalog, relevantClaims, tags) {
  const keepKeys = new Set();

  // (a) Every atom_key referenced by the relevant claims (gates + modifiers + exceptions).
  for (const c of relevantClaims) {
    atomKeysReferencedByClaim(c).forEach(k => { if (k) keepKeys.add(String(k).trim()); });
  }
  // (b) Every atom the reviewer drafted on the candidate.
  if (tags) {
    for (const d of ["C","S","P","R","E","M","X"]) {
      const arr = tags[d] || [];
      arr.forEach(k => { if (k) keepKeys.add(String(k).trim()); });
    }
  }

  const out = { C:[], S:[], P:[], R:[], E:[], M:[], X:[] };
  for (const d of Object.keys(fullCatalog)) {
    for (const a of fullCatalog[d]) {
      if (keepKeys.has(String(a.atom_key).trim())) out[d].push(a);
    }
  }
  return out;
}

// Pick a relevant slice of NSA claims for the candidate.
//   - Always include claims that the engine flagged as gate_hit OR suppressed
//     (these are the engine's universe of "fired or nearly fired").
//   - Always include claims for the candidate's policy_title.
//   - Include any claim whose gate intersects with the candidate's tagged atoms.
//   - Include any claim referenced by precedent decisions (rationale anchors).
//   - Cap with a hard limit; if everything is in scope, fall back to all NSA
//     claims (with an explicit `claim_slice_mode = "full"` flag so the
//     specialist knows the slice was not narrowed).
function sliceRelevantClaims(allIssueClaims, opts) {
  const { engineResult, candidatePolicyTitle, tags, precedents, hardCap, policyArea } = opts;
  const cap = hardCap || 60;

  // (0) Umbrella policy areas (HHB = HSS+BPI+HHB) or absent draft tags:
  //     Send ALL issueClaims unsliced. The skill needs the full claim set
  //     cross-vertically to propose atoms the reviewer hasn't tagged yet.
  //     This matches the LLM-first flow (no draft atoms at send time).
  const tagCount = tags ? ["C","S","P","R","E","M","X"].reduce((s,d) => s + (tags[d] || []).length, 0) : 0;
  const isUmbrella = !!(POLICY_AREA_INCLUDES[policyArea]);
  if ((isUmbrella || tagCount === 0) && allIssueClaims.length <= 300) {
    return { claims: allIssueClaims, mode: "full", kept_ids: allIssueClaims.map(c => c.claim_id), all_count: allIssueClaims.length };
  }

  const keepIds = new Set();
  // (a) Engine-considered claims
  if (engineResult) {
    for (const h of (engineResult.gate_hits || []))   if (h.claim_id) keepIds.add(h.claim_id);
    for (const s of (engineResult.suppressed  || []))  if (s.claim_id) keepIds.add(s.claim_id);
    for (const cl of (engineResult.applied_claim_chain || [])) if (cl) keepIds.add(cl);
  }

  // (b) Candidate policy_title match
  const titleNorm = String(candidatePolicyTitle || "").trim().toLowerCase();
  if (titleNorm) {
    for (const c of allIssueClaims) {
      const titles = (c.policy_titles || []).map(t => String(t).trim().toLowerCase());
      if (titles.includes(titleNorm)) keepIds.add(c.claim_id);
    }
  }

  // (c) Atom intersection (any gate atom in tagged set)
  const tagSet = new Set();
  if (tags) {
    for (const d of ["C","S","P","R","E","M","X"]) {
      (tags[d] || []).forEach(k => k && tagSet.add(String(k).trim()));
    }
  }
  if (tagSet.size) {
    for (const c of allIssueClaims) {
      const g = c.gates || {};
      let hit = false;
      for (const d of ["C","S","P","R","E"]) {
        for (const k of (g[d] || [])) {
          if (tagSet.has(String(k).trim())) { hit = true; break; }
        }
        if (hit) break;
      }
      if (hit) keepIds.add(c.claim_id);
    }
  }

  // (d) Precedent policy_titles → also pull those claims (precedents anchor analogy)
  const precTitles = new Set();
  for (const p of (precedents || [])) {
    if (p && p.policy_title) precTitles.add(String(p.policy_title).trim().toLowerCase());
  }
  if (precTitles.size) {
    for (const c of allIssueClaims) {
      const titles = (c.policy_titles || []).map(t => String(t).trim().toLowerCase());
      for (const t of titles) {
        if (precTitles.has(t)) { keepIds.add(c.claim_id); break; }
      }
    }
  }

  let mode = "slice";
  let kept = allIssueClaims.filter(c => keepIds.has(c.claim_id));

  // If we somehow narrowed below 1 (no signal at all), fall back to first
  // `cap` claims so the specialist still sees the rule book shape.
  if (kept.length === 0) {
    kept = allIssueClaims.slice(0, cap);
    mode = "fallback_top_n";
  }
  // If slice exceeds cap, keep the cap-sized prefix (deterministic order).
  if (kept.length > cap) {
    kept = kept.slice(0, cap);
    mode = "slice_capped";
  }

  return { claims: kept, mode: mode, kept_ids: Array.from(keepIds), all_count: allIssueClaims.length };
}

function buildAtomRulesBlock(corpus, policyArea, opts) {
  if (!policyArea || !corpus || !corpus.claims || !corpus.atoms) return null;
  opts = opts || {};

  // 1. Filter claims to ones whose `issue` matches the policy area.
  const issueClaims = corpus.claims.filter(c => matchesPolicyArea(c.issue, policyArea));

  // 2. Build atoms_catalog for this policy area (used for slicing; not all of it ships).
  const referenced = new Set();
  for (const c of issueClaims) {
    const keys = atomKeysReferencedByClaim(c);
    keys.forEach(k => { if (k) referenced.add(String(k).trim()); });
  }
  const atomByKey = {};
  for (const a of corpus.atoms) {
    const k = String(a.atom_key || "").trim();
    if (k) atomByKey[k] = a;
  }
  const fullCatalog = { C: [], S: [], P: [], R: [], E: [], M: [], X: [] };
  let unresolved = 0;
  for (const k of referenced) {
    const a = atomByKey[k];
    if (!a) { unresolved++; continue; }
    const d = (a.dimension || "X").toString().trim().toUpperCase().charAt(0);
    if (!fullCatalog[d]) fullCatalog[d] = [];
    fullCatalog[d].push({
      atom_key:    a.atom_key,
      atom_name:   a.atom_name,
      dimension:   a.dimension,
      serial_code: a.serial_code,
      description: a.description,
      audit_rule:  a.audit_rule
    });
  }
  for (const d of Object.keys(fullCatalog)) {
    fullCatalog[d].sort((x, y) => String(x.serial_code || "").localeCompare(String(y.serial_code || "")));
  }

  // 3. Slice claims relevant to this candidate
  const sliced = sliceRelevantClaims(issueClaims, {
    engineResult:        opts.engineResult,
    candidatePolicyTitle: opts.candidatePolicyTitle,
    tags:                opts.tags,
    precedents:          opts.precedents,
    hardCap:             opts.hardCap || 60,
    policyArea:          policyArea
  });

  // 4. Slim atoms_catalog to entries the relevant claims actually need.
  const slicedCatalog = sliceAtomsCatalog(corpus, fullCatalog, sliced.claims, opts.tags);

  // 5. Emit slimmed claim list — strip empty arrays / objects to save bytes.
  const claimsOut = sliced.claims.map(c => {
    const out = {
      claim_id: c.claim_id,
      issue:    c.issue,
      outcome:  c.outcome,
      gates:    c.gates || {}
    };
    if (c.policy_titles && c.policy_titles.length) out.policy_titles = c.policy_titles;
    if (c.modifiers_required && c.modifiers_required.length) out.modifiers_required = c.modifiers_required;
    if (c.modifiers_excluded && c.modifiers_excluded.length) out.modifiers_excluded = c.modifiers_excluded;
    if (c.modifiers_lift_to_approve && c.modifiers_lift_to_approve.length) out.modifiers_lift_to_approve = c.modifiers_lift_to_approve;
    if (c.modifiers_lift_dnf && c.modifiers_lift_dnf.length) out.modifiers_lift_dnf = c.modifiers_lift_dnf;
    if (c.exceptions_required && c.exceptions_required.length) out.exceptions_required = c.exceptions_required;
    if (c.exceptions_lift_to_approve) out.exceptions_lift_to_approve = true;
    if (c.exception_qualifiers && Object.keys(c.exception_qualifiers).length) out.exception_qualifiers = c.exception_qualifiers;
    if (c.exception_qualifier_modifiers && Object.keys(c.exception_qualifier_modifiers).length) out.exception_qualifier_modifiers = c.exception_qualifier_modifiers;
    if (c.requires_exception_context) out.requires_exception_context = true;
    if (c.routing && (c.routing.non_realistic_routes_to || c.routing.cross_title_redirect)) out.routing = c.routing;
    if (c.notes) out.notes = c.notes;
    return out;
  });

  // Stats for header
  const catCounts = {};
  let total = 0;
  for (const d of ["C","S","P","R","E","M","X"]) {
    catCounts[d] = (slicedCatalog[d] || []).length;
    total += catCounts[d];
  }

  if (unresolved > 0) {
    try { console.warn("[AtomConsole] buildAtomRulesBlock:",
      unresolved, "/", referenced.size, "referenced atom_keys did not resolve in corpus.atoms"); } catch(_) {}
  }
  try { console.info("[AtomConsole] atom_rules built:",
    "policy=" + policyArea,
    "claims_all=" + issueClaims.length,
    "claims_kept=" + claimsOut.length + " (mode=" + sliced.mode + ")",
    "atoms_in_slice=" + total,
    "corpus.atoms=" + corpus.atoms.length); } catch(_) {}

  return {
    policy_area: policyArea,
    dimensions: {
      C: { name: "Content",       weight: 1.0, role: "primary gate" },
      S: { name: "Subject",       weight: 1.0, role: "primary gate" },
      P: { name: "Portrayal",     weight: 1.0, role: "primary gate" },
      R: { name: "Realism",       weight: 0.7, role: "secondary gate; affects routing" },
      E: { name: "Explicitness",  weight: 0.7, role: "secondary gate" },
      M: { name: "Modifier",      weight: 0.5, role: "lift / suppress claim outcome" },
      X: { name: "Exception",     weight: 0.5, role: "lift / context-required" }
    },
    semantics: {
      gate_logic: "AND across dimensions (C,S,P,R,E); OR within each dimension. " +
                  "Empty dimension = wildcard (no constraint).",
      verdict_priority: ["VIOLATION","NOT_RECOMMEND","NOT_FOR_FEED","APPROVE","NO_CLAIM_FIRED"],
      lift_logic: "modifiers_lift_to_approve atoms tagged → outcome upgraded to APPROVE. " +
                  "modifiers_lift_dnf atoms apply per-claim partial lifts. " +
                  "exceptions_required atoms must all be tagged when requires_exception_context=true.",
      routing_logic: "non_realistic_routes_to: when realism atoms imply non-realistic content, " +
                     "re-route to a different claim chain. cross_title_redirect: rebind verdict to a different policy_title."
    },
    atoms_catalog:    slicedCatalog,    // sliced: only atoms referenced by claims_in_scope or tagged on candidate
    atoms_in_scope:   total,
    atoms_per_dim:    catCounts,
    claims:           claimsOut,
    claims_in_scope:  claimsOut.length,
    claims_total_for_policy_area: issueClaims.length,
    claim_slice_mode: sliced.mode,        // "slice" | "slice_capped" | "fallback_top_n"
    note:             "atom_rules is a CASE-SCOPED SLICE. The full atom rule book lives in the skill body. " +
                      "claims_in_scope = " + claimsOut.length + " of " + issueClaims.length + " total " + policyArea + " claims. " +
                      "atoms_catalog only includes atoms referenced by these claims or tagged on the candidate."
  };
}

function buildPayload(pendingCase, tags, engineResult, precedentsResult, corpus) {
  if (!pendingCase) return null;
  const policy_area = resolvePolicyArea(pendingCase.issue);
  const imgSummary = imagesAttachedSummary(pendingCase.images);

  const candidate = {
    item_id:                pendingCase.source_video_id || pendingCase.record_id || "",
    record_id:              pendingCase.record_id || "",
    policy_title:           pendingCase.policy_title || "",
    issue:                  pendingCase.issue || "",
    visual_summary:         pendingCase.visual_summary || "",
    asr_text:               pendingCase.asr_text || "",
    ocr_text:               pendingCase.ocr_text || "",
    caption_text:           pendingCase.caption_text || "",
    images_attached_count:  imgSummary.count,
    images_note:            imgSummary.note,
    // Reviewer's draft tags (may be empty). Specialist may revise.
    draft_atom_tags:        tags || {}
  };

  // Precedents — content-only, no retrieval scores. Atoms are the analogy
  // anchor. Decision + rationale tell the specialist how the atom set was
  // historically resolved. Long text fields are capped to keep payload size
  // sane (typical case shrinks 122 KB → ~40 KB without losing precedential
  // signal — the specialist also reads the candidate composite image).
  const PREC_VS_CAP   = 1500;   // visual_summary
  const PREC_TEXT_CAP = 800;    // asr_text / ocr_text / caption_text each
  const PREC_RAT_CAP  = 1000;   // rationale
  const _cap = (s, n) => {
    if (!s) return "";
    const t = String(s);
    if (t.length <= n) return t;
    return t.slice(0, n) + " …[truncated +" + (t.length - n) + " chars]";
  };
  const precedents = ((precedentsResult && precedentsResult.results) || []).map((r, i) => ({
    rank:               i + 1,
    case_id:            r.case_id || r.source_video_id || "",
    source_video_id:    r.source_video_id || "",
    policy_title:       r.policy_title || "",
    issue:              r.issue || "",
    decision:           r.decision || "",
    visual_summary:     _cap(r.visual_summary, PREC_VS_CAP),
    asr_text:           _cap(r.asr_text,       PREC_TEXT_CAP),
    ocr_text:           _cap(r.ocr_text,       PREC_TEXT_CAP),
    caption_text:       _cap(r.caption_text,   PREC_TEXT_CAP),
    rationale:          _cap(r.rationale,      PREC_RAT_CAP),
    atoms:              r.atoms || {},        // full tag set, all 7 dims
    images:             (r.images || []).map(im => ({
      // Strip volatile tokens; keep stable metadata so specialist can reference
      // "image #2 shows X" without leaking signed urls.
      name: im && im.name || "",
      type: im && (im.type || im.ext) || "",
      size: im && im.size || null
    }))
  }));

  // Engine output as a simulation hint (the specialist may agree, override, or
  // re-tag and re-run mentally using the embedded atom_rules.claims).
  const engine_simulation = engineResult ? {
    verdict:              engineResult.verdict,
    applied_claim_chain:  engineResult.applied_claim_chain || [],
    lifts_applied:        engineResult.lifts_applied || [],
    routing:              engineResult.routing || {},
    gate_hits: (engineResult.gate_hits || []).map(h => ({
      claim_id:            h.claim_id,
      outcome_base:        h.outcome_base,
      outcome_after_lifts: h.outcome_after_lifts,
      lift:                h.lift || null,
      evidence:            h.evidence || {},
      policy_titles:       h.policy_titles || []
    })),
    suppressed: (engineResult.suppressed || []).map(s => ({
      claim_id:        s.claim_id,
      outcome_base:    s.outcome_base,
      suppress_reason: s.suppress_reason,
      policy_titles:   s.policy_titles || []
    }))
  } : null;

  // v0.9.0: Claims are now baked into the specialist skill (Appendix B).
  // Payload no longer ships claims_slice — the skill has the full non-approve
  // corpus (223 claims) and doesn't need per-case claim data from the plugin.
  // The local engine still uses corpus.claims for in-plugin simulation.

  // Tiny version pointer so the specialist can verify rule book alignment.
  const rule_book_ref = {
    schema: "atom-catalog",
    version: "v1.0",
    policy_area: policy_area
  };

  return {
    schema:           "case-review-payload",
    version:          "v0.7",
    policy_area:      policy_area,
    generated_at:     new Date().toISOString(),
    generator:        PLUGIN_VERSION,
    // Strong, version-locked discriminator so the agent picks the atom skill
    // unambiguously even if the legacy nsa-precedent-review skill description
    // also matches `schema=case-review-payload`. The atom skill description
    // pins on `version=v0.6` AND on `_route_hint`.
    _route_hint:      (policy_area ? policy_area.toLowerCase() : "nsa") + "-atom-precedent-review",
    candidate:        candidate,
    precedents:       precedents,
    rule_book_ref:    rule_book_ref,
    engine_simulation: engine_simulation
  };
}

// ---- PayloadPane: emit + copy + JSON preview -------------------------------
// Two-step UX (v0.6.6, ported from legacy case_review_mvp V3.1.0):
//   1. "Send payload"     — copies payload (with route preamble) to clipboard.
//                           Falls back to .json download if the iframe blocks
//                           Clipboard API.
//   2. "Copy keyframes (N)" — builds a single PNG composite of up to 12 frames
//                           in a 2-col grid and writes it to the clipboard via
//                           ClipboardItem. Pasting that PNG gives the specialist
//                           a real multimodal attachment (pixels), not URLs the
//                           agent can't fetch. Falls back to opening a new tab
//                           where the reviewer can right-click → Copy image.
//   • "↓ .json" remains as a quiet ghost link for offline / drag-into-chat.
function PayloadPane(props) {
  const { payload, pendingCase, imageMeta } = props;
  const [copyState, setCopyState]       = React.useState("idle"); // idle | ok | err
  const [imgState,  setImgState]        = React.useState("idle"); // idle | resolving | ok | newtab | err
  const [resolvedImgUrls, setResolvedImgUrls] = React.useState([]);
  const [open, setOpen] = React.useState(false);

  if (!payload) return null;

  const json = React.useMemo(() => JSON.stringify(payload, null, 2), [payload]);
  const sizeKb = (json.length / 1024).toFixed(1);
  const precCount = (payload.precedents || []).length;
  const policyArea = payload.policy_area || "—";
  const verdict = payload.engine_simulation ? payload.engine_simulation.verdict : "(no atoms tagged)";
  const rbr = payload.rule_book_ref || null;
  const rbVersion = rbr ? rbr.version : null;
  // v0.9: claims baked into skill — no claims_slice in payload
  const routeHint  = payload._route_hint || "nsa-atom-precedent-review";

  // Compose payload-with-preamble: gives the agent an unambiguous routing cue
  // even if the (older) legacy nsa-precedent-review skill description also
  // matches schema=case-review-payload. The preamble is plain text the user
  // would type, so it doesn't break the JSON parser on the receiving side.
  const payloadWithPreamble =
      "Run /" + routeHint + " on this case-review-payload (v0.7, claims baked in skill):\n\n" +
      json;

  const hasImages = !!(pendingCase && pendingCase.images && pendingCase.images.length);
  const imgCount  = hasImages ? pendingCase.images.length : 0;

  // ---- helpers --------------------------------------------------------------

  const copyText = async (text) => {
    let ok = false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText &&
          window.isSecureContext !== false) {
        await navigator.clipboard.writeText(text);
        ok = true;
      }
    } catch (e) { /* fall through */ }
    if (!ok) {
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed"; ta.style.left = "-1000px"; ta.style.top = "0";
        document.body.appendChild(ta);
        ta.select();
        ta.setSelectionRange(0, text.length);
