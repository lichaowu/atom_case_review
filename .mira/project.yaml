# Mira Project config — case_review_atom_mvp
# Lives at: <repo_root>/.mira/project.yaml
# Bound Mira Project: "AI Policy"
#
# Local is the source of truth. This file declares which parts of the local
# repo Mira should treat as project context, which to exclude, and how to
# keep the cloud/sandbox copy in sync.

project:
  name: case_review_atom_mvp
  mira_project: "AI Policy"
  owner: "1132591"
  description: >
    NSA + HHB + HRA ATLAS Atom Rules Bitable plugin + three companion specialist skills.
    Sibling of case_review_mvp (legacy V0.3 console). Local-truth, sandbox-first.

# ---------------------------------------------------------------------------
# Sync — local <-> sandbox copy
# ---------------------------------------------------------------------------
sync:
  local_root: "~/Documents/Rich/case_review_atom_mvp"
  sandbox_root: "userdata/1132591/case_review_atom_mvp"
  strategy: mtime_one_way        # local -> sandbox; never reverse without explicit write-back
  on_session_open:
    - check_local_mtimes         # 1 cheap stat per pinned file
    - copy_changed_only          # only re-copy files where local mtime > sandbox mtime
  on_write_back:
    - write_local_via_mcp        # final patches go to local first
    - mirror_to_sandbox          # then update the sandbox copy so next session is in sync

# ---------------------------------------------------------------------------
# Pins — auto-load into session context on project open
# ---------------------------------------------------------------------------
# Glob-based so new files matching the patterns are picked up automatically
# the next time the project opens. Size-capped to prevent accidental bloat.
pins:
  globs:
    - "PROJECT_NOTES.md"
    - "docs/*.md"
    - "*.md"                     # top-level .md files
  exclude_from_pins:
    - "REVIEW_AND_DESIGN.md"     # historical; pin only on demand
    - "CHANGELOG.md"             # available, but only read when version-walking
  max_pin_size_kb: 100           # auto-skip pins larger than this; surface a warning instead

# ---------------------------------------------------------------------------
# On-demand — included in the project, read only when relevant
# ---------------------------------------------------------------------------
on_demand:
  - "plugin/dist/index.html"           # ~157 KB — use grep + line ranges
  - "plugin/manifest.json"
  - "skills/**/SKILL.md"
  - "skills/**/schema/*.json"
  - "skills/**/*.json"

# ---------------------------------------------------------------------------
# Excludes — never enter the Mira project
# ---------------------------------------------------------------------------
excludes:
  - "context/**"                 # 19 MB external reference snapshot — local only
  - "**/node_modules/**"
  - "**/.DS_Store"
  - "**/*.log"
  - "**/.next/**"
  - "**/dist/**.map"

# ---------------------------------------------------------------------------
# Drift handling — keep the project setup itself fresh
# ---------------------------------------------------------------------------
drift:
  refresh_ritual: on_version_bump   # re-evaluate pin list when CHANGELOG gets a new version entry
  audit_on_session_open: false      # skip per-session audit; rely on globs + ritual
  notify_on:
    - new_top_level_directory       # e.g., a new tests/ folder shows up
    - oversized_pinned_file         # any glob-matched file > max_pin_size_kb
    - orphaned_cloud_file           # file exists in sandbox but not in local

# ---------------------------------------------------------------------------
# External references (not in repo, but project-relevant)
# ---------------------------------------------------------------------------
external:
  bitable:
    name: "AI Policy Rule Book"
    base_token: "LGf7bfNwla5QmcscMEhljFWjgId"
    tables:
      atlas_atoms: "tblUnjW7W9hiAJ93"
      atlas_atom_rules: "tblWrb1MWg7nzV3d"
      atlas_molecules: "tblhpm2SOraBjxJF"
  sibling_plugin: "case_review_mvp"
  upstream_atlas_app: "context/agent014-atlas-main"   # local mirror only

# ---------------------------------------------------------------------------
# Versioning of this config
# ---------------------------------------------------------------------------
config_version: "1.0"
